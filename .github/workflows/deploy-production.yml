          export PROD_SERVER_USER="$U_SECRET"
        fi
        export PROD_DB_HOST="$DB_HOST_RESOLVED"
        DU="${{ secrets.PRODUCTION_DB_USER }}"
        DP="${{ secrets.PRODUCTION_DB_PASSWORD }}"
