name: Deploy Homepage

on:
  push:
    branches:
      - develop
      - dev
      - homepage/develop
      - main
      - master
  pull_request:
    branches:
      - develop
      - dev
      - homepage/develop
      - main
      - master

jobs:
  # 개발 브랜치 배포
  deploy-dev:
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/homepage/develop'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
        continue-on-error: true
        # TODO: ESLint 에러 수정 후 continue-on-error 제거 (values, ConsultationBottomSheet, ReviewsList 등)
      
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.DEV_API_BASE_URL || secrets.NEXT_PUBLIC_API_BASE_URL || 'https://api.mindgarden.co.kr' }}
          BLOG_ADMIN_PASSWORD: ${{ secrets.DEV_BLOG_ADMIN_PASSWORD || secrets.BLOG_ADMIN_PASSWORD }}
          DB_HOST: ${{ secrets.DEV_DB_HOST || secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DEV_DB_PORT || secrets.DB_PORT }}
          DB_USER: ${{ secrets.DEV_DB_USER || secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DEV_DB_PASSWORD || secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DEV_DB_NAME || secrets.DB_NAME }}

      # ------------------------------------------------------------------
      # 개발 배포: CI(린트·빌드) 통과 후에만 SSH로 서버에서 동일 스크립트 실행 → pm2 재기동
      # 사용법: 저장소 Variables 에 HOMEPAGE_DEV_SSH_DEPLOY=true
      #         Secrets 에 DEV_SSH_HOST, DEV_SSH_USER, DEV_SSH_KEY (개인키 PEM 전체)
      # 상세: docs/DEV_DEPLOY_CI_SSH.md
      # Webhook(푸시 즉시 배포)과 병행 가능하나, 이중 빌드가 될 수 있음 → 운영에서 한쪽만 쓰는 것을 권장
      # ------------------------------------------------------------------
      - name: Deploy to dev server (SSH, after CI)
        if: github.event_name == 'push' && vars.HOMEPAGE_DEV_SSH_DEPLOY == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /var/www/homepage
            bash deploy-from-webhook.sh

      # Webhook만 쓰는 경우(HOMEPAGE_DEV_SSH_DEPLOY 미설정): 푸시 시 서버 homepage-webhook → deploy-from-webhook.sh

  # 프로덕션 브랜치 빌드 및 테스트
  build-and-test:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
      
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL || 'https://api.mindgarden.co.kr' }}
          BLOG_ADMIN_PASSWORD: ${{ secrets.BLOG_ADMIN_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
      
      # 프로덕션 배포는 별도로 설정 필요 (예: Vercel, 자체 서버 등)
      # - name: Deploy to Production
      #   if: github.event_name == 'push'
      #   run: |
      #     # 배포 스크립트 추가

