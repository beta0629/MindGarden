# Google Gemini 설정 (향후 지원)
#gemini:
#  api:
#    key: ${GEMINI_API_KEY:}
#    url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1/models}
#  model: ${GEMINI_MODEL:gemini-pro}

# AI 모델 및 모니터링 설정 (통합)
ai:
  # AI 모델 설정 (확장 가능)
  model:
    provider: ${AI_MODEL_PROVIDER:openai}  # openai, claude, gemini 등
  # AI 모니터링 설정 (하이브리드 방식)
  monitoring:
    enabled: ${AI_MONITORING_ENABLED:false}  # AI 모니터링 활성화 여부 (기본: 비활성화)
    hybrid:
      enabled: true  # 하이브리드 모드 (통계 + AI)
      # 1차 필터링: 통계 기반 임계값
      statistical-threshold:
        cpu: 70.0      # CPU 70% 이상일 때만 AI 분석 고려
        memory: 75.0   # 메모리 75% 이상일 때만 AI 분석 고려
        jvm: 80.0      # JVM 80% 이상일 때만 AI 분석 고려
      # 2차 분석: AI 호출 조건
      ai-trigger:
        consecutive-violations: 3  # 연속 3회 임계값 초과 시 AI 호출
        severity-threshold: "MEDIUM"  # MEDIUM 이상 심각도일 때만 AI 호출
        cooldown-minutes: 30  # AI 호출 후 30분간 재호출 방지 (비용 절감)
    # 비용 관리
    cost-control:
      daily-limit: 100  # 일일 AI 호출 최대 횟수
      monthly-budget: 50.0  # 월 예산 (USD)
      alert-threshold: 80  # 예산 80% 도달 시 알림

# 민감정보 보호 설정은 아래 security 섹션으로 통합됨

# 온보딩 자동 승인 설정
onboarding:
  auto-approval:
    enabled: ${ONBOARDING_AUTO_APPROVAL_ENABLED:true}  # 자동 승인 활성화 여부
    allowed-risk-levels: ${ONBOARDING_AUTO_APPROVAL_RISK_LEVELS:LOW}  # 허용 위험도 (쉼표로 구분: LOW,MEDIUM)
    allowed-business-types: ${ONBOARDING_AUTO_APPROVAL_BUSINESS_TYPES:}  # 허용 업종 (쉼표로 구분, 비어있으면 모든 업종 허용)
    require-payment-method: ${ONBOARDING_AUTO_APPROVAL_REQUIRE_PAYMENT:false}  # 결제 수단 필수 여부 (false: 선택 사항)
    require-subscription: ${ONBOARDING_AUTO_APPROVAL_REQUIRE_SUBSCRIPTION:false}  # 구독 필수 여부 (false: 선택 사항)

# Ops Portal 관리자 계정 설정 (프로파일별 설정에서 기본값 제공)
ops:
  admin:
    # Ops Portal 관리자 아이디 (환경 변수 또는 프로파일별 기본값 사용)
    # OpsAuthController에서 userId로 사용하므로 userId로 설정
    userId: ${OPS_ADMIN_USERNAME:ops_core}
    username: ${OPS_ADMIN_USERNAME:ops_core}  # 하위 호환성
    # Ops Portal 관리자 비밀번호 (환경 변수 또는 프로파일별 기본값 사용)
    password: ${OPS_ADMIN_PASSWORD:godgod826!}
    # Ops Portal 관리자 역할 (환경 변수 또는 프로파일별 기본값 사용)
    role: ${OPS_ADMIN_ROLE:HQ_ADMIN}

# 환경변수 기본값 설정은 프로파일별 설정 파일에서 관리

# 이메일 설정은 프로파일별 설정 파일에서 관리

# 카카오 알림톡 설정은 프로파일별 설정 파일에서 관리

# =====================================================
# 스케줄러 설정 (배치 작업 표준화)
# =====================================================
scheduler:
  # 전역 설정
  task:
    scheduling:
      pool:
        size: 10  # 스케줄러 스레드 풀 크기
      thread-name-prefix: scheduler-

  # 알림 설정
  alert:
    enabled: ${SCHEDULER_ALERT_ENABLED:true}
    success-rate-threshold: ${SCHEDULER_SUCCESS_RATE_THRESHOLD:0.95}  # 95% 미만 시 알림

  # 개별 스케줄러 설정
  # 1. 급여 배치 스케줄러
  salary-batch:
    enabled: ${SCHEDULER_SALARY_BATCH_ENABLED:true}
    cron: ${SCHEDULER_SALARY_BATCH_CRON:0 0 2 * * ?}  # 매일 새벽 2시

  salary-batch-monitor:
    enabled: ${SCHEDULER_SALARY_BATCH_MONITOR_ENABLED:true}
    cron: ${SCHEDULER_SALARY_BATCH_MONITOR_CRON:0 0 * * * ?}  # 매시간 정각

  # 2. 구독 만료 스케줄러
  subscription-expiration:
    enabled: ${SCHEDULER_SUBSCRIPTION_EXPIRATION_ENABLED:true}
    cron: ${SCHEDULER_SUBSCRIPTION_EXPIRATION_CRON:0 0 2 * * ?}  # 매일 새벽 2시

  # 3. 스케줄 자동 완료 스케줄러
  schedule-auto-complete:
    enabled: ${SCHEDULER_SCHEDULE_AUTO_COMPLETE_ENABLED:true}
    cron: ${SCHEDULER_SCHEDULE_AUTO_COMPLETE_CRON:0 */10 * * * *}  # 매 10분마다

  # 4. 통계 생성 스케줄러
  statistics-generation:
    enabled: ${SCHEDULER_STATISTICS_GENERATION_ENABLED:true}
    cron: ${SCHEDULER_STATISTICS_GENERATION_CRON:0 1 0 * * *}  # 매일 자정 1분 후

  # 5. 웰니스 알림 스케줄러
  wellness-notification:
    enabled: ${SCHEDULER_WELLNESS_NOTIFICATION_ENABLED:true}
    cron: ${SCHEDULER_WELLNESS_NOTIFICATION_CRON:0 0 9 * * ?}  # 매일 오전 9시

  # 6. 상담일지 알림 스케줄러
  consultation-record-alert:
    enabled: ${SCHEDULER_CONSULTATION_RECORD_ALERT_ENABLED:true}
    cron: ${SCHEDULER_CONSULTATION_RECORD_ALERT_CRON:0 0 9 * * *}  # 매일 오전 9시

  # 7. 워크플로우 자동화 스케줄러
  workflow-automation:
    enabled: ${SCHEDULER_WORKFLOW_AUTOMATION_ENABLED:true}
    cron: ${SCHEDULER_WORKFLOW_AUTOMATION_CRON:0 */10 * * * *}  # 매 10분마다

  # 8. 은행 이체 처리 스케줄러
  bank-transfer:
    enabled: ${SCHEDULER_BANK_TRANSFER_ENABLED:true}
    cron: ${SCHEDULER_BANK_TRANSFER_CRON:0 */5 * * * *}  # 매 5분마다

  # 9. 개인정보 파기 스케줄러
  personal-data-destruction:
    enabled: ${SCHEDULER_PERSONAL_DATA_DESTRUCTION_ENABLED:true}
    cron: ${SCHEDULER_PERSONAL_DATA_DESTRUCTION_CRON:0 0 3 * * ?}  # 매일 새벽 3시

  # 10. 세션 정리 스케줄러
  session-cleanup:
    enabled: ${SCHEDULER_SESSION_CLEANUP_ENABLED:true}
    cron: ${SCHEDULER_SESSION_CLEANUP_CRON:0 */5 * * * *}  # 매 5분마다

  # 11. 스키마 변경 감지 스케줄러
  schema-change-detection:
    enabled: ${SCHEDULER_SCHEMA_CHANGE_DETECTION_ENABLED:true}
    cron: ${SCHEDULER_SCHEMA_CHANGE_DETECTION_CRON:0 0 2 * * ?}  # 매일 새벽 2시

  # 12. 내담자 CLIENT 등급 자동 승급 (완료 스케줄 수·common_codes min_sessions)
  client-grade-auto:
    enabled: ${SCHEDULER_CLIENT_GRADE_AUTO_ENABLED:true}
    cron: ${SCHEDULER_CLIENT_GRADE_AUTO_CRON:0 15 3 * * ?}  # 매일 새벽 3시 15분

# =====================================================
# 보안 설정 (보안 표준화 + 민감정보 보호)
# =====================================================
security:
  # 민감정보 보호 (데이터 마스킹)
  data-masking:
    enabled: ${DATA_MASKING_ENABLED:true}  # 민감정보 마스킹 활성화 (운영: true, 개발: false)
    mask-in-logs: true  # 로그 출력 시 마스킹
    mask-in-ai-analysis: true  # AI 분석 시 마스킹
    mask-in-external-api: true  # 외부 API 전송 시 마스킹

  # 로그인 보안
  login:
    max-attempts: ${SECURITY_LOGIN_MAX_ATTEMPTS:5}  # 최대 로그인 시도 횟수
    lockout-duration-minutes: ${SECURITY_LOGIN_LOCKOUT_DURATION:30}  # 계정 잠금 시간 (분)

  # JWT 설정
  jwt:
    secret-min-length: ${JWT_SECRET_MIN_LENGTH:32}  # JWT 비밀키 최소 길이
    access-token-validity: ${JWT_ACCESS_TOKEN_VALIDITY:3600000}  # 1시간 (ms)
    refresh-token-validity: ${JWT_REFRESH_TOKEN_VALIDITY:604800000}  # 7일 (ms)

  # 비밀번호 정책
  password:
    strength: ${SECURITY_PASSWORD_STRENGTH:12}  # BCrypt 강도 12 (표준화: backend-ops와 동일)
    min-length: ${PASSWORD_MIN_LENGTH:8}  # 최소 길이
    max-length: ${PASSWORD_MAX_LENGTH:100}  # 최대 길이
    require-uppercase: ${PASSWORD_REQUIRE_UPPERCASE:true}  # 대문자 필수
    require-lowercase: ${PASSWORD_REQUIRE_LOWERCASE:true}  # 소문자 필수
    require-digit: ${PASSWORD_REQUIRE_DIGIT:true}  # 숫자 필수
    require-special: ${PASSWORD_REQUIRE_SPECIAL:true}  # 특수문자 필수

  # 보안 감사 로그
  audit:
    enabled: ${SECURITY_AUDIT_ENABLED:true}  # 감사 로그 활성화
    retention-days: ${SECURITY_AUDIT_RETENTION_DAYS:365}  # 로그 보관 기간 (일)
