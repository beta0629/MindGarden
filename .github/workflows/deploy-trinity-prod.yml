# Trinity 온보딩 정적 프론트 운영 배포 → /var/www/html-trinity (apply.e-trinity.co.kr)
# SSH/SCP: PRODUCTION_* 시크릿만 사용 (DEV_SERVER_* 금지)
#
# Repository secrets (필수): PRODUCTION_HOST, PRODUCTION_USER, PRODUCTION_SSH_KEY
# 선택: TRINITY_NEXT_PUBLIC_TOSS_CLIENT_KEY — 토스 라이브 클라이언트 키(저장소에 평문 금지)
#
# NEXT_PUBLIC_API_BASE_URL: 비워 두면 same-origin(/api/...) — nginx가 apply.e-trinity.co.kr/api → 백엔드로 프록시
#   운영 Core 공개 URL로만 직접 호출해야 하면 secrets.TRINITY_NEXT_PUBLIC_API_BASE_URL 에 절대 URL 설정

name: 🌟 Trinity 프론트엔드 운영 배포

on:
  push:
    branches: [main]
    paths:
      - "frontend-trinity/**"
      - ".github/workflows/deploy-trinity-prod.yml"
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "체크아웃할 Git ref (운영은 main만 허용)"
        required: false
        default: "main"
        type: string

jobs:
  deploy-trinity-prod:
    name: 🏗️ Trinity 프론트엔드 빌드 및 운영 배포
    runs-on: ubuntu-latest

    steps:
      - name: 🛡️ 운영 배포 ref 가드 (main만 허용)
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DREF="${{ github.event.inputs.deploy_ref }}"
            DREF="${DREF:-main}"
          else
            DREF="${{ github.ref_name }}"
          fi
          if [ "$DREF" != "main" ]; then
            echo "::error::운영 배포는 main 브랜치만 허용됩니다. 선택된 ref: $DREF"
            exit 1
          fi
          echo "deploy_ref=$DREF" >> "$GITHUB_OUTPUT"
          echo "이벤트=${{ github.event_name }} 배포 ref=$DREF"

      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.guard.outputs.deploy_ref }}

      - name: 📦 Node.js 18 설정
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend-trinity/package-lock.json

      - name: 📦 Trinity 프론트엔드 의존성 설치
        run: |
          cd frontend-trinity
          npm ci

      - name: 🏗️ Trinity 프론트엔드 빌드 (운영)
        env:
          # 비우면 utils/api.ts 가 상대 경로 — apply.e-trinity.co.kr 동일 출처
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.TRINITY_NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_TOSS_CLIENT_KEY: ${{ secrets.TRINITY_NEXT_PUBLIC_TOSS_CLIENT_KEY }}
          NEXT_PUBLIC_TOSS_TEST_MODE: "false"
          NODE_ENV: production
        run: |
          cd frontend-trinity
          ESLINT_NO_DEV_ERRORS=true npm run build

      - name: 🔍 Trinity 프론트엔드 빌드 결과 확인
        run: |
          echo "🔍 Trinity 프론트엔드 빌드 결과 확인..."
          if [ -d frontend-trinity/out ]; then
            FILE_COUNT=$(find frontend-trinity/out -type f 2>/dev/null | wc -l)
            if [ "$FILE_COUNT" -gt 0 ]; then
              echo "✅ frontend-trinity/out 디렉토리 생성됨: $FILE_COUNT 개 파일"
              ls -lh frontend-trinity/out/ | head -10
            else
              echo "❌ frontend-trinity/out 디렉토리가 비어있음!"
              exit 1
            fi
          else
            echo "❌ frontend-trinity/out 디렉토리 없음!"
            exit 1
          fi

      - name: 🔍 운영 서버 SSH 연결 테스트
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: 22
          timeout: 30s
          script: |
            echo "SSH 연결 테스트 성공: $(date)"
            echo "서버 정보: $(uname -a)"

      - name: 💾 배포 전 기존 파일 백업
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: 22
          timeout: 60s
          script: |
            sudo mkdir -p /var/www/backups/html-trinity

            if [ -d /var/www/html-trinity ] && [ "$(ls -A /var/www/html-trinity 2>/dev/null)" ]; then
              BACKUP_NAME="html-trinity-backup-$(date +%Y%m%d_%H%M%S).tar.gz"
              echo "💾 기존 파일 백업 중: $BACKUP_NAME"
              sudo tar -czf /var/www/backups/html-trinity/$BACKUP_NAME -C /var/www html-trinity
              echo "✅ 백업 완료: $BACKUP_NAME"
              ls -lh /var/www/backups/html-trinity/$BACKUP_NAME
            else
              echo "ℹ️ 백업할 기존 파일 없음 (신규 배포)"
            fi

            BACKUP_RETENTION_COUNT=5
            BACKUP_DIR="/var/www/backups/html-trinity"
            ls -1t "$BACKUP_DIR"/html-trinity-backup-*.tar.gz 2>/dev/null | tail -n +$((BACKUP_RETENTION_COUNT + 1)) | xargs -r sudo rm -f

      - name: 📤 Trinity 프론트엔드 파일 업로드 SCP (운영)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: 22
          timeout: 120s
          source: "frontend-trinity/out/*"
          target: "/var/www/html-trinity/"
          strip_components: 2
          overwrite: true

      - name: 🔄 Trinity 프론트엔드 배포 완료 및 검증
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: 22
          timeout: 60s
          script: |
            sudo mkdir -p /var/www/html-trinity
            sudo chown -R www-data:www-data /var/www/html-trinity
            sudo chmod -R 755 /var/www/html-trinity

            echo "🔍 배포된 파일 확인..."
            if [ -d /var/www/html-trinity ]; then
              FILE_COUNT=$(find /var/www/html-trinity -type f 2>/dev/null | wc -l)
              if [ "$FILE_COUNT" -gt 0 ]; then
                echo "✅ 배포 완료: $FILE_COUNT 개 파일"
                ls -lh /var/www/html-trinity/ | head -10
                if [ -f /var/www/html-trinity/index.html ]; then
                  echo "✅ index.html 확인됨"
                  echo "파일 크기: $(stat -c%s /var/www/html-trinity/index.html) bytes"
                else
                  echo "⚠️ index.html 없음!"
                  exit 1
                fi
              else
                echo "❌ 배포된 파일 없음!"
                exit 1
              fi
            else
              echo "❌ 배포 디렉토리 없음!"
              exit 1
            fi

            echo "✅ Trinity 프론트엔드 운영 배포 완료"

      - name: 🏥 배포 후 헬스체크
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: 22
          timeout: 30s
          script: |
            echo "🏥 헬스체크 시작..."
            sleep 3

            if sudo nginx -t 2>/dev/null; then
              echo "✅ Nginx 설정 정상"
            else
              echo "⚠️ Nginx 설정 오류 (계속 진행)"
            fi

            for i in {1..3}; do
              if curl -f -s -o /dev/null -w "%{http_code}" https://apply.e-trinity.co.kr | grep -qE "200|301|302"; then
                echo "✅ 웹사이트 접근 성공 (시도 $i)"
                curl -s -I https://apply.e-trinity.co.kr | head -5
                exit 0
              else
                echo "⏳ 헬스체크 대기 중... (시도 $i/3)"
                sleep 5
              fi
            done

            echo "⚠️ 헬스체크 실패 - 수동 확인 필요"
            echo "도메인: https://apply.e-trinity.co.kr"
