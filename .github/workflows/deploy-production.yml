    # 배경: PR #167 배포 시 운영 SSH 로 prod-from-dev.env 에 PROFILE_IMAGE_UPLOAD_DIR 를
    #       직접 추가했음. 후속 배포가 동일 키를 자동 주입하지 않으면 다음 운영자 작업·env
    #       재생성 시 사라질 위험 → 워크플로에서 멱등 주입으로 영구 보장.
    # 가이드: docs/project-management/2026-06-09/PROFILE_IMAGE_UPLOAD_OPS_GUIDE.md §5
    # Secret: PROFILE_IMAGE_UPLOAD_DIR (비밀 아님; 미등록 시 default 적용 + notice)
    # 값 변경 시에만 BG 슬롯 재시작 — no-op 시 재시작 생략하여 배포 비용 최소화.
    # ============================================================================
    - name: 🖼️ Profile Image Upload env 자동 주입 + 검증
      uses: appleboy/ssh-action@master
      env:
        PROFILE_IMAGE_UPLOAD_DIR: ${{ secrets.PROFILE_IMAGE_UPLOAD_DIR }}
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: 22
        timeout: 120s
        command_timeout: 10m
        envs: PROFILE_IMAGE_UPLOAD_DIR
        script: |
          PROD_ENV_FILE=/etc/mindgarden/prod-from-dev.env
          ACTIVE_FILE=/etc/mindgarden/active-backend
          UNIT_BLUE=mindgarden-core-blue.service
          UNIT_GREEN=mindgarden-core-green.service
          KEY=PROFILE_IMAGE_UPLOAD_DIR
          DEFAULT_VALUE="/var/mindgarden/uploads/profile-images/"

          VALUE="${PROFILE_IMAGE_UPLOAD_DIR}"
          if [ -z "$VALUE" ]; then
            echo "::notice title=${KEY} secret missing::GitHub Secret ${KEY} 미설정 → default(${DEFAULT_VALUE}) 적용. 등록 권장: gh secret set ${KEY} --repo ${{ github.repository }} --body \"${DEFAULT_VALUE}\""
            VALUE="$DEFAULT_VALUE"
          fi

          if [ ! -f "$PROD_ENV_FILE" ]; then
            echo "::warning title=prod-from-dev.env 누락::$PROD_ENV_FILE 가 없어 신규 생성합니다."
            sudo mkdir -p /etc/mindgarden
            sudo touch "$PROD_ENV_FILE"
            sudo chmod 600 "$PROD_ENV_FILE"
            sudo chown root:root "$PROD_ENV_FILE"
          fi

          CURRENT_VALUE=$(sudo grep -E "^[[:space:]]*${KEY}=" "$PROD_ENV_FILE" 2>/dev/null | tail -n1 | sed -n 's/^[^=]*=//p' | sed -E 's/^"(.*)"$/\1/' | sed -E "s/^'(.*)'$/\1/" | tr -d '\r')

          if [ "$CURRENT_VALUE" = "$VALUE" ]; then
            echo "✅ ${KEY} 변경 없음 (${VALUE}) — env 갱신·재시작 생략 (no-op)"
            sudo mkdir -p "$VALUE"
            if id mindgarden >/dev/null 2>&1; then
              sudo chown -R mindgarden:mindgarden "$VALUE" 2>/dev/null || true
            fi
            sudo chmod 755 "$VALUE"
            exit 0
          fi

          BACKUP_FILE="${PROD_ENV_FILE}.bak.$(date +%Y%m%d_%H%M%S)"
          sudo cp -p "$PROD_ENV_FILE" "$BACKUP_FILE" 2>/dev/null || true
          echo "📦 백업: $BACKUP_FILE"

          # === [P0 재발 방지 가드 — DB_* 키 PRESERVE] ===
          # 2026-06-13 운영 BE boot loop 회귀: prod-from-dev.env 가
          # DB_HOST/DB_NAME/DB_USERNAME 키 0건 상태로 덮어써져 양 슬롯 boot loop.
          # 본 step 은 PROFILE_IMAGE_UPLOAD_DIR 단일 키만 다루지만, 만일의 사고
          # 대비 기존 DB 키 값을 사용자 홈 임시 파일에 보존한다.
          DB_PRESERVE_KEYS="DB_HOST DB_NAME DB_USERNAME"
          DB_PRESERVED_FILE="$HOME/.prod-from-dev.env.preserved_db_keys.$$"
          rm -f "$DB_PRESERVED_FILE"
          for _pkey in $DB_PRESERVE_KEYS; do
            _existing=$(sudo grep -E "^[[:space:]]*${_pkey}=" "$PROD_ENV_FILE" 2>/dev/null | tail -n1 || true)
            if [ -n "$_existing" ]; then
              printf '%s\n' "$_existing" >> "$DB_PRESERVED_FILE"
            fi
          done

          escaped_value=$(printf '%s' "$VALUE" | sed -e 's/[\\&|]/\\&/g')
          if sudo grep -qE "^[[:space:]]*${KEY}=" "$PROD_ENV_FILE" 2>/dev/null; then
            sudo sed -i "s|^[[:space:]]*${KEY}=.*|${KEY}=\"${escaped_value}\"|" "$PROD_ENV_FILE"
          else
            printf '%s="%s"\n' "$KEY" "$VALUE" | sudo tee -a "$PROD_ENV_FILE" >/dev/null
          fi
          sudo chmod 600 "$PROD_ENV_FILE"
          sudo chown root:root "$PROD_ENV_FILE"
          echo "✅ ${KEY}=\"${VALUE}\" 갱신 완료 (was: '${CURRENT_VALUE}')"

          # === [P0 재발 방지 가드 — DB_* 키 RESTORE + FAIL-FAST] ===
          # 갱신 직후 보존했던 DB_* 키가 사라졌으면 PRESERVED 값으로 복원하고,
          # 그래도 누락/빈값이면 deploy 중단 (exit 1) — 운영 BE boot loop 회귀 차단.
          if [ -f "$DB_PRESERVED_FILE" ]; then
            while IFS= read -r _preserved; do
              _pkey=$(printf '%s' "$_preserved" | cut -d'=' -f1 | tr -d '[:space:]')
              if [ -n "$_pkey" ] && ! sudo grep -qE "^[[:space:]]*${_pkey}=" "$PROD_ENV_FILE" 2>/dev/null; then
                echo "::warning title=DB 키 복원::${_pkey} 가 갱신 도중 사라져 PRESERVED 값으로 복원합니다."
                printf '%s\n' "$_preserved" | sudo tee -a "$PROD_ENV_FILE" >/dev/null
              fi
            done < "$DB_PRESERVED_FILE"
            rm -f "$DB_PRESERVED_FILE"
          fi
          DB_REQUIRED_KEYS="DB_HOST DB_NAME DB_USERNAME"
          DB_MISSING_KEYS=""
          DB_EMPTY_KEYS=""
          for _dkey in $DB_REQUIRED_KEYS; do
            _line=$(sudo grep -E "^[[:space:]]*${_dkey}=" "$PROD_ENV_FILE" 2>/dev/null | tail -n1 || true)
            if [ -z "$_line" ]; then
              DB_MISSING_KEYS="$DB_MISSING_KEYS $_dkey"
            else
              _val=$(printf '%s' "$_line" | sed -n 's/^[^=]*=//p' | sed -E 's/^"(.*)"$/\1/' | sed -E "s/^'(.*)'$/\1/" | tr -d '\r')
              if [ -z "$_val" ]; then
                DB_EMPTY_KEYS="$DB_EMPTY_KEYS $_dkey"
              fi
            fi
          done
          if [ -n "$DB_MISSING_KEYS" ]; then
            echo "::error title=prod-from-dev.env DB 키 누락::다음 키가 ${PROD_ENV_FILE} 에 없습니다 -$DB_MISSING_KEYS. 2026-06-13 운영 BE boot loop 회귀 위험 — deploy 중단."
            exit 1
          fi
          if [ -n "$DB_EMPTY_KEYS" ]; then
            echo "::error title=prod-from-dev.env DB 키 빈 값::다음 키 값이 비어 있습니다 -$DB_EMPTY_KEYS. 2026-06-13 운영 BE boot loop 회귀 위험 — deploy 중단."
            exit 1
          fi
          echo "✅ prod-from-dev.env DB 키 검증 PASS (DB_HOST/DB_NAME/DB_USERNAME)"

          sudo mkdir -p "$VALUE"
          if id mindgarden >/dev/null 2>&1; then
            sudo chown -R mindgarden:mindgarden "$VALUE" 2>/dev/null || true
          fi
          sudo chmod 755 "$VALUE"
          echo "✅ 업로드 디렉터리 보장: $VALUE"

          sudo systemctl daemon-reload
          echo "🔄 ${UNIT_BLUE} + ${UNIT_GREEN} 재시작 (${KEY} 변경)"
          sudo systemctl restart "$UNIT_BLUE" || echo "::warning::${UNIT_BLUE} 재시작 실패 (계속 진행)"
          sudo systemctl restart "$UNIT_GREEN" || echo "::warning::${UNIT_GREEN} 재시작 실패 (계속 진행)"

          sleep 15
          BLUE_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:8080/actuator/health 2>/dev/null || echo "000")
          GREEN_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:8081/actuator/health 2>/dev/null || echo "000")
          echo "🏥 헬스: blue(8080)=$BLUE_HEALTH / green(8081)=$GREEN_HEALTH"

          ACTIVE=$(sudo cat "$ACTIVE_FILE" 2>/dev/null | tr -d '[:space:]' | awk '{print tolower($0)}')
          if [ -z "$ACTIVE" ]; then
            echo "::warning::${ACTIVE_FILE} 비어 있음 — 프로세스 env 검증 skip"
            exit 0
          fi
          ACTIVE_UNIT="mindgarden-core-${ACTIVE}.service"
          PID=$(systemctl show -p MainPID --value "$ACTIVE_UNIT" 2>/dev/null)
          if [ -z "$PID" ] || [ "$PID" = "0" ]; then
            echo "::warning::${ACTIVE_UNIT} MainPID 조회 실패 (PID='$PID') — 프로세스 env 검증 skip"
            exit 0
          fi
          ACTUAL=$(sudo cat "/proc/$PID/environ" 2>/dev/null | tr '\0' '\n' | awk -F= -v K="$KEY" '$1==K { v=substr($0, length(K)+2); print v; exit }')
          if [ "$ACTUAL" = "$VALUE" ]; then
            echo "🎉 active(${ACTIVE_UNIT}) PID=${PID} 프로세스 env ${KEY}=${ACTUAL} 검증 완료"
          else
            echo "::error title=${KEY} 프로세스 env 불일치::기대=\"${VALUE}\" 실제=\"${ACTUAL}\". prod-from-dev.env 형식·EnvironmentFile drop-in 경로 확인 필요."
          fi
    # ============================================================================
    # [/P0 후속 강화 2026-06-09]
    # ============================================================================

    - name: 🏥 헬스체크
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        script: |
          echo "🏥 헬스체크 시작..."
          
          echo "⏳ 애플리케이션 안정화 대기 (45초)..."
          sleep 45
          
          ACTIVE_FILE=/etc/mindgarden/active-backend
          ACTIVE=$(sudo cat "$ACTIVE_FILE" 2>/dev/null | tr -d '\r\n' | awk '{print tolower($0)}')
          if [ -z "$ACTIVE" ]; then ACTIVE=blue; fi
          if [ "$ACTIVE" = "green" ]; then ACTIVE_PORT=8081; ACTIVE_UNIT=mindgarden-core-green.service; else ACTIVE_PORT=8080; ACTIVE_UNIT=mindgarden-core-blue.service; fi
          
          echo "🔍 트래픽 슬롯: $ACTIVE → 포트 $ACTIVE_PORT ($ACTIVE_UNIT)"
          if sudo systemctl is-active --quiet mindgarden.service 2>/dev/null; then
            echo "⚠️ 레거시 mindgarden.service 동작 중 — 헬스는 레거시 기준(8080)으로 폴백"
            ACTIVE_PORT=8080
            ACTIVE_UNIT=mindgarden.service
          fi
          
          if sudo systemctl is-active --quiet "$ACTIVE_UNIT"; then
            echo "✅ 슬롯 서비스 정상 실행 중 ($ACTIVE_UNIT)"
          else
            echo "❌ 슬롯 서비스 비활성: $ACTIVE_UNIT"
            sudo systemctl status "$ACTIVE_UNIT" --no-pager -l | head -40 || true
            sudo journalctl -u "$ACTIVE_UNIT" --no-pager -n 50 || true
            exit 1
          fi
          
          echo "🔍 포트 ${ACTIVE_PORT} 리스닝 확인..."
          if netstat -tlnp 2>/dev/null | grep -q ":${ACTIVE_PORT} " || ss -tlnp 2>/dev/null | grep -q ":${ACTIVE_PORT} "; then
            echo "✅ 포트 ${ACTIVE_PORT} 리스닝 중"
          else
            echo "❌ 포트 ${ACTIVE_PORT} 리스닝 안 됨"
            sudo journalctl -u "$ACTIVE_UNIT" --no-pager -n 80 | tail -50 || true
          fi
          
          echo "🔍 Flyway·DB 마이그레이션 확인 (최근 기동 구간, $ACTIVE_UNIT)..."
          sudo journalctl -u "$ACTIVE_UNIT" --since "25 minutes ago" --no-pager \
            | grep -iE 'flyway|Flyway|schema_history|Migrating schema|Successfully applied|Validate failed' \
            | tail -40 || true
          if sudo journalctl -u "$ACTIVE_UNIT" --since "25 minutes ago" --no-pager | grep -qi flyway; then
            echo "✅ 최근 로그에 Flyway 관련 메시지 존재 (위 로그 참고)"
          else
            echo "⚠️ 최근 25분 journal에 Flyway 키워드 없음 — SPRING_FLYWAY_ENABLED=false 이거나 로그 레벨·기동 전 구간일 수 있음"
          fi
          if command -v mysql >/dev/null 2>&1; then
            for kv in $(systemctl show "$ACTIVE_UNIT" -p Environment --value | tr ' ' '\n' | grep '^DB_'); do
              export "$kv" 2>/dev/null || true
            done
            DBN="${DB_NAME:-core_solution}"
            DBU="${DB_USERNAME:-mindgarden}"
            DBP="${DB_PASSWORD:-}"
            DBH="${DB_HOST:-localhost}"
            if [ -n "$DBP" ]; then
              echo "🔍 flyway_schema_history 최신 5건 ($ACTIVE_UNIT Environment 의 DB_* 사용)..."
              if mysql -h "$DBH" -u "$DBU" -p"$DBP" "$DBN" -e "SHOW TABLES LIKE 'flyway_schema_history';" 2>/dev/null | grep -q flyway_schema_history; then
                mysql -h "$DBH" -u "$DBU" -p"$DBP" "$DBN" -e \
                  "SELECT installed_rank, version, description, success, installed_on FROM flyway_schema_history ORDER BY installed_rank DESC LIMIT 5;" 2>/dev/null \
                  || echo "⚠️ flyway_schema_history 조회 실패"
              else
                echo "⚠️ flyway_schema_history 테이블 없음 — Flyway 미사용 DB이거나 최초 기동 전"
              fi
            else
              echo "ℹ️ systemd에서 DB_PASSWORD 파싱 실패 — journalctl Flyway 로그만 참고"
            fi
          fi
          
          echo "🔍 HTTP 헬스체크 (트래픽 슬롯 포트 ${ACTIVE_PORT})..."
          for i in {1..3}; do
            if curl -f -s "http://127.0.0.1:${ACTIVE_PORT}/actuator/health" > /dev/null 2>&1; then
              echo "✅ HTTP 헬스체크 통과 (시도 $i)"
              curl -s "http://127.0.0.1:${ACTIVE_PORT}/actuator/health" | head -10
              break
            else
              echo "⏳ HTTP 헬스체크 재시도 중... (시도 $i/3)"
              if [ $i -lt 3 ]; then
                sleep 10
              else
                echo "❌ HTTP 헬스체크 실패 (3회 시도 후 실패)"
                sudo journalctl -u "$ACTIVE_UNIT" --no-pager -n 100 | tail -50 || true
                if [ -f /var/www/mindgarden/logs/mindgarden-prod.log ]; then
                  tail -50 /var/www/mindgarden/logs/mindgarden-prod.log
                fi
                echo "⚠️ HTTP 헬스체크 실패했지만 배포는 계속 진행됩니다."
              fi
            fi
          done
          
          # 프론트엔드(SPA 엔트리) 확인 — 트래픽 슬롯 포트 직접
          fe_code=$(curl -sS -o /dev/null -w '%{http_code}' -m 15 "http://127.0.0.1:${ACTIVE_PORT}/login" 2>/dev/null || echo "000")
          if echo "$fe_code" | grep -qE '^(200|301|302|303|304)$'; then
            echo "✅ 프론트엔드 엔트리(/login) 응답 정상 (HTTP $fe_code)"
          else
            echo "❌ 프론트엔드 접근 실패 (HTTP $fe_code, 기대: 2xx/3xx)"
          fi
          
          echo "🎉 배포 완료!"
          
    - name: 🔍 서버 상태 상세 확인 (디버깅)
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        script: |
          echo "🔍 운영 서버 상태 상세 확인"
          echo "=================================="
          
          echo ""
          echo "1. 서비스 상태 (블루·그린):"
          sudo systemctl status mindgarden-core-blue.service --no-pager -l | head -20 || true
          sudo systemctl status mindgarden-core-green.service --no-pager -l | head -20 || true
          sudo systemctl status mindgarden.service --no-pager -l | head -15 || true
          
          echo ""
          echo "2. 서비스 로그 (최근 50줄, blue / green):"
          sudo journalctl -u mindgarden-core-blue.service --no-pager -n 25 || true
          sudo journalctl -u mindgarden-core-green.service --no-pager -n 25 || true
          
          echo ""
          echo "3. 포트 리스닝 확인 (8080·8081):"
          if command -v netstat &> /dev/null; then
            netstat -tlnp 2>/dev/null | grep -E ':8080|:8081' || echo "8080/8081 리스닝 없음"
          elif command -v ss &> /dev/null; then
            ss -tlnp 2>/dev/null | grep -E ':8080|:8081' || echo "8080/8081 리스닝 없음"
          else
            echo "netstat 또는 ss 명령어 없음"
          fi
          
          echo ""
          echo "4. Java 프로세스 확인:"
          ps aux | grep java | grep -v grep || echo "Java 프로세스 없음"
          
          echo ""
          echo "5. 애플리케이션 로그 (최근 50줄):"
          if [ -f /var/www/mindgarden/logs/mindgarden-prod.log ]; then
            tail -50 /var/www/mindgarden/logs/mindgarden-prod.log
          else
            echo "로그 파일 없음: /var/www/mindgarden/logs/mindgarden-prod.log"
            echo "대체 로그 위치 확인:"
            find /var/www/mindgarden -name "*.log" -type f 2>/dev/null | head -5
          fi
          
          echo ""
          echo "6. JAR 파일 확인 (슬롯 + 레거시):"
          ls -lh /var/www/mindgarden/releases/blue/app.jar 2>/dev/null || echo "blue JAR 없음"
          ls -lh /var/www/mindgarden/releases/green/app.jar 2>/dev/null || echo "green JAR 없음"
          ls -lh /var/www/mindgarden/app.jar 2>/dev/null || echo "레거시 app.jar 없음"
          echo "active-backend:"; sudo cat /etc/mindgarden/active-backend 2>/dev/null || echo "(없음)"
          
          echo ""
          echo "7. 환경 변수 확인:"
          if [ -f /etc/mindgarden/prod.env ]; then
            echo "환경 변수 파일 존재: /etc/mindgarden/prod.env"
            echo "파일 크기: $(ls -lh /etc/mindgarden/prod.env | awk '{print $5}')"
          else
            echo "환경 변수 파일 없음: /etc/mindgarden/prod.env"
          fi
          
          echo ""
          echo "8. 디스크 사용량:"
          df -h /var/www/mindgarden 2>/dev/null || df -h /var/www
          
          echo ""
          echo "9. 메모리 사용량:"
          free -h
          
          echo ""
          echo "=================================="
          
    - name: 🧹 메모리 정리
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        script: |
          echo "🧹 메모리 정리 시작..."
          
          # 백업: 유형별 최신 5개만 유지 (7일 규칙 대신 개발 서버와 동일 정책)
          BACKUP_DIR="/var/www/mindgarden/backups"
          if [ -d "$BACKUP_DIR" ]; then
            cd "$BACKUP_DIR"
            ls -t app.jar.backup.* 2>/dev/null | tail -n +6 | xargs -r rm -f || true
            ls -t frontend.backup.*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm -f || true
            shopt -s nullglob
            extra=(app-before-*.jar app-flyway-*.jar)
            if [ ${#extra[@]} -gt 0 ]; then
              ls -t "${extra[@]}" 2>/dev/null | tail -n +6 | xargs -r rm -f || true
            fi
          fi
          
          # 시스템 메모리 정리
          sync
          echo 3 | sudo tee /proc/sys/vm/drop_caches > /dev/null
          
          # 최종 시스템 상태
          echo "💾 메모리 사용량:"
          free -h
          echo ""
          echo "💿 디스크 사용량:"
          df -h /var/www/mindgarden
          echo ""
          echo "🔧 서비스 상태 (블루·그린):"
          sudo systemctl is-active mindgarden-core-blue.service 2>/dev/null || echo "blue: n/a"
          sudo systemctl is-active mindgarden-core-green.service 2>/dev/null || echo "green: n/a"
          
          echo "✅ 메모리 정리 완료!"

  # AI 모니터링 Phase 1 — 운영 배포 실패 시 Discord webhook 알람
  # Secret 미등록 시 알람 skip
  # 참고: docs/project-management/2026-06-11/AI_MONITORING_ROADMAP.md §6 Phase 1
  notify-discord-on-failure:
    name: 🚨 Discord 실패 알람
    needs: [deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: 🚨 Discord 알람 발송
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "⚠️ DISCORD_WEBHOOK_URL Secret 미등록 — 알람 skip"
            exit 0
          fi
          WORKFLOW_NAME="${{ github.workflow }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BRANCH="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          PAYLOAD=$(jq -nc \
            --arg title "❌ CI/배포 실패: $WORKFLOW_NAME" \
            --arg branch "$BRANCH" \
            --arg actor "$ACTOR" \
            --arg sha "$SHORT_SHA" \
            --arg run_url "$RUN_URL" \
            --arg ts "$TIMESTAMP" \
            '{embeds: [{
              title: $title,
              color: 15158332,
              fields: [
                {name: "브랜치", value: ("`" + $branch + "`"), inline: true},
                {name: "Actor", value: $actor, inline: true},
                {name: "SHA", value: ("`" + $sha + "`"), inline: true},
                {name: "Run URL", value: $run_url}
              ],
              timestamp: $ts
            }]}')

          curl -fsS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "⚠️ Discord 발송 실패 (재시도 안 함, 본 알람만 skip)"
