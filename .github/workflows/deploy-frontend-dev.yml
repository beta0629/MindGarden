name: 🎨 Frontend (CoreSolution) 개발 서버 배포
# 배포 트리거: 2025-12-10

on:
  push:
    branches: [ develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend-dev.yml'
  workflow_dispatch:
    # 수동 실행 가능

jobs:
  deploy-frontend:
    name: 🏗️ 프론트엔드 빌드 및 배포
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 📦 Node.js 18 설정
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: 📦 프론트엔드 의존성 설치
      run: |
        cd frontend
        npm ci
        
    - name: 🏗️ 프론트엔드 빌드
      run: |
        cd frontend
        npm run build:ci
        
    - name: 🔍 프론트엔드 빌드 결과 확인
      run: |
        echo "🔍 프론트엔드 빌드 결과 확인..."
        if [ -d frontend/build ]; then
          FILE_COUNT=$(find frontend/build -type f 2>/dev/null | wc -l)
          if [ "$FILE_COUNT" -gt 0 ]; then
            echo "✅ frontend/build 디렉토리 생성됨: $FILE_COUNT 개 파일"
            ls -lh frontend/build/ | head -10
          else
            echo "❌ frontend/build 디렉토리가 비어있음!"
            exit 1
          fi
        else
          echo "❌ frontend/build 디렉토리 없음!"
          exit 1
        fi
        
    - name: 🔍 개발 서버 SSH 연결 테스트
      uses: appleboy/ssh-action@v1.2.4
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 30s
        script: |
          echo "SSH 연결 테스트 성공: $(date)"
          echo "서버 정보: $(uname -a)"
          
    - name: 💾 배포 전 기존 파일 백업
      uses: appleboy/ssh-action@v1.2.4
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 60s
        script: |
          # 백업 디렉토리 생성
          sudo mkdir -p /var/www/backups/html-dev
          
          # 기존 파일 백업 (존재하는 경우)
          if [ -d /var/www/html-dev ] && [ "$(ls -A /var/www/html-dev 2>/dev/null)" ]; then
            BACKUP_NAME="html-dev-backup-$(date +%Y%m%d_%H%M%S).tar.gz"
            echo "💾 기존 파일 백업 중: $BACKUP_NAME"
            sudo tar -czf /var/www/backups/html-dev/$BACKUP_NAME -C /var/www html-dev
            echo "✅ 백업 완료: $BACKUP_NAME"
            ls -lh /var/www/backups/html-dev/$BACKUP_NAME
          else
            echo "ℹ️ 백업할 기존 파일 없음 (신규 배포)"
          fi
          
    - name: 📤 프론트엔드 파일 업로드 SCP (개발 서버)
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 120s
        source: "frontend/build/*"
        target: "/var/www/html-dev/"
        strip_components: 2
        overwrite: true
        
    - name: 🔄 프론트엔드 배포 완료 및 검증
      uses: appleboy/ssh-action@v1.2.4
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 60s
        script: |
          # 디렉토리 생성 및 권한 설정
          sudo mkdir -p /var/www/html-dev
          sudo chown -R www-data:www-data /var/www/html-dev
          sudo chmod -R 755 /var/www/html-dev
          
          # 배포된 파일 확인
          echo "🔍 배포된 파일 확인..."
          if [ -d /var/www/html-dev ]; then
            FILE_COUNT=$(find /var/www/html-dev -type f 2>/dev/null | wc -l)
            if [ "$FILE_COUNT" -gt 0 ]; then
              echo "✅ 배포 완료: $FILE_COUNT 개 파일"
              echo "주요 파일:"
              ls -lh /var/www/html-dev/ | head -10
              
              # index.html 존재 확인
              if [ -f /var/www/html-dev/index.html ]; then
                echo "✅ index.html 확인됨"
                echo "파일 크기: $(stat -c%s /var/www/html-dev/index.html) bytes"
              else
                echo "⚠️ index.html 없음!"
                exit 1
              fi
            else
              echo "❌ 배포된 파일 없음!"
              exit 1
            fi
          else
            echo "❌ 배포 디렉토리 없음!"
            exit 1
          fi
          
          echo "✅ 프론트엔드 배포 완료"
          
    - name: 🏥 배포 후 헬스체크
      uses: appleboy/ssh-action@v1.2.4
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 30s
        script: |
          echo "🏥 헬스체크 시작..."
          sleep 3
          
          # Nginx 설정 테스트
          if sudo nginx -t 2>/dev/null; then
            echo "✅ Nginx 설정 정상"
          else
            echo "⚠️ Nginx 설정 오류 (계속 진행)"
          fi
          
          # 웹사이트 접근 테스트
          for i in {1..3}; do
            if curl -f -s -o /dev/null -w "%{http_code}" https://dev.core-solution.co.kr | grep -q "200\|301\|302"; then
              echo "✅ 웹사이트 접근 성공 (시도 $i)"
              curl -s -I https://dev.core-solution.co.kr | head -5
              exit 0
            else
              echo "⏳ 헬스체크 대기 중... (시도 $i/3)"
              sleep 5
            fi
          done
          
          echo "⚠️ 헬스체크 실패 - 수동 확인 필요"
          echo "도메인: https://dev.core-solution.co.kr"
