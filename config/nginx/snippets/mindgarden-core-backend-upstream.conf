# Core JVM 단일 upstream (블루그린 시 listen 포트만 바뀜).
# 운영 서버 실경로: /etc/nginx/snippets/mindgarden-core-backend-upstream.conf
# GitHub Actions(deploy-production)가 헬스 통과 후 tee/cp 로 갱신 — 저장소 기본값은 blue(8080).
# 문서: docs/deployment/ZERO_DOWNTIME_GAP_AND_ROADMAP.md 부록, docs/deployment/PRODUCTION_BLUE_GREEN_BACKEND_CUTOVER.md
upstream mindgarden_core_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}
