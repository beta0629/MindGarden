server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: mindgarden-ops-backend
  profiles:
    active: dev  # 개발 DB(MySQL) 사용
    group:
      staging: staging
      prod: prod
  main:
    banner-mode: off
  # datasource 설정은 application-dev.yml에서 관리

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.mindgarden.ops: DEBUG

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:local-dev-secret-change-me-please-use-a-stronger-one}
    issuer: ${SECURITY_JWT_ISSUER:mindgarden-ops}
    expires-in-seconds: ${SECURITY_JWT_EXPIRES:3600}
  ops:
    username: ${OPS_ADMIN_USERNAME:ops_core}
    password: ${OPS_ADMIN_PASSWORD:godgod826!}
    default-role: ${OPS_ADMIN_ROLE:HQ_ADMIN}
