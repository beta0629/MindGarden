# systemd-timesyncd 한국 NTP 정본 (운영/개발 공용 참고본)
#
# 적용 경로 (운영): /etc/systemd/timesyncd.conf
# 적용 방법: docs/운영반영/NTP_RECOVERY_PLAN_20260614.md 참조
# 작성일: 2026-06-14
#
# 배경:
#   - 운영 호스트에서 ntp.ubuntu.com 응답이 30분 주기 timeout (UDP 123 outbound 차단 추정)
#   - System clock synchronized: no, drift -247s 누적
#   - 한국 NTP 풀(time.bora.net, time.kriss.re.kr 등)을 명시하여 영구 복구
#
# 주의:
#   - 본 파일은 정본(SSOT)이며, 운영 적용은 별도 deployer 작업으로 진행한다.
#   - cafe24 호스팅 측 UDP 123 outbound 차단 해제가 선행되어야 동기화가 보장된다.
[Time]
NTP=time.bora.net time.kriss.re.kr 1.kr.pool.ntp.org
FallbackNTP=2.kr.pool.ntp.org 3.kr.pool.ntp.org time.google.com
RootDistanceMaxSec=5
PollIntervalMinSec=32
PollIntervalMaxSec=2048
