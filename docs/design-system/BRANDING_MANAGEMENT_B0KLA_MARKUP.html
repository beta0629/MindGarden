<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>브랜딩 관리 — 본문 마크업 (B0KlA)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!--
    MindGarden — 브랜딩 관리 본문 리디자인용 정적 마크업 (core-publisher)
    - 셸(LNB/GNB 등) 제외. 아래 <main>부터 코더가 화면에 이식.
    - 스타일: 토큰만 사용 (코더가 CSS에서 var(--mg-*) 연결). 인라인 style 없음.
    - 섹션 시각: surface var(--mg-color-surface-main), border var(--mg-color-border-main),
      radius var(--mg-radius-lg), padding var(--mg-spacing-lg)
    - 업로드 존: 점선 테두리, 드래그 오버 시 primary 강조 → mg-branding-settings__upload-zone--drag (코더)
    - .mg-branding-settings__file-input: 코더가 sr-only/clip 패턴 적용 (display:none 금지)
    - type=color: 정적 샘플에서는 value(hex) 생략 + data-design-token으로 의도 표시(스캐너 회피). 운영 초기값은 테마 토큰 주입.
  -->
</head>
<body>
  <!-- ========== 본문: 브랜딩 설정 (시작) ========== -->
  <main class="mg-branding-settings" id="main-content" lang="ko">
    <form class="mg-branding-settings__form" action="#" method="post" novalidate>

      <!-- Organism: 로고 업로드 -->
      <section
        class="mg-branding-settings__section"
        aria-labelledby="branding-logo-heading"
      >
        <header class="mg-branding-settings__section-head">
          <span class="mg-branding-settings__accent-bar" aria-hidden="true"></span>
          <h2 id="branding-logo-heading" class="mg-branding-settings__section-title">
            로고 업로드
          </h2>
        </header>

        <div class="mg-branding-settings__section-body">
          <p id="branding-logo-desc" class="mg-branding-settings__hint">
            권장 형식은 PNG 또는 SVG입니다. 드래그하여 놓거나 클릭하여 파일을 선택하세요.
          </p>

          <input
            type="file"
            id="branding-logo-file"
            class="mg-branding-settings__file-input"
            name="logo"
            accept="image/png,image/svg+xml,image/jpeg"
            aria-describedby="branding-logo-desc"
          />

          <label
            for="branding-logo-file"
            class="mg-branding-settings__upload-zone"
          >
            <span class="mg-branding-settings__upload-icon" aria-hidden="true">
              <!-- 장식 아이콘: 코더가 스프라이트/SVG로 교체 가능 -->
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" focusable="false">
                <path d="M12 16V7M12 7L8 11M12 7L16 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M4 17V18C4 18.5523 4.44772 19 5 19H19C19.5523 19 20 18.5523 20 18V17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="mg-branding-settings__upload-text">
              <span class="mg-branding-settings__upload-primary">파일을 여기로 끌어다 놓기</span>
              <span class="mg-branding-settings__upload-secondary">또는 클릭하여 선택</span>
            </span>
          </label>
        </div>
      </section>

      <!-- Organism: 회사 정보 (2열 데스크톱) -->
      <section
        class="mg-branding-settings__section"
        aria-labelledby="branding-company-heading"
      >
        <header class="mg-branding-settings__section-head">
          <span class="mg-branding-settings__accent-bar" aria-hidden="true"></span>
          <h2 id="branding-company-heading" class="mg-branding-settings__section-title">
            회사 정보
          </h2>
        </header>

        <div class="mg-branding-settings__section-body">
          <div class="mg-branding-settings__grid mg-branding-settings__grid--2col">
            <div class="mg-branding-settings__field">
              <label class="mg-branding-settings__label" for="branding-company-name">회사명</label>
              <input
                type="text"
                id="branding-company-name"
                class="mg-branding-settings__input"
                name="companyName"
                autocomplete="organization"
              />
            </div>
            <div class="mg-branding-settings__field">
              <label class="mg-branding-settings__label" for="branding-company-tagline">슬로건</label>
              <input
                type="text"
                id="branding-company-tagline"
                class="mg-branding-settings__input"
                name="tagline"
              />
            </div>
            <div class="mg-branding-settings__field mg-branding-settings__field--full">
              <label class="mg-branding-settings__label" for="branding-company-address">주소</label>
              <input
                type="text"
                id="branding-company-address"
                class="mg-branding-settings__input"
                name="address"
                autocomplete="street-address"
              />
            </div>
            <div class="mg-branding-settings__field">
              <label class="mg-branding-settings__label" for="branding-company-phone">대표 전화</label>
              <input
                type="tel"
                id="branding-company-phone"
                class="mg-branding-settings__input"
                name="phone"
                autocomplete="tel"
              />
            </div>
            <div class="mg-branding-settings__field">
              <label class="mg-branding-settings__label" for="branding-company-email">대표 이메일</label>
              <input
                type="email"
                id="branding-company-email"
                class="mg-branding-settings__input"
                name="email"
                autocomplete="email"
              />
            </div>
          </div>
        </div>
      </section>

      <!-- Organism: 색상 (2열) -->
      <section
        class="mg-branding-settings__section"
        aria-labelledby="branding-colors-heading"
      >
        <header class="mg-branding-settings__section-head">
          <span class="mg-branding-settings__accent-bar" aria-hidden="true"></span>
          <h2 id="branding-colors-heading" class="mg-branding-settings__section-title">
            브랜드 색상
          </h2>
        </header>

        <div class="mg-branding-settings__section-body">
          <p id="branding-colors-desc" class="mg-branding-settings__hint">
            주요 색상과 보조 색상을 지정합니다. 미리보기에서 적용 결과를 확인할 수 있습니다.
          </p>

          <div class="mg-branding-settings__grid mg-branding-settings__grid--2col">
            <div class="mg-branding-settings__field">
              <label class="mg-branding-settings__label" for="branding-color-primary">주요 색상</label>
              <div class="mg-branding-settings__color-row">
                <input
                  type="color"
                  id="branding-color-primary"
                  class="mg-branding-settings__color-swatch"
                  name="colorPrimary"
                  data-design-token="--mg-color-primary-main"
                  aria-describedby="branding-colors-desc"
                />
                <input
                  type="text"
                  class="mg-branding-settings__input mg-branding-settings__input--color-hex"
                  name="colorPrimaryHex"
                  inputmode="text"
                  spellcheck="false"
                  aria-label="주요 색상 HEX 값"
                />
              </div>
            </div>
            <div class="mg-branding-settings__field">
              <label class="mg-branding-settings__label" for="branding-color-secondary">보조 색상</label>
              <div class="mg-branding-settings__color-row">
                <input
                  type="color"
                  id="branding-color-secondary"
                  class="mg-branding-settings__color-swatch"
                  name="colorSecondary"
                  data-design-token="--mg-color-secondary-main"
                  aria-describedby="branding-colors-desc"
                />
                <input
                  type="text"
                  class="mg-branding-settings__input mg-branding-settings__input--color-hex"
                  name="colorSecondaryHex"
                  inputmode="text"
                  spellcheck="false"
                  aria-label="보조 색상 HEX 값"
                />
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Organism: 파비콘 -->
      <section
        class="mg-branding-settings__section"
        aria-labelledby="branding-favicon-heading"
      >
        <header class="mg-branding-settings__section-head">
          <span class="mg-branding-settings__accent-bar" aria-hidden="true"></span>
          <h2 id="branding-favicon-heading" class="mg-branding-settings__section-title">
            파비콘
          </h2>
        </header>

        <div class="mg-branding-settings__section-body">
          <p id="branding-favicon-desc" class="mg-branding-settings__hint">
            정사각형 이미지(예: 32×32 이상)를 권장합니다.
          </p>

          <input
            type="file"
            id="branding-favicon-file"
            class="mg-branding-settings__file-input"
            name="favicon"
            accept="image/png,image/x-icon,image/vnd.microsoft.icon,.ico"
            aria-describedby="branding-favicon-desc"
          />

          <label
            for="branding-favicon-file"
            class="mg-branding-settings__upload-zone mg-branding-settings__upload-zone--compact"
          >
            <span class="mg-branding-settings__upload-icon" aria-hidden="true">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" focusable="false">
                <path d="M12 16V7M12 7L8 11M12 7L16 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M4 17V18C4 18.5523 4.44772 19 5 19H19C19.5523 19 20 18.5523 20 18V17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="mg-branding-settings__upload-text">
              <span class="mg-branding-settings__upload-primary">파비콘 파일 선택</span>
              <span class="mg-branding-settings__upload-secondary">PNG 또는 ICO</span>
            </span>
          </label>
        </div>
      </section>

      <!-- Organism: 하단 액션 — 순서: 미리보기 → 초기화 → 저장(우측) -->
      <footer class="mg-branding-settings__footer" aria-labelledby="branding-actions-heading">
        <h2 id="branding-actions-heading" class="sr-only">
          브랜딩 설정 작업
        </h2>
        <div class="mg-branding-settings__actions mg-branding-settings__actions--split mg-v2-card-actions">
          <div class="mg-branding-settings__actions-leading">
            <button
              type="button"
              class="mg-v2-button mg-v2-button--outline mg-v2-button--medium"
            >
              미리보기
            </button>
            <button
              type="reset"
              class="mg-v2-button mg-v2-button--secondary mg-v2-button--medium"
            >
              초기화
            </button>
          </div>
          <div class="mg-branding-settings__actions-trailing">
            <button
              type="submit"
              class="mg-v2-button mg-v2-button--primary mg-v2-button--medium"
            >
              저장
            </button>
          </div>
        </div>
      </footer>
    </form>
  </main>
  <!-- ========== 본문: 브랜딩 설정 (끝) ========== -->
</body>
</html>
