    # [P0 후속 강화 2026-06-09] Profile Image Upload Dir env 자동 주입 + 검증 (운영)
    # 배경: PR #167 배포 시 운영 SSH 로 prod.env 에 PROFILE_IMAGE_UPLOAD_DIR 를
    #       직접 추가했음. 후속 배포가 동일 키를 자동 주입하지 않으면 다음 운영자 작업·env
    #       재생성 시 사라질 위험 → 워크플로에서 멱등 주입으로 영구 보장.
    # 가이드: docs/project-management/2026-06-09/PROFILE_IMAGE_UPLOAD_OPS_GUIDE.md §5
    # Secret: PROFILE_IMAGE_UPLOAD_DIR (비밀 아님; 미등록 시 default 적용 + notice)
    # 값 변경 시에만 BG 슬롯 재시작 — no-op 시 재시작 생략하여 배포 비용 최소화.
    # PR #302 (2026-06-13): composite action 으로 DRY 통합 (noop_compare + default_value + mkdir_value_keys).
    # PR-2 (2026-06-13 SSOT 통일): env_path 를 SSOT 정책 v1.0.0 에 따라 prod.env 단일로 통일.
    # ============================================================================
    - name: 🖼️ Profile Image Upload env 자동 주입 + 검증
      uses: ./.github/actions/sync-prod-env-key
      env:
        PROFILE_IMAGE_UPLOAD_DIR: ${{ secrets.PROFILE_IMAGE_UPLOAD_DIR }}
      with:
        step_name: 'PROFILE_IMAGE_UPLOAD_DIR'
        keys: 'PROFILE_IMAGE_UPLOAD_DIR'
        # SSOT 통일 (PR-2, 2026-06-13): prod.env 단일 EnvironmentFile (DB_ENV_SSOT_POLICY.md §1)
        env_path: '/etc/mindgarden/prod.env'
        ssh_host: ${{ secrets.PRODUCTION_HOST }}
        ssh_user: ${{ secrets.PRODUCTION_USER }}
        ssh_key: ${{ secrets.PRODUCTION_SSH_KEY }}
        skip_when: 'any_missing'
        # 비-secret 운영 상수 — 미등록 시 default 적용
        default_value: '/var/mindgarden/uploads/profile-images/'
        # 무변경 배포 시 재시작 생략 (배포 비용 최소화)
        noop_compare: 'true'
        # 디렉터리 존재·소유권 보장 (no-op 경로에서도 실행)
        mkdir_value_keys: 'PROFILE_IMAGE_UPLOAD_DIR'
        mkdir_chown_user: 'mindgarden:mindgarden'
