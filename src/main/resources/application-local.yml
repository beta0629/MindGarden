# 로컬 개발 환경 설정
isDev: true  # 개발 모드 활성화

# 로컬 개발 환경용 기본 테넌트 ID (서브도메인이 없을 때 사용)
# 환경 변수 LOCAL_DEFAULT_TENANT_ID로도 설정 가능
local:
  default-tenant-id: ${LOCAL_DEFAULT_TENANT_ID:tenant-incheon-consultation-006}  # 로컬 개발 환경 기본 테넌트

# 민감정보 보호 설정은 아래 security 섹션으로 통합됨

# WebAuthn/Passkey 설정
webauthn:
  rp:
    name: MindGarden
    id: localhost  # 로컬 환경에서는 localhost 사용
  challenge:
    timeout: 60000  # 60초

spring:
  # ⚠️ 포트 충돌 방지: 애플리케이션 종료 설정
  lifecycle:
    timeout-per-shutdown-phase: 10s  # 종료 시 최대 10초 대기 (포트 해제 시간 확보)
  
  # DevTools 자동 재시작 설정 (로컬 개발 환경)
  devtools:
    restart:
      enabled: true  # 자동 재시작 활성화
      additional-paths: src/main/java,src/main/resources  # 변경 감지 경로
      exclude: static/**,public/**,templates/**  # 재시작 제외 경로
    livereload:
      enabled: true  # LiveReload 활성화 (브라우저 자동 새로고침)
  
  # Redis 설정 (로컬 개발 환경에서는 비활성화)
  data:
    redis:
      repositories:
        enabled: false  # Redis Repository 비활성화
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.data.redis.RedisReactiveHealthIndicatorAutoConfiguration
  
  # 데이터베이스 설정 (개발 서버 DB 사용)
  datasource:
    # IPv4 우선 사용을 위해 IP 주소 직접 사용 (DNS 문제 해결)
    url: jdbc:mysql://${DB_HOST:114.202.247.246}:${DB_PORT:3306}/${DB_NAME:core_solution}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useUnicode=true&characterSetResults=UTF-8&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci
    username: ${DB_USERNAME:mindgarden_dev}
    password: ${DB_PASSWORD:MindGardenDev2025!@#}  # 로컬 개발용 기본 비밀번호 (환경 변수로 오버라이드 가능)
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 문자셋 설정 추가
    connection-init-sql: "SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci"
  
  # 이메일 설정 (Gmail SMTP)
  mail:
    host: smtp.gmail.com
    port: 587
    username: mindgarden1013@gmail.com
    password: ombe ansd pbcx wgrz
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: smtp.gmail.com
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
        debug: true  # 로컬에서 디버그 활성화

  # Flyway 설정 (로컬 개발 환경 - 유연한 검증)
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false  # 로컬에서는 검증 완화 (checksum mismatch 허용)
    clean-disabled: true
    out-of-order: false  # Flyway 설정 바인딩 오류 방지
    # 로컬 개발 환경에서는 checksum mismatch를 허용하여 개발 편의성 향상
    # 운영 환경에서는 반드시 validate-on-migrate: true로 설정
  
  # Spring 스케줄링 비활성화 (로컬 개발 환경)
  task:
    scheduling:
      enabled: false  # 로컬에서는 모든 스케줄러 비활성화 (무한루프 방지)

  # OAuth2 설정 (Java 코드 호환성)
  security:
    oauth2:
      client:
        registration:
          kakao:
