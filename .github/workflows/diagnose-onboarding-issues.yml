name: 🔍 온보딩 프로세스 종합 진단

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: '온보딩 요청 ID (선택)'
        required: false
        type: string

jobs:
  diagnose:
    name: 📋 온보딩 프로세스 종합 진단
    runs-on: ubuntu-latest
    
    steps:
    - name: 🔍 종합 진단 실행
      uses: appleboy/ssh-action@v1.2.4
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 120s
        script: |
          echo "=========================================="
          echo "🔍 온보딩 프로세스 종합 진단"
          echo "=========================================="
          echo ""
          
          # 1. 데이터베이스 상태 확인
          echo "=========================================="
          echo "1️⃣ 데이터베이스 상태 확인"
          echo "=========================================="
          source /etc/mindgarden/dev.env
          mysql -h "$DB_HOST" -u "$DB_USERNAME" -p"$DB_PASSWORD" "$DB_NAME" -e "SELECT 'Flyway 마이그레이션 상태:' as info; SELECT * FROM flyway_schema_history ORDER BY installed_rank DESC LIMIT 10;"
          mysql -h "$DB_HOST" -u "$DB_USERNAME" -p"$DB_PASSWORD" "$DB_NAME" -e "SELECT 'role_templates 테이블 상태:' as info; SELECT business_type, COUNT(*) as count, GROUP_CONCAT(template_code) as templates FROM role_templates WHERE is_deleted = FALSE AND is_active = TRUE GROUP BY business_type;"
          mysql -h "$DB_HOST" -u "$DB_USERNAME" -p"$DB_PASSWORD" "$DB_NAME" -e "SELECT 'COUNSELING 업종 템플릿 상세:' as info; SELECT template_code, name_ko, is_active, is_deleted FROM role_templates WHERE business_type = 'COUNSELING';"
          mysql -h "$DB_HOST" -u "$DB_USERNAME" -p"$DB_PASSWORD" "$DB_NAME" -e "SELECT '최근 온보딩 요청 상태:' as info; SELECT id, tenant_id, tenant_name, business_type, status, decision_note FROM onboarding_requests ORDER BY created_at DESC LIMIT 5;"
          mysql -h "$DB_HOST" -u "$DB_USERNAME" -p"$DB_PASSWORD" "$DB_NAME" -e "SELECT '프로시저 존재 확인:' as info; SELECT ROUTINE_NAME, ROUTINE_TYPE, CREATED, LAST_ALTERED FROM information_schema.ROUTINES WHERE ROUTINE_SCHEMA = DATABASE() AND ROUTINE_NAME IN ('ProcessOnboardingApproval', 'CreateOrActivateTenant', 'ApplyDefaultRoleTemplates', 'CreateTenantAdminAccount');"
          echo ""
          
          # 2. 프로시저 정의 확인
          echo "=========================================="
          echo "2️⃣ 프로시저 정의 확인"
          echo "=========================================="
          source /etc/mindgarden/dev.env
          mysql -h "$DB_HOST" -u "$DB_USERNAME" -p"$DB_PASSWORD" "$DB_NAME" -e "SHOW CREATE PROCEDURE ProcessOnboardingApproval\G"
          echo ""
          
          # 3. 최근 온보딩 프로세스 로그
          echo "=========================================="
          echo "3️⃣ 최근 온보딩 프로세스 로그 (최근 500줄)"
          echo "=========================================="
          sudo journalctl -u mindgarden-dev.service --no-pager -n 1000 | grep -i -E "(온보딩|onboarding|ProcessOnboardingApproval|프로시저 실행|프로시저 결과|프로시저 실패|메타데이터 검증|roleTemplates|COUNSELING|권한 그룹|commonCodes|roleCodes|permissionGroups|Transaction.*rolled back|알 수 없는 오류)" | tail -100
          echo ""
          
          # 4. 에러 로그 상세 확인
          echo "=========================================="
          echo "4️⃣ 에러 로그 상세 확인"
          echo "=========================================="
          sudo journalctl -u mindgarden-dev.service --no-pager -n 1000 | grep -i "ERROR" | grep -i -E "(온보딩|onboarding)" | tail -50
          echo ""
          
          # 5. 애플리케이션 상태 확인
          echo "=========================================="
          echo "5️⃣ 애플리케이션 상태 확인"
          echo "=========================================="
          sudo systemctl status mindgarden-dev.service --no-pager -l | head -20
          echo ""
          
          echo "=========================================="
          echo "✅ 종합 진단 완료"
          echo "=========================================="

