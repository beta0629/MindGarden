# 운영 시크릿은 deploy-production.yml · fix-production-db.yml 과 동일 네이밍 사용.
# 필수: PRODUCTION_HOST, PRODUCTION_USER, PRODUCTION_SSH_KEY, PRODUCTION_DB_PASSWORD
# 선택: PRODUCTION_DB_HOST, PRODUCTION_DB_USER, PRODUCTION_DB_NAME (비우면 deploy 스크립트 기본값)

name: 📦 표준화된 프로시저 배포 (운영)

on:
  workflow_dispatch:  # 수동 실행만 가능

jobs:
  deploy-procedures:
    name: 🚀 프로시저 배포
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 🔧 배포용 프로시저 파일 생성
      run: |
        chmod +x database/schema/procedures_standardized/create_deployment_files.sh
        bash database/schema/procedures_standardized/create_deployment_files.sh

    # 배포 전 서버 호스트 키를 known_hosts에 추가해 "Host key verification failed" (exit 255) 방지.
    # 자세한 옵션: docs/debug/PROCEDURE_DEPLOY_AND_BUILD_ERROR_ANALYSIS.md §1.4
    - name: 🔑 known_hosts 추가 (Host key verification 방지)
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H "${{ secrets.PRODUCTION_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
    
    - name: 📤 프로시저 배포
      env:
        PROD_SERVER_HOST: ${{ secrets.PRODUCTION_HOST }}
        PROD_SERVER_USER: ${{ secrets.PRODUCTION_USER }}
        PROD_DB_HOST: ${{ secrets.PRODUCTION_DB_HOST }}
        PROD_DB_USER: ${{ secrets.PRODUCTION_DB_USER }}
        PROD_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
        PROD_DB_NAME: ${{ secrets.PRODUCTION_DB_NAME }}
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/prod_ci_key
        chmod 600 ~/.ssh/prod_ci_key
        eval "$(ssh-agent -s)"
        ssh-add ~/.ssh/prod_ci_key
        chmod +x scripts/automation/deployment/deploy-standardized-procedures.sh
        bash scripts/automation/deployment/deploy-standardized-procedures.sh prod
