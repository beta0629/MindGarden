<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700&display=swap');
      .logo-text { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 26px; letter-spacing: 0.05em; fill: currentColor; }
      .link-path { fill: none; stroke: currentColor; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .link-accent { stroke: #3b82f6; }
    </style>
  </defs>
  <g transform="translate(15, 15)">
    <!-- Infinity / Knot symbol -->
    <path d="M10,15 C10,5 22,5 26,15 C30,25 42,25 42,15 C42,5 30,5 26,15 C22,25 10,25 10,15 Z" class="link-path" />
    <circle cx="26" cy="15" r="3" class="link-accent" fill="#3b82f6" stroke="none" />
  </g>
  <text x="75" y="38" class="logo-text">Trinity</text>
</svg>