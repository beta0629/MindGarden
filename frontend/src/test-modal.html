<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Test</title>
    <link rel="stylesheet" href="./styles/unified-design-tokens.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        .test-button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Modal Button Test</h1>
    <button class="test-button" onclick="showModal()">로그아웃 모달 테스트</button>
    
    <!-- Modal HTML -->
    <div id="modal" class="mg-v2-modal-overlay" style="display: none;">
        <div class="mg-v2-modal">
            <div class="mg-v2-modal-header">
                <div class="mg-v2-modal-title-wrapper">
                    <h2 class="mg-v2-modal-title">로그아웃</h2>
                </div>
                <button class="mg-v2-modal-close" onclick="hideModal()">×</button>
            </div>
            
            <div class="mg-v2-modal-body">
                <div class="mg-v2-empty-state">
                    <p class="mg-v2-text-base mg-v2-mt-md">로그아웃하면 현재 세션이 종료됩니다.</p>
                </div>
            </div>
            
            <div class="mg-v2-modal-footer">
                <button class="mg-v2-button mg-v2-button--secondary" onclick="hideModal()">
                    취소
                </button>
                <button class="mg-v2-button mg-v2-button--primary" onclick="confirmLogout()">
                    로그아웃
                </button>
            </div>
        </div>
    </div>

    <script>
        function showModal() {
            document.getElementById('modal').style.display = 'flex';
        }
        
        function hideModal() {
            document.getElementById('modal').style.display = 'none';
        }
        
        function confirmLogout() {
            alert('로그아웃 확인됨!');
            hideModal();
        }
    </script>
</body>
</html>
