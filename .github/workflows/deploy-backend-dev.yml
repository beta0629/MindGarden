name: 🚀 CoreSolution 백엔드 개발 서버 배포
# 배포 트리거: 2025-12-10 (502 오류 해결)

on:
  push:
    branches: [ develop ]
    paths:
      # 코어솔루션 관련 Java 코드 (온보딩 제외)
      - 'src/main/java/com/coresolution/core/domain/**'
      - '!src/main/java/com/coresolution/core/domain/onboarding/**'
      - 'src/main/java/com/coresolution/core/repository/**'
      - '!src/main/java/com/coresolution/core/repository/onboarding/**'
      - 'src/main/java/com/coresolution/core/service/**'
      - '!src/main/java/com/coresolution/core/service/Onboarding*.java'
      - '!src/main/java/com/coresolution/core/service/impl/Onboarding*.java'
      - 'src/main/java/com/coresolution/core/controller/**'
      - '!src/main/java/com/coresolution/core/controller/Onboarding*.java'
      - 'src/main/java/com/coresolution/core/controller/dto/**'
      - '!src/main/java/com/coresolution/core/controller/dto/Onboarding*.java'
      - 'src/main/java/com/coresolution/core/dto/**'
      - 'src/main/java/com/coresolution/core/security/**'
      - 'src/main/java/com/coresolution/core/context/**'
      - 'src/main/java/com/coresolution/core/constant/**'
      - 'src/main/java/com/coresolution/core/config/**'
      # 기타 백엔드 코드
      - 'src/main/java/com/coresolution/consultation/**'
      - 'pom.xml'
      - '.github/workflows/deploy-backend-dev.yml'
  workflow_dispatch:
    # 수동 실행 가능

jobs:
  deploy-backend:
    name: 🏗️ 코어솔루션 백엔드 빌드 및 배포
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: ☕ Java 17 설정
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: 🔧 Maven 캐시 설정
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: 🏗️ 백엔드 빌드
      run: |
        mvn clean package -DskipTests
        echo "빌드 완료. 결과 확인:"
        ls -lh target/consultation-management-system-1.0.0.jar || echo "JAR 파일 없음!"
      
    - name: 🔍 백엔드 빌드 결과 확인
      run: |
        echo "🔍 백엔드 빌드 결과 확인..."
        if [ -f target/consultation-management-system-1.0.0.jar ]; then
          ls -lh target/consultation-management-system-1.0.0.jar
          echo "✅ JAR 파일 생성됨"
        else
          echo "❌ JAR 파일 없음!"
          ls -la target/ 2>/dev/null || echo "target 디렉토리 없음"
          exit 1
        fi
        
    - name: 🔍 개발 서버 SSH 연결 테스트
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 30s
        script: |
          echo "SSH 연결 테스트 성공: $(date)"
          
    - name: 🚀 개발 서버 배포 준비
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 120s
        command_timeout: 30m
        script: |
          cd /var/www/mindgarden-dev
          
          # 💾 배포 전 디스크 공간 확인 및 정리 (20% 이상 여유 공간 유지)
          echo "💾 배포 전 디스크 공간 확인..."
          DISK_USAGE=$(df -h / | awk 'NR==2 {print $5}' | sed 's/%//')
          if [ "$DISK_USAGE" -ge 80 ]; then
            echo "⚠️ 디스크 사용률이 80% 이상입니다. 자동 정리 시작..."
            if [ -f /opt/mindgarden/scripts/development/utilities/auto-disk-cleanup.sh ]; then
              /opt/mindgarden/scripts/development/utilities/auto-disk-cleanup.sh || true
            else
              echo "⚠️ 디스크 정리 스크립트를 찾을 수 없습니다. 수동 정리 필요"
            fi
          else
            echo "✅ 디스크 공간 충분: ${DISK_USAGE}% 사용 중"
          fi
          
          # 🔧 배포 전 DB 연결 정리 (Too many connections 오류 방지)
          echo "🔧 배포 전 DB 연결 정리 시작..."
          if [ -f /opt/mindgarden/scripts/development/utilities/cleanup-db-connections.sh ]; then
            source /etc/mindgarden/dev.env || true
            /opt/mindgarden/scripts/development/utilities/cleanup-db-connections.sh <<< "y" || true
          else
            echo "⚠️ 연결 정리 스크립트를 찾을 수 없습니다. 수동 정리 필요"
          fi
          
          # 서비스 중지
          sudo systemctl stop mindgarden-dev.service || true
          
          # 서비스 중지 후 추가 대기 (연결 정리 시간 확보)
          sleep 5
          
          # 백업 생성
          if [ -f app.jar ]; then
            BACKUP_DIR="/var/www/mindgarden-dev/backups"
            mkdir -p $BACKUP_DIR
            BACKUP_FILE="$BACKUP_DIR/app.jar.backup.$(date +%Y%m%d_%H%M%S)"
            # 같은 타임스탬프 파일이 있으면 초까지 포함한 타임스탬프 사용
            while [ -f "$BACKUP_FILE" ]; do
              BACKUP_FILE="$BACKUP_DIR/app.jar.backup.$(date +%Y%m%d_%H%M%S.%N | cut -b1-19)"
            done
            cp app.jar "$BACKUP_FILE"
            echo "✅ 백업 완료: $BACKUP_FILE"
          fi
          
    - name: 📤 백엔드 파일 업로드 SCP (개발 서버)
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 120s
        source: "target/consultation-management-system-1.0.0.jar"
        target: "/var/www/mindgarden-dev/"
        strip_components: 1
        overwrite: true
        
    - name: 📤 systemd 서비스 파일 업로드 (개발 서버)
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 120s
        source: "config/systemd/mindgarden-dev.service"
        target: "/tmp/mindgarden-dev.service"
        overwrite: true
        
    - name: 🔄 개발 서버 서비스 재시작
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 60s
        command_timeout: 5m
        script: |
          cd /var/www/mindgarden-dev
          
          # JAR 파일명 변경
          if [ -f consultation-management-system-1.0.0.jar ]; then
            mv consultation-management-system-1.0.0.jar app.jar
          fi
          
          # 권한 설정
          chmod +x app.jar
          
          # 시작 스크립트 생성
          echo "📝 시작 스크립트 생성 중..."
          sudo mkdir -p /opt/mindgarden
          sudo bash -c 'echo "#!/bin/bash" > /opt/mindgarden/start.sh'
          sudo bash -c 'echo "set -e" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "source /etc/mindgarden/dev.env" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "export DB_PASSWORD" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "export DB_USERNAME" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "export DB_HOST" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "export DB_NAME" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "export DB_PORT" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "export JWT_SECRET" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "export PERSONAL_DATA_ENCRYPTION_KEY" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "export PERSONAL_DATA_ENCRYPTION_IV" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "export OPS_ADMIN_USERNAME" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "export OPS_ADMIN_PASSWORD" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "export OPS_ADMIN_ROLE" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "export MAIL_HOST" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "export MAIL_PORT" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "export MAIL_USERNAME" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "export MAIL_PASSWORD" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "cd /var/www/mindgarden-dev" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "exec /usr/bin/java -jar app.jar --spring.profiles.active=dev -Dops.admin.userId=\"\$OPS_ADMIN_USERNAME\" -Dops.admin.password=\"\$OPS_ADMIN_PASSWORD\" -Dops.admin.role=\"\$OPS_ADMIN_ROLE\"" >> /opt/mindgarden/start.sh'
          sudo chmod +x /opt/mindgarden/start.sh
          echo "✅ 시작 스크립트 생성 완료"
          
          # systemd 서비스 파일 설정
          echo "📝 systemd 서비스 파일 설정 중..."
          if [ -f /tmp/mindgarden-dev.service ]; then
            sudo cp /tmp/mindgarden-dev.service /etc/systemd/system/mindgarden-dev.service
            sudo systemctl daemon-reload
            sudo systemctl enable mindgarden-dev.service
            echo "✅ systemd 서비스 파일 설정 완료"
          else
            echo "⚠️ systemd 서비스 파일이 업로드되지 않음 - 기본 설정 사용"
            sudo bash -c 'echo "[Unit]" > /etc/systemd/system/mindgarden-dev.service'
            sudo bash -c 'echo "Description=MindGarden Development Server" >> /etc/systemd/system/mindgarden-dev.service'
            sudo bash -c 'echo "After=network.target mysql.service" >> /etc/systemd/system/mindgarden-dev.service'
            sudo bash -c 'echo "" >> /etc/systemd/system/mindgarden-dev.service'
            sudo bash -c 'echo "[Service]" >> /etc/systemd/system/mindgarden-dev.service'
            sudo bash -c 'echo "Type=simple" >> /etc/systemd/system/mindgarden-dev.service'
            sudo bash -c 'echo "User=root" >> /etc/systemd/system/mindgarden-dev.service'
            sudo bash -c 'echo "WorkingDirectory=/var/www/mindgarden-dev" >> /etc/systemd/system/mindgarden-dev.service'
            sudo bash -c 'echo "ExecStart=/opt/mindgarden/start.sh" >> /etc/systemd/system/mindgarden-dev.service'
            sudo bash -c 'echo "Restart=always" >> /etc/systemd/system/mindgarden-dev.service'
            sudo bash -c 'echo "RestartSec=10" >> /etc/systemd/system/mindgarden-dev.service'
            sudo bash -c 'echo "StandardOutput=journal" >> /etc/systemd/system/mindgarden-dev.service'
            sudo bash -c 'echo "StandardError=journal" >> /etc/systemd/system/mindgarden-dev.service'
            sudo bash -c 'echo "SyslogIdentifier=mindgarden-dev" >> /etc/systemd/system/mindgarden-dev.service'
            sudo bash -c 'echo "" >> /etc/systemd/system/mindgarden-dev.service'
            sudo bash -c 'echo "[Install]" >> /etc/systemd/system/mindgarden-dev.service'
            sudo bash -c 'echo "WantedBy=multi-user.target" >> /etc/systemd/system/mindgarden-dev.service'
            sudo systemctl daemon-reload
            sudo systemctl enable mindgarden-dev.service
            echo "✅ 기본 systemd 서비스 파일 생성 완료"
          fi
          
          # 서비스 재시작
          echo "🔄 개발 서버 서비스 재시작..."
          sudo systemctl daemon-reload
          
          # 🔧 서비스 중지 전 DB 연결 정리 (Too many connections 오류 방지)
          echo "🔧 서비스 중지 전 DB 연결 정리..."
          if [ -f /opt/mindgarden/scripts/development/utilities/cleanup-db-connections.sh ]; then
            source /etc/mindgarden/dev.env || true
            echo "y" | /opt/mindgarden/scripts/development/utilities/cleanup-db-connections.sh || true
          else
            echo "⚠️ 연결 정리 스크립트를 찾을 수 없습니다"
          fi
          
          # 서비스 중지 (systemd가 자동으로 프로세스 종료 처리)
          echo "🛑 서비스 중지 중..."
          if sudo systemctl is-active --quiet mindgarden-dev.service; then
            sudo systemctl stop mindgarden-dev.service || true
            # 서비스가 완전히 중지될 때까지 대기 (최대 30초)
            for i in {1..30}; do
              if ! sudo systemctl is-active --quiet mindgarden-dev.service; then
                echo "✅ 서비스 중지 완료"
                break
              fi
              sleep 1
            done
            # 추가 안정화 대기 (연결 정리 시간 확보)
            sleep 5
          else
            echo "ℹ️ 서비스가 이미 중지되어 있음"
          fi
          
          # 포트 확인 (systemd가 프로세스를 종료했으므로 포트는 비어있어야 함)
          echo "🔍 포트 8080 확인..."
          PORT_CHECK=$(sudo lsof -ti:8080 2>/dev/null || true)
          if [ ! -z "$PORT_CHECK" ]; then
            echo "⚠️ 포트 8080이 여전히 사용 중입니다. systemd 서비스 외 프로세스일 수 있습니다."
            echo "   포트를 사용하는 프로세스: $PORT_CHECK"
            # systemd 서비스가 아닌 프로세스만 강제 종료 (선택적)
            # sudo fuser -k 8080/tcp 2>/dev/null || true
            # sleep 2
          else
            echo "✅ 포트 8080 준비 완료"
          fi
          
          # 서비스 시작
          echo "🚀 서비스 시작 중..."
          sudo systemctl start mindgarden-dev.service
          
          # 서비스가 완전히 시작될 때까지 대기 (최대 60초)
          echo "⏳ 서비스 시작 대기 중..."
          SERVICE_STARTED=false
          for i in {1..60}; do
            if sudo systemctl is-active --quiet mindgarden-dev.service; then
              # 서비스가 활성화되었지만, 애플리케이션이 완전히 시작되었는지 확인
              if curl -f -s http://localhost:8080/actuator/health > /dev/null 2>&1; then
                echo "✅ 서비스 및 애플리케이션 시작 완료 (${i}초 소요)"
                SERVICE_STARTED=true
                break
              fi
            fi
            sleep 1
          done
          
          if [ "$SERVICE_STARTED" = false ]; then
            echo "⚠️ 서비스 시작 대기 시간 초과 - 상태 확인 중..."
          fi
          
          # 서비스 상태 확인
          echo "🔍 서비스 상태 확인..."
          sudo systemctl status mindgarden-dev.service --no-pager | head -20
          
          if sudo systemctl is-active --quiet mindgarden-dev.service; then
            echo "✅ 개발 서버 서비스 정상 시작됨"
          else
            echo "❌ 서비스 시작 실패 - 로그 확인..."
            sudo journalctl -u mindgarden-dev.service --no-pager -n 100 || true
            exit 1
          fi
          
    - name: 🏥 개발 서버 헬스체크
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 30s
        script: |
          echo "🏥 개발 서버 헬스체크 시작..."
          sleep 5
          
          for i in {1..3}; do
            if curl -f -s http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "✅ 개발 서버 헬스체크 성공 (시도 $i)"
              curl -s http://localhost:8080/actuator/health | head -5
              exit 0
            else
              echo "⏳ 헬스체크 대기 중... (시도 $i/3)"
              sleep 10
            fi
          done
          
          echo "⚠️ 헬스체크 실패 - 서비스 로그 확인 필요"
          sudo journalctl -u mindgarden-dev.service --no-pager -n 50
          exit 1

