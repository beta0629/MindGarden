name: 🔁 KAKAO/NAVER SECRET 회전 (정책 §3.2 자동화)

# ============================================================================
# KAKAO_CLIENT_SECRET / NAVER_CLIENT_SECRET 회전 자동화 워크플로
#
# 정책 SSOT: docs/standards/SECRET_ROTATION_POLICY.md §3.2
# 회전 이력 표: docs/operations/secret-rotation-history.md
# 동일 패턴 참고: .github/workflows/rotate-jwt-secret.yml (정책 §3.1, JWT_SECRET)
#
# 트리거: workflow_dispatch (수동만). paths/push 트리거 절대 금지.
#
# JWT_SECRET 과의 차이:
#   1. 외부 콘솔 선행 — KAKAO Developers / NAVER Developers Console 에서
#      운영자가 GUI 로 시크릿을 재발급하고, 본 워크플로 입력에 신규 값을 붙여넣는다.
#      (콘솔 자동화는 정책상 금지 — API 미공개 + GUI 인증.)
#   2. 강도 검증 — JwtSecretValidator 같은 강도 정책 없음. 길이 ≥ 10자 + 공백/제어문자
#      차단 수준의 sanity check 만 inline 으로 수행.
#   3. 라이브 토큰 교환 검증 — /api/v1/auth/kakao 또는 /api/v1/auth/naver 호출은
#      외부 콘솔 상태에 영향을 주므로 본 워크플로 범위 외. /actuator/health UP 만
#      자동 확인하고, 실제 소셜 로그인 검증은 정책 §3.2 사후 수동 절차.
#
# 보안 원칙 (정책 §3 + §11 준수):
#   1. 평문 출력 절대 금지 — ::add-mask:: 로 즉시 마스킹 후 길이·sha256 prefix(8자) 만 노출
#   2. permissions 최소화 — contents/pull-requests/actions:write (secret 쓰기는 PAT 필수)
#   3. prod 환경은 confirm=ROTATE 외에 추가 confirm_prod=PROD_ROTATE 입력 필수
#   4. GitHub expression 직접 보간 금지 — env 매핑 후 셸 변수 사용 (injection 차단)
#   5. concurrency 그룹은 환경·제공자별 직렬화
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '회전 대상 환경 (dev → staging → prod 순차 검증 권장)'
        required: true
        type: choice
        default: 'dev'
        options:
          - dev
          - staging
          - prod
      provider:
        description: '회전 대상 제공자 (KAKAO / NAVER / BOTH)'
        required: true
        type: choice
        default: 'KAKAO'
        options:
          - KAKAO
          - NAVER
          - BOTH
      kakao_client_secret_new:
        description: 'KAKAO Developers 콘솔에서 발급한 신규 client secret (provider=KAKAO 또는 BOTH 일 때 필수)'
        required: false
        type: string
        default: ''
      naver_client_secret_new:
        description: 'NAVER Developers 콘솔에서 발급한 신규 client secret (provider=NAVER 또는 BOTH 일 때 필수)'
        required: false
        type: string
        default: ''
      confirm:
        description: '회전 확인 입력 — 정확히 "ROTATE" 만 진행'
        required: true
        type: string
        default: ''
      confirm_prod:
        description: '운영(prod) 회전 시 추가 확인 — 정확히 "PROD_ROTATE" (dev/staging 시 무시)'
        required: false
        type: string
        default: ''
      trigger_reason:
        description: '회전 트리거 사유 (정기 / 비상 / 점검 / 기타)'
        required: true
        type: choice
        default: '정기'
        options:
          - 정기
          - 비상
          - 점검
          - 기타

# 동시 회전 직렬화 — 동일 환경·제공자 동시 회전 차단 (race condition 방지)
concurrency:
  group: rotate-social-secrets-${{ inputs.environment }}-${{ inputs.provider }}
  cancel-in-progress: false

# 최소 권한 — secret 쓰기는 본 GITHUB_TOKEN 으로 불가능하므로
# secrets.ROTATION_SECRETS_PAT (repo scope: secrets:write) 별도 PAT 사용 필요.
permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  rotate:
    name: 🔁 ${{ inputs.provider }} 회전 — ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ROTATION_ENV: ${{ inputs.environment }}
      ROTATION_PROVIDER: ${{ inputs.provider }}
      ROTATION_REASON: ${{ inputs.trigger_reason }}
      ROTATION_CONFIRM: ${{ inputs.confirm }}
      ROTATION_CONFIRM_PROD: ${{ inputs.confirm_prod }}
      KAKAO_NEW_INPUT: ${{ inputs.kakao_client_secret_new }}
      NAVER_NEW_INPUT: ${{ inputs.naver_client_secret_new }}
    steps:
      # ---------------------------------------------------------------------
      # 0) 입력 검증 — confirm 토큰 + prod 추가 confirm + provider 별 신규 값 필수
      #    GitHub expression 직접 보간 대신 env 매핑을 통해 injection 차단.
      # ---------------------------------------------------------------------
      - name: ✅ 입력 confirm + provider 검증
        run: |
          set -euo pipefail
          if [ "${ROTATION_CONFIRM}" != "ROTATE" ]; then
            echo "::error title=confirm 미입력::confirm 입력값이 'ROTATE' 와 정확히 일치해야 회전을 진행합니다."
            exit 1
          fi
          if [ "${ROTATION_ENV}" = "prod" ]; then
            if [ "${ROTATION_CONFIRM_PROD}" != "PROD_ROTATE" ]; then
              echo "::error title=prod 추가 confirm 미입력::운영(prod) 회전은 confirm_prod='PROD_ROTATE' 추가 입력이 필요합니다."
              exit 1
            fi
            echo "::notice title=prod 회전 confirm 통과::운영 회전 confirm 2단계 통과"
          fi
          case "${ROTATION_PROVIDER}" in
            KAKAO)
              if [ -z "${KAKAO_NEW_INPUT}" ]; then
                echo "::error title=KAKAO 신규 값 누락::provider=KAKAO 일 때 kakao_client_secret_new 입력이 필요합니다."
                exit 1
              fi
              ;;
            NAVER)
              if [ -z "${NAVER_NEW_INPUT}" ]; then
                echo "::error title=NAVER 신규 값 누락::provider=NAVER 일 때 naver_client_secret_new 입력이 필요합니다."
                exit 1
              fi
              ;;
            BOTH)
              if [ -z "${KAKAO_NEW_INPUT}" ] || [ -z "${NAVER_NEW_INPUT}" ]; then
                echo "::error title=BOTH 신규 값 누락::provider=BOTH 일 때 KAKAO/NAVER 신규 값 모두 입력이 필요합니다."
                exit 1
              fi
              ;;
            *)
              echo "::error title=unknown provider::ROTATION_PROVIDER='${ROTATION_PROVIDER}'"
              exit 1
              ;;
          esac
          echo "✅ confirm + provider 검증 완료 — env=${ROTATION_ENV} provider=${ROTATION_PROVIDER} reason=${ROTATION_REASON}"

      - name: 📥 체크아웃 (이력 기록용)
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 1

      # ---------------------------------------------------------------------
      # 1) 신규 값 마스킹 + sanity check (한 step 통합)
      #    값은 즉시 ::add-mask:: 로 마스킹하여 이후 로그 노출을 차단.
      #    sanity check: 길이 ≥ 10자, 공백/제어문자 차단.
      #    검증 통과 후에만 후속 step 으로 ENV 전파.
      # ---------------------------------------------------------------------
      - name: 🔐 신규 값 마스킹 + sanity check
        id: sanity
        run: |
          set -euo pipefail

          MIN_LEN=10
          MAX_LEN=512
          KAKAO_LEN=0
          NAVER_LEN=0
          KAKAO_SHA8="N/A"
          NAVER_SHA8="N/A"

          check_value() {
            local label="$1"
            local val="$2"
            if [ -z "$val" ]; then
              echo "::error title=${label} 값 비어 있음::입력값이 비어 있습니다."
              return 1
            fi
            local len=${#val}
            if [ "$len" -lt "$MIN_LEN" ]; then
              echo "::error title=${label} 길이 위반::길이 ${len}자 < 최소 ${MIN_LEN}자"
              return 1
            fi
            if [ "$len" -gt "$MAX_LEN" ]; then
              echo "::error title=${label} 길이 위반::길이 ${len}자 > 최대 ${MAX_LEN}자"
              return 1
            fi
            # 공백/제어문자 차단 (탭·개행 등 포함)
            if printf '%s' "$val" | LC_ALL=C grep -qE '[[:space:][:cntrl:]]'; then
              echo "::error title=${label} 공백/제어문자 포함::신규 값에 공백 또는 제어문자가 포함되었습니다."
              return 1
            fi
            return 0
          }

          # KAKAO 측 처리
          if [ "${ROTATION_PROVIDER}" = "KAKAO" ] || [ "${ROTATION_PROVIDER}" = "BOTH" ]; then
            # 즉시 마스킹 — 이후 어떤 step 에서도 평문 노출 차단
            echo "::add-mask::${KAKAO_NEW_INPUT}"
            check_value "KAKAO" "${KAKAO_NEW_INPUT}"
            KAKAO_LEN=${#KAKAO_NEW_INPUT}
            KAKAO_SHA8=$(printf '%s' "${KAKAO_NEW_INPUT}" | sha256sum | cut -c1-8)
            {
              echo "KAKAO_NEW_SECRET<<__EOF_KAKAO__"
              printf '%s\n' "${KAKAO_NEW_INPUT}"
              echo "__EOF_KAKAO__"
            } >> "$GITHUB_ENV"
          fi

          # NAVER 측 처리
          if [ "${ROTATION_PROVIDER}" = "NAVER" ] || [ "${ROTATION_PROVIDER}" = "BOTH" ]; then
            echo "::add-mask::${NAVER_NEW_INPUT}"
            check_value "NAVER" "${NAVER_NEW_INPUT}"
            NAVER_LEN=${#NAVER_NEW_INPUT}
            NAVER_SHA8=$(printf '%s' "${NAVER_NEW_INPUT}" | sha256sum | cut -c1-8)
            {
              echo "NAVER_NEW_SECRET<<__EOF_NAVER__"
              printf '%s\n' "${NAVER_NEW_INPUT}"
              echo "__EOF_NAVER__"
            } >> "$GITHUB_ENV"
          fi

          {
            echo "kakao_len=${KAKAO_LEN}"
            echo "kakao_sha8=${KAKAO_SHA8}"
            echo "naver_len=${NAVER_LEN}"
            echo "naver_sha8=${NAVER_SHA8}"
          } >> "$GITHUB_OUTPUT"

          echo "✅ sanity check 통과 — provider=${ROTATION_PROVIDER} kakao_len=${KAKAO_LEN} naver_len=${NAVER_LEN}"

      # ---------------------------------------------------------------------
      # 2) GH Environment Secret 갱신
      #    secrets.ROTATION_SECRETS_PAT 는 repo scope: secrets:write 권한의 PAT.
      #    PAT 미설정 시 step 은 ::error 로 즉시 종료.
      # ---------------------------------------------------------------------
      - name: 🔐 GH Environment Secret 갱신
        env:
          ROTATION_SECRETS_PAT: ${{ secrets.ROTATION_SECRETS_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${ROTATION_SECRETS_PAT:-}" ]; then
            echo "::error title=PAT 미설정::secrets.ROTATION_SECRETS_PAT 미설정. repo scope secrets:write PAT 등록 후 재실행하세요. 정책 §10 참조."
            exit 1
          fi
          # gh CLI 인증 (stdin)
          echo "$ROTATION_SECRETS_PAT" | gh auth login --with-token
          gh auth status

          if [ "${ROTATION_PROVIDER}" = "KAKAO" ] || [ "${ROTATION_PROVIDER}" = "BOTH" ]; then
            printf '%s' "$KAKAO_NEW_SECRET" | gh secret set KAKAO_CLIENT_SECRET --env "$ROTATION_ENV" --body -
            echo "✅ gh secret set KAKAO_CLIENT_SECRET --env $ROTATION_ENV 완료"
            if ! gh secret list --env "$ROTATION_ENV" | grep -qE '^KAKAO_CLIENT_SECRET[[:space:]]'; then
              echo "::error title=secret list 실패::KAKAO_CLIENT_SECRET 키가 environment '$ROTATION_ENV' 에 등록되지 않았습니다."
              exit 1
            fi
          fi

          if [ "${ROTATION_PROVIDER}" = "NAVER" ] || [ "${ROTATION_PROVIDER}" = "BOTH" ]; then
            printf '%s' "$NAVER_NEW_SECRET" | gh secret set NAVER_CLIENT_SECRET --env "$ROTATION_ENV" --body -
            echo "✅ gh secret set NAVER_CLIENT_SECRET --env $ROTATION_ENV 완료"
            if ! gh secret list --env "$ROTATION_ENV" | grep -qE '^NAVER_CLIENT_SECRET[[:space:]]'; then
              echo "::error title=secret list 실패::NAVER_CLIENT_SECRET 키가 environment '$ROTATION_ENV' 에 등록되지 않았습니다."
              exit 1
            fi
          fi
          echo "✅ gh secret list 확인 통과"

      # ---------------------------------------------------------------------
      # 3) 해당 환경 BE 재배포 트리거
      #    - dev    → deploy-backend-dev.yml (ref: develop)
      #    - prod   → deploy-production.yml (ref: main)
      #    - staging→ (staging 라인 도입 후 추가)
      # ---------------------------------------------------------------------
      - name: 🚀 환경별 재배포 워크플로 트리거
        env:
          GH_TOKEN: ${{ secrets.ROTATION_SECRETS_PAT }}
        run: |
          set -euo pipefail
          case "$ROTATION_ENV" in
            dev)
              echo "🚀 deploy-backend-dev.yml dispatch (ref: develop)"
              gh workflow run deploy-backend-dev.yml --ref develop
              ;;
            prod)
              echo "🚀 deploy-production.yml dispatch (ref: main)"
              gh workflow run deploy-production.yml --ref main -f deploy_ref=main
              ;;
            staging)
              echo "::warning title=staging 미지원::staging 배포 워크플로가 아직 신설되지 않음. 본 step skip."
              ;;
            *)
              echo "::error title=unknown environment::$ROTATION_ENV"
              exit 1
              ;;
          esac

      # ---------------------------------------------------------------------
      # 4) /actuator/health UP 30회 polling (10초 간격 → 최대 5분)
      #    실제 소셜 로그인 토큰 교환 검증은 외부 콘솔 영향 우려로 본 워크플로 범위 외.
      #    정책 §3.2 사후 수동 검증 절차를 따른다.
      # ---------------------------------------------------------------------
      - name: 🏥 /actuator/health UP polling (30회 × 10초)
        run: |
          set -euo pipefail
          case "$ROTATION_ENV" in
            dev)     HEALTH_URL="https://mindgarden.dev.core-solution.co.kr/actuator/health" ;;
            prod)    HEALTH_URL="https://mindgarden.core-solution.co.kr/actuator/health" ;;
            staging) echo "::warning title=staging skip::staging health URL 미정의 — polling skip"; exit 0 ;;
            *)       echo "::error::unknown env"; exit 1 ;;
          esac

          # 재배포 dispatch 후 빌드/배포가 진행될 시간을 위해 30초 grace
          sleep 30

          echo "🏥 polling: $HEALTH_URL (최대 30회 × 10초)"
          OK=0
          for i in $(seq 1 30); do
            CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" --max-time 5 "$HEALTH_URL" || echo "000")
            STATUS=$(grep -oE '"status"[[:space:]]*:[[:space:]]*"[A-Z]+"' /tmp/health.json 2>/dev/null | head -n1 | sed -E 's/.*"([A-Z]+)".*/\1/' || echo "")
            echo "  [$i/30] http=$CODE status=$STATUS"
            if [ "$CODE" = "200" ] && [ "$STATUS" = "UP" ]; then
              OK=1
              break
            fi
            sleep 10
          done

          if [ "$OK" != "1" ]; then
            echo "::error title=헬스 polling 실패::30회 polling 안에 UP/200 응답 없음. 롤백 절차(정책 §6) 필요."
            exit 1
          fi
          echo "✅ /actuator/health UP 응답 확인"

      # ---------------------------------------------------------------------
      # 5) 회전 이력 자동 append + PR 생성
      #    docs/operations/secret-rotation-history.md 가 미존재 시 (PR #326 미머지 등)
      #    경고만 남기고 PR 생성을 skip — 회전 자체는 이미 완료된 상태로 안전 종료.
      # ---------------------------------------------------------------------
      - name: 📝 회전 이력 append + PR 생성
        env:
          GH_TOKEN: ${{ secrets.ROTATION_SECRETS_PAT }}
          KAKAO_LEN: ${{ steps.sanity.outputs.kakao_len }}
          KAKAO_SHA8: ${{ steps.sanity.outputs.kakao_sha8 }}
          NAVER_LEN: ${{ steps.sanity.outputs.naver_len }}
          NAVER_SHA8: ${{ steps.sanity.outputs.naver_sha8 }}
          RUN_ID: ${{ github.run_id }}
          REPO_FULL: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          HISTORY_FILE="docs/operations/secret-rotation-history.md"
          if [ ! -f "$HISTORY_FILE" ]; then
            echo "::warning title=이력 파일 미존재::${HISTORY_FILE} 가 develop 에 존재하지 않습니다. (PR #326 미머지 가능성) — 이력 PR 생성 skip."
            exit 0
          fi

          BRANCH="chore/secret-rotation/${ROTATION_ENV}-${ROTATION_PROVIDER}-${RUN_ID}"
          KST_NOW=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M')
          RUN_URL="https://github.com/${REPO_FULL}/actions/runs/${RUN_ID}"

          # provider 별 행 생성 — 시크릿 값 평문 절대 미기재 (길이·sha256 prefix 만)
          ROW_KAKAO=""
          ROW_NAVER=""
          if [ "${ROTATION_PROVIDER}" = "KAKAO" ] || [ "${ROTATION_PROVIDER}" = "BOTH" ]; then
            ROW_KAKAO="| ${KST_NOW} | \`KAKAO_CLIENT_SECRET\` | \`${ROTATION_ENV}\` | ${ROTATION_REASON} | [${RUN_ID}](${RUN_URL}) | ${ACTOR} | len=${KAKAO_LEN}, sha256=${KAKAO_SHA8} (구 키 N/A — 평문 미보유). 정책 §3.2 자동 회전. |"
          fi
          if [ "${ROTATION_PROVIDER}" = "NAVER" ] || [ "${ROTATION_PROVIDER}" = "BOTH" ]; then
            ROW_NAVER="| ${KST_NOW} | \`NAVER_CLIENT_SECRET\` | \`${ROTATION_ENV}\` | ${ROTATION_REASON} | [${RUN_ID}](${RUN_URL}) | ${ACTOR} | len=${NAVER_LEN}, sha256=${NAVER_SHA8} (구 키 N/A — 평문 미보유). 정책 §3.2 자동 회전. |"
          fi
          export ROW_KAKAO ROW_NAVER HISTORY_FILE

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # 표의 마지막 데이터 행 뒤에 신규 행 append (KAKAO → NAVER 순)
          # heredoc 안에서는 ENV 만 사용하여 GitHub expression injection 차단.
          python3 - <<'PYEOF'
          import os, re
          path = os.environ['HISTORY_FILE']
          rows = [os.environ.get('ROW_KAKAO', ''), os.environ.get('ROW_NAVER', '')]
          rows = [r for r in rows if r]
          if not rows:
              print('append 할 행 없음 — skip')
              raise SystemExit(0)
          with open(path, 'r', encoding='utf-8') as f:
              lines = f.readlines()
          last_table_idx = -1
          for i, line in enumerate(lines):
              s = line.strip()
              if s.startswith('|') and not re.match(r'^\|[\s\-:|]+\|$', s):
                  last_table_idx = i
          if last_table_idx == -1:
              raise SystemExit('이력 표를 찾지 못했습니다.')
          insert_at = last_table_idx + 1
          for r in rows:
              lines.insert(insert_at, r + '\n')
              insert_at += 1
          with open(path, 'w', encoding='utf-8') as f:
              f.writelines(lines)
          print(f'append 위치: line {last_table_idx + 2}, 행 수: {len(rows)}')
          PYEOF

          if git diff --quiet -- "$HISTORY_FILE"; then
            echo "::warning title=이력 파일 변경 없음::이력 행이 추가되지 않았습니다."
            exit 0
          fi

          git add "$HISTORY_FILE"
          git commit -m "chore(security): ${ROTATION_PROVIDER}_CLIENT_SECRET 회전 이력 append (${ROTATION_ENV}, run ${RUN_ID})"
          git push -u origin "$BRANCH"

          PR_BODY_FILE=$(mktemp)
          cat > "$PR_BODY_FILE" <<EOF
          ## 자동 생성 PR — ${ROTATION_PROVIDER} 회전 이력

          본 PR 은 \`rotate-social-secrets.yml\` 워크플로가 자동 생성합니다.

          - **환경**: \`${ROTATION_ENV}\`
          - **제공자**: \`${ROTATION_PROVIDER}\`
          - **트리거**: ${ROTATION_REASON}
          - **Run**: [${RUN_ID}](${RUN_URL})
          - **KAKAO 신 키**: len=${KAKAO_LEN}, sha256=\`${KAKAO_SHA8}\`
          - **NAVER 신 키**: len=${NAVER_LEN}, sha256=\`${NAVER_SHA8}\`

          ### 사후 수동 검증 체크리스트 (정책 §3.2)
          - [x] sanity check (길이 ≥ 10, 공백/제어문자 차단) 통과
          - [x] \`/actuator/health\` UP 응답 확인
          - [ ] dev 환경에서 실제 KAKAO/NAVER 소셜 로그인 1회 성공
          - [ ] 회전 전 발급 access token 동작 확인 (사용자 세션 영향 없음)
          - [ ] 외부 콘솔 구 시크릿 비활성화 (N=3일 후, OAuth provider 정책 따름)

          정책: \`docs/standards/SECRET_ROTATION_POLICY.md\` §3.2
          EOF

          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "chore(security): ${ROTATION_PROVIDER}_CLIENT_SECRET 회전 이력 (${ROTATION_ENV}, run ${RUN_ID})" \
            --body-file "$PR_BODY_FILE"

      # ---------------------------------------------------------------------
      # 6) 회전 결과 요약 (Job Summary)
      # ---------------------------------------------------------------------
      - name: 📋 회전 결과 요약 (job summary)
        if: always()
        env:
          KAKAO_LEN: ${{ steps.sanity.outputs.kakao_len }}
          KAKAO_SHA8: ${{ steps.sanity.outputs.kakao_sha8 }}
          NAVER_LEN: ${{ steps.sanity.outputs.naver_len }}
          NAVER_SHA8: ${{ steps.sanity.outputs.naver_sha8 }}
          RUN_ID: ${{ github.run_id }}
        run: |
          {
            echo "## ${ROTATION_PROVIDER}_CLIENT_SECRET 회전 결과"
            echo ""
            echo "- 환경: \`${ROTATION_ENV}\`"
            echo "- 제공자: \`${ROTATION_PROVIDER}\`"
            echo "- 트리거: \`${ROTATION_REASON}\`"
            echo "- KAKAO 신 키 길이: \`${KAKAO_LEN:-N/A}\`자, sha256 prefix: \`${KAKAO_SHA8:-N/A}\`"
            echo "- NAVER 신 키 길이: \`${NAVER_LEN:-N/A}\`자, sha256 prefix: \`${NAVER_SHA8:-N/A}\`"
            echo "- 구 키 sha256 prefix: \`N/A\` (GH Secrets 평문 미보유)"
            echo "- Run: \`${RUN_ID}\`"
            echo ""
            echo "정책: \`docs/standards/SECRET_ROTATION_POLICY.md\` §3.2"
            echo "이력: \`docs/operations/secret-rotation-history.md\`"
            echo ""
            echo "### 사후 수동 검증 (필수)"
            echo "- dev 환경에서 실제 KAKAO/NAVER 소셜 로그인 1회 사용자 검증"
            echo "- 외부 콘솔 구 시크릿 비활성화 (N=3일 후)"
          } >> "$GITHUB_STEP_SUMMARY"
