name: 🔍 개발 서버 로그 확인

on:
  workflow_dispatch:
    # 수동 실행 가능

jobs:
  check-logs:
    name: 📋 개발 서버 로그 확인
    runs-on: ubuntu-latest
    
    steps:
    - name: 🔍 개발 서버 로그 확인
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 60s
        script: |
          echo "=========================================="
          echo "📋 개발 서버 로그 확인"
          echo "=========================================="
          echo ""
          
          # 헬스 체크 및 디스크/로그 용량 (로그 가득 찼는지 확인)
          echo "🩺 헬스 체크 및 디스크/로그 용량:"
          echo "=========================================="
          echo "--- 디스크 사용량 (df -h) ---"
          df -h
          echo ""
          echo "--- systemd 저널 용량 (로그 가득 여부) ---"
          journalctl --disk-usage
          echo ""
          echo "--- /var/log 용량 ---"
          du -sh /var/log 2>/dev/null || true
          du -sh /var/log/mindgarden 2>/dev/null || true
          echo ""
          echo "--- /var/www/mindgarden-dev 로그/캐시 용량 ---"
          du -sh /var/www/mindgarden-dev 2>/dev/null || true
          ls -la /var/www/mindgarden-dev/*.log 2>/dev/null || echo "앱 로그 파일 없음"
          echo ""
          echo "--- 로컬 헬스 체크 (actuator/health) ---"
          curl -sf -m 10 http://localhost:8080/actuator/health && echo "" || echo "❌ 헬스 체크 실패 또는 타임아웃"
          echo ""
          
          # 서비스 상태 확인
          echo "🔍 서비스 상태:"
          echo "=========================================="
          sudo systemctl status mindgarden-dev.service --no-pager | head -30 || true
          echo ""
          
          # 최근 서비스 로그 (최근 100줄)
          echo "📋 최근 서비스 로그 (최근 100줄):"
          echo "=========================================="
          sudo journalctl -u mindgarden-dev.service --no-pager -n 100 || true
          echo ""
          
          # 온보딩 프로세스 관련 로그 (최근 200줄)
          echo "📋 온보딩 프로세스 관련 로그 (최근 200줄):"
          echo "=========================================="
          sudo journalctl -u mindgarden-dev.service --no-pager -n 500 | grep -i -E "(온보딩|onboarding|ProcessOnboardingApproval|프로시저 실행|프로시저 결과|권한 그룹|commonCodes|roleCodes|permissionGroups)" || echo "온보딩 관련 로그 없음"
          echo ""
          
          # 애플리케이션 에러 로그
          echo "📋 애플리케이션 에러 로그:"
          echo "=========================================="
          sudo tail -100 /var/log/mindgarden/dev-error.log 2>/dev/null || echo "에러 로그 파일 없음"
          echo ""
          
          # 온보딩 프로세스 에러 로그 (필터링)
          echo "📋 온보딩 프로세스 에러 로그 (필터링):"
          echo "=========================================="
          sudo tail -200 /var/log/mindgarden/dev-error.log 2>/dev/null | grep -i -E "(온보딩|onboarding|ProcessOnboardingApproval|프로시저 실행 실패|프로시저 결과|권한 그룹|Transaction.*rolled back)" || echo "온보딩 관련 에러 로그 없음"
          echo ""
          
          # 애플리케이션 일반 로그
          echo "📋 애플리케이션 일반 로그:"
          echo "=========================================="
          sudo tail -100 /var/log/mindgarden/dev.log 2>/dev/null || echo "로그 파일 없음"
          echo ""
          
          # JAR 파일 확인
          echo "📋 JAR 파일 확인:"
          echo "=========================================="
          ls -lh /var/www/mindgarden-dev/app.jar 2>/dev/null || echo "JAR 파일 없음!"
          echo ""
          
          # 환경 변수 파일 확인
          echo "📋 환경 변수 파일 확인:"
          echo "=========================================="
          if sudo test -f /etc/mindgarden/dev.env; then
            echo "✅ 환경 변수 파일 존재"
            echo "파일 크기: $(sudo ls -lh /etc/mindgarden/dev.env | awk '{print $5}')"
            echo "파일 권한: $(sudo ls -l /etc/mindgarden/dev.env | awk '{print $1}')"
          else
            echo "❌ 환경 변수 파일 없음: /etc/mindgarden/dev.env"
          fi
          echo ""
          
          # Java 버전 확인
          echo "📋 Java 버전 확인:"
          echo "=========================================="
          /usr/bin/java -version 2>&1 || echo "Java 없음!"
          echo ""
          
          # 포트 사용 확인
          echo "📋 포트 8080 사용 확인:"
          echo "=========================================="
          sudo netstat -tlnp | grep 8080 || echo "포트 8080 사용 안 함"
          echo ""
          
          # 데이터베이스 연결 테스트 (환경 변수 파일이 있는 경우)
          if sudo test -f /etc/mindgarden/dev.env; then
            echo "📋 데이터베이스 연결 테스트:"
            echo "=========================================="
            source /etc/mindgarden/dev.env
            if [ -n "$DB_HOST" ] && [ -n "$DB_NAME" ]; then
              echo "DB_HOST: $DB_HOST"
              echo "DB_NAME: $DB_NAME"
              echo "DB_USERNAME: $DB_USERNAME"
              # MySQL 클라이언트가 있으면 연결 테스트
              if command -v mysql &> /dev/null; then
                timeout 5 mysql -h "$DB_HOST" -u "$DB_USERNAME" -p"$DB_PASSWORD" -e "SELECT 1" "$DB_NAME" 2>&1 | head -5 || echo "데이터베이스 연결 실패"
              else
                echo "MySQL 클라이언트 없음"
              fi
            else
              echo "데이터베이스 환경 변수 없음"
            fi
            echo ""
          fi
          
          # systemd 서비스 파일 확인
          echo "📋 systemd 서비스 파일 확인:"
          echo "=========================================="
          sudo cat /etc/systemd/system/mindgarden-dev.service 2>/dev/null || echo "서비스 파일 없음"
          echo ""
          
          # 운영→개발 DB 일일 동기화 (D-1) — docs/project-management/PROD_TO_DEV_DB_SYNC_RUNBOOK.md
          echo "📋 D-1 운영→개발 DB 동기화 배치 (prod-to-dev-daily.sh):"
          echo "=========================================="
          SYNC_SCRIPT="/opt/mindgarden/scripts/database/sync/prod-to-dev-daily.sh"
          SYNC_ENV="/etc/mindgarden/prod-to-dev-sync.env"
          if sudo test -x "$SYNC_SCRIPT"; then
            echo "✅ 스크립트 존재 및 실행 가능: $SYNC_SCRIPT"
          else
            echo "❌ 스크립트 없음 또는 비실행: $SYNC_SCRIPT (런북대로 배포·chmod +x 필요)"
          fi
          if sudo test -f "$SYNC_ENV"; then
            echo "✅ 설정 파일 존재: $SYNC_ENV"
          else
            echo "❌ 설정 파일 없음: $SYNC_ENV (example 복사 후 chmod 600)"
          fi
          echo "--- crontab (mindgarden / prod-to-dev 관련 줄) ---"
          (sudo crontab -l 2>/dev/null || true; crontab -l 2>/dev/null || true) | grep -E "prod-to-dev|mindgarden.*sync|database/sync" || echo "(등록된 prod-to-dev cron 줄 없음 — crontab.example 참고)"
          echo "--- 최근 cron 로그 (있으면) ---"
          sudo tail -80 /var/log/mindgarden/prod-to-dev-cron.log 2>/dev/null || echo "prod-to-dev-cron.log 없음"
          echo "--- 최근 동기화 스크립트 로그 (LOG_DIR 기본) ---"
          sudo ls -lt /var/log/mindgarden/prod-to-dev-sync_*.log 2>/dev/null | head -5 || echo "prod-to-dev-sync_*.log 없음"
          sudo tail -40 /var/log/mindgarden/prod-to-dev-sync_*.log 2>/dev/null | tail -40 || true
          echo ""
          
          echo "=========================================="
          echo "✅ 로그 확인 완료"
          echo "=========================================="

