# 정적 사이트 SSH/SCP 배포 공통 단계 (Trinity·Ops 등)
# 호출: workflow_call + secrets(ssh_host, ssh_user, ssh_key) 매핑

on:
  workflow_call:
    secrets:
      ssh_host:
        description: "배포 대상 SSH 호스트"
        required: true
      ssh_user:
        description: "SSH 사용자"
        required: true
      ssh_key:
        description: "SSH 개인 키"
        required: true
    inputs:
      site_label:
        description: "로그·메시지용 사이트 라벨"
        required: true
        type: string
      remote_html_dir:
        description: "/var/www 아래 HTML 디렉터리명 (예 html-trinity)"
        required: true
        type: string
      backup_subdir:
        description: "/var/www/backups 아래 백업 하위 디렉터리명"
        required: true
        type: string
      backup_tar_prefix:
        description: "백업 tar 접두사 (예 html-trinity-backup)"
        required: true
        type: string
      scp_source:
        description: "워크스페이스 기준 SCP source glob (빌드 job에서 내려받은 산출물 경로)"
        required: true
        type: string
      strip_components:
        description: "appleboy/scp-action strip_components (워크스페이스 glob이 frontend-*/out/* 이면 2, 평탄 아티팩트는 1)"
        required: false
        default: 2
        type: number
      artifact_name:
        description: "download-artifact 이름 (build job upload 와 동일)"
        required: true
        type: string
      health_urls:
        description: "헬스체크 URL 목록 (줄바꿈 구분, 빈 줄 무시)"
        required: true
        type: string
      health_require_all_urls:
        description: "true면 health_urls 전부 성공해야 pass (false면 하나라도 성공 시 pass)"
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    name: 📤 ${{ inputs.site_label }} 정적 배포 (SSH)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 빌드 아티팩트 다운로드
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact_name }}
          path: _static_site_upload

      - name: 🔍 SSH 연결 테스트
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ssh_host }}
          username: ${{ secrets.ssh_user }}
          key: ${{ secrets.ssh_key }}
          port: 22
          timeout: 30s
          script: |
            echo "SSH 연결 테스트 성공: $(date)"
            echo "서버 정보: $(uname -a)"

      - name: 💾 배포 전 기존 파일 백업
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ssh_host }}
          username: ${{ secrets.ssh_user }}
          key: ${{ secrets.ssh_key }}
          port: 22
          timeout: 60s
          script: |
            sudo mkdir -p /var/www/backups/${{ inputs.backup_subdir }}

            if [ -d /var/www/${{ inputs.remote_html_dir }} ] && [ "$(ls -A /var/www/${{ inputs.remote_html_dir }} 2>/dev/null)" ]; then
              BACKUP_NAME="${{ inputs.backup_tar_prefix }}-$(date +%Y%m%d_%H%M%S).tar.gz"
              echo "💾 기존 파일 백업 중: $BACKUP_NAME"
              sudo tar -czf /var/www/backups/${{ inputs.backup_subdir }}/$BACKUP_NAME -C /var/www ${{ inputs.remote_html_dir }}
              echo "✅ 백업 완료: $BACKUP_NAME"
              ls -lh /var/www/backups/${{ inputs.backup_subdir }}/$BACKUP_NAME
            else
              echo "ℹ️ 백업할 기존 파일 없음 (신규 배포)"
            fi

            BACKUP_RETENTION_COUNT=5
            BACKUP_DIR="/var/www/backups/${{ inputs.backup_subdir }}"
            ls -1t "$BACKUP_DIR"/${{ inputs.backup_tar_prefix }}-*.tar.gz 2>/dev/null | tail -n +$((BACKUP_RETENTION_COUNT + 1)) | xargs -r sudo rm -f

      - name: 📤 정적 파일 업로드 SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ssh_host }}
          username: ${{ secrets.ssh_user }}
          key: ${{ secrets.ssh_key }}
          port: 22
          timeout: 120s
          source: ${{ inputs.scp_source }}
          target: "/var/www/${{ inputs.remote_html_dir }}/"
          strip_components: ${{ inputs.strip_components }}
          overwrite: true

      - name: 🔄 배포 완료 및 검증
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ssh_host }}
          username: ${{ secrets.ssh_user }}
          key: ${{ secrets.ssh_key }}
          port: 22
          timeout: 60s
          script: |
            sudo mkdir -p /var/www/${{ inputs.remote_html_dir }}
            sudo chown -R www-data:www-data /var/www/${{ inputs.remote_html_dir }}
            sudo chmod -R 755 /var/www/${{ inputs.remote_html_dir }}

            echo "🔍 배포된 파일 확인..."
            if [ -d /var/www/${{ inputs.remote_html_dir }} ]; then
              FILE_COUNT=$(find /var/www/${{ inputs.remote_html_dir }} -type f 2>/dev/null | wc -l)
              if [ "$FILE_COUNT" -gt 0 ]; then
                echo "✅ 배포 완료: $FILE_COUNT 개 파일"
                ls -lh /var/www/${{ inputs.remote_html_dir }}/ | head -10
                if [ -f /var/www/${{ inputs.remote_html_dir }}/index.html ]; then
                  echo "✅ index.html 확인됨"
                  echo "파일 크기: $(stat -c%s /var/www/${{ inputs.remote_html_dir }}/index.html) bytes"
                else
                  echo "⚠️ index.html 없음!"
                  exit 1
                fi
              else
                echo "❌ 배포된 파일 없음!"
                exit 1
              fi
            else
              echo "❌ 배포 디렉토리 없음!"
              exit 1
            fi

            echo "✅ ${{ inputs.site_label }} 정적 배포 완료"

      - name: 🏥 배포 후 헬스체크
        env:
          HEALTH_URLS_ECHO: ${{ inputs.health_urls }}
          HEALTH_REQUIRE_ALL: ${{ inputs.health_require_all_urls }}
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ssh_host }}
          username: ${{ secrets.ssh_user }}
          key: ${{ secrets.ssh_key }}
          port: 22
          timeout: 120s
          envs: HEALTH_URLS_ECHO,HEALTH_REQUIRE_ALL
          script: |
            echo "🏥 헬스체크 시작 (require_all=$HEALTH_REQUIRE_ALL)..."
            sleep 3

            if sudo nginx -t 2>/dev/null; then
              echo "✅ Nginx 설정 정상"
            else
              echo "⚠️ Nginx 설정 오류 (계속 진행)"
            fi

            check_health_url() {
              url="$1"
              curl_err_file=$(mktemp)
              for i in 1 2 3; do
                http_code=$(curl -sS -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 15 "$url" 2>"$curl_err_file")
                curl_exit=$?
                curl_err=$(cat "$curl_err_file" 2>/dev/null || true)

                if [ "$curl_exit" -eq 0 ] && echo "$http_code" | grep -qE '^(200|301|302)$'; then
                  echo "✅ 웹사이트 접근 성공: $url (HTTP $http_code, 시도 $i/3)"
                  curl -sI "$url" | head -5
                  rm -f "$curl_err_file"
                  return 0
                fi

                if echo "$curl_err" | grep -qiE 'ssl|certificate|TLS|handshake'; then
                  echo "❌ SSL/TLS 오류: $url (시도 $i/3)"
                  echo "   $curl_err"
                elif [ "$http_code" != "000" ] && echo "$http_code" | grep -qE '^[0-9]+$'; then
                  echo "❌ HTTP $http_code: $url (시도 $i/3)"
                  [ -n "$curl_err" ] && echo "   $curl_err"
                else
                  echo "❌ 연결 실패: $url (curl exit $curl_exit, 시도 $i/3)"
                  [ -n "$curl_err" ] && echo "   $curl_err"
                fi

                [ "$i" -lt 3 ] && sleep 5
              done
              rm -f "$curl_err_file"
              return 1
            }

            success_count=0
            fail_count=0
            checked_count=0
            failed_urls=""

            while IFS= read -r url || [ -n "$url" ]; do
              url_trimmed=$(echo "$url" | xargs)
              [ -z "$url_trimmed" ] && continue
              checked_count=$((checked_count + 1))

              if check_health_url "$url_trimmed"; then
                success_count=$((success_count + 1))
                if [ "$HEALTH_REQUIRE_ALL" != "true" ]; then
                  echo "✅ 헬스체크 통과 (URL $success_count/$checked_count 성공, require_all=false)"
                  exit 0
                fi
              else
                fail_count=$((fail_count + 1))
                failed_urls="${failed_urls}  - ${url_trimmed}"$'\n'
                if [ "$HEALTH_REQUIRE_ALL" != "true" ]; then
                  continue
                fi
                echo "::error::필수 헬스체크 실패 (require_all=true): $url_trimmed"
                echo "❌ 배포 헬스체크 실패 — 모든 URL 필수"
                echo "실패 URL:"
                printf '%s' "$failed_urls"
                exit 1
              fi
            done <<< "$HEALTH_URLS_ECHO"

            if [ "$checked_count" -eq 0 ]; then
              echo "::error::헬스체크 URL이 비어 있습니다"
              exit 1
            fi

            if [ "$HEALTH_REQUIRE_ALL" = "true" ]; then
              echo "✅ 헬스체크 통과 ($success_count/$checked_count URL 모두 성공)"
              exit 0
            fi

            echo "::error::헬스체크 실패 — 확인된 URL 중 성공 없음 ($fail_count/$checked_count 실패)"
            echo "확인 URL 목록:"
            echo "$HEALTH_URLS_ECHO"
            exit 1
