# SSH/SCP: 개발 서버(DEV_SERVER_HOST·DEV_SERVER_SSH_KEY)에서 mysql 실행 — 운영서버→개발DB 3306 연결(2003) 방지.
# DEV_SERVER_USER 선택(미설정 시 root). DB: DEV_DB_* + 스크립트 기본 비밀번호 폴백.
# refs: deploy-procedures-dev.yml, deploy-standardized-procedures.sh prod 분기

name: 📦 표준화된 프로시저 배포 (운영)

on:
  workflow_dispatch:  # 수동 실행만 가능

jobs:
  deploy-procedures:
    name: 🚀 프로시저 배포
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 🔧 배포용 프로시저 파일 생성
      run: |
        chmod +x database/schema/procedures_standardized/create_deployment_files.sh
        bash database/schema/procedures_standardized/create_deployment_files.sh

    - name: 🔑 known_hosts 추가 (Host key verification 방지)
      run: |
        mkdir -p ~/.ssh
        for h in "${{ secrets.DEV_SERVER_HOST }}" "${{ secrets.PRODUCTION_HOST }}"; do
          [ -n "$h" ] && ssh-keyscan -H "$h" >> ~/.ssh/known_hosts 2>/dev/null || true
        done
    
    - name: 📤 프로시저 배포
      run: |
        if [ -z "${{ secrets.DEV_DB_PASSWORD }}" ]; then
          echo "::notice::DEV_DB_PASSWORD 시크릿이 비어 있습니다. 스크립트 개발 DB 기본 비밀번호(DEPLOYMENT_STANDARD와 동일)를 사용합니다."
        fi

        DB_HOST_RESOLVED="${{ secrets.DEV_DB_HOST }}"
        if [ -z "$DB_HOST_RESOLVED" ]; then
          DB_HOST_RESOLVED="beta0629.cafe24.com"
          echo "::notice::DEV_DB_HOST 가 비어 있어 기본값 beta0629.cafe24.com 을 사용합니다. 개발 DB가 다르면 DEV_DB_HOST 시크릿을 설정하세요."
        fi

        JUMP="${{ secrets.DEV_SERVER_HOST }}"
        [ -z "$JUMP" ] && JUMP="beta0629.cafe24.com"
        export PROD_SSH_JUMP_HOST="$JUMP"
        JUSER="${{ secrets.DEV_SERVER_USER }}"
        [ -n "$JUSER" ] && export PROD_SSH_JUMP_USER="$JUSER"

        export PROD_DB_HOST="$DB_HOST_RESOLVED"
        export PROD_DB_PASSWORD="${{ secrets.DEV_DB_PASSWORD }}"
        U_SECRET="${{ secrets.DEV_DB_USER }}"
        [ -n "$U_SECRET" ] && export PROD_DB_USER="$U_SECRET"
        N_SECRET="${{ secrets.DEV_DB_NAME }}"
        [ -n "$N_SECRET" ] && export PROD_DB_NAME="$N_SECRET"

        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        if [ -n "${{ secrets.DEV_SERVER_SSH_KEY }}" ]; then
          echo "${{ secrets.DEV_SERVER_SSH_KEY }}" > ~/.ssh/prod_ci_key
        else
          echo "::warning::DEV_SERVER_SSH_KEY 가 비어 있습니다. PRODUCTION_SSH_KEY 로 시도합니다(개발 서버에 동일 키가 등록된 경우만 성공)."
          echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/prod_ci_key
        fi
        chmod 600 ~/.ssh/prod_ci_key
        eval "$(ssh-agent -s)"
        ssh-add ~/.ssh/prod_ci_key
        chmod +x scripts/automation/deployment/deploy-standardized-procedures.sh
        bash scripts/automation/deployment/deploy-standardized-procedures.sh prod
