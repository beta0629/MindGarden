# 테스트 프로파일: @ActiveProfiles("test") 시 로드.
# PlSqlInitializer 는 MySQL 저장 프로시저 DDL을 H2에서 실행할 수 없으므로 비활성화한다.
mindgarden:
  plsql-initializer:
    enabled: false

# 기본은 인메모리 H2(MODE=MySQL)로 mvn test 가 외부 DB 없이 JPA 컨텍스트를 기동한다.
# 공유 MySQL로 통합 검증 시에만 환경 변수로 JDBC URL·계정을 넘긴다.
#
# DevTools 의 DataSource 자동구성이 동일 타입 빈을 추가하면 HibernateJpaConfiguration 의
# @ConditionalOnSingleCandidate(DataSource) 에 걸려 entityManagerFactory 가 등록되지 않을 수 있음.
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.devtools.autoconfigure.DevToolsDataSourceAutoConfiguration
  datasource:
    # 빈 문자열로 설정된 SPRING_DATASOURCE_URL 이 기본값을 덮어써 풀 미생성·JPA 비활성화되는 것을 피함.
    # MySQL 등으로 덮어쓸 때는 IDE/CLI에서 --spring.datasource.url=... 만 사용 (빈 env 금지).
    # NON_KEYWORDS: H2 2.x 에서 MONTH/YEAR 등이 예약어(예: erp_budgets.month)로 DDL 실패 방지
    # implicit-strategy: H2는 인덱스 이름이 스키마 전역 유일(MySQL은 테이블별 동일 이름 허용) → 테스트 전용 네이밍
    url: jdbc:h2:mem:mindgarden_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=MONTH,YEAR
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
    # application.yml 의 MySQL 전용 SET NAMES … 가 H2 풀 초기화를 깨므로 테스트에서는 비움
    connection-init-sql: ""
    hikari:
      connection-init-sql: ""
  jpa:
    hibernate:
      # Flyway 비활성 시 엔티티 메타데이터로 스키마 보강 (운영은 ddl-auto none + Flyway)
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
      naming:
        implicit-strategy: com.coresolution.consultation.testsupport.H2GlobalUniqueIndexImplicitNamingStrategy
    show-sql: true
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
    properties:
      hibernate:
        dialect: ${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
        # application.yml 의 hbm2ddl.auto: none 과 정합 (ddl-auto update 가 실제로 적용되도록)
        hbm2ddl:
          auto: ${SPRING_JPA_PROPERTIES_HIBERNATE_HBM2DDL_AUTO:update}
        format_sql: true
        use_sql_comments: true
  task:
    scheduling:
      enabled: false
  flyway:
    # H2는 다수 Flyway(MySQL 전용) 마이그레이션과 호환되지 않으므로 테스트 기본은 비활성
    enabled: ${SPRING_FLYWAY_ENABLED:false}
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
    clean-disabled: true
    out-of-order: false

logging:
  level:
    root: WARN
    com.coresolution: INFO
    org.springframework: WARN
    org.hibernate: WARN
    org.flywaydb: INFO

erd:
  auto-generation:
    enabled: false
    trigger-on-migration: false
  notification:
    enabled: false

server:
  port: 8081

JWT_SECRET: "test-jwt-secret-key-for-integration-test-only-minimum-32-characters-required"
JWT_EXPIRATION: 86400000
JWT_REFRESH_EXPIRATION: 604800000

PERSONAL_DATA_ENCRYPTION_KEY: "test-encryption-key-32-characters-long-required"
PERSONAL_DATA_ENCRYPTION_IV: "test-iv-16-chars"

OPENAI_API_KEY: "test-openai-key"
OPENAI_API_URL: "https://api.openai.com/v1"
OPENAI_MODEL: "gpt-3.5-turbo"

email:
  block-all-outbound: true
  send-allowlist: ""

ops:
  admin:
    username: "test-admin@mindgarden.com"
    password: "test-password-123"
    role: "HQ_ADMIN"
