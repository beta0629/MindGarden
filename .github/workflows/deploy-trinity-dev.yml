name: 🌟 Trinity 프론트엔드 개발 서버 배포
# 배포 트리거: 2025-12-10

on:
  push:
    branches: [ develop ]
    paths:
      - 'frontend-trinity/**'
      - '.github/workflows/deploy-trinity-dev.yml'
  workflow_dispatch:
    # 수동 실행 가능

jobs:
  build:
    name: 🏗️ Trinity 프론트엔드 빌드
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 📦 Node.js 18 설정
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend-trinity/package-lock.json

      - name: 📦 Trinity 프론트엔드 의존성 설치
        run: |
          cd frontend-trinity
          npm ci

      - name: 🏗️ Trinity 프론트엔드 빌드
        run: |
          cd frontend-trinity
          ESLINT_NO_DEV_ERRORS=true npm run build

      - name: 🔍 Trinity 프론트엔드 빌드 결과 확인
        run: |
          echo "🔍 Trinity 프론트엔드 빌드 결과 확인..."
          if [ -d frontend-trinity/out ]; then
            FILE_COUNT=$(find frontend-trinity/out -type f 2>/dev/null | wc -l)
            if [ "$FILE_COUNT" -gt 0 ]; then
              echo "✅ frontend-trinity/out 디렉토리 생성됨: $FILE_COUNT 개 파일"
              find frontend-trinity/out -maxdepth 1 -type f -print0 2>/dev/null | head -z -n 10 | xargs -0r ls -lh
            else
              echo "❌ frontend-trinity/out 디렉토리가 비어있음!"
              exit 1
            fi
          else
            echo "❌ frontend-trinity/out 디렉토리 없음!"
            exit 1
          fi

      - name: 📦 배포용 아티팩트 스테이징
        run: |
          rm -rf _gha_static_site_upload
          mkdir -p _gha_static_site_upload
          cp -a frontend-trinity/out/. _gha_static_site_upload/

      - name: 📤 빌드 산출물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: trinity-static-site-artifact
          path: _gha_static_site_upload/

  deploy:
    name: 📤 Trinity 개발 서버 배포
    needs: build
    uses: ./.github/workflows/reusable-static-site-ssh-deploy.yml
    with:
      site_label: Trinity(개발)
      remote_html_dir: html-trinity
      backup_subdir: html-trinity
      backup_tar_prefix: html-trinity-backup
      scp_source: _static_site_upload/*
      strip_components: 1
      artifact_name: trinity-static-site-artifact
      health_urls: |
        https://apply.dev.e-trinity.co.kr
        https://dev.e-trinity.co.kr
    secrets:
      ssh_host: ${{ secrets.DEV_SERVER_HOST }}
      ssh_user: ${{ secrets.DEV_SERVER_USER }}
      ssh_key: ${{ secrets.DEV_SERVER_SSH_KEY }}
