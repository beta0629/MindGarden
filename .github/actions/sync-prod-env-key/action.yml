name: 'Sync prod-from-dev.env Key Set'
description: 'GitHub Secrets → /etc/mindgarden/prod-from-dev.env 멱등 sync + PRESERVE_KEYS 가드 (DB 8키 + PII/DORMANT 4키, PR #296/#299/#301/#303/PR-2 통합)'

# ============================================================================
# secrets-sync composite action (PR #302, 2026-06-13)
# Apple/Google/REGISTERED_URLS/PROFILE_IMAGE/JWT_SECRET 5 step 의 동일 PRESERVE/RESTORE/FAIL-FAST
# 가드 + sed 멱등 갱신 로직을 단일 액션으로 통합.
#
# PII 회전 선행 PR-2 (2026-06-14): PRESERVE 가드 set 을 DB 8키 + PII/DORMANT 4키 = 12종 으로 확장.
# 다른 sync step 갱신 도중 PII 키 라인이 사라지는 회귀 차단 (PR #299 DB_PRESERVE_KEYS 동일 패턴).
# 신규 보존 키 4종:
#   - PERSONAL_DATA_ENCRYPTION_ACTIVE_KEY_ID
#   - PERSONAL_DATA_ENCRYPTION_KEYS
#   - PERSONAL_DATA_ENCRYPTION_IVS
#   - MINDGARDEN_DORMANT_PII_ENC_KEY
# DB FAIL-FAST 검증 (DB_HOST/DB_NAME/DB_USERNAME) 은 그대로 유지 — PII 키는 누락 허용
# (Phase 0~4 진입 전 BE 기동 영향 최소화). 회전이 끝난 뒤 보존 가드가 회귀 차단을 담당한다.
#
# 참조: docs/standards/DB_ENV_SSOT_POLICY.md §2 (PR-2),
#       docs/운영반영/DB_ENV_SSOT_PRECHECK_20260613.md §6, 부록 D.4,
#       docs/standards/PII_KEY_ROTATION_REENCRYPTION_DESIGN.md (PR #335)
# ============================================================================

inputs:
  step_name:
    description: '로그용 step 이름 (예: "Apple SIWA")'
    required: true
  keys:
    description: |
      sync 대상 키 set (space-separated). 각 키는 caller workflow 의 step.env 또는 job.env 로
      `secrets.*` 매핑되어 있어야 한다.
      예) "APPLE_CLIENT_ID APPLE_TEAM_ID APPLE_KEY_ID APPLE_PRIVATE_KEY APPLE_REDIRECT_URI APPLE_ALLOWED_AUDIENCES"
    required: true
  env_path:
    description: '운영 env 파일 경로 (PR-2 이후 prod.env 단일화 시 SSOT 정책 §1 에 따라 변경)'
    required: false
    default: '/etc/mindgarden/prod-from-dev.env'
  ssh_host:
    description: '운영 SSH host (secrets.PRODUCTION_HOST)'
    required: true
  ssh_user:
    description: '운영 SSH user (secrets.PRODUCTION_USER)'
    required: true
  ssh_key:
    description: '운영 SSH private key (secrets.PRODUCTION_SSH_KEY)'
    required: true
  skip_when:
    description: |
      Secret 누락 시 skip 정책.
        - any_missing: 키 중 하나라도 비어 있으면 skip (Apple/Google 같은 strict batch)
        - all_missing: 모든 키가 비어 있을 때만 skip, 일부 채워진 경우는 채워진 키만 갱신 (REGISTERED_URLS)
    required: false
    default: 'any_missing'
  default_value:
    description: |
      단일 키 모드 (keys 가 1개) 에서, secret 이 비어 있으면 사용할 fallback 값.
      비-secret 운영 상수(PROFILE_IMAGE_UPLOAD_DIR default 경로 등) 에만 사용.
    required: false
    default: ''
  pem_oneline_keys:
    description: |
      Space-separated. 해당 키 값에 포함된 \n/\r 을 모두 제거(한 줄로 만든다).
      systemd EnvironmentFile 이 멀티라인을 지원하지 않으므로 PEM 같은 멀티라인 secret 은 필수.
      예) "APPLE_PRIVATE_KEY"
    required: false
    default: ''
  noop_compare:
    description: |
      단일 키 모드에서 현재 값과 새 값이 동일하면 env 갱신·BG 슬롯 재시작을 생략 (no-op).
      PROFILE_IMAGE_UPLOAD_DIR / JWT_SECRET 같이 빈번한 무변경 배포에서 비용 절감.
    required: false
    default: 'false'
  mkdir_value_keys:
    description: |
      Space-separated. 해당 키 값을 디렉터리로 간주해 mkdir -p + chown + chmod 755 보장.
      예) "PROFILE_IMAGE_UPLOAD_DIR"
    required: false
    default: ''
  mkdir_chown_user:
    description: 'mkdir 디렉터리의 owner:group (사용자 미존재 시 chown skip)'
    required: false
    default: 'mindgarden:mindgarden'
  restart_on_change:
    description: '변경 발생 시 mindgarden-core-{blue,green}.service 양쪽 재시작 + 헬스체크 수행'
    required: false
    default: 'true'
  db_fail_fast:
    description: |
      DB 핵심 키 (DB_HOST/DB_NAME/DB_USERNAME) FAIL-FAST 가드 활성화 여부.
      default 'true' — prod-from-dev.env (DB 키가 있는 SSOT) 호출자 (Apple/Google/REGISTERED_URLS/PROFILE_IMAGE/JWT_SECRET/HQ_TENANT_ID) 는 그대로 유지.
      env_path 가 /etc/mindgarden/prod.env (DB 키가 없는 비-secret 운영 상수 파일) 같이 DB 키가 존재하지 않는 파일을 갱신할 때만 'false' 로 비활성화.
      PRESERVE/RESTORE 가드는 무해 (해당 키가 없으면 noop) 라 그대로 유지.
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    # 1) appleboy/ssh-action 의 envs 파라미터에 넘길 CSV 구성:
    #    composite 설정 env (STEP_NAME 등) + caller 가 매핑한 secret 키 set
    - name: ⚙️ Prepare envs CSV
      id: prep
      shell: bash
      env:
        SYNC_KEYS: ${{ inputs.keys }}
      run: |
        set -e
        KEYS_CSV=$(printf '%s' "$SYNC_KEYS" | tr -s ' \t' ',' | sed 's/^,*//; s/,*$//')
        CONFIG_CSV="SYNC_STEP_NAME,SYNC_ENV_FILE,SYNC_KEYS,SYNC_SKIP_WHEN,SYNC_DEFAULT_VALUE,SYNC_PEM_ONELINE_KEYS,SYNC_NOOP_COMPARE,SYNC_MKDIR_VALUE_KEYS,SYNC_MKDIR_CHOWN_USER,SYNC_RESTART_ON_CHANGE,SYNC_DB_FAIL_FAST"
        if [ -n "$KEYS_CSV" ]; then
          echo "envs_csv=${CONFIG_CSV},${KEYS_CSV}" >> "$GITHUB_OUTPUT"
        else
          echo "envs_csv=${CONFIG_CSV}" >> "$GITHUB_OUTPUT"
        fi

    - name: 🔄 secrets sync (PRESERVE/sed/RESTORE/FAIL-FAST)
      uses: appleboy/ssh-action@master
      env:
        SYNC_STEP_NAME: ${{ inputs.step_name }}
        SYNC_ENV_FILE: ${{ inputs.env_path }}
        SYNC_KEYS: ${{ inputs.keys }}
        SYNC_SKIP_WHEN: ${{ inputs.skip_when }}
        SYNC_DEFAULT_VALUE: ${{ inputs.default_value }}
        SYNC_PEM_ONELINE_KEYS: ${{ inputs.pem_oneline_keys }}
        SYNC_NOOP_COMPARE: ${{ inputs.noop_compare }}
        SYNC_MKDIR_VALUE_KEYS: ${{ inputs.mkdir_value_keys }}
        SYNC_MKDIR_CHOWN_USER: ${{ inputs.mkdir_chown_user }}
        SYNC_RESTART_ON_CHANGE: ${{ inputs.restart_on_change }}
        SYNC_DB_FAIL_FAST: ${{ inputs.db_fail_fast }}
      with:
        host: ${{ inputs.ssh_host }}
        username: ${{ inputs.ssh_user }}
        key: ${{ inputs.ssh_key }}
        port: 22
        timeout: 120s
        command_timeout: 10m
        envs: ${{ steps.prep.outputs.envs_csv }}
        script: |
          # =====================================================================
          # secrets-sync composite (PR #302) — set -e 비활성 (env 주입 실패가
          # 전체 배포 실패로 전파되지 않도록).
          # =====================================================================
          STEP_NAME="${SYNC_STEP_NAME}"
          PROD_ENV_FILE="${SYNC_ENV_FILE}"
          KEYS_STR="${SYNC_KEYS}"
          SKIP_WHEN="${SYNC_SKIP_WHEN}"
          DEFAULT_VALUE="${SYNC_DEFAULT_VALUE}"
          PEM_ONELINE_KEYS="${SYNC_PEM_ONELINE_KEYS}"
          NOOP_COMPARE="${SYNC_NOOP_COMPARE}"
          MKDIR_VALUE_KEYS="${SYNC_MKDIR_VALUE_KEYS}"
          MKDIR_CHOWN_USER="${SYNC_MKDIR_CHOWN_USER}"
          RESTART_ON_CHANGE="${SYNC_RESTART_ON_CHANGE}"
          DB_FAIL_FAST="${SYNC_DB_FAIL_FAST:-true}"

          ACTIVE_FILE=/etc/mindgarden/active-backend
          UNIT_BLUE=mindgarden-core-blue.service
          UNIT_GREEN=mindgarden-core-green.service

          # 키 개수
          N_KEYS=0
          for _k in $KEYS_STR; do
            N_KEYS=$((N_KEYS+1))
          done

          # 0) 사전 검증 — 비어 있는 키 카운트
          MISSING_SECRET=0
          for k in $KEYS_STR; do
            eval "v=\${$k:-}"
            if [ -z "$v" ]; then
              MISSING_SECRET=$((MISSING_SECRET+1))
            fi
          done

          # 단일 키 모드 + secret 비어있음 + DEFAULT_VALUE 지정 → default 적용
          if [ "$N_KEYS" = "1" ] && [ "$MISSING_SECRET" -gt 0 ] && [ -n "$DEFAULT_VALUE" ]; then
            FIRST_KEY=$(printf '%s' "$KEYS_STR" | awk '{print $1}')
            eval "$FIRST_KEY=\"\$DEFAULT_VALUE\""
            echo "::notice title=${STEP_NAME} default::GitHub Secret ${FIRST_KEY} 미설정 → default(${DEFAULT_VALUE}) 적용. 등록 권장: gh secret set ${FIRST_KEY} --repo \"\${GITHUB_REPOSITORY:-<repo>}\" --body \"${DEFAULT_VALUE}\""
            MISSING_SECRET=0
          fi

          # Skip 정책 적용
          case "$SKIP_WHEN" in
            any_missing)
              if [ "$MISSING_SECRET" -gt 0 ]; then
                echo "::notice title=${STEP_NAME} env skip::GitHub Secrets 중 $MISSING_SECRET 개가 비어 있어 ${PROD_ENV_FILE} 갱신을 skip 합니다. 등록 권장: https://github.com/\${GITHUB_REPOSITORY:-<repo>}/settings/secrets/actions"
                exit 0
              fi
              ;;
            all_missing)
              if [ "$MISSING_SECRET" -ge "$N_KEYS" ]; then
                echo "::notice title=${STEP_NAME} env skip::${N_KEYS} 종 GitHub Secrets 가 모두 비어 있어 ${PROD_ENV_FILE} 갱신을 skip 합니다. BE 검증은 graceful skip 으로 기존 동작 유지. 등록 권장: https://github.com/\${GITHUB_REPOSITORY:-<repo>}/settings/secrets/actions"
                exit 0
              fi
              if [ "$MISSING_SECRET" -gt 0 ]; then
                echo "::notice title=${STEP_NAME} partial::${N_KEYS} 종 중 $MISSING_SECRET 개가 비어 있어 빈 키는 graceful skip 됩니다 (BE 검증도 skip). 채워진 키만 ${PROD_ENV_FILE} 에 반영합니다."
              fi
              ;;
            *)
              echo "::warning title=${STEP_NAME} skip_when unknown::SKIP_WHEN='${SKIP_WHEN}' — any_missing 으로 처리"
              if [ "$MISSING_SECRET" -gt 0 ]; then
                echo "::notice title=${STEP_NAME} env skip::GitHub Secrets 중 $MISSING_SECRET 개가 비어 있어 skip 합니다."
                exit 0
              fi
              ;;
          esac

          # PEM oneline 변환 (멀티라인 secret → 한 줄)
          # systemd EnvironmentFile 은 멀티라인을 지원하지 않으므로 PEM 같은 키는 반드시 한 줄로 강제.
          # Spring AppleClientSecretGenerator#parsePrivateKey 가 \s+ 제거 후 base64 디코드하므로 안전.
          for pk in $PEM_ONELINE_KEYS; do
            eval "v=\${$pk:-}"
            if [ -n "$v" ]; then
              oneline=$(printf '%s' "$v" | tr -d '\n\r')
              eval "$pk=\"\$oneline\""
            fi
          done

          # 1) 파일 존재 보장
          if [ ! -f "$PROD_ENV_FILE" ]; then
            echo "::warning title=${PROD_ENV_FILE##*/} 누락::$PROD_ENV_FILE 가 없어 신규 생성합니다. systemd EnvironmentFile 경로(/etc/mindgarden/active-backend drop-in) 와 일치하는지 확인 필요."
            sudo mkdir -p "$(dirname "$PROD_ENV_FILE")"
            sudo touch "$PROD_ENV_FILE"
            sudo chmod 600 "$PROD_ENV_FILE"
            sudo chown root:root "$PROD_ENV_FILE"
          fi

          # No-op detection (단일 키 모드 + noop_compare=true)
          NOOP=0
          if [ "$NOOP_COMPARE" = "true" ] && [ "$N_KEYS" = "1" ]; then
            FIRST_KEY=$(printf '%s' "$KEYS_STR" | awk '{print $1}')
            eval "NEW_VALUE=\${$FIRST_KEY:-}"
            CURRENT_VALUE=$(sudo grep -E "^[[:space:]]*${FIRST_KEY}=" "$PROD_ENV_FILE" 2>/dev/null | tail -n1 | sed -n 's/^[^=]*=//p' | sed -E 's/^"(.*)"$/\1/' | sed -E "s/^'(.*)'$/\1/" | tr -d '\r')
            if [ "$CURRENT_VALUE" = "$NEW_VALUE" ]; then
              echo "✅ ${FIRST_KEY} 변경 없음 (길이 ${#NEW_VALUE}자) — env 갱신·재시작 생략 (no-op)"
              NOOP=1
            fi
          fi

          # No-op 경로에서도 mkdir 보장 (PROFILE_IMAGE_UPLOAD_DIR 같은 키는 디렉터리 존재가 더 중요)
          if [ "$NOOP" = "1" ]; then
            for mk in $MKDIR_VALUE_KEYS; do
              eval "dirv=\${$mk:-}"
              if [ -n "$dirv" ]; then
                sudo mkdir -p "$dirv"
                _mu="${MKDIR_CHOWN_USER%%:*}"
                if [ -n "$_mu" ] && id "$_mu" >/dev/null 2>&1; then
                  sudo chown -R "$MKDIR_CHOWN_USER" "$dirv" 2>/dev/null || true
                fi
                sudo chmod 755 "$dirv"
              fi
            done
            exit 0
          fi

          # 2) 백업
          BACKUP_FILE="${PROD_ENV_FILE}.bak.$(date +%Y%m%d_%H%M%S)"
          sudo cp -p "$PROD_ENV_FILE" "$BACKUP_FILE" 2>/dev/null || true
          echo "📦 백업: $BACKUP_FILE"

          # === [P0 재발 방지 가드 — DB_* / PII_* / DORMANT 키 PRESERVE] ===
          # 2026-06-13 운영 BE boot loop 회귀: prod-from-dev.env 가
          # DB_HOST/DB_NAME/DB_USERNAME 키 0건 상태로 덮어써져 양 슬롯 boot loop.
          # PR #296 가드 보호 키 set: prod-from-dev.env 의 application-prod.yml fallback 없는
          # 핵심 DB 키 8종 (DB env SSOT 사전 점검 docs/운영반영/DB_ENV_SSOT_PRECHECK_20260613.md 부록 D.4).
          # 5 step (Apple/Google/REGISTERED_URLS/PROFILE_IMAGE/JWT_SECRET sync) 에서 동일 set 유지.
          #
          # PII 회전 선행 PR-2 (2026-06-14): DB 8키 + PII/DORMANT 4키 = 12종 으로 확장.
          # 다른 sync step 갱신 도중 PII 키 라인이 사라지는 회귀 차단 — Phase 0~4 회전 시점에서
          # PERSONAL_DATA_ENCRYPTION_KEYS/IVS 누락 시 재암호화 결과가 lost 될 수 있어 동일 PRESERVE
          # 가드 보호 대상에 편입. 단, 누락 허용 (DB FAIL-FAST 와 달리 PII 는 빈 값 허용) 으로
          # Phase 1 진입 전 BE 기동 영향 최소화. 회전이 끝난 뒤 보존 가드가 회귀 차단을 담당한다.
          DB_PRESERVE_KEYS="DB_HOST DB_NAME DB_USERNAME DB_PASSWORD DB_PORT DB_DRIVER_CLASS_NAME DB_URL DB_SCHEMA"
          PII_PRESERVE_KEYS="PERSONAL_DATA_ENCRYPTION_ACTIVE_KEY_ID PERSONAL_DATA_ENCRYPTION_KEYS PERSONAL_DATA_ENCRYPTION_IVS MINDGARDEN_DORMANT_PII_ENC_KEY"
          PRESERVE_KEYS="$DB_PRESERVE_KEYS $PII_PRESERVE_KEYS"
          # 변수명은 기존 운영 가드 추적성을 위해 DB_PRESERVED_FILE 유지 (DB+PII 통합 보존 파일).
          DB_PRESERVED_FILE="$HOME/.prod-from-dev.env.preserved_db_keys.$$"
          rm -f "$DB_PRESERVED_FILE"
          echo "🛡️ PRESERVE 가드 보호 키 set (12종): DB(8) + PII/DORMANT(4)"
          for _pkey in $PRESERVE_KEYS; do
            _existing=$(sudo grep -E "^[[:space:]]*${_pkey}=" "$PROD_ENV_FILE" 2>/dev/null | tail -n1 || true)
            if [ -n "$_existing" ]; then
              printf '%s\n' "$_existing" >> "$DB_PRESERVED_FILE"
            fi
          done

          # 3) 멱등 KEY="VALUE" 갱신 (있으면 sed 교체, 없으면 append).
          #    sed delimiter 는 | 사용 (URL/PEM 의 / 충돌 회피). replacement 안의 &/|/\ 만 escape.
          #    값은 항상 " 로 감싸 — bash systemd EnvironmentFile 양쪽 모두 인용된 멀티문자열 안전.
          update_env() {
            _key="$1"
            _value="$2"
            _escaped_value=$(printf '%s' "$_value" | sed -e 's/[\\&|]/\\&/g')
            if sudo grep -qE "^[[:space:]]*${_key}=" "$PROD_ENV_FILE" 2>/dev/null; then
              sudo sed -i "s|^[[:space:]]*${_key}=.*|${_key}=\"${_escaped_value}\"|" "$PROD_ENV_FILE"
            else
              printf '%s="%s"\n' "$_key" "$_value" | sudo tee -a "$PROD_ENV_FILE" >/dev/null
            fi
          }

          echo "🔐 ${PROD_ENV_FILE} ${STEP_NAME} 멱등 갱신 시작 (빈 값은 skip)"
          for k in $KEYS_STR; do
            eval "v=\${$k:-}"
            if [ -n "$v" ]; then
              update_env "$k" "$v"
            fi
          done

          # 4) 권한 보호 (root:root 0600)
          sudo chmod 600 "$PROD_ENV_FILE"
          sudo chown root:root "$PROD_ENV_FILE"

          # === [P0 재발 방지 가드 — DB_* / PII_* / DORMANT 키 RESTORE + DB FAIL-FAST] ===
          # 갱신 직후 보존했던 DB/PII/DORMANT 키가 사라졌으면 PRESERVED 값으로 복원하고,
          # DB 핵심 키(DB_HOST/DB_NAME/DB_USERNAME)가 누락/빈값이면 deploy 중단 (exit 1) — 운영 BE boot loop 회귀 차단.
          # PII 키는 누락 허용 — Phase 0~4 진입 전 부분 등록 단계에서 BE 기동 영향 최소화.
          if [ -f "$DB_PRESERVED_FILE" ]; then
            while IFS= read -r _preserved; do
              _pkey=$(printf '%s' "$_preserved" | cut -d'=' -f1 | tr -d '[:space:]')
              if [ -n "$_pkey" ] && ! sudo grep -qE "^[[:space:]]*${_pkey}=" "$PROD_ENV_FILE" 2>/dev/null; then
                # DB/PII 어느 쪽이든 동일 PRESERVED 파일에 기록되어 있으므로 복원 메시지는 통합.
                echo "::warning title=PRESERVE 키 복원::${_pkey} 가 갱신 도중 사라져 PRESERVED 값으로 복원합니다."
                printf '%s\n' "$_preserved" | sudo tee -a "$PROD_ENV_FILE" >/dev/null
              fi
            done < "$DB_PRESERVED_FILE"
            rm -f "$DB_PRESERVED_FILE"
          fi
          if [ "$DB_FAIL_FAST" = "true" ]; then
            DB_REQUIRED_KEYS="DB_HOST DB_NAME DB_USERNAME"
            DB_MISSING_KEYS=""
            DB_EMPTY_KEYS=""
            for _dkey in $DB_REQUIRED_KEYS; do
              _line=$(sudo grep -E "^[[:space:]]*${_dkey}=" "$PROD_ENV_FILE" 2>/dev/null | tail -n1 || true)
              if [ -z "$_line" ]; then
                DB_MISSING_KEYS="$DB_MISSING_KEYS $_dkey"
              else
                _val=$(printf '%s' "$_line" | sed -n 's/^[^=]*=//p' | sed -E 's/^"(.*)"$/\1/' | sed -E "s/^'(.*)'$/\1/" | tr -d '\r')
                if [ -z "$_val" ]; then
                  DB_EMPTY_KEYS="$DB_EMPTY_KEYS $_dkey"
                fi
              fi
            done
            if [ -n "$DB_MISSING_KEYS" ]; then
              echo "::error title=${PROD_ENV_FILE##*/} DB 키 누락::다음 키가 ${PROD_ENV_FILE} 에 없습니다 -$DB_MISSING_KEYS. 2026-06-13 운영 BE boot loop 회귀 위험 — deploy 중단."
              exit 1
            fi
            if [ -n "$DB_EMPTY_KEYS" ]; then
              echo "::error title=${PROD_ENV_FILE##*/} DB 키 빈 값::다음 키 값이 비어 있습니다 -$DB_EMPTY_KEYS. 2026-06-13 운영 BE boot loop 회귀 위험 — deploy 중단."
              exit 1
            fi
            echo "✅ ${PROD_ENV_FILE} DB 키 검증 PASS (DB_HOST/DB_NAME/DB_USERNAME)"
          else
            echo "ℹ️ DB FAIL-FAST 가드 비활성 (db_fail_fast=false) — DB 키가 없는 운영 상수 파일(${PROD_ENV_FILE##*/}) 호출 컨텍스트."
          fi

          # 5) 값 노출 없이 길이만 표시 (Secret 보안 — 절대 echo 금지)
          echo "✅ ${STEP_NAME} 갱신 완료 — 길이만 표시:"
          for k in $KEYS_STR; do
            _line=$(sudo grep -E "^[[:space:]]*${k}=" "$PROD_ENV_FILE" 2>/dev/null | tail -n1 || true)
            if [ -n "$_line" ]; then
              _val=$(printf '%s' "$_line" | sed -n 's/^[^=]*=//p' | sed -E 's/^"(.*)"$/\1/' | sed -E "s/^'(.*)'$/\1/" | tr -d '\r')
              printf '   %s = (%d chars)\n' "$k" "${#_val}"
            fi
          done

          # 6) mkdir 보장 (PROFILE_IMAGE_UPLOAD_DIR 같은 디렉터리 값 키)
          for mk in $MKDIR_VALUE_KEYS; do
            eval "dirv=\${$mk:-}"
            if [ -n "$dirv" ]; then
              sudo mkdir -p "$dirv"
              _mu="${MKDIR_CHOWN_USER%%:*}"
              if [ -n "$_mu" ] && id "$_mu" >/dev/null 2>&1; then
                sudo chown -R "$MKDIR_CHOWN_USER" "$dirv" 2>/dev/null || true
              fi
              sudo chmod 755 "$dirv"
              echo "✅ 디렉터리 보장: $dirv (chown ${MKDIR_CHOWN_USER})"
            fi
          done

          # 7) systemd daemon-reload + 양쪽 슬롯 재시작 (active + inactive 모두 새 env 로 기동)
          if [ "$RESTART_ON_CHANGE" = "true" ]; then
            sudo systemctl daemon-reload
            echo "🔄 ${UNIT_BLUE} + ${UNIT_GREEN} 재시작 (${STEP_NAME} 변경)"
            sudo systemctl restart "$UNIT_BLUE" || echo "::warning::${UNIT_BLUE} 재시작 실패 (계속 진행)"
            sudo systemctl restart "$UNIT_GREEN" || echo "::warning::${UNIT_GREEN} 재시작 실패 (계속 진행)"

            sleep 15
            BLUE_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:8080/actuator/health 2>/dev/null || echo "000")
            GREEN_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:8081/actuator/health 2>/dev/null || echo "000")
            echo "🏥 헬스: blue(8080)=$BLUE_HEALTH / green(8081)=$GREEN_HEALTH"
            if [ "$BLUE_HEALTH" != "200" ] && [ "$GREEN_HEALTH" != "200" ]; then
              echo "::warning title=${STEP_NAME} BE 헬스 양쪽 비정상::15초 후에도 8080/8081 모두 200 이 아닙니다. 후속 '🏥 헬스체크' step 에서 재대기·재검증 합니다."
            fi
          fi

          # 8) 프로세스 env 검증 — active 슬롯 PID 의 /proc/PID/environ 에 키가 들어갔는지 (길이만)
          ACTIVE=$(sudo cat "$ACTIVE_FILE" 2>/dev/null | tr -d '[:space:]' | awk '{print tolower($0)}')
          if [ -z "$ACTIVE" ]; then
            echo "::warning::${ACTIVE_FILE} 비어 있음 — 프로세스 env 검증 skip"
            exit 0
          fi
          ACTIVE_UNIT="mindgarden-core-${ACTIVE}.service"
          PID=$(systemctl show -p MainPID --value "$ACTIVE_UNIT" 2>/dev/null)
          if [ -z "$PID" ] || [ "$PID" = "0" ]; then
            echo "::warning::${ACTIVE_UNIT} MainPID 조회 실패 (PID='$PID') — 프로세스 env 검증 skip"
            exit 0
          fi
          echo "🔍 active=${ACTIVE} / unit=${ACTIVE_UNIT} / PID=${PID} 프로세스 env ${STEP_NAME} 확인"
          MISSING_ENV=0
          CHECKED=0
          for k in $KEYS_STR; do
            eval "v=\${$k:-}"
            if [ -z "$v" ]; then
              continue
            fi
            CHECKED=$((CHECKED+1))
            len=$(sudo cat "/proc/$PID/environ" 2>/dev/null | tr '\0' '\n' | awk -F= -v K="$k" 'BEGIN{ found=0 } $1==K { v=substr($0, length(K)+2); print length(v); found=1; exit } END { if (!found) print "" }')
            if [ -z "$len" ] || [ "$len" = "0" ]; then
              echo "   ❌ ${k} = MISSING (빈 값 또는 환경 미주입)"
              MISSING_ENV=$((MISSING_ENV+1))
            else
              echo "   ✅ ${k} = ($len chars)"
            fi
          done
          if [ "$CHECKED" = "0" ]; then
            echo "::warning::${STEP_NAME} 검증 대상 키가 없습니다 (모두 비어 있음 — partial skip 모드 가능성)"
            exit 0
          fi
          if [ "$MISSING_ENV" -gt 0 ]; then
            echo "::error title=${STEP_NAME} 프로세스 env 누락::${STEP_NAME} 검증 대상 ${CHECKED} 종 중 ${MISSING_ENV} 개가 ${ACTIVE_UNIT} (PID=$PID) 프로세스 환경에 없습니다. ${PROD_ENV_FILE} 형식·따옴표·systemd EnvironmentFile 경로 확인 필요. (배포 자체는 성공으로 처리 — 후속 헬스체크는 이전 BE 가 응답할 수 있음)"
          else
            echo "🎉 active 슬롯 (${ACTIVE_UNIT}) 에 ${STEP_NAME} ${CHECKED} 종 모두 주입 완료"
          fi
