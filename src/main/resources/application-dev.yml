# 개발 서버(dev 프로파일) 전용 설정
# 배포: mindgarden-dev.service, /var/www/mindgarden-dev
# OAuth2 redirect 등 기본값으로 기동 보장 (환경 변수 미설정 시에도 기동)

# 서버 기준 URL (OAuth2 callback 등에 사용, 환경 변수로 오버라이드)
server:
  base-url: ${OAUTH2_BASE_URL:https://mindgarden.dev.core-solution.co.kr}

# JWT/암호화 키: dev에서 미설정 시 기본값으로 기동 가능 (검증기는 dev 한정 완화)
jwt:
  secret: ${JWT_SECRET:dev-jwt-secret-key-for-development-server-only-32chars}

encryption:
  personal-data:
    key: ${PERSONAL_DATA_ENCRYPTION_KEY:dev-encryption-key-32-bytes-long!!!!}
    iv: ${PERSONAL_DATA_ENCRYPTION_IV:dev-iv-16-bytes!!}

# OAuth2 클라이언트 등록 (Google/Apple redirect-uri 기본값)
# authorization-grant-type 미설정 시 authorizationGrantType cannot be null 기동 실패
# Apple은 CommonOAuth2Provider에 없어 provider 수동 정의 필요 (provider-id 미지정 시 기동 실패)
spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy}
            redirect-uri: "${server.base-url}/api/auth/google/callback"
            client-authentication-method: post
            authorization-grant-type: authorization_code
            client-name: Google
          apple:
            client-id: ${APPLE_CLIENT_ID:dummy}
            client-secret: ${APPLE_CLIENT_SECRET:dummy}
            scope: name,email
            redirect-uri: "${server.base-url}/api/auth/apple/callback"
            client-authentication-method: post
            authorization-grant-type: authorization_code
            client-name: Apple
        provider:
          apple:
            authorization-uri: https://appleid.apple.com/auth/authorize
            token-uri: https://appleid.apple.com/auth/token
            user-info-uri: https://appleid.apple.com/auth/userinfo
            user-name-attribute: sub

# 심리검사 이미지 OCR (Tesseract) — dev 로컬 예시
# tessdata 디렉터리 경로. 미설정 시 application.yml의 TESSDATA_PREFIX 환경 변수 사용.
# 예: macOS Homebrew → /opt/homebrew/share/tessdata 또는 /usr/local/share/tessdata
# psych:
#   assessment:
#     tesseract:
#       datapath: /opt/homebrew/share/tessdata
