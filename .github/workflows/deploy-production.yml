        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        ssh-keyscan -H "${{ secrets.PRODUCTION_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
        echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/prod_integrated_proc_key
        chmod 600 ~/.ssh/prod_integrated_proc_key
        eval "$(ssh-agent -s)"
        ssh-add ~/.ssh/prod_integrated_proc_key
        unset PROD_SSH_JUMP_HOST 2>/dev/null || true
        unset PROD_SSH_JUMP_USER 2>/dev/null || true
        export PROD_SERVER_HOST="${{ secrets.PRODUCTION_HOST }}"
        U_SECRET="${{ secrets.PRODUCTION_USER }}"
