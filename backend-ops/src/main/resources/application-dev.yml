# OPS Portal 개발 서버 환경 설정
# Development Server Environment Configuration

spring:
  # 데이터베이스 설정 (개발 서버 DB 사용 - dev.env 참조)
  datasource:
    url: jdbc:mysql://${DB_HOST:beta0629.cafe24.com}:${DB_PORT:3306}/${DB_NAME:core_solution}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useUnicode=true&characterSetResults=UTF-8&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci&rewriteBatchedStatements=true&useServerPrepStmts=true&socketTimeout=60000&connectTimeout=60000&autoReconnect=true&failOverReadOnly=false&maxReconnects=3
    username: ${DB_USERNAME:mindgarden_dev}
    password: ${DB_PASSWORD:MindGardenDev2025!@#}
    driver-class-name: com.mysql.cj.jdbc.Driver
    connection-init-sql: "SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci"
    hikari:
      minimum-idle: 2  # 최소 유휴 연결 수 감소 (5 -> 2)
      maximum-pool-size: 5  # 최대 연결 수 감소 (20 -> 5) - Too many connections 오류 방지
      auto-commit: true
      connection-timeout: 5000  # 연결 대기 시간 단축 (30초 -> 5초) - 빠른 실패로 누수 방지
      validation-timeout: 3000  # 연결 검증 시간 단축 (5초 -> 3초)
      idle-timeout: 180000  # 유휴 연결 타임아웃 단축 (10분 -> 3분) - 연결 해제 촉진
      max-lifetime: 300000  # 연결 최대 수명 단축 (30분 -> 5분) - 연결 순환 촉진
      connection-test-query: SELECT 1
      leak-detection-threshold: 30000  # 연결 누수 감지 시간 단축 (60초 -> 30초) - 빠른 감지
      pool-name: MindGardenOpsHikariPool-Dev
      initialization-fail-timeout: 1
      register-mbeans: true  # JMX 모니터링 활성화
      keepalive-time: 30000  # 연결 유지 시간 (30초) - 연결 상태 확인
  
  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: update  # OPS Portal 테이블 자동 생성
    show-sql: false  # 개발 서버에서는 SQL 로그 비활성화 (성능)
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false
        use_sql_comments: false
        jdbc:
          batch_size: 20
          batch_versioned_data: true
          fetch_size: 50
        logging:
          level:
            org.hibernate.SQL: INFO
            org.hibernate.type.descriptor.sql.BasicBinder: INFO
  
  # Flyway 설정 (개발 서버용)
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false  # 개발 서버에서만 검증 완화
    repair-on-migrate: true
    clean-disabled: true
    out-of-order: false

# 서버 설정
# 개발 서버: Nginx가 ops.dev.e-trinity.co.kr를 localhost:8080으로 프록시하므로 8080 사용
server:
  port: ${SERVER_PORT:8080}  # 개발 서버: 8080 (Nginx 프록시와 일치)
  servlet:
    context-path: /

# CORS 설정 (개발 서버 도메인)
ops:
  cors:
    allowed-origins: ${OPS_CORS_ALLOWED_ORIGINS:http://localhost:4300,https://ops.dev.e-trinity.co.kr}

# JWT 설정 (dev.env 참조)
security:
  jwt:
    secret: ${JWT_SECRET:dev-jwt-secret-key-for-development-server-only}
    issuer: ${SECURITY_JWT_ISSUER:mindgarden-ops}
    expires-in-seconds: ${SECURITY_JWT_EXPIRES:3600}
  ops:
    username: ${OPS_ADMIN_USERNAME:ops_core}
    password: ${OPS_ADMIN_PASSWORD:godgod826!}
    default-role: ${OPS_ADMIN_ROLE:HQ_ADMIN}

# 로깅 설정
logging:
  level:
    root: INFO
    com.mindgarden.ops: INFO
    org.springframework: INFO
    org.hibernate: INFO

# Actuator 설정
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

