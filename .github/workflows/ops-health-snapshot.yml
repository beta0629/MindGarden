# 운영 헬스·디스크·로그 디렉터리 스냅샷 (읽기 전용)
# deploy-production.yml 과 트리거·책임 분리 — 배포 파이프라인에서 호출하지 않음.
# 스케줄·기본 dispatch 는 스냅샷만 실행. 로그 실삭제(cleanup)는 이 워크플로에서 호출하지 않음.
# 권장: 동일 스크립트를 서버 cron/systemd timer 로 배치해 Runner 장애와 무관하게 점검.

name: 🩺 운영 코어·OPS 헬스 스냅샷

on:
  workflow_dispatch:
  schedule:
    # 5분 간격 헬스 폴링 (운영 헬스 DOWN 알람용). 외부 uptime monitor (UptimeRobot/BetterStack) 가
    # 등록되어 있으면 본 cron 빈도를 다시 줄여(예: 0 0,12 * * *) GitHub Actions 무료 한도와 충돌하지
    # 않게 한다. 자세한 권고: docs/운영반영/UPTIME_MONITOR_RECOMMENDATION.md
    - cron: '*/5 * * * *'

concurrency:
  group: ops-health-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    name: 원격 스냅샷
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # /tmp 직접 덮어쓰기 시 root 소유 파일 등으로 untar 실패할 수 있어, run_id 별 전용 디렉터리 사용.
      # scp-action: strip_components: 2 → target 아래 prod-health-snapshot.sh 로 평탄화.
      - name: 스냅샷 업로드용 원격 디렉터리 준비
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail
            RUN_DIR="/tmp/mg-health-snapshot/${{ github.run_id }}"
            mkdir -p "$RUN_DIR"
            chmod 700 "$RUN_DIR"
            rm -f /tmp/prod-health-snapshot.sh || true

      - name: 스냅샷 스크립트 업로드
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: 22
          source: scripts/ops/prod-health-snapshot.sh
          target: /tmp/mg-health-snapshot/${{ github.run_id }}/
          strip_components: 2
          overwrite: true

      - name: 원격에서 스냅샷 실행
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: 22
          timeout: 120s
          script: |
            set -euo pipefail
            SNAPSHOT_SH="/tmp/mg-health-snapshot/${{ github.run_id }}/prod-health-snapshot.sh"
            if [ ! -f "$SNAPSHOT_SH" ]; then
              SNAPSHOT_SH="/tmp/prod-health-snapshot.sh"
            fi
            if [ ! -f "$SNAPSHOT_SH" ]; then
              SNAPSHOT_SH="/tmp/scripts/ops/prod-health-snapshot.sh"
            fi
            if [ ! -f "$SNAPSHOT_SH" ]; then
              echo "::error::스냅샷 스크립트를 찾을 수 없습니다. run_id 디렉터리·/tmp·scp 경로 보존 여부를 확인하세요."
              ls -la "/tmp/mg-health-snapshot/${{ github.run_id }}/" 2>/dev/null || true
              ls -la /tmp/ 2>/dev/null || true
              ls -la /tmp/scripts/ops/ 2>/dev/null || true
              exit 1
            fi
            chmod +x "$SNAPSHOT_SH" 2>/dev/null || true
            bash "$SNAPSHOT_SH"

      # 헬스 응답 분기 — 200 OK 가 아니거나 actuator body 의 status:DOWN 이면 다음 step 에서 Discord 발사.
      # 정상 응답 시 본 step 도 success → Discord step 은 if 조건으로 skip 됨 (5분 cron 노이즈 방지).
      - name: 운영 헬스 응답 확인 (DOWN 분기)
        id: health_check
        continue-on-error: true
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: 22
          timeout: 30s
          script: |
            set -u
            HEALTH_URL="${MG_HEALTH_URL:-http://127.0.0.1:8080/actuator/health}"
            HTTP_CODE=$(curl -sS -o /tmp/mg-health-body.txt -w '%{http_code}' \
              --connect-timeout 10 "$HEALTH_URL" 2>/dev/null || echo "000")
            echo "HEALTH_HTTP_CODE=${HTTP_CODE}"
            if [ "$HTTP_CODE" != "200" ]; then
              echo "::warning::헬스 HTTP 비정상 ($HTTP_CODE)"
              exit 1
            fi
            BODY=$(cat /tmp/mg-health-body.txt 2>/dev/null || echo "")
            if echo "$BODY" | grep -qiE '"status"[[:space:]]*:[[:space:]]*"DOWN"'; then
              echo "::warning::헬스 body 가 DOWN — $BODY"
              exit 2
            fi
            echo "헬스 OK"

      # secrets 직접 if 비교는 GitHub Actions 에서 평가되지 않으므로 env 로 받고 step 안에서 -z 검사.
      - name: Discord 알람 발사 (헬스 DOWN/비정상만)
        if: ${{ steps.health_check.outcome == 'failure' }}
        env:
          DISCORD_OPS_WEBHOOK_URL: ${{ secrets.DISCORD_OPS_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -u
          if [ -z "${DISCORD_OPS_WEBHOOK_URL:-}" ]; then
            echo "DISCORD_OPS_WEBHOOK_URL secret 미설정 — Discord 발송 skip (워크플로는 정상 종료)"
            exit 0
          fi
          CONTENT=$(printf '🚨 [Ops] 운영 헬스 응답 비정상 — run #%s\n• run: %s\n• workflow: %s\n• branch: %s' \
            "${GITHUB_RUN_ID}" "${RUN_URL}" "${GITHUB_WORKFLOW}" "${GITHUB_REF_NAME}")
          PAYLOAD=$(jq -nc --arg content "$CONTENT" '{content: $content}')
          HTTP_CODE=$(curl -fsS -o /tmp/discord-curl.out -w '%{http_code}' \
            -X POST "$DISCORD_OPS_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD" 2>/dev/null || echo "000")
          if [ "$HTTP_CODE" = "204" ] || [ "$HTTP_CODE" = "200" ]; then
            echo "Discord 발송 OK (HTTP $HTTP_CODE)"
          else
            echo "Discord 발송 실패 (HTTP $HTTP_CODE)"
            cat /tmp/discord-curl.out 2>/dev/null || true
            # 알람 실패가 본 워크플로의 다른 step 결과를 가리지 않도록 exit 0
            exit 0
          fi
