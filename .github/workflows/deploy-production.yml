name: 🚀 Core Solution 운영 배포

on:
  # 운영 배포는 수동 실행만 가능 (자동 배포 비활성화)
  # push:
  #   branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: '체크아웃할 Git ref (운영은 main만 허용)'
        required: false
        default: 'main'
        type: string

jobs:
  deploy:
    name: 🏗️ 빌드 및 배포
    runs-on: ubuntu-latest
    
    steps:
    - name: 🛡️ 운영 배포 ref 가드 (main만 허용)
      env:
        DEPLOY_REF: ${{ github.event.inputs.deploy_ref || 'main' }}
      run: |
        if [ "$DEPLOY_REF" != "main" ]; then
          echo "::error::운영 배포는 main 브랜치만 허용됩니다. 선택된 ref: $DEPLOY_REF"
          exit 1
        fi

    - name: 📌 배포 대상 ref 출력
      run: |
        echo "선택된 배포 ref: ${{ github.event.inputs.deploy_ref || 'main' }}"

    - name: 📥 코드 체크아웃
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.deploy_ref || 'main' }}

    - name: ☕ Java 17 설정
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: 📦 Node.js 20 설정
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: 🔧 Maven 캐시 설정
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: 🏗️ 백엔드 빌드
      run: mvn clean package -DskipTests
      
    - name: 📦 프론트엔드 의존성 설치
      run: |
        cd frontend
        npm install
        
    - name: 🏗️ 프론트엔드 빌드
      run: |
        cd frontend
        npm run build:ci
        
    - name: 🔍 변경된 파일 감지
      id: changed-files
      run: |
        echo "🔍 변경된 파일 감지 중..."
        
        # 이전 커밋과 비교 (main 브랜치의 마지막 배포 커밋)
        # 또는 workflow_dispatch의 경우 모든 파일이 변경된 것으로 간주
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          # 수동 실행 시: 모든 파일이 변경된 것으로 간주 (전체 배포)
          echo "📋 수동 실행: 모든 파일 배포"
          echo "backend_changed=true" >> $GITHUB_OUTPUT
          echo "frontend_changed=true" >> $GITHUB_OUTPUT
          echo "config_changed=true" >> $GITHUB_OUTPUT
          echo "sql_procedures_changed=true" >> $GITHUB_OUTPUT
        else
          # 자동 실행 시: 변경된 파일만 감지
          git diff --name-only HEAD~1 HEAD > /tmp/changed_files.txt || echo "" > /tmp/changed_files.txt
          
          # 백엔드 변경 감지 (Java 소스, pom.xml 등)
          if grep -qE "^(src/|pom\.xml|\.github/workflows/deploy-production\.yml)" /tmp/changed_files.txt; then
            echo "✅ 백엔드 변경 감지됨"
            echo "backend_changed=true" >> $GITHUB_OUTPUT
          else
            echo "⏭️ 백엔드 변경 없음 - 업로드 스킵"
            echo "backend_changed=false" >> $GITHUB_OUTPUT
          fi
          
          # 프론트엔드 변경 감지
          if grep -qE "^frontend/" /tmp/changed_files.txt; then
            echo "✅ 프론트엔드 변경 감지됨"
            echo "frontend_changed=true" >> $GITHUB_OUTPUT
          else
            echo "⏭️ 프론트엔드 변경 없음 - 업로드 스킵"
            echo "frontend_changed=false" >> $GITHUB_OUTPUT
          fi
          
          # 설정 파일 변경 감지
          if grep -qE "^deployment/application-production\.yml" /tmp/changed_files.txt; then
            echo "✅ 설정 파일 변경 감지됨"
            echo "config_changed=true" >> $GITHUB_OUTPUT
          else
            echo "⏭️ 설정 파일 변경 없음 - 업로드 스킵"
            echo "config_changed=false" >> $GITHUB_OUTPUT
          fi
          
          # SQL 프로시저 변경 감지
          if grep -qE "^sql/.*\.sql$" /tmp/changed_files.txt; then
            echo "✅ SQL 프로시저 변경 감지됨"
            echo "sql_procedures_changed=true" >> $GITHUB_OUTPUT
            # 변경된 SQL 파일 목록 저장
            grep -E "^sql/.*\.sql$" /tmp/changed_files.txt > /tmp/changed_sql_files.txt || true
          else
            echo "⏭️ SQL 프로시저 변경 없음 - 업로드 스킵"
            echo "sql_procedures_changed=false" >> $GITHUB_OUTPUT
          fi
        fi
        
        echo ""
        echo "📋 변경 감지 결과:"
        echo "  백엔드: ${{ steps.changed-files.outputs.backend_changed }}"
        echo "  프론트엔드: ${{ steps.changed-files.outputs.frontend_changed }}"
        echo "  설정 파일: ${{ steps.changed-files.outputs.config_changed }}"
        echo "  SQL 프로시저: ${{ steps.changed-files.outputs.sql_procedures_changed }}"
        
    - name: 🔍 SSH 연결 테스트
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: 22
        timeout: 30s
        script: |
          echo "SSH 연결 테스트 성공: $(date)"
          echo "서버 정보: $(uname -a)"
          
          # SSH 안전장치: 방화벽 관련 명령어는 절대 실행하지 않음
          echo "🛡️ SSH 안전장치 활성화 - 방화벽 설정은 건드리지 않음"
          echo "✅ SSH 포트 22는 기존 상태 유지 (절대 변경 금지)"
          echo "⚠️ ufw, iptables, 방화벽 관련 명령어는 절대 실행하지 않음"
          
          echo "🔧 서버 상태 확인 완료 (SSH 보호됨)"
          
    - name: 🚀 서버 배포
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: 22
        timeout: 120s
        command_timeout: 30m
        script: |
          # 배포 디렉토리로 이동
          cd /var/www/mindgarden
          
          # 서비스 중지
          sudo systemctl stop mindgarden.service
          
          # 백업 생성
          if [ -f app.jar ]; then
            BACKUP_DIR="/var/www/mindgarden/backups"
            mkdir -p $BACKUP_DIR
            BACKUP_FILE="$BACKUP_DIR/app.jar.backup.$(date +%Y%m%d_%H%M%S)"
            # 같은 타임스탬프 파일이 있으면 초까지 포함한 타임스탬프 사용
            while [ -f "$BACKUP_FILE" ]; do
              BACKUP_FILE="$BACKUP_DIR/app.jar.backup.$(date +%Y%m%d_%H%M%S.%N | cut -b1-19)"
            done
            cp app.jar "$BACKUP_FILE"
            echo "✅ 백업 완료: $BACKUP_FILE"
          fi
          
          # 프론트엔드 백업
          if [ -d frontend ]; then
            BACKUP_DIR="/var/www/mindgarden/backups"
            mkdir -p $BACKUP_DIR
            FRONTEND_BACKUP_FILE="$BACKUP_DIR/frontend.backup.$(date +%Y%m%d_%H%M%S).tar.gz"
            # 같은 타임스탬프 파일이 있으면 초까지 포함한 타임스탬프 사용
            while [ -f "$FRONTEND_BACKUP_FILE" ]; do
              FRONTEND_BACKUP_FILE="$BACKUP_DIR/frontend.backup.$(date +%Y%m%d_%H%M%S.%N | cut -b1-19).tar.gz"
            done
            tar -czf "$FRONTEND_BACKUP_FILE" frontend/
            echo "✅ 프론트엔드 백업 완료: $FRONTEND_BACKUP_FILE"
          fi
          
          # /tmp/ 디렉토리의 기존 SQL 파일 및 디렉토리 정리
          echo "🧹 /tmp/ 디렉토리 정리 중..."
          rm -rf /tmp/production_all_missing_procedures.sql
          rm -rf /tmp/mapping_update_procedures_mysql.sql
          rm -rf /tmp/production_mapping_procedures.sql
          rm -rf /tmp/business_time_procedures_final.sql
          rm -rf /tmp/update_all_role_menus.sql
          rm -f /tmp/*.sql
          rm -f /tmp/*_proc.log
          echo "✅ /tmp/ 디렉토리 정리 완료"
          
    - name: 📤 백엔드 파일 업로드
      if: steps.changed-files.outputs.backend_changed == 'true'
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: 22
        timeout: 120s
        source: "target/consultation-management-system-1.0.0.jar"
        target: "/var/www/mindgarden/"
        strip_components: 1
        overwrite: true
        
    - name: ⏭️ 백엔드 파일 업로드 스킵
      if: steps.changed-files.outputs.backend_changed != 'true'
      run: echo "⏭️ 백엔드 변경 없음 - 업로드 스킵됨"
        
    - name: 📤 프론트엔드 파일 업로드
      if: steps.changed-files.outputs.frontend_changed == 'true'
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: 22
        timeout: 120s
        source: "frontend/build/*"
        target: "/var/www/html/"
        strip_components: 2
        overwrite: true
        
    - name: ⏭️ 프론트엔드 파일 업로드 스킵
      if: steps.changed-files.outputs.frontend_changed != 'true'
      run: echo "⏭️ 프론트엔드 변경 없음 - 업로드 스킵됨"
        
    - name: 📤 설정 파일 업로드
      if: steps.changed-files.outputs.config_changed == 'true'
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: 22
        timeout: 120s
        source: "deployment/application-production.yml"
        target: "/var/www/mindgarden/"
        strip_components: 1
        overwrite: true
        
    - name: 📤 Nginx 설정 파일 업로드 (운영 서버 - 통합 설정)
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: 22
        timeout: 120s
        # 앱 배포 디렉터리에 두어 배포 계정이 쓰기 가능(/tmp 는 기존 루트 소유 파일과 충돌 가능)
        source: "config/nginx/core-solution-prod.conf"
        target: "/var/www/mindgarden/"
        strip_components: 2
        overwrite: true
        
    # PL/SQL 프로시저 업로드는 필요할 때만 수동으로 실행
    # - name: 📤 PL/SQL 프로시저 업로드
    #   uses: appleboy/scp-action@v0.1.7
    #   with:
    #     host: ${{ secrets.PRODUCTION_HOST }}
    #     username: ${{ secrets.PRODUCTION_USER }}
    #     key: ${{ secrets.PRODUCTION_SSH_KEY }}
    #     port: 22
    #     timeout: 120s
    #     source: "sql/production_all_missing_procedures.sql"
    #     target: "/tmp/"
    #     strip_components: 1
    #     overwrite: true
        
    - name: 📤 메뉴 업데이트 SQL 업로드
      if: steps.changed-files.outputs.sql_procedures_changed == 'true'
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: 22
        timeout: 120s
        source: "src/main/resources/sql/update_all_role_menus.sql"
        target: "/tmp/"
        strip_components: 3
        overwrite: true
        
    - name: 📤 매핑 수정 프로시저 업로드
      if: steps.changed-files.outputs.sql_procedures_changed == 'true'
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: 22
        timeout: 120s
        source: "database/schema/mapping_update_procedures_mysql.sql"
        target: "/tmp/"
        strip_components: 2
        overwrite: true
        
    # 메시지 권한 SQL 업로드 - 권한 오류로 주석 처리
    # SQL 파일은 한 번만 실행되어야 함 - 수동 실행 필요
    # - name: 📤 메시지 권한 SQL 업로드
    #   uses: appleboy/scp-action@v0.1.7
    #   with:
    #     host: ${{ secrets.PRODUCTION_HOST }}
    #     username: ${{ secrets.PRODUCTION_USER }}
    #     key: ${{ secrets.PRODUCTION_SSH_KEY }}
    #     port: 22
    #     timeout: 120s
    #     source: "sql/add_message_management_permissions.sql"
    #     target: "/tmp/"
    #     strip_components: 1
    #     overwrite: true
        
    # 메시지 권한 강제 추가 SQL은 한 번만 실행되어야 함 - 수동 실행 필요
    # - name: 📤 메시지 권한 강제 추가 SQL 업로드
    #   uses: appleboy/scp-action@v0.1.7
    #   with:
    #     host: ${{ secrets.PRODUCTION_HOST }}
    #     username: ${{ secrets.PRODUCTION_USER }}
    #     key: ${{ secrets.PRODUCTION_SSH_KEY }}
    #     port: 22
    #     timeout: 120s
    #     source: "sql/add_message_management_permissions_force.sql"
    #     target: "/tmp/"
    #     strip_components: 1
    #     overwrite: true
        
    # SQL 파일 권한 설정은 메뉴 업데이트가 필요한 경우에만 실행
    # - name: 🔧 SQL 파일 권한 설정
    #   uses: appleboy/ssh-action@v1.1.0
    #   with:
    #     host: ${{ secrets.PRODUCTION_HOST }}
    #     username: ${{ secrets.PRODUCTION_USER }}
    #     key: ${{ secrets.PRODUCTION_SSH_KEY }}
    #     port: 22
    #     timeout: 60s
    #     script: |
    #       # SQL 파일 권한 설정
    #       sudo chmod 644 /tmp/update_all_role_menus.sql
    #       echo "✅ SQL 파일 권한 설정 완료"
        
    - name: 🔧 프론트엔드 파일 권한 설정
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: 22
        timeout: 120s
        command_timeout: 10m
        script: |
          # 프론트엔드 파일 권한 설정
          sudo chown -R www-data:www-data /var/www/html/
          sudo chmod -R 755 /var/www/html/
          
          # CSS 파일 권한 특별 설정
          sudo find /var/www/html/ -name "*.css" -exec chmod 644 {} \;
          sudo find /var/www/html/ -name "*.js" -exec chmod 644 {} \;
          
          echo "✅ 프론트엔드 파일 권한 설정 완료"
        
    # 참고: 메뉴 구조 업데이트는 필요할 때만 수동으로 실행
    # sudo mysql -u root -p'!QAZ2wsx#EDC4rfv' mindgarden < /tmp/update_all_role_menus.sql
        
    - name: 🔄 서비스 재시작
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: 22
        timeout: 60s
        command_timeout: 5m
        script: |
          cd /var/www/mindgarden
          
          # JAR 파일명 변경
          if [ -f consultation-management-system-1.0.0.jar ]; then
            mv consultation-management-system-1.0.0.jar app.jar
          fi
          
          # 권한 설정
          chmod +x app.jar
          
          # 서비스 재시작
          echo "🔄 서비스 재시작..."
          sudo systemctl stop mindgarden.service || true
          sleep 5
          sudo systemctl start mindgarden.service
          echo "⏳ 애플리케이션 시작 대기 중 (30초)..."
          sleep 30
          
          # 서비스 상태 확인
          echo "🔍 서비스 상태 확인..."
          sudo systemctl status mindgarden.service --no-pager | head -10
          
          # 서비스 활성화 상태 확인
          if sudo systemctl is-active --quiet mindgarden.service; then
            echo "✅ 서비스 정상 시작됨"
            # 서비스 상태 상세 출력
            sudo systemctl status mindgarden.service --no-pager -l | head -20
          else
            echo "❌ 서비스 시작 실패 - 재시도..."
            echo "📋 서비스 상태 상세:"
            sudo systemctl status mindgarden.service --no-pager -l
            echo ""
            echo "📋 서비스 로그:"
            sudo journalctl -u mindgarden.service --no-pager -n 30
            sudo systemctl restart mindgarden.service
            sleep 30
            echo "⏳ 재시작 후 대기 완료"
          fi
          
          # Nginx 설정 업데이트 (통합 설정 파일)
          if [ -f /var/www/mindgarden/core-solution-prod.conf ]; then
            echo "🌐 Nginx 통합 설정 업데이트 중..."
            sudo cp /var/www/mindgarden/core-solution-prod.conf /etc/nginx/sites-available/core-solution
            sudo ln -sf /etc/nginx/sites-available/core-solution /etc/nginx/sites-enabled/core-solution
            echo "✅ 통합 설정 파일 적용 완료"
            
            # Nginx 설정 테스트
            if sudo nginx -t; then
              sudo systemctl reload nginx
              echo "✅ Nginx 설정 업데이트 완료"
            else
              echo "⚠️ Nginx 설정 오류 - 수동 확인 필요"
              sudo nginx -t
            fi
          fi
          
          # 데이터베이스 스키마 업데이트는 별도 워크플로우에서 수동 실행
          echo "ℹ️ DB 스키마 업데이트는 별도 워크플로우에서 수동 실행하세요"
          echo "ℹ️ Actions > 'Fix Production Database' 워크플로우 사용"
          
          # 메시지 관리 권한 확인 (SQL 파일 업로드는 주석 처리됨)
          echo "🔧 메시지 관리 권한 확인 시작..."
          EXISTING_COUNT=$(mysql -u mindgarden -p'mindgarden2025' mind_garden -N -e "SELECT COUNT(*) FROM role_permissions WHERE permission_code IN ('MESSAGE_MANAGE', 'MESSAGE_VIEW') AND role_name='BRANCH_SUPER_ADMIN' AND is_active=true;" 2>/dev/null || echo "0")
          
          if [ "$EXISTING_COUNT" -eq "0" ]; then
            echo "⚠️ 메시지 권한이 없음 - 수동으로 SQL 실행 필요"
            echo "⚠️ 운영 서버 SSH 접속 후 SQL 실행:"
            echo "   mysql -u mindgarden -p'mindgarden2025' mind_garden < /path/to/sql/add_message_management_permissions_force.sql"
          else
            echo "✅ 메시지 관리 권한이 이미 존재함 (${EXISTING_COUNT}개)"
          fi
          
          # 매핑 수정 프로시저 배포
          echo "🔧 매핑 수정 프로시저 배포 시작..."
          if [ -f /tmp/mapping_update_procedures_mysql.sql ]; then
            echo "📋 매핑 수정 프로시저 파일 확인됨"
            
            # DROP 구문 제거 (권한 오류 방지) - DROP 없이 CREATE만 시도
            echo "📋 DROP 구문 제거한 임시 파일 생성..."
            sed '/^DROP PROCEDURE/d' /tmp/mapping_update_procedures_mysql.sql > /tmp/mapping_proc_no_drop.sql || cp /tmp/mapping_update_procedures_mysql.sql /tmp/mapping_proc_no_drop.sql
            
            # 프로시저 배포 실행 (DROP 없이)
            echo "📋 프로시저 배포 실행..."
            mysql -h localhost -u mindgarden -p'mindgarden2025' mind_garden < /tmp/mapping_proc_no_drop.sql 2>&1 | tee /tmp/procedure_deploy.log
            
            DEPLOY_RESULT=${PIPESTATUS[0]}
            
            # DROP 권한 오류로 실패한 경우, root로 재시도
            if [ $DEPLOY_RESULT -ne 0 ] && grep -q "Access denied\|DROP PROCEDURE\|SYSTEM_USER" /tmp/procedure_deploy.log 2>/dev/null; then
              echo "⚠️ DROP 권한 오류 감지 - root 권한으로 재시도..."
              sudo mysql -h localhost -u root -pmindgarden2025 mind_garden < /tmp/mapping_update_procedures_mysql.sql 2>&1 | tee /tmp/procedure_deploy_root.log
              
              if [ ${PIPESTATUS[0]} -eq 0 ]; then
                echo "✅ root 권한으로 프로시저 배포 완료"
                DEPLOY_RESULT=0
              else
                echo "❌ root 권한으로도 배포 실패"
                cat /tmp/procedure_deploy_root.log || true
                rm -f /tmp/procedure_deploy_root.log
              fi
            fi
            
            if [ $DEPLOY_RESULT -eq 0 ]; then
              echo "✅ 매핑 수정 프로시저 배포 완료"
            else
              echo "❌ 매핑 수정 프로시저 배포 실패"
              echo "📋 배포 로그 (오류 확인):"
              cat /tmp/procedure_deploy.log || true
              echo "⚠️ 프로시저 배포 실패해도 서비스는 계속 진행"
            fi
            
            rm -f /tmp/mapping_proc_no_drop.sql /tmp/procedure_deploy.log
            
            # 프로시저 확인
            echo "📋 최종 프로시저 확인:"
            mysql -h localhost -u mindgarden -p'mindgarden2025' mind_garden -e "
            SELECT 
                ROUTINE_NAME,
                CREATED,
                LAST_ALTERED,
                CASE 
                    WHEN ROUTINE_DEFINITION LIKE '%tax_included%' THEN '✅ 최신버전'
                    ELSE '⚠️ 구버전'
                END AS '버전'
            FROM information_schema.ROUTINES 
            WHERE ROUTINE_SCHEMA = 'mind_garden' 
            AND ROUTINE_TYPE = 'PROCEDURE' 
            AND ROUTINE_NAME = 'UpdateMappingInfo';
            " 2>/dev/null || true
            
            rm -f /tmp/mapping_update_procedures_mysql.sql /tmp/procedure_deploy.log
          else
            echo "⚠️ 매핑 수정 프로시저 파일을 찾을 수 없습니다"
          fi
          
          # 매핑 프로시저 (운영용) 배포
          echo "🔧 매핑 프로시저 (운영용) 배포 시작..."
          if [ -f /tmp/production_mapping_procedures.sql ]; then
            echo "📋 매핑 프로시저 (운영용) 파일 확인됨"
            mysql -h localhost -u mindgarden -p'mindgarden2025' mind_garden < /tmp/production_mapping_procedures.sql 2>&1 | tee /tmp/production_mapping_proc.log || true
            
            if [ ${PIPESTATUS[0]} -eq 0 ]; then
              echo "✅ 매핑 프로시저 (운영용) 배포 완료"
            else
              echo "⚠️ 매핑 프로시저 (운영용) 배포 중 오류 발생 (계속 진행)"
              cat /tmp/production_mapping_proc.log | tail -20 || true
            fi
            rm -f /tmp/production_mapping_procedures.sql /tmp/production_mapping_proc.log
          else
            echo "⚠️ 매핑 프로시저 (운영용) 파일을 찾을 수 없습니다"
          fi
          
          # 업무 시간 프로시저 배포
          echo "🔧 업무 시간 프로시저 배포 시작..."
          if [ -f /tmp/business_time_procedures_final.sql ]; then
            echo "📋 업무 시간 프로시저 파일 확인됨"
            mysql -h localhost -u mindgarden -p'mindgarden2025' mind_garden < /tmp/business_time_procedures_final.sql 2>&1 | tee /tmp/business_time_proc.log || true
            
            if [ ${PIPESTATUS[0]} -eq 0 ]; then
              echo "✅ 업무 시간 프로시저 배포 완료"
            else
              echo "⚠️ 업무 시간 프로시저 배포 중 오류 발생 (계속 진행)"
              cat /tmp/business_time_proc.log | tail -20 || true
            fi
            rm -f /tmp/business_time_procedures_final.sql /tmp/business_time_proc.log
          else
            echo "⚠️ 업무 시간 프로시저 파일을 찾을 수 없습니다"
          fi
          
          # PL/SQL 프로시저 등록
          echo "🔧 PL/SQL 프로시저 등록 시작..."
          if [ -f /tmp/production_all_missing_procedures.sql ]; then
            # 파일 내용 확인
            echo "📋 파일 내용 확인:"
            head -5 /tmp/production_all_missing_procedures.sql
            # 환경변수 명시적 설정
            export DB_HOST="localhost"
            export DB_USERNAME="mindgarden"
            export DB_PASSWORD="mindgarden2025"
            export DB_NAME="mind_garden"
            
            echo "📋 MySQL 연결 정보 확인..."
            echo "DB_HOST: $DB_HOST"
            echo "DB_USERNAME: $DB_USERNAME"
            echo "DB_NAME: $DB_NAME"
            
            # MySQL 연결 테스트
            mysql -h $DB_HOST -u $DB_USERNAME -p$DB_PASSWORD -e "SELECT 1;" $DB_NAME
            
            if [ $? -eq 0 ]; then
              echo "✅ MySQL 연결 성공 - 프로시저 등록 시작"
              mysql -h $DB_HOST -u $DB_USERNAME -p$DB_PASSWORD $DB_NAME < /tmp/production_all_missing_procedures.sql
              
              if [ $? -eq 0 ]; then
                echo "✅ 모든 누락된 PL/SQL 프로시저 등록 완료"
                
                # 등록된 프로시저 확인
                echo "📋 등록된 프로시저 목록:"
                mysql -h $DB_HOST -u $DB_USERNAME -p$DB_PASSWORD $DB_NAME -e "
                SELECT ROUTINE_NAME, CREATED 
                FROM information_schema.ROUTINES 
                WHERE ROUTINE_SCHEMA = DATABASE() 
                AND ROUTINE_TYPE = 'PROCEDURE' 
                ORDER BY CREATED DESC;
                "
              else
                echo "❌ PL/SQL 프로시저 등록 실패"
                exit 1
              fi
            else
              echo "❌ MySQL 연결 실패 - 프로시저 등록 건너뜀"
            fi
            
            rm -f /tmp/production_all_missing_procedures.sql
          else
            echo "⚠️ PL/SQL 프로시저 파일을 찾을 수 없습니다"
          fi
          
    - name: 🏥 헬스체크
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        script: |
          echo "🏥 헬스체크 시작..."
          
          # 60초 대기 후 헬스체크 (애플리케이션 초기화 시간 확보)
          echo "⏳ 애플리케이션 초기화 대기 중 (60초)..."
          sleep 60
          
          # 서비스 상태 확인
          echo "🔍 서비스 상태 확인..."
          if sudo systemctl is-active --quiet mindgarden.service; then
            echo "✅ 서비스 정상 실행 중"
          else
            echo "❌ 서비스 실행 실패"
            echo "📋 서비스 상태 상세:"
            sudo systemctl status mindgarden.service --no-pager -l
            echo ""
            echo "📋 최근 서비스 로그:"
            sudo journalctl -u mindgarden.service --no-pager -n 50
            exit 1
          fi
          
          # 포트 리스닝 확인
          echo "🔍 포트 8080 리스닝 확인..."
          if netstat -tlnp 2>/dev/null | grep -q ":8080 " || ss -tlnp 2>/dev/null | grep -q ":8080 "; then
            echo "✅ 포트 8080 리스닝 중"
          else
            echo "❌ 포트 8080 리스닝 안 됨"
            echo "📋 서비스 로그 확인:"
            sudo journalctl -u mindgarden.service --no-pager -n 100 | tail -50
          fi
          
          # Flyway / DB 마이그레이션 실행 여부 확인 (journal + 선택적 flyway_schema_history)
          echo "🔍 Flyway·DB 마이그레이션 확인 (최근 기동 구간)..."
          sudo journalctl -u mindgarden.service --since "25 minutes ago" --no-pager \
            | grep -iE 'flyway|Flyway|schema_history|Migrating schema|Successfully applied|Validate failed' \
            | tail -40 || true
          if sudo journalctl -u mindgarden.service --since "25 minutes ago" --no-pager | grep -qi flyway; then
            echo "✅ 최근 로그에 Flyway 관련 메시지 존재 (위 로그 참고)"
          else
            echo "⚠️ 최근 25분 journal에 Flyway 키워드 없음 — SPRING_FLYWAY_ENABLED=false 이거나 로그 레벨·기동 전 구간일 수 있음"
          fi
          if command -v mysql >/dev/null 2>&1; then
            for kv in $(systemctl show mindgarden.service -p Environment --value | tr ' ' '\n' | grep '^DB_'); do
              export "$kv" 2>/dev/null || true
            done
            DBN="${DB_NAME:-core_solution}"
            DBU="${DB_USERNAME:-mindgarden}"
            DBP="${DB_PASSWORD:-}"
            DBH="${DB_HOST:-localhost}"
            if [ -n "$DBP" ]; then
              echo "🔍 flyway_schema_history 최신 5건 (mindgarden.service Environment 의 DB_* 사용)..."
              if mysql -h "$DBH" -u "$DBU" -p"$DBP" "$DBN" -e "SHOW TABLES LIKE 'flyway_schema_history';" 2>/dev/null | grep -q flyway_schema_history; then
                mysql -h "$DBH" -u "$DBU" -p"$DBP" "$DBN" -e \
                  "SELECT installed_rank, version, description, success, installed_on FROM flyway_schema_history ORDER BY installed_rank DESC LIMIT 5;" 2>/dev/null \
                  || echo "⚠️ flyway_schema_history 조회 실패"
              else
                echo "⚠️ flyway_schema_history 테이블 없음 — Flyway 미사용 DB이거나 최초 기동 전"
              fi
            else
              echo "ℹ️ systemd에서 DB_PASSWORD 파싱 실패 — journalctl Flyway 로그만 참고"
            fi
          fi
          
          # HTTP 헬스체크 (재시도 3회)
          echo "🔍 HTTP 헬스체크 시작..."
          for i in {1..3}; do
            if curl -f -s http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "✅ HTTP 헬스체크 통과 (시도 $i)"
              curl -s http://localhost:8080/actuator/health | head -10
              break
            else
              echo "⏳ HTTP 헬스체크 재시도 중... (시도 $i/3)"
              if [ $i -lt 3 ]; then
                sleep 10
              else
                echo "❌ HTTP 헬스체크 실패 (3회 시도 후 실패)"
                echo "📋 서비스 로그 최근 100줄:"
                sudo journalctl -u mindgarden.service --no-pager -n 100 | tail -50
                echo ""
                echo "📋 애플리케이션 로그 확인:"
                if [ -f /var/www/mindgarden/logs/mindgarden-prod.log ]; then
                  tail -50 /var/www/mindgarden/logs/mindgarden-prod.log
                fi
                echo ""
                echo "⚠️ HTTP 헬스체크 실패했지만 배포는 계속 진행됩니다."
              fi
            fi
          done
          
          # 프론트엔드 확인
          if curl -f -s http://localhost/login > /dev/null 2>&1; then
            echo "✅ 프론트엔드 정상 접근"
          else
            echo "❌ 프론트엔드 접근 실패"
          fi
          
          echo "🎉 배포 완료!"
          
    - name: 🔍 서버 상태 상세 확인 (디버깅)
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        script: |
          echo "🔍 운영 서버 상태 상세 확인"
          echo "=================================="
          
          echo ""
          echo "1. 서비스 상태:"
          sudo systemctl status mindgarden.service --no-pager -l | head -30
          
          echo ""
          echo "2. 서비스 로그 (최근 50줄):"
          sudo journalctl -u mindgarden.service --no-pager -n 50
          
          echo ""
          echo "3. 포트 리스닝 확인:"
          if command -v netstat &> /dev/null; then
            netstat -tlnp 2>/dev/null | grep 8080 || echo "포트 8080 리스닝 안 됨"
          elif command -v ss &> /dev/null; then
            ss -tlnp 2>/dev/null | grep 8080 || echo "포트 8080 리스닝 안 됨"
          else
            echo "netstat 또는 ss 명령어 없음"
          fi
          
          echo ""
          echo "4. Java 프로세스 확인:"
          ps aux | grep java | grep -v grep || echo "Java 프로세스 없음"
          
          echo ""
          echo "5. 애플리케이션 로그 (최근 50줄):"
          if [ -f /var/www/mindgarden/logs/mindgarden-prod.log ]; then
            tail -50 /var/www/mindgarden/logs/mindgarden-prod.log
          else
            echo "로그 파일 없음: /var/www/mindgarden/logs/mindgarden-prod.log"
            echo "대체 로그 위치 확인:"
            find /var/www/mindgarden -name "*.log" -type f 2>/dev/null | head -5
          fi
          
          echo ""
          echo "6. JAR 파일 확인:"
          if [ -f /var/www/mindgarden/app.jar ]; then
            ls -lh /var/www/mindgarden/app.jar
          else
            echo "JAR 파일 없음: /var/www/mindgarden/app.jar"
            echo "디렉토리 내용:"
            ls -lh /var/www/mindgarden/ | head -10
          fi
          
          echo ""
          echo "7. 환경 변수 확인:"
          if [ -f /etc/mindgarden/prod.env ]; then
            echo "환경 변수 파일 존재: /etc/mindgarden/prod.env"
            echo "파일 크기: $(ls -lh /etc/mindgarden/prod.env | awk '{print $5}')"
          else
            echo "환경 변수 파일 없음: /etc/mindgarden/prod.env"
          fi
          
          echo ""
          echo "8. 디스크 사용량:"
          df -h /var/www/mindgarden 2>/dev/null || df -h /var/www
          
          echo ""
          echo "9. 메모리 사용량:"
          free -h
          
          echo ""
          echo "=================================="
          
    - name: 🧹 메모리 정리
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        script: |
          echo "🧹 메모리 정리 시작..."
          
          # 7일 이상 된 백업 파일 삭제
          cd /var/www/mindgarden
          find . -name "*.backup.*" -type f -mtime +7 -delete || true
          
          # 시스템 메모리 정리
          sync
          echo 3 | sudo tee /proc/sys/vm/drop_caches > /dev/null
          
          # 최종 시스템 상태
          echo "💾 메모리 사용량:"
          free -h
          echo ""
          echo "💿 디스크 사용량:"
          df -h /var/www/mindgarden
          echo ""
          echo "🔧 서비스 상태:"
          sudo systemctl is-active mindgarden.service
          
          echo "✅ 메모리 정리 완료!"