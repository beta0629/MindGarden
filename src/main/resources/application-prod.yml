# 프로덕션 환경 설정

# 개발 모드 비활성화 (운영 환경)
isDev: false

# 데이터베이스 백업 설정
backup:
  directory: /home/backup/database
  log:
    directory: /home/backup/logs

# Redis 캐시 활성화 (운영 환경)
spring:
  cache:
    type: redis
    redis:
      time-to-live: 3600000  # 1시간 (밀리초)
      cache-null-values: false
  main:
    allow-circular-references: false  # 순환 참조 비활성화 (프로덕션용)
  # Redis 설정
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  
  # 프로덕션 환경 전용 설정
  
  # 데이터베이스 설정 (프로덕션)
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useSSL=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useUnicode=true&allowPublicKeyRetrieval=false&connectionCollation=utf8mb4_unicode_ci&characterSetResults=utf8mb4
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 풀 상한은 인스턴스 수·MySQL max_connections와 합산 정합 필요 (HIKARI_* 환경 변수)
    hikari:
      maximum-pool-size: ${HIKARI_MAXIMUM_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MINIMUM_IDLE:5}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${HIKARI_MAX_LIFETIME_MS:1800000}
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION_THRESHOLD_MS:60000}
  
  # Flyway (운영): 기동 시 classpath:db/migration 적용. 기존 DB는 baseline-on-migrate 로 히스토리 정합.
  # 비상 시에만 서비스 Environment: SPRING_FLYWAY_ENABLED=false
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    # 비상 시 systemd Environment 로 SPRING_FLYWAY_VALIDATE_ON_MIGRATE=false 가능, 기본은 true.
    validate-on-migrate: ${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:true}
    clean-disabled: true
    out-of-order: false

  # JPA 설정 (프로덕션)
  jpa:
    hibernate:
      ddl-auto: validate  # 스키마 검증만 수행
    show-sql: false  # SQL 로그 비활성화
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false
        use_sql_comments: false
        jdbc:
          batch_size: 50
        cache:
          use_second_level_cache: false
          use_query_cache: false
    database-platform: org.hibernate.dialect.MySQL8Dialect
  
  # 보안 설정 (프로덕션용)
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            scope: profile_nickname,account_email
            redirect-uri: ${KAKAO_REDIRECT_URI:${server.base-url}/api/auth/kakao/callback}
            client-authentication-method: post
            authorization-grant-type: authorization_code
            client-name: Kakao
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            scope: name,email
            redirect-uri: ${NAVER_REDIRECT_URI:${server.base-url}/api/auth/naver/callback}
            client-authentication-method: post
            authorization-grant-type: authorization_code
            client-name: Naver
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
    user:
      name: ${ADMIN_USERNAME}
      password: ${ADMIN_PASSWORD}
      roles: ADMIN
  
  # 프로덕션 환경 전용 설정
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

# 프로덕션 환경 전용 프로퍼티
isLocal: false
isDevelopment: false

# 환경 변수 검증 활성화 (운영 환경 필수)
environment:
  validation:
    enabled: true  # 운영 환경에서 필수 환경 변수 검증 활성화

# 프로덕션 환경에서 중복 로그인 방지 활성화
session:
  duplicate-login-check:
    enabled: true  # 프로덕션 환경에서는 중복 로그인 체크 활성화
    ask-user-confirmation: true  # 사용자에게 기존 세션 종료 확인 요청

# 테스트 플래그 (프로덕션용)
testing:
  enabled: false
  mock-data: false
  bypass-auth: false  # 인증 우회 비활성화
  debug-mode: false
  profile:
    show-test-data: false
    mock-user-info: false

# 프로덕션 환경 전용 설정
production:
  # 데이터베이스 초기화
  database:
    initialize: false
    seed-data: false
  
  # JWT 설정은 최상위 레벨로 이동됨
  
  # 이메일 설정 (프로덕션용)
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: ${SMTP_HOST:}
  
  # API 설정
  api:
    # 프로덕션용 CORS 제한
    cors:
      allowed-origins: ${ALLOWED_ORIGINS}
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: Authorization,Content-Type,X-Requested-With,X-CSRF-TOKEN
      allow-credentials: true
      exposed-headers: Set-Cookie
  
  # 로깅 설정
  logging:
    # 프로덕션용 로깅 레벨
    level:
      root: WARN
      com.mindgarden: INFO
      org.springframework: WARN
      org.hibernate: WARN

# JWT 설정 (프로덕션용)
jwt:
  secret: ${JWT_SECRET:}
  expiration: 3600000   # 1시간 (밀리초)
  refresh-expiration: 604800000  # 7일 (밀리초)

# 개인정보 암호화 설정 (프로덕션용)
encryption:
  personal-data:
    key: ${PERSONAL_DATA_ENCRYPTION_KEY}
    iv: ${PERSONAL_DATA_ENCRYPTION_IV}

# 세션 관리 설정은 위에서 이미 정의됨 (중복 제거)

# 프론트엔드 설정 (프로덕션용)
frontend:
  base-url: ${FRONTEND_BASE_URL:}

# 로깅 설정 (프로덕션용)
logging:
  level:
    com.mindgarden.consultation: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.springframework.boot.autoconfigure: WARN
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
    org.springframework.orm.jpa: WARN
    org.springframework.transaction: WARN
  
  # 로그 파일 설정
  file:
    name: logs/mindgarden-prod.log
    max-size: 50MB
    max-history: 30
  
  # 패턴 설정
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  
  # 에러 로그 분리 설정
  logback:
    rollingpolicy:
      # 에러 로그 파일 설정
      error-file: logs/error-prod.log
      error-max-size: 50MB
      error-max-history: 30
      # 에러 로그 패턴
      error-pattern: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n%ex{full}"

# 프로덕션 환경 전용 서버 설정
server:
  # 서버 기본 URL (프로덕션용, 환경 변수로만 관리)
  base-url: ${SERVER_BASE_URL:}
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
    session:
      cookie:
        http-only: false  # 프론트엔드에서 접근 가능하도록 false로 변경
        secure: false  # HTTP 환경이므로 false로 설정 (HTTPS 적용 후 true로 변경)
        same-site: none  # OAuth2 콜백 완전 호환을 위해 none으로 변경
        max-age: 3600  # 1시간
        path: /  # 전체 경로에서 쿠키 사용
  # 프로덕션용 에러 페이지 설정
  error:
    whitelabel:
      enabled: true
    include-stacktrace: never
    include-message: never

# 카카오 알림톡 설정 (프로덕션용)
kakao:
  alimtalk:
    enabled: true  # 운영 환경에서 활성화
    simulation-mode: false  # 실제 API 호출
    api-key: ${KAKAO_ALIMTALK_API_KEY:}  # 환경 변수에서 가져오기
    sender-key: ${KAKAO_ALIMTALK_SENDER_KEY:}  # 환경 변수에서 가져오기
    api-url: https://alimtalk-api.bizmsg.kr
    fallback-to-sms: true  # 실패 시 SMS 대체 발송
    max-retry-count: 3
    timeout-seconds: 30