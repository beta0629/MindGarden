name: Deploy Homepage

on:
  push:
    branches:
      - develop
      - dev
      - homepage/develop
      - main
      - master
  pull_request:
    branches:
      - develop
      - dev
      - homepage/develop
      - main
      - master

jobs:
  # 개발 브랜치 배포
  deploy-dev:
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/homepage/develop'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
        continue-on-error: true
        # TODO: ESLint 에러 수정 후 continue-on-error 제거 (values, ConsultationBottomSheet, ReviewsList 등)
      
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.DEV_API_BASE_URL || secrets.NEXT_PUBLIC_API_BASE_URL || 'https://api.mindgarden.co.kr' }}
          BLOG_ADMIN_PASSWORD: ${{ secrets.DEV_BLOG_ADMIN_PASSWORD || secrets.BLOG_ADMIN_PASSWORD }}
          DB_HOST: ${{ secrets.DEV_DB_HOST || secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DEV_DB_PORT || secrets.DB_PORT }}
          DB_USER: ${{ secrets.DEV_DB_USER || secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DEV_DB_PASSWORD || secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DEV_DB_NAME || secrets.DB_NAME }}

      # 실제 배포는 GitHub Webhook으로 처리 (별도 SSH 키 불필요)
      # 푸시 시 서버 homepage-webhook이 수신 → deploy-from-webhook.sh (git pull, build, pm2 restart)

  # 프로덕션 브랜치 빌드 및 테스트
  build-and-test:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
      
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL || 'https://api.mindgarden.co.kr' }}
          BLOG_ADMIN_PASSWORD: ${{ secrets.BLOG_ADMIN_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
      
      # 프로덕션 배포는 별도로 설정 필요 (예: Vercel, 자체 서버 등)
      # - name: Deploy to Production
      #   if: github.event_name == 'push'
      #   run: |
      #     # 배포 스크립트 추가

