# Trinity 프론트엔드 정적 빌드 스모크 (Playwright 없음 — 포트·baseURL 혼선 방지)
name: Trinity build smoke (CI)

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend-trinity/**'
      - '.github/workflows/e2e-trinity-build-smoke.yml'
      - 'frontend-trinity/package-lock.json'
  push:
    branches: [main, develop]
    paths:
      - 'frontend-trinity/**'
      - '.github/workflows/e2e-trinity-build-smoke.yml'
      - 'frontend-trinity/package-lock.json'
  workflow_dispatch:

jobs:
  trinity-build-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend-trinity/package-lock.json

      - name: Install dependencies
        working-directory: frontend-trinity
        run: npm ci

      - name: Build (CI)
        working-directory: frontend-trinity
        run: npm run build:ci
