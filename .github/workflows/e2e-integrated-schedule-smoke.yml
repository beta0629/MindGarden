# 통합 스케줄 — 내담자 특이사항·공휴일 범례 등 Playwright 스모크 (로그인·API 전제)
# 백엔드 기동은 이 워크플로에 포함하지 않음.
#   → 스테이징/개발에 `E2E_BASE_URL`을 두거나, self-hosted runner에서 앱·백엔드가 이미 떠 있는 상태에서 실행할 것.
#
# 로그인 시크릿 SSOT: `.cursor/skills/core-solution-testing/SKILL.md` — `E2E_TEST_EMAIL`, `E2E_TEST_PASSWORD`
# (하위 호환: `E2E_ADMIN_USERNAME` / `E2E_ADMIN_PASSWORD`)
name: E2E integrated schedule client notes smoke

on:
  pull_request:
    branches: [main, develop]
    paths:
      # tests/e2e
      - 'tests/e2e/helpers/erpAuth.ts'
      - 'tests/e2e/helpers/react130ConsoleGate.ts'
      - 'tests/e2e/playwright.config.ts'
      - 'tests/e2e/tests/admin/integrated-schedule-client-notes.spec.ts'
      - 'tests/e2e/tests/admin/integrated-schedule-detail-modal.spec.ts'
      - 'tests/e2e/tests/admin/integrated-schedule-external-drop-guard-smoke.spec.ts'
      # frontend
      - 'frontend/src/components/admin/mapping-management/constants/integratedScheduleSidebarFilterConstants.js'
      - 'frontend/src/components/admin/mapping-management/IntegratedMatchingSchedule.css'
      - 'frontend/src/components/admin/mapping-management/IntegratedMatchingSchedule.js'
      - 'frontend/src/components/schedule/ScheduleB0KlA.css'
      - 'frontend/src/components/schedule/ScheduleClientNotesSection.js'
      - 'frontend/src/components/schedule/ScheduleDetailModal.js'
      - 'frontend/src/components/schedule/ScheduleModal.js'
      - 'frontend/src/components/schedule/UnifiedScheduleComponent.js'
      - 'frontend/src/components/ui/Schedule/ScheduleCalendarView.css'
      - 'frontend/src/components/ui/Schedule/ScheduleCalendarView.js'
      - 'frontend/src/components/ui/Schedule/ScheduleLegend.js'
      - 'frontend/src/constants/schedule.js'
      - 'frontend/src/utils/krPublicHolidays.js'
      - 'frontend/src/utils/scheduleExternalDropGuards.js'
      - 'frontend/src/utils/scheduleRescheduleUtils.js'
      - 'frontend/src/utils/scheduleRoleGuards.js'
      - 'frontend/src/utils/standardizedApi.js'
  workflow_dispatch:

jobs:
  e2e-integrated-schedule-smoke:
    # PR·fork 등 시크릿 미설정 시 이후 스텝만 스킵 → 워크플로는 성공으로 끝남(job if 에서는 secrets 사용 불가).
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check E2E credentials (gate)
        id: e2e_gate
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_ADMIN_USERNAME: ${{ secrets.E2E_ADMIN_USERNAME }}
        run: |
          if [ -n "${E2E_TEST_EMAIL}" ] || [ -n "${E2E_ADMIN_USERNAME}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.e2e_gate.outputs.run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies (Playwright webServer)
        if: steps.e2e_gate.outputs.run == 'true'
        working-directory: frontend
        run: npm ci

      - name: Install E2E dependencies
        if: steps.e2e_gate.outputs.run == 'true'
        working-directory: tests/e2e
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright Chromium
        if: steps.e2e_gate.outputs.run == 'true'
        working-directory: tests/e2e
        run: npx playwright install chromium --with-deps

      - name: Run integrated schedule client notes smoke (chromium)
        if: steps.e2e_gate.outputs.run == 'true'
        working-directory: tests/e2e
        env:
          BASE_URL: ${{ secrets.E2E_BASE_URL != '' && secrets.E2E_BASE_URL || 'http://localhost:3000' }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          TEST_USERNAME: ${{ secrets.E2E_TEST_EMAIL != '' && secrets.E2E_TEST_EMAIL || secrets.E2E_ADMIN_USERNAME }}
          TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD != '' && secrets.E2E_TEST_PASSWORD || secrets.E2E_ADMIN_PASSWORD }}
        run: |
          npx playwright test \
            tests/admin/integrated-schedule-client-notes.spec.ts \
            tests/admin/integrated-schedule-detail-modal.spec.ts \
            tests/admin/integrated-schedule-external-drop-guard-smoke.spec.ts \
            --project=chromium
