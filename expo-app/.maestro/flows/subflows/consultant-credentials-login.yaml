# Consultant 홈 P0 — 테넌트 선택(선택) + 이메일/휴대폰·비밀번호 로그인
# admin-credentials-login.yaml 과 동일 단계. 자격 증명만 CONSULTANT 전용.
#
# 카피 기준: app/(auth)/tenant-select.tsx, login.tsx
appId: com.mindgardenmobile
---
# 1) 테넌트 미선택 시
- runFlow:
    when:
      visible: '소속 기관을 선택해주세요'
    commands:
      - tapOn:
          text: '기관명 또는 서브도메인 검색'
          optional: true
      - inputText: ${MAESTRO_TENANT_SEARCH}
      - hideKeyboard
      - tapOn:
          text: ${MAESTRO_TENANT_NAME}

# 2) 로그인 화면 — ID/PW
- runFlow:
    when:
      visible: '카카오로 로그인'
    commands:
      - tapOn: '다른 방법으로 로그인'
      - tapOn: '이메일 또는 휴대폰 번호 입력'
      - inputText: ${MAESTRO_CONSULTANT_EMAIL}
      - tapOn: '비밀번호 입력'
      - inputText: ${MAESTRO_CONSULTANT_PASSWORD}
      - tapOn: '로그인'
