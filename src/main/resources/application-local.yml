    # 토스페이먼츠 웹훅 시크릿 (로컬 개발용)
    webhook-secret: ${PAYMENT_TOSS_WEBHOOK_SECRET:09fb9726652b997b8b7f4fe44782cd08f8cda6bb8ed8af243ebe9248d967ba2c}
    # 토스페이먼츠 상점 아이디 (선택사항)
