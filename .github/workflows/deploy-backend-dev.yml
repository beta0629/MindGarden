name: 🚀 CoreSolution 백엔드 개발 서버 배포
# 배포 트리거: 2025-12-10 (502 오류 해결)
# paths 변경 시 develop push로 배포 실행
#
# 표준 프로시저: DEV_DB_USER, DEV_DB_PASSWORD, DEV_DB_NAME (+ DEV_SERVER_*) Secret이 있으면
# 서비스 재시작 전에 deploy-standardized-procedures.sh dev 가 자동 실행됩니다. 없으면 Notice 후 스킵.

on:
  push:
    branches: [ develop ]
    paths:
      # 코어솔루션 관련 Java 코드 (온보딩 제외)
      - 'src/main/java/com/coresolution/core/domain/**'
      - '!src/main/java/com/coresolution/core/domain/onboarding/**'
      - 'src/main/java/com/coresolution/core/repository/**'
      - '!src/main/java/com/coresolution/core/repository/onboarding/**'
      - 'src/main/java/com/coresolution/core/service/**'
      - '!src/main/java/com/coresolution/core/service/Onboarding*.java'
      - '!src/main/java/com/coresolution/core/service/impl/Onboarding*.java'
      - 'src/main/java/com/coresolution/core/controller/**'
      - '!src/main/java/com/coresolution/core/controller/Onboarding*.java'
      - 'src/main/java/com/coresolution/core/controller/dto/**'
      - '!src/main/java/com/coresolution/core/controller/dto/Onboarding*.java'
      - 'src/main/java/com/coresolution/core/dto/**'
      - 'src/main/java/com/coresolution/core/security/**'
      - 'src/main/java/com/coresolution/core/filter/**'
      - 'src/main/java/com/coresolution/core/context/**'
      - 'src/main/java/com/coresolution/core/constant/**'
      - 'src/main/java/com/coresolution/core/config/**'
      # 기타 백엔드 코드
      - 'src/main/java/com/coresolution/consultation/**'
      # dev 프로파일 설정 (기동 오류 방지)
      - 'src/main/resources/application.yml'
      - 'src/main/resources/application-dev.yml'
      # Shop 카탈로그 썸네일 classpath placeholder (FileController 폴백)
      - 'src/main/resources/shop-catalog-thumbnails/**'
      # DB 마이그레이션 (Flyway 적용을 위해 배포 필요)
      - 'src/main/resources/db/migration/**'
      - 'pom.xml'
      - 'deployment/mindgarden.prod-env.example'
      - '.github/workflows/deploy-backend-dev.yml'
  workflow_dispatch:
    # 수동 실행 가능

# 동시 트리거 직렬화: PR 다발 머지 시 두 dev 배포가 동시에 진행되어
# 서로의 systemd 부팅을 중단시키며 14회 무한 재시작을 유발하는 회귀 방지
# (2026-05-28 P0: SMS_API_KEY placeholder 미해결 사례). cancel-in-progress=false 로 큐잉.
concurrency:
  group: dev-backend-deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: 🏗️ 코어솔루션 백엔드 빌드 및 배포
    runs-on: ubuntu-latest
    # Apple SIWA 환경변수 6종 — 개발 배포 SSH 스크립트가 /etc/mindgarden/dev.env 에 주입할 때 사용 (P0 hotfix 2026-06-08)
    # 가이드: docs/project-management/2026-06-04/APPLE_T1_OPS_ENV_INJECTION_GUIDE.md §1.1
    # 실제 런타임 주입은 서버 systemd EnvironmentFile=/etc/mindgarden/dev.env 가 담당하나,
    # 워크플로 env 로 매핑해 두어야 후속 SSH 스크립트(dev.env 갱신·검증)에서 즉시 참조 가능.
    # Google OAuth 환경변수 3종 — 개발 BE 의 GoogleOAuth2ServiceImpl 가 Google /token 호출 시 사용 (P0 hotfix 2026-06-11)
    # 운영(deploy-production.yml) 과 동일 패턴 — 후속 자동 주입 step 이 dev.env 멱등 갱신·재시작 수행.
    env:
      APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
      APPLE_PRIVATE_KEY: ${{ secrets.APPLE_PRIVATE_KEY }}
      APPLE_REDIRECT_URI: ${{ secrets.APPLE_REDIRECT_URI }}
      APPLE_ALLOWED_AUDIENCES: ${{ secrets.APPLE_ALLOWED_AUDIENCES }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
      # OAuth 4종 표준화 (옵션 B′, 2026-06-11): 외부 OAuth Console 등록 콜백 URL 목록.
      # 콤마 구분, 각 환경별 apex 콜백을 모두 포함. 미주입 시 BE 검증 graceful skip.
      KAKAO_REGISTERED_URLS: ${{ secrets.KAKAO_REGISTERED_URLS }}
      NAVER_REGISTERED_URLS: ${{ secrets.NAVER_REGISTERED_URLS }}
      GOOGLE_REGISTERED_URLS: ${{ secrets.GOOGLE_REGISTERED_URLS }}
      APPLE_REGISTERED_URLS: ${{ secrets.APPLE_REGISTERED_URLS }}
      # PII KEY/IV 회전 SSOT (선행 PR-1, 2026-06-14):
      # PII KEY/IV 회전 설계 (docs/standards/PII_KEY_ROTATION_REENCRYPTION_DESIGN.md, PR #335) 후속.
      # PersonalDataEncryptionKeyProvider 가 다중 키/IV 로테이션을 위해 읽는 환경변수 4종을
      # /etc/mindgarden/dev.env 로 멱등 동기화한다 (운영 deploy-production.yml 과 동일 set).
      # 누락 허용 — Phase 1 진입 전까지 BE 기동 영향 최소화.
      PERSONAL_DATA_ENCRYPTION_ACTIVE_KEY_ID: ${{ secrets.PERSONAL_DATA_ENCRYPTION_ACTIVE_KEY_ID }}
      PERSONAL_DATA_ENCRYPTION_KEYS: ${{ secrets.PERSONAL_DATA_ENCRYPTION_KEYS }}
      PERSONAL_DATA_ENCRYPTION_IVS: ${{ secrets.PERSONAL_DATA_ENCRYPTION_IVS }}
      MINDGARDEN_DORMANT_PII_ENC_KEY: ${{ secrets.MINDGARDEN_DORMANT_PII_ENC_KEY }}
      # NCP SENS 4종 환경변수 폐기 (2026-06-12 SSOT 통합).
      # SmsGatewayServiceImpl → SolapiSmsProvider 단일 통합. 솔라피 자격 증명은
      # scripts/deployment/sync-solapi-sms-env.sh 가 운영 환경 동기화를 담당한다.

    steps:
    - name: 📥 코드 체크아웃
      uses: actions/checkout@v6
      
    - name: ☕ Java 17 설정
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: 🔧 Maven 캐시 설정
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: 🏗️ 백엔드 빌드
      run: |
        mvn clean package -DskipTests
        echo "빌드 완료. 결과 확인:"
        ls -lh target/consultation-management-system-1.0.0.jar || echo "JAR 파일 없음!"
      
    - name: 🔍 백엔드 빌드 결과 확인
      run: |
        echo "🔍 백엔드 빌드 결과 확인..."
        if [ -f target/consultation-management-system-1.0.0.jar ]; then
          ls -lh target/consultation-management-system-1.0.0.jar
          echo "✅ JAR 파일 생성됨"
        else
          echo "❌ JAR 파일 없음!"
          ls -la target/ 2>/dev/null || echo "target 디렉토리 없음"
          exit 1
        fi

    - name: 🔒 dev 프로파일 설정 검증 (배포 전 기동 오류 방지)
      run: |
        echo "🔒 JAR 내 dev 설정 검증..."
        JAR=target/consultation-management-system-1.0.0.jar
        if ! jar tf "$JAR" | grep -q "BOOT-INF/classes/application-dev.yml"; then
          echo "❌ application-dev.yml이 JAR에 없습니다. dev 기동 시 기본 설정이 적용되지 않습니다."
          exit 1
        fi
        # OAuth2 Apple provider 필수 (미포함 시 기동 시 Provider ID must be specified 오류)
        unzip -p "$JAR" BOOT-INF/classes/application-dev.yml > /tmp/app-dev.yml 2>/dev/null || true
        if [ -f /tmp/app-dev.yml ]; then
          if ! grep -q "provider:" /tmp/app-dev.yml || ! grep -q "apple:" /tmp/app-dev.yml; then
            echo "❌ application-dev.yml에 OAuth2 provider.apple 정의가 없습니다. 기동 시 오류가 발생합니다."
            exit 1
          fi
          echo "✅ application-dev.yml 및 OAuth2 provider.apple 확인됨"
        else
          echo "⚠️ application-dev.yml 추출 실패, 검증 스킵"
        fi

    - name: 🔍 개발 서버 SSH 연결 테스트
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 30s
        script: |
          echo "SSH 연결 테스트 성공: $(date)"
          
    - name: 🚀 개발 서버 배포 준비
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 120s
        command_timeout: 30m
        script: |
          cd /var/www/mindgarden-dev
          
          # 💾 배포 전 디스크 공간 확인 및 정리 (20% 이상 여유 공간 유지)
          echo "💾 배포 전 디스크 공간 확인..."
          DISK_USAGE=$(df -h / | awk 'NR==2 {print $5}' | sed 's/%//')
          if [ "$DISK_USAGE" -ge 80 ]; then
            echo "⚠️ 디스크 사용률이 80% 이상입니다. 자동 정리 시작..."
            if [ -f /opt/mindgarden/scripts/development/utilities/auto-disk-cleanup.sh ]; then
              /opt/mindgarden/scripts/development/utilities/auto-disk-cleanup.sh || true
            else
              echo "⚠️ 디스크 정리 스크립트를 찾을 수 없습니다. 수동 정리 필요"
            fi
          else
            echo "✅ 디스크 공간 충분: ${DISK_USAGE}% 사용 중"
          fi
          
          # 💾 배포 전 디스크 공간 확인 및 정리 (20% 이상 여유 공간 유지)
          echo "💾 배포 전 디스크 공간 확인..."
          DISK_USAGE=$(df -h / | awk 'NR==2 {print $5}' | sed 's/%//')
          if [ "$DISK_USAGE" -ge 80 ]; then
            echo "⚠️ 디스크 사용률이 80% 이상입니다. 자동 정리 시작..."
            if [ -f /opt/mindgarden/scripts/development/utilities/auto-disk-cleanup.sh ]; then
              chmod +x /opt/mindgarden/scripts/development/utilities/auto-disk-cleanup.sh
              /opt/mindgarden/scripts/development/utilities/auto-disk-cleanup.sh || true
            else
              echo "⚠️ 디스크 정리 스크립트를 찾을 수 없습니다. 수동 정리 필요"
            fi
          else
            echo "✅ 디스크 공간 충분: ${DISK_USAGE}% 사용 중"
          fi
          
          # 🔧 배포 전 DB 연결 정리 (Too many connections 오류 방지)
          echo "🔧 배포 전 DB 연결 정리 시작..."
          if [ -f /opt/mindgarden/scripts/development/utilities/cleanup-db-connections.sh ]; then
            source /etc/mindgarden/dev.env || true
            /opt/mindgarden/scripts/development/utilities/cleanup-db-connections.sh <<< "y" || true
          else
            echo "⚠️ 연결 정리 스크립트를 찾을 수 없습니다. 수동 정리 필요"
          fi
          
          # 서비스 중지
          sudo systemctl stop mindgarden-dev.service || true
          
          # 서비스 중지 후 추가 대기 (연결 정리 시간 확보)
          sleep 5
          
          # 백업 생성
          if [ -f app.jar ]; then
            BACKUP_DIR="/var/www/mindgarden-dev/backups"
            mkdir -p $BACKUP_DIR
            BACKUP_FILE="$BACKUP_DIR/app.jar.backup.$(date +%Y%m%d_%H%M%S)"
            # 같은 타임스탬프 파일이 있으면 초까지 포함한 타임스탬프 사용
            while [ -f "$BACKUP_FILE" ]; do
              BACKUP_FILE="$BACKUP_DIR/app.jar.backup.$(date +%Y%m%d_%H%M%S.%N | cut -b1-19)"
            done
            cp app.jar "$BACKUP_FILE"
            echo "✅ 백업 완료: $BACKUP_FILE"
          fi
          
          # 백업 보관: 유형별 최신 5개만 유지 (운영 배포와 동일·디스크 누적 방지)
          BACKUP_DIR="/var/www/mindgarden-dev/backups"
          if [ -d "$BACKUP_DIR" ]; then
            cd "$BACKUP_DIR"
            ls -t app.jar.backup.* 2>/dev/null | tail -n +6 | xargs -r rm -f || true
            ls -t frontend.backup.*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm -f || true
            shopt -s nullglob
            extra=(app-before-*.jar app-flyway-*.jar)
            if [ ${#extra[@]} -gt 0 ]; then
              ls -t "${extra[@]}" 2>/dev/null | tail -n +6 | xargs -r rm -f || true
            fi
            echo "✅ 백업 디렉터리 정리 완료 (각 패턴별 최대 5개 유지)"
          fi
          
    - name: 📤 유틸리티 스크립트 업로드 (개발 서버)
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 120s
        source: "scripts/development/utilities/*.sh"
        target: "/opt/mindgarden/scripts/development/utilities/"
        strip_components: 3
        overwrite: true
        
    - name: 📤 백엔드 파일 업로드 SCP (개발 서버)
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 120s
        source: "target/consultation-management-system-1.0.0.jar"
        target: "/var/www/mindgarden-dev/"
        strip_components: 1
        overwrite: true
        
    - name: 🔧 배포용 표준 프로시저 파일 생성 (개발)
      run: |
        chmod +x database/schema/procedures_standardized/create_deployment_files.sh
        bash database/schema/procedures_standardized/create_deployment_files.sh

    - name: 📦 표준 프로시저 배포 (개발 DB, 배포 통합)
      run: |
        set -euo pipefail
        if [ -z "${{ secrets.DEV_DB_USER }}" ] || [ -z "${{ secrets.DEV_DB_PASSWORD }}" ] || [ -z "${{ secrets.DEV_DB_NAME }}" ]; then
          echo "::notice::DEV_DB_USER / DEV_DB_PASSWORD / DEV_DB_NAME Secret이 비어 있어 표준 프로시저 배포를 건너뜁니다. 등록 시 이후 개발 배포마다 자동 적용됩니다."
          exit 0
        fi
        if [ -z "${{ secrets.DEV_SERVER_SSH_KEY }}" ] || [ -z "${{ secrets.DEV_SERVER_HOST }}" ]; then
          echo "::notice::DEV_SERVER_SSH_KEY 또는 DEV_SERVER_HOST 가 비어 있어 표준 프로시저 배포를 건너뜁니다."
          exit 0
        fi
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        ssh-keyscan -H "${{ secrets.DEV_SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
        echo "${{ secrets.DEV_SERVER_SSH_KEY }}" > ~/.ssh/dev_integrated_proc_key
        chmod 600 ~/.ssh/dev_integrated_proc_key
        eval "$(ssh-agent -s)"
        ssh-add ~/.ssh/dev_integrated_proc_key
        export DEV_SERVER_HOST="${{ secrets.DEV_SERVER_HOST }}"
        U="${{ secrets.DEV_SERVER_USER }}"
        export DEV_SERVER_USER="${U:-root}"
        export DEV_DB_HOST="${{ secrets.DEV_DB_HOST }}"
        export DEV_DB_USER="${{ secrets.DEV_DB_USER }}"
        export DEV_DB_PASSWORD="${{ secrets.DEV_DB_PASSWORD }}"
        export DEV_DB_NAME="${{ secrets.DEV_DB_NAME }}"
        chmod +x scripts/automation/deployment/deploy-standardized-procedures.sh
        bash scripts/automation/deployment/deploy-standardized-procedures.sh dev
        
    - name: 📤 systemd 서비스 파일 업로드 (개발 서버)
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 120s
        source: "config/systemd/mindgarden-dev.service"
        target: "/tmp/mindgarden-dev.service"
        overwrite: true
        
    - name: 🔄 개발 서버 서비스 재시작
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 120s
        # 헬스 대기(최대 600s) + journalctl·롤백 + start.sh 재생성 (Shop·Flyway·PlSql 기동 여유)
        command_timeout: 45m
        # appleboy/ssh-action envs: 워크플로 환경변수를 SSH 세션으로 export (P0 hotfix 2026-06-08).
        # 실제 dev.env 갱신은 운영자 1회 작업(가이드 §1.1)이며, 본 매핑은 후속 자동화·진단 스크립트용.
        # GOOGLE_* 3종은 P0 hotfix 2026-06-11 추가 — 후속 자동 주입 step 이 같은 패턴으로 사용.
        # *_REGISTERED_URLS 4종은 OAuth 4종 표준화 (옵션 B′) 추가 — 후속 자동 주입 step 이 동일 패턴으로 사용.
        envs: APPLE_CLIENT_ID,APPLE_TEAM_ID,APPLE_KEY_ID,APPLE_PRIVATE_KEY,APPLE_REDIRECT_URI,APPLE_ALLOWED_AUDIENCES,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_REDIRECT_URI,KAKAO_REGISTERED_URLS,NAVER_REGISTERED_URLS,GOOGLE_REGISTERED_URLS,APPLE_REGISTERED_URLS
        script: |
          cd /var/www/mindgarden-dev
          
          # JAR 파일명 변경
          if [ -f consultation-management-system-1.0.0.jar ]; then
            mv consultation-management-system-1.0.0.jar app.jar
          fi
          
          # 권한 설정
          chmod +x app.jar
          
          # 시작 스크립트 생성
          # 환경변수 export 패턴: set -a / source / set +a (개별 export 목록 미사용 → 신규 ENV 누락 회귀 방지)
          # 2026-05-28 P0 사례: SMS_API_KEY 등 신규 키가 dev.env 에는 있어도
          # bash `source` 만으로는 비-export 변수로 남아 자식 Java 프로세스에 전달되지 않아 재시작 14회 발생.
          echo "📝 시작 스크립트 생성 중..."
          sudo mkdir -p /opt/mindgarden
          sudo bash -c 'echo "#!/bin/bash" > /opt/mindgarden/start.sh'
          sudo bash -c 'echo "set -e" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "# /etc/mindgarden/dev.env 의 모든 key=value 를 자동 export" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "# (개별 export 목록을 유지하지 않아도 신규 키가 누락되지 않음)" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "set -a" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "# shellcheck source=/dev/null" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "source /etc/mindgarden/dev.env" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "set +a" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "cd /var/www/mindgarden-dev" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "JAVA_OPTS=\"\${JAVA_OPTS:--Xms1g -Xmx4g -XX:+UseG1GC}\"" >> /opt/mindgarden/start.sh'
          sudo bash -c 'echo "exec /usr/bin/java \$JAVA_OPTS -jar app.jar --spring.profiles.active=dev" >> /opt/mindgarden/start.sh'
          sudo chmod +x /opt/mindgarden/start.sh
          # 회귀 즉시 감지: set -a / source / set +a 3종 라인이 모두 작성되었는지 검증
          # 한 줄이라도 누락되면 dev.env 변수가 export 되지 않아 기동 시 placeholder 미해결 오류 발생
          if ! sudo grep -q '^set -a$' /opt/mindgarden/start.sh \
            || ! sudo grep -q '^source /etc/mindgarden/dev.env$' /opt/mindgarden/start.sh \
            || ! sudo grep -q '^set +a$' /opt/mindgarden/start.sh; then
            echo "::error::start.sh 에 set -a / source / set +a 패턴이 누락되었습니다. dev.env 변수가 export 되지 않아 기동 시 placeholder 미해결 오류가 발생합니다."
            sudo cat /opt/mindgarden/start.sh || true
            exit 1
          fi
          echo "✅ 시작 스크립트 생성 완료 (set -a 패턴 검증 통과)"
          
          # systemd 서비스 파일 설정
          echo "📝 systemd 서비스 파일 설정 중..."
          if [ -f /tmp/mindgarden-dev.service ]; then
            sudo cp /tmp/mindgarden-dev.service /etc/systemd/system/mindgarden-dev.service
            sudo systemctl daemon-reload
            sudo systemctl enable mindgarden-dev.service
            echo "✅ systemd 서비스 파일 설정 완료"
          else
            # ⚠️ Fallback: 정식 systemd unit (config/systemd/mindgarden-dev.service) SCP 업로드가 누락된 경우
            # 정식 unit 과 동등하게 EnvironmentFile=-/etc/mindgarden/dev.env 를 포함하여
            # start.sh 의 source 패턴이 회귀하더라도 systemd 차원에서 ENV 가 자동 로드되도록 이중 안전망 구성.
            # 2026-05-28 P0 회귀 (SMS_API_KEY placeholder 미해결) 재발 방지.
            echo "⚠️ systemd 서비스 파일이 업로드되지 않음 - 기본 설정 사용 (EnvironmentFile 이중 안전망 포함)"
            UNIT_FILE=/etc/systemd/system/mindgarden-dev.service
            sudo bash -c "echo '[Unit]' > $UNIT_FILE"
            sudo bash -c "echo 'Description=MindGarden Development Server' >> $UNIT_FILE"
            sudo bash -c "echo 'After=network.target mysql.service' >> $UNIT_FILE"
            sudo bash -c "echo '' >> $UNIT_FILE"
            sudo bash -c "echo '[Service]' >> $UNIT_FILE"
            sudo bash -c "echo 'Type=simple' >> $UNIT_FILE"
            sudo bash -c "echo 'User=root' >> $UNIT_FILE"
            sudo bash -c "echo 'WorkingDirectory=/var/www/mindgarden-dev' >> $UNIT_FILE"
            # 🔒 이중 안전망: start.sh 의 set -a/source 패턴이 회귀하더라도 systemd 가 dev.env 의 모든 키를 환경변수로 로드
            # (- 접두사 = 파일 없으면 무시, 운영 unit 및 config/systemd/mindgarden-dev.service 와 동일한 패턴)
            sudo bash -c "echo 'EnvironmentFile=-/etc/mindgarden/dev.env' >> $UNIT_FILE"
            sudo bash -c "echo 'Environment=JAVA_OPTS=\"-Xms1g -Xmx4g -XX:+UseG1GC\"' >> $UNIT_FILE"
            sudo bash -c "echo 'ExecStart=/opt/mindgarden/start.sh' >> $UNIT_FILE"
            sudo bash -c "echo 'Restart=always' >> $UNIT_FILE"
            sudo bash -c "echo 'RestartSec=10' >> $UNIT_FILE"
            sudo bash -c "echo 'TimeoutStartSec=120' >> $UNIT_FILE"
            # Spring Boot graceful shutdown 여유 (application.yml lifecycle 30s + scheduler await 25s)
            sudo bash -c "echo 'TimeoutStopSec=120' >> $UNIT_FILE"
            sudo bash -c "echo 'StandardOutput=journal' >> $UNIT_FILE"
            sudo bash -c "echo 'StandardError=journal' >> $UNIT_FILE"
            sudo bash -c "echo 'SyslogIdentifier=mindgarden-dev' >> $UNIT_FILE"
            sudo bash -c "echo '' >> $UNIT_FILE"
            sudo bash -c "echo '[Install]' >> $UNIT_FILE"
            sudo bash -c "echo 'WantedBy=multi-user.target' >> $UNIT_FILE"
            sudo systemctl daemon-reload
            sudo systemctl enable mindgarden-dev.service
            # 회귀 즉시 감지: EnvironmentFile 라인이 실제 작성되었는지 검증
            if ! sudo grep -q '^EnvironmentFile=-/etc/mindgarden/dev.env$' "$UNIT_FILE"; then
              echo "::error::fallback systemd unit 에 EnvironmentFile=-/etc/mindgarden/dev.env 가 누락되었습니다. start.sh 의 source 가 회귀할 경우 ENV 가 전달되지 않아 기동 실패합니다."
              sudo cat "$UNIT_FILE" || true
              exit 1
            fi
            echo "✅ 기본 systemd 서비스 파일 생성 완료 (EnvironmentFile=/etc/mindgarden/dev.env 이중 안전망 포함)"
          fi
          
          # 서비스 재시작
          echo "🔄 개발 서버 서비스 재시작..."
          sudo systemctl daemon-reload
          
          # 🔧 서비스 중지 전 DB 연결 정리 (Too many connections 오류 방지)
          echo "🔧 서비스 중지 전 DB 연결 정리..."
          if [ -f /opt/mindgarden/scripts/development/utilities/cleanup-db-connections.sh ]; then
            source /etc/mindgarden/dev.env || true
            echo "y" | /opt/mindgarden/scripts/development/utilities/cleanup-db-connections.sh || true
          else
            echo "⚠️ 연결 정리 스크립트를 찾을 수 없습니다"
          fi
          
          # 서비스 중지 (systemd가 자동으로 프로세스 종료 처리)
          echo "🛑 서비스 중지 중..."
          if sudo systemctl is-active --quiet mindgarden-dev.service; then
            sudo systemctl stop mindgarden-dev.service || true
            # 서비스가 완전히 중지될 때까지 대기 (최대 30초)
            for i in {1..30}; do
              if ! sudo systemctl is-active --quiet mindgarden-dev.service; then
                echo "✅ 서비스 중지 완료"
                break
              fi
              sleep 1
            done
            # 추가 안정화 대기 (연결 정리 시간 확보)
            sleep 5
          else
            echo "ℹ️ 서비스가 이미 중지되어 있음"
          fi
          
          # 포트 확인 (systemd가 프로세스를 종료했으므로 포트는 비어있어야 함)
          echo "🔍 포트 8080 확인..."
          PORT_CHECK=$(sudo lsof -ti:8080 2>/dev/null || true)
          if [ ! -z "$PORT_CHECK" ]; then
            echo "⚠️ 포트 8080이 여전히 사용 중입니다. systemd 서비스 외 프로세스일 수 있습니다."
            echo "   포트를 사용하는 프로세스: $PORT_CHECK"
            # systemd 서비스가 아닌 프로세스만 강제 종료 (선택적)
            # sudo fuser -k 8080/tcp 2>/dev/null || true
            # sleep 2
          else
            echo "✅ 포트 8080 준비 완료"
          fi
          
          # 서비스 시작
          echo "🚀 서비스 시작 중..."
          sudo systemctl start mindgarden-dev.service
          
          # Flyway·Hibernate·PlSql 초기화 여유 (첫 헬스 폴링 전 워밍업)
          echo "⏳ JVM·Flyway 초기화 워밍업 45초..."
          sleep 45
          
          # 헬스 폴링 (최대 600초, 60초마다 진행 로그·journal 스니펫)
          echo "⏳ actuator/health 대기 중 (최대 600초)..."
          SERVICE_STARTED=false
          for i in $(seq 1 600); do
            if curl -f -s --connect-timeout 3 --max-time 12 http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "✅ 서비스 및 애플리케이션 시작 완료 (${i}초 소요, 워밍업 45초 포함)"
              SERVICE_STARTED=true
              break
            fi
            if ! sudo systemctl is-active --quiet mindgarden-dev.service; then
              if [ "$i" -gt 60 ]; then
                echo "❌ systemd 비활성(크래시·실패 추정) — ${i}초 경과"
                sudo journalctl -u mindgarden-dev.service --no-pager -n 120 || true
                break
              fi
            fi
            if [ $((i % 60)) -eq 0 ]; then
              echo "⏳ 헬스 대기 중... ${i}/600초 (systemd=$(sudo systemctl is-active mindgarden-dev.service 2>/dev/null || echo unknown))"
              sudo journalctl -u mindgarden-dev.service --no-pager -n 8 2>/dev/null | tail -5 || true
            fi
            sleep 1
          done
          
          if [ "$SERVICE_STARTED" = false ]; then
            echo "⚠️ 600초 내 헬스 미응답 — 상태·로그 확인"
            sudo journalctl -u mindgarden-dev.service --no-pager -n 150 || true
          fi
          
          # 서비스 상태 확인
          echo "🔍 서비스 상태 확인..."
          sudo systemctl status mindgarden-dev.service --no-pager | head -20
          
          if [ "$SERVICE_STARTED" = true ] && sudo systemctl is-active --quiet mindgarden-dev.service; then
            echo "✅ 개발 서버 서비스 정상 시작됨 (actuator/health 확인됨)"
          else
            echo "❌ 서비스 시작 실패 - 롤백 후 로그 확인..."
            LATEST_BACKUP=$(ls -t /var/www/mindgarden-dev/backups/app.jar.backup.* 2>/dev/null | head -1)
            if [ -n "$LATEST_BACKUP" ] && [ -f "$LATEST_BACKUP" ]; then
              echo "🔄 이전 JAR로 롤백 중: $LATEST_BACKUP"
              cp "$LATEST_BACKUP" /var/www/mindgarden-dev/app.jar
              sudo systemctl restart mindgarden-dev.service
              sleep 15
              if curl -f -s --connect-timeout 3 --max-time 8 http://localhost:8080/actuator/health > /dev/null 2>&1; then
                echo "✅ 롤백 후 서비스 정상 기동됨"
              fi
            fi
            sudo journalctl -u mindgarden-dev.service --no-pager -n 100 || true
            exit 1
          fi
          
    # ============================================================================
    # [P0 hotfix 2026-06-08] Apple SIWA env 자동 주입 + 검증 (개발)
    # GitHub Secrets(APPLE_*) → /etc/mindgarden/dev.env 멱등 갱신 + 단일 unit 재시작 + env 검증.
    # 가이드: docs/project-management/2026-06-04/APPLE_T1_OPS_ENV_INJECTION_GUIDE.md §1.1 (자동화 완료).
    # 운영(deploy-production.yml) 의 동일 step 과 패턴 일치 — dev 는 단일 systemd unit.
    # ============================================================================
    - name: 🍎 Apple SIWA env 자동 주입 + 검증
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 120s
        command_timeout: 10m
        # appleboy/ssh-action envs: 워크플로 env(=GitHub Secrets) 를 SSH 세션으로 export
        envs: APPLE_CLIENT_ID,APPLE_TEAM_ID,APPLE_KEY_ID,APPLE_PRIVATE_KEY,APPLE_REDIRECT_URI,APPLE_ALLOWED_AUDIENCES
        script: |
          # set -e 비활성 — env 주입 실패가 전체 배포 실패로 전파되지 않도록
          DEV_ENV_FILE=/etc/mindgarden/dev.env
          UNIT=mindgarden-dev.service
          APPLE_KEYS="APPLE_CLIENT_ID APPLE_TEAM_ID APPLE_KEY_ID APPLE_PRIVATE_KEY APPLE_REDIRECT_URI APPLE_ALLOWED_AUDIENCES"
          
          # 0) 사전 검증 — 6종 모두 있는지
          MISSING_SECRET=0
          for k in $APPLE_KEYS; do
            eval "v=\${$k}"
            if [ -z "$v" ]; then
              MISSING_SECRET=$((MISSING_SECRET+1))
            fi
          done
          if [ "$MISSING_SECRET" -gt 0 ]; then
            echo "::notice title=Apple SIWA env skip::GitHub Secrets 의 APPLE_* 6종 중 $MISSING_SECRET 개가 비어 있어 dev.env 갱신을 skip 합니다. https://github.com/${{ github.repository }}/settings/secrets/actions 확인 필요."
            exit 0
          fi
          
          # 1) 파일 존재 보장 + 백업
          if [ ! -f "$DEV_ENV_FILE" ]; then
            echo "::warning title=dev.env 누락::$DEV_ENV_FILE 가 없어 신규 생성합니다."
            sudo mkdir -p /etc/mindgarden
            sudo touch "$DEV_ENV_FILE"
            sudo chmod 600 "$DEV_ENV_FILE"
            sudo chown root:root "$DEV_ENV_FILE"
          fi
          BACKUP_FILE="${DEV_ENV_FILE}.bak.$(date +%Y%m%d_%H%M%S)"
          sudo cp -p "$DEV_ENV_FILE" "$BACKUP_FILE" 2>/dev/null || true
          echo "📦 백업: $BACKUP_FILE"
          
          # 2) 멱등 KEY="VALUE" 갱신 (운영 워크플로와 동일 로직)
          update_env() {
            local key="$1"
            local value="$2"
            local escaped_value
            escaped_value=$(printf '%s' "$value" | sed -e 's/[\\&|]/\\&/g')
            if sudo grep -qE "^[[:space:]]*${key}=" "$DEV_ENV_FILE" 2>/dev/null; then
              sudo sed -i "s|^[[:space:]]*${key}=.*|${key}=\"${escaped_value}\"|" "$DEV_ENV_FILE"
            else
              printf '%s="%s"\n' "$key" "$value" | sudo tee -a "$DEV_ENV_FILE" >/dev/null
            fi
          }
          
          echo "🔐 dev.env Apple SIWA 6종 멱등 갱신 시작"
          update_env APPLE_CLIENT_ID         "$APPLE_CLIENT_ID"
          update_env APPLE_TEAM_ID           "$APPLE_TEAM_ID"
          update_env APPLE_KEY_ID            "$APPLE_KEY_ID"
          update_env APPLE_REDIRECT_URI      "$APPLE_REDIRECT_URI"
          update_env APPLE_ALLOWED_AUDIENCES "$APPLE_ALLOWED_AUDIENCES"
          # PEM 은 systemd EnvironmentFile 호환 위해 한 줄로 (Spring 측에서 \s+ 제거 후 base64 디코드)
          PEM_ONELINE=$(printf '%s' "$APPLE_PRIVATE_KEY" | tr -d '\n\r')
          update_env APPLE_PRIVATE_KEY "$PEM_ONELINE"
          
          # 3) 권한 보호
          sudo chmod 600 "$DEV_ENV_FILE"
          sudo chown root:root "$DEV_ENV_FILE"
          
          # 4) 값 노출 없이 길이만 표시
          echo "✅ dev.env Apple SIWA 6종 갱신 완료 — 길이만 표시:"
          sudo grep -E "^APPLE_" "$DEV_ENV_FILE" \
            | awk -F= '{key=$1; rest=substr($0, length(key)+2); gsub(/^"|"$/, "", rest); printf "   %s = (%d chars)\n", key, length(rest)}'
          
          # 5) 변경 마커 작성 — 4개 env step 이후 단일 통합 restart step 이 1회만 systemctl restart 수행.
          # [P2 2026-06-11] 5+ restart → 1회 통합으로 transient 502 차단.
          # 기존: 각 env step 이 sudo systemctl restart + sleep 15 → BE 부팅(~60s) 보다 짧아
          #       restart 직후 외부 요청이 들어오면 nginx 8080 proxy 가 502 반환.
          # 변경: dev.env 갱신만 수행 + 마커 파일 작성 → 통합 restart step 이 마커 존재 시 1회 restart + 300s 헬스 폴링.
          # 프로세스 env 검증(APPLE_*) 은 통합 restart step 으로 이관 — restart 미적용 상태에서는 의미 없음.
          sudo touch /tmp/mindgarden-dev-env-pending-restart
          echo "📝 변경 마커 작성: /tmp/mindgarden-dev-env-pending-restart (통합 restart step 에서 APPLE_* 6종 일괄 반영·검증)"
