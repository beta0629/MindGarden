# ============================================
# 개발 서버 통합 Nginx 설정 파일
# 서버 IP: 114.202.247.246
# 업데이트: 2025-12-11 - SSL 인증서 자동 발급 트리거
# ============================================
# 이 파일은 모든 개발 서버 도메인을 포함합니다:
# - dev.core-solution.co.kr
# - api.dev.core-solution.co.kr
# - dev.e-trinity.co.kr
# - apply.dev.e-trinity.co.kr
# - ops.dev.e-trinity.co.kr
# - *.dev.core-solution.co.kr (테넌트 서브도메인)
# ============================================

# ============================================
# 개발 서버: dev.core-solution.co.kr
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name dev.core-solution.co.kr;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dev.core-solution.co.kr;

    ssl_certificate /etc/letsencrypt/live/dev.core-solution.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.core-solution.co.kr/privkey.pem;

    # SSL 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 보안 헤더
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 프론트엔드 파일 서빙 (SPA 라우팅 지원)
    location / {
        root /var/www/html-dev;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # 개발 환경: 캐싱 비활성화
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    
    # 정적 파일 캐싱 (JS, CSS, 이미지 등)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /var/www/html-dev;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
    
    # 백엔드 API 프록시
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # 타임아웃 설정 (온보딩 프로세스가 오래 걸릴 수 있으므로 120초로 증가)
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        # WebSocket 지원
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 버퍼링 비활성화
        proxy_buffering off;
        proxy_request_buffering off;
    }
    
    # Actuator 프록시
    location /actuator/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 로그 설정
    access_log /var/log/nginx/dev.core-solution.co.kr.access.log;
    error_log /var/log/nginx/dev.core-solution.co.kr.error.log;
}

