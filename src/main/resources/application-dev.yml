# 개발 서버(dev 프로파일) 전용 설정
# 배포: mindgarden-dev.service, /var/www/mindgarden-dev
# OAuth2 redirect 등 기본값으로 기동 보장 (환경 변수 미설정 시에도 기동)
# 배포 후 Flyway V20260330_001 적용 및 clients.phone DDL(길이) 확인 권장 — 미적용 시 phone truncation 재발 가능

# 서버 기준 URL (Spring OAuth2 registration.redirect-uri, 토큰 교환 등)
# 네이버·카카오 개발자센터 Callback은 dev apex 한 줄과 문자열 일치 필요:
#   https://dev.core-solution.co.kr/api/auth/{naver|kakao}/callback
# 테넌트 프론트는 *.dev.core-solution.co.kr 이더라도 위 호스트를 쓰면 됨(OAuth2DomainUtil이 동적 생성 시에도 동일 apex로 수렴).
server:
  base-url: ${OAUTH2_BASE_URL:https://dev.core-solution.co.kr}
  servlet:
    session:
      cookie:
        # 루트 도메인(dev) 콜백 사용 시, 서브도메인(mindgarden 등)에서도 세션 공유
        # RFC 6265: 선행 점(.) 불허 → dev.core-solution.co.kr 사용 시에도 서브도메인에 쿠키 전송됨
        domain: ${SESSION_COOKIE_DOMAIN:dev.core-solution.co.kr}

# JWT/암호화 키: dev에서 미설정 시 기본값으로 기동 가능 (검증기는 dev 한정 완화)
jwt:
  secret: ${JWT_SECRET:dev-jwt-secret-key-for-development-server-only-32chars}

encryption:
  personal-data:
    key: ${PERSONAL_DATA_ENCRYPTION_KEY:dev-encryption-key-32-bytes-long!!!!}
    iv: ${PERSONAL_DATA_ENCRYPTION_IV:dev-iv-16-bytes!!}

# OAuth2 클라이언트 등록 (Google/Apple redirect-uri 기본값)
# authorization-grant-type 미설정 시 authorizationGrantType cannot be null 기동 실패
# Apple은 CommonOAuth2Provider에 없어 provider 수동 정의 필요 (provider-id 미지정 시 기동 실패)
spring:
  security:
    oauth2:
      # 개발 파이프라인: *.dev.core-solution.co.kr 우선 매칭 → dev apex / 그 외 *.core-solution.co.kr → 운영 apex(폴백)
      domain:
        main-domains: dev.core-solution.co.kr,core-solution.co.kr
        subdomain-patterns: "^dev\\.core-solution\\.co\\.kr$,.*\\.dev\\.core-solution\\.co\\.kr,.*\\.core-solution\\.co\\.kr"
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy}
            redirect-uri: "${server.base-url}/api/auth/google/callback"
            client-authentication-method: post
            authorization-grant-type: authorization_code
            client-name: Google
          apple:
            client-id: ${APPLE_CLIENT_ID:dummy}
            client-secret: ${APPLE_CLIENT_SECRET:dummy}
            scope: name,email
            redirect-uri: "${server.base-url}/api/auth/apple/callback"
            client-authentication-method: post
            authorization-grant-type: authorization_code
            client-name: Apple
        provider:
          apple:
            authorization-uri: https://appleid.apple.com/auth/authorize
            token-uri: https://appleid.apple.com/auth/token
            user-info-uri: https://appleid.apple.com/auth/userinfo
            user-name-attribute: sub
  # 온보딩 승인·시딩 장시간 작업: 베이스 application.yml Hikari 위 dev 추가 완화
  datasource:
    hikari:
      maximum-pool-size: 10
      leak-detection-threshold: 180000

  # Flyway (dev 프로파일 명시 오버라이드 — 베이스 application.yml 기본값과 동일하나, dev 함정 재발 방지 위해 명시)
  # - 2026-05-22 사고: DEV DB 최상위가 V20260525_001 인 상태에서 V20260522_003/004 가 영원히 무시됨(out-of-order 미설정 기본=false).
  # - 본 키로 같은 함정 재발 시 즉시 적용 보장.
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    out-of-order: ${SPRING_FLYWAY_OUT_OF_ORDER:true}
    validate-on-migrate: ${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:false}

# Ops Portal 관리자 (환경변수로 주입, -D 인자 제거로 ps/journalctl 노출 방지)
ops:
  admin:
    userId: ${OPS_ADMIN_USERNAME:ops_core}
    username: ${OPS_ADMIN_USERNAME:ops_core}
    password: ${OPS_ADMIN_PASSWORD:godgod826!}
    role: ${OPS_ADMIN_ROLE:HQ_ADMIN}

# 심리검사 이미지 OCR (Tesseract) — dev 로컬 예시
# tessdata 디렉터리 경로. 미설정 시 application.yml의 TESSDATA_PREFIX 환경 변수 사용.
# 예: macOS Homebrew → /opt/homebrew/share/tessdata 또는 /usr/local/share/tessdata
# psych:
#   assessment:
#     tesseract:
#       datapath: /opt/homebrew/share/tessdata

# ─────────────────────────────────────────────────────────────────
# DEV 발송 차단 게이트 (운영 중복 발송 방지) — 2026-06-02 사용자 P0 보고 반영
#
# 배경:
# - 개발 서버(beta0629.cafe24.com)와 운영 서버(beta74.cafe24.com)가 동일한 솔라피
#   API 키 (SMS_API_KEY) 와 동일한 카카오 PFID (SOLAPI_ALIMTALK_PFID) 를 공유.
# - dev DB 와 prod DB 는 분리되어 있어도, 동일 client phone 번호로 양쪽 스케줄러가
#   동시에 외부 발송하면 사용자에게 같은 알림이 2번 도달함 (D-2 09:00 KST 배치 등).
# - 운영(prod)에서는 prod-from-dev.env 가 명시적으로 SMS_TEST_MODE=false /
#   KAKAO_ALIMTALK_ENABLED=true 로 override 하므로 영향 없음.
#
# 가드 3개 (모두 env 우선, 미설정 시 안전 default 적용):
# 1) sms.auth.test-mode=true  → SmsAuthService.sendNotificationMessage 가 외부 호출 스킵
# 2) kakao.alimtalk.enabled=false → KakaoAlimTalkServiceImpl 진입 즉시 차단
# 3) notification.batch.reservation-reminder-enabled=false → D-2 스케줄러 빈 등록 차단
#
# 부활이 필요한 경우(예: 솔라피 검수용 dev 라이브 모드):
#   /etc/mindgarden/dev.env 에 위 env 를 명시적으로 설정 후 systemctl restart mindgarden-dev.
#   운영 발송과 시간대를 분리해 일시적으로만 사용 권장.
# ─────────────────────────────────────────────────────────────────
sms:
  auth:
    test-mode: ${SMS_TEST_MODE:true}

kakao:
  alimtalk:
    enabled: ${KAKAO_ALIMTALK_ENABLED:false}

notification:
  batch:
    reservation-reminder-enabled: ${NOTIFICATION_BATCH_RESERVATION_REMINDER_ENABLED:false}
