# Ops Portal 백엔드(backend-ops) 운영 배포 초안
#
# deploy-production.yml 은 MindGarden 코어 JAR만 배포하며 backend-ops 는 포함하지 않음.
# Nginx(core-solution-prod.conf): ops.e-trinity.co.kr·apply.e-trinity.co.kr 의 /api/ 가 127.0.0.1:8080 프록시.
# 동일 호스트에서 mindgarden.service(코어)가 이미 8080을 쓰면 충돌 — e-trinity 전용 VM 이거나 코어 미기동 호스트에서만 안전.
#
# 최초 1회(수동): /var/www/ops-backend 디렉터리, systemd ops-backend.service,
#   EnvironmentFile=/etc/ops-backend/prod.env (backend-ops/env.production.example 참고) 준비.
#
# Repository secrets (필수): PRODUCTION_HOST, PRODUCTION_USER, PRODUCTION_SSH_KEY
# JAR 업로드 경로: /var/www/ops-backend/app.jar (restart 시 이 경로 사용)

name: 🔧 Ops 백엔드 운영 배포

on:
  push:
    branches: [main]
    paths:
      - "backend-ops/**"
      - ".github/workflows/deploy-ops-backend-prod.yml"
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "체크아웃할 Git ref (운영은 main만 허용)"
        required: false
        default: "main"
        type: string

jobs:
  deploy-ops-backend-prod:
    name: 🏗️ Ops 백엔드 Gradle 빌드 및 운영 배포
    runs-on: ubuntu-latest

    steps:
      - name: 🛡️ 운영 배포 ref 가드 (main만 허용)
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DREF="${{ github.event.inputs.deploy_ref }}"
            DREF="${DREF:-main}"
          else
            DREF="${{ github.ref_name }}"
          fi
          if [ "$DREF" != "main" ]; then
            echo "::error::운영 배포는 main 브랜치만 허용됩니다. 선택된 ref: $DREF"
            exit 1
          fi
          echo "deploy_ref=$DREF" >> "$GITHUB_OUTPUT"
          echo "이벤트=${{ github.event_name }} 배포 ref=$DREF"

      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.guard.outputs.deploy_ref }}

      - name: ☕ Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Grant execute permission for gradlew
        working-directory: backend-ops
        run: chmod +x gradlew

      - name: 🏗️ Ops 백엔드 빌드 (bootJar)
        working-directory: backend-ops
        run: ./gradlew clean bootJar --no-daemon

      - name: 🔍 boot JAR 경로 확인
        id: jar
        working-directory: backend-ops
        run: |
          JAR=$(ls build/libs/*.jar 2>/dev/null | grep -v plain | head -n1)
          if [ -z "$JAR" ] || [ ! -f "$JAR" ]; then
            echo "❌ boot JAR 를 찾을 수 없습니다 (build/libs/*.jar)"
            ls -la build/libs/ 2>/dev/null || true
            exit 1
          fi
          echo "✅ JAR: backend-ops/$JAR"
          echo "jar_path=backend-ops/$JAR" >> "$GITHUB_OUTPUT"

      - name: 🔍 운영 서버 SSH 연결 테스트
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: 22
          timeout: 30s
          script: |
            echo "SSH 연결 테스트 성공: $(date)"

      - name: 💾 배포 전 JAR 백업 (운영 서버)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: 22
          timeout: 60s
          script: |
            sudo mkdir -p /var/www/backups/ops-backend
            sudo mkdir -p /var/www/ops-backend
            OPS_BASE="/var/www/ops-backend"
            if [ -f "$OPS_BASE/app.jar" ]; then
              BACKUP_NAME="ops-backend-$(date +%Y%m%d_%H%M%S).jar"
              echo "💾 기존 app.jar 백업"
              sudo cp -a "$OPS_BASE/app.jar" "/var/www/backups/ops-backend/$BACKUP_NAME"
              ls -lh "/var/www/backups/ops-backend/$BACKUP_NAME"
            else
              echo "ℹ️ 기존 app.jar 없음 (최초 배포)"
            fi
            BACKUP_RETENTION_COUNT=5
            ls -1t /var/www/backups/ops-backend/ops-backend-*.jar 2>/dev/null | tail -n +$((BACKUP_RETENTION_COUNT + 1)) | xargs -r sudo rm -f

      - name: 📤 Ops 백엔드 JAR 업로드
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: 22
          timeout: 120s
          source: ${{ steps.jar.outputs.jar_path }}
          target: "/var/www/ops-backend/"
          strip_components: 3
          overwrite: true

      - name: 🔄 JAR를 app.jar 로 정리 및 서비스 재시작
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          script: |
            OPS_BASE="/var/www/ops-backend"
            sudo mkdir -p "$OPS_BASE"
            # SCP는 backend-ops-0.1.0.jar 같은 이름으로 둘 수 있음 → app.jar 로 통일
            MAIN_JAR=$(ls -1 "$OPS_BASE"/backend-ops-*.jar 2>/dev/null | head -n1)
            if [ -z "$MAIN_JAR" ]; then
              MAIN_JAR=$(ls -1 "$OPS_BASE"/*.jar 2>/dev/null | grep -v app.jar | head -n1)
            fi
            if [ -z "$MAIN_JAR" ] || [ ! -f "$MAIN_JAR" ]; then
              echo "❌ 업로드된 JAR 를 찾을 수 없습니다: $OPS_BASE"
              ls -la "$OPS_BASE" || true
              exit 1
            fi
            sudo mv "$MAIN_JAR" "$OPS_BASE/app.jar"
            sudo chmod +x "$OPS_BASE/app.jar" || true
            sudo chown root:root "$OPS_BASE/app.jar" || true

            if sudo systemctl list-unit-files | grep -q '^ops-backend.service'; then
              echo "🔄 ops-backend.service 재시작"
              sudo systemctl restart ops-backend.service
              sleep 10
              sudo systemctl is-active --quiet ops-backend.service && echo "✅ ops-backend 실행 중" || { echo "❌ ops-backend 기동 실패"; sudo systemctl status ops-backend.service --no-pager -l | head -40; exit 1; }
            else
              echo "::warning::ops-backend.service 가 없습니다. JAR 만 배치했습니다 (/var/www/ops-backend/app.jar). systemd 유닛을 생성한 뒤 재실행하세요."
            fi

      - name: 🏥 Actuator 헬스체크 (localhost:8080)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: 22
          timeout: 30s
          script: |
            if ! sudo systemctl is-active --quiet ops-backend.service 2>/dev/null; then
              echo "⚠️ ops-backend.service 가 동작 중이 아님 — 다른 프로세스가 8080을 점유했는지 확인 (헬스 스킵)"
              exit 0
            fi
            for i in {1..3}; do
              if curl -f -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/actuator/health | grep -qE "200"; then
                echo "✅ localhost:8080 actuator 헬스 성공"
                curl -s http://127.0.0.1:8080/actuator/health | head -5
                exit 0
              fi
              echo "⏳ 재시도 $i/3..."
              sleep 5
            done
            echo "⚠️ actuator 헬스 실패 — 로그 및 EnvironmentFile 확인"
