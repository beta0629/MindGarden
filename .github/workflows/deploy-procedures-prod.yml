# SSH: PRODUCTION_* (필수). DB: PRODUCTION_DB_* 우선, 비어 있으면 DEV_DB_* → 스크립트 기본값(개발 서버 DB와 동일).
# refs: deploy-procedures-dev.yml, deploy-standardized-procedures.sh prod 분기

name: 📦 표준화된 프로시저 배포 (운영)

on:
  workflow_dispatch:  # 수동 실행만 가능

jobs:
  deploy-procedures:
    name: 🚀 프로시저 배포
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 🔧 배포용 프로시저 파일 생성
      run: |
        chmod +x database/schema/procedures_standardized/create_deployment_files.sh
        bash database/schema/procedures_standardized/create_deployment_files.sh

    - name: 🔑 known_hosts 추가 (Host key verification 방지)
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H "${{ secrets.PRODUCTION_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
    
    - name: 📤 프로시저 배포
      run: |
        export PROD_SERVER_HOST="${{ secrets.PRODUCTION_HOST }}"
        export PROD_SERVER_USER="${{ secrets.PRODUCTION_USER }}"
        export PROD_DB_HOST="${{ secrets.PRODUCTION_DB_HOST }}"
        [ -z "$PROD_DB_HOST" ] && export PROD_DB_HOST="${{ secrets.DEV_DB_HOST }}"
        export PROD_DB_USER="${{ secrets.PRODUCTION_DB_USER }}"
        [ -z "$PROD_DB_USER" ] && export PROD_DB_USER="${{ secrets.DEV_DB_USER }}"
        export PROD_DB_PASSWORD="${{ secrets.PRODUCTION_DB_PASSWORD }}"
        [ -z "$PROD_DB_PASSWORD" ] && export PROD_DB_PASSWORD="${{ secrets.DEV_DB_PASSWORD }}"
        export PROD_DB_NAME="${{ secrets.PRODUCTION_DB_NAME }}"
        [ -z "$PROD_DB_NAME" ] && export PROD_DB_NAME="${{ secrets.DEV_DB_NAME }}"

        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/prod_ci_key
        chmod 600 ~/.ssh/prod_ci_key
        eval "$(ssh-agent -s)"
        ssh-add ~/.ssh/prod_ci_key
        chmod +x scripts/automation/deployment/deploy-standardized-procedures.sh
        bash scripts/automation/deployment/deploy-standardized-procedures.sh prod
