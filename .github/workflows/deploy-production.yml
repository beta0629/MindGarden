    - name: 📦 표준 프로시저 배포 (운영 MySQL, 배포 통합)
      run: |
        set -euo pipefail
        if [ -z "${{ secrets.PRODUCTION_DB_PASSWORD }}" ]; then
          echo "::notice::PRODUCTION_DB_PASSWORD 가 비어 있어 표준 프로시저 배포를 건너뜁니다. Secret 등록 시 이후 운영 배포마다 자동 적용됩니다."
