name: 📦 표준화된 프로시저 배포 (운영)

on:
  workflow_dispatch:  # 수동 실행만 가능

jobs:
  deploy-procedures:
    name: 🚀 프로시저 배포
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 🔧 배포용 프로시저 파일 생성
      run: |
        chmod +x database/schema/procedures_standardized/create_deployment_files.sh
        bash database/schema/procedures_standardized/create_deployment_files.sh
      
    - name: 📤 프로시저 배포
      env:
        PROD_SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
        PROD_SERVER_USER: ${{ secrets.PROD_SERVER_USER }}
        PROD_DB_HOST: ${{ secrets.PROD_DB_HOST }}
        PROD_DB_USER: ${{ secrets.PROD_DB_USER }}
        PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
        PROD_DB_NAME: ${{ secrets.PROD_DB_NAME }}
      run: |
        chmod +x scripts/automation/deployment/deploy-standardized-procedures.sh
        bash scripts/automation/deployment/deploy-standardized-procedures.sh prod

