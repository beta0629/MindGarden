name: 🌟 Trinity 프론트엔드 개발 서버 배포

on:
  push:
    branches: [ develop ]
    paths:
      - 'frontend-trinity/**'
      - '.github/workflows/deploy-trinity-dev.yml'
  workflow_dispatch:
    # 수동 실행 가능

jobs:
  deploy-trinity:
    name: 🏗️ Trinity 프론트엔드 빌드 및 배포
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 📦 Node.js 18 설정
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend-trinity/package-lock.json
        
    - name: 📦 Trinity 프론트엔드 의존성 설치
      run: |
        cd frontend-trinity
        npm ci
        
    - name: 🏗️ Trinity 프론트엔드 빌드
      run: |
        cd frontend-trinity
        ESLINT_NO_DEV_ERRORS=true npm run build
        
    - name: 🔍 Trinity 프론트엔드 빌드 결과 확인
      run: |
        echo "🔍 Trinity 프론트엔드 빌드 결과 확인..."
        if [ -d frontend-trinity/out ]; then
          FILE_COUNT=$(find frontend-trinity/out -type f 2>/dev/null | wc -l)
          if [ "$FILE_COUNT" -gt 0 ]; then
            echo "✅ frontend-trinity/out 디렉토리 생성됨: $FILE_COUNT 개 파일"
            ls -lh frontend-trinity/out/ | head -10
          else
            echo "❌ frontend-trinity/out 디렉토리가 비어있음!"
            exit 1
          fi
        else
          echo "❌ frontend-trinity/out 디렉토리 없음!"
          exit 1
        fi
        
    - name: 🔍 개발 서버 SSH 연결 테스트
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 30s
        script: |
          echo "SSH 연결 테스트 성공: $(date)"
          echo "서버 정보: $(uname -a)"
          
    - name: 💾 배포 전 기존 파일 백업
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 60s
        script: |
          # 백업 디렉토리 생성
          sudo mkdir -p /var/www/backups/html-trinity
          
          # 기존 파일 백업 (존재하는 경우)
          if [ -d /var/www/html-trinity ] && [ "$(ls -A /var/www/html-trinity 2>/dev/null)" ]; then
            BACKUP_NAME="html-trinity-backup-$(date +%Y%m%d_%H%M%S).tar.gz"
            echo "💾 기존 파일 백업 중: $BACKUP_NAME"
            sudo tar -czf /var/www/backups/html-trinity/$BACKUP_NAME -C /var/www html-trinity
            echo "✅ 백업 완료: $BACKUP_NAME"
            ls -lh /var/www/backups/html-trinity/$BACKUP_NAME
          else
            echo "ℹ️ 백업할 기존 파일 없음 (신규 배포)"
          fi
          
    - name: 📤 Trinity 프론트엔드 파일 업로드 SCP (개발 서버)
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 120s
        source: "frontend-trinity/out/*"
        target: "/var/www/html-trinity/"
        strip_components: 2
        overwrite: true
        
    - name: 🔄 Trinity 프론트엔드 배포 완료 및 검증
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 60s
        script: |
          # 디렉토리 생성 및 권한 설정
          sudo mkdir -p /var/www/html-trinity
          sudo chown -R www-data:www-data /var/www/html-trinity
          sudo chmod -R 755 /var/www/html-trinity
          
          # 배포된 파일 확인
          echo "🔍 배포된 파일 확인..."
          if [ -d /var/www/html-trinity ]; then
            FILE_COUNT=$(find /var/www/html-trinity -type f 2>/dev/null | wc -l)
            if [ "$FILE_COUNT" -gt 0 ]; then
              echo "✅ 배포 완료: $FILE_COUNT 개 파일"
              echo "주요 파일:"
              ls -lh /var/www/html-trinity/ | head -10
              
              # index.html 존재 확인
              if [ -f /var/www/html-trinity/index.html ]; then
                echo "✅ index.html 확인됨"
                echo "파일 크기: $(stat -c%s /var/www/html-trinity/index.html) bytes"
              else
                echo "⚠️ index.html 없음!"
                exit 1
              fi
            else
              echo "❌ 배포된 파일 없음!"
              exit 1
            fi
          else
            echo "❌ 배포 디렉토리 없음!"
            exit 1
          fi
          
          echo "✅ Trinity 프론트엔드 배포 완료"
          
    - name: 🏥 배포 후 헬스체크
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 30s
        script: |
          echo "🏥 헬스체크 시작..."
          sleep 3
          
          # Nginx 설정 테스트
          if sudo nginx -t 2>/dev/null; then
            echo "✅ Nginx 설정 정상"
          else
            echo "⚠️ Nginx 설정 오류 (계속 진행)"
          fi
          
          # 웹사이트 접근 테스트 (온보딩 도메인)
          for i in {1..3}; do
            if curl -f -s -o /dev/null -w "%{http_code}" https://apply.dev.e-trinity.co.kr | grep -q "200\|301\|302"; then
              echo "✅ 웹사이트 접근 성공 (시도 $i)"
              curl -s -I https://apply.dev.e-trinity.co.kr | head -5
              exit 0
            else
              echo "⏳ 헬스체크 대기 중... (시도 $i/3)"
              sleep 5
            fi
          done
          
          # 회사 홈페이지 도메인도 테스트
          for i in {1..3}; do
            if curl -f -s -o /dev/null -w "%{http_code}" https://dev.e-trinity.co.kr | grep -q "200\|301\|302"; then
              echo "✅ 웹사이트 접근 성공 (시도 $i)"
              curl -s -I https://dev.e-trinity.co.kr | head -5
              exit 0
            else
              echo "⏳ 헬스체크 대기 중... (시도 $i/3)"
              sleep 5
            fi
          done
          
          echo "⚠️ 헬스체크 실패 - 수동 확인 필요"
          echo "도메인: https://apply.dev.e-trinity.co.kr, https://dev.e-trinity.co.kr"
