    # ============================================================================
    # [2026-06-12 SSOT 통합] NCP SENS env 자동 주입 step 폐기.
    # PR #227 (NCP SENS SignatureV2 정식 호출) + 다중 어댑터(NhnSmsProvider) 폐기.
    # SmsGatewayServiceImpl 은 SolapiSmsProvider 단일 호출로 통합됨.
    # 솔라피 자격 증명은 scripts/deployment/sync-solapi-sms-env.sh 가 운영 환경 동기화를 담당.
