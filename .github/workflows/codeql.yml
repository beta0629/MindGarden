name: 🔒 CodeQL 보안 분석
# AI 모니터링 Phase 1 — GitHub 무료 보안 분석 (카드 등록 불필요)
# 참고: docs/project-management/2026-06-11/AI_MONITORING_ROADMAP.md §6 Phase 1 — P1-5
#
# - Java + JavaScript/TypeScript 동시 분석 (matrix)
# - PR/push 트리거 + 매주 일요일 18:00 UTC (= 03:00 KST 월요일) 정기 스캔
# - security-extended 쿼리: 표준 + 보안 권장 규칙
# - 결과는 GitHub Security 탭의 Code scanning alerts 에 누적
# - PR 차단은 별도 branch protection rule 으로 설정 (본 워크플로 자체는 차단 X)

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  schedule:
    # 매주 일요일 18:00 UTC = 월요일 03:00 KST
    - cron: '0 18 * * 0'
  workflow_dispatch:

jobs:
  analyze:
    name: CodeQL 분석 (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      security-events: write
      contents: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        language: ['java-kotlin', 'javascript-typescript']

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ Java 17 설정
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔧 Maven 캐시 (Java)
        if: matrix.language == 'java-kotlin'
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-codeql-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-codeql-m2

      - name: 🔍 CodeQL 초기화
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: 🏗️ Build (Java)
        if: matrix.language == 'java-kotlin'
        run: |
          # 테스트 제외 + repackage 비활성으로 분석용 클래스만 빠르게 생성
          mvn -B -DskipTests -Dspring-boot.repackage.skip=true compile

      - name: 🧪 CodeQL 분석 실행
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
