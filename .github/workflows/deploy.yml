name: Deploy Homepage

on:
  push:
    branches:
      - develop
      - dev
      - homepage/develop
      - main
      - master
  pull_request:
    branches:
      - develop
      - dev
      - homepage/develop
      - main
      - master

jobs:
  # 개발 브랜치 배포
  deploy-dev:
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/homepage/develop'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
        continue-on-error: true
        # TODO: ESLint 에러 수정 후 continue-on-error 제거 (values, ConsultationBottomSheet, ReviewsList 등)
      
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.DEV_API_BASE_URL || secrets.NEXT_PUBLIC_API_BASE_URL || 'https://api.mindgarden.co.kr' }}
          BLOG_ADMIN_PASSWORD: ${{ secrets.DEV_BLOG_ADMIN_PASSWORD || secrets.BLOG_ADMIN_PASSWORD }}
          DB_HOST: ${{ secrets.DEV_DB_HOST || secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DEV_DB_PORT || secrets.DB_PORT }}
          DB_USER: ${{ secrets.DEV_DB_USER || secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DEV_DB_PASSWORD || secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DEV_DB_NAME || secrets.DB_NAME }}

      # 개발 자동 배포: CI 성공 후 SSH로 서버에서 deploy-from-webhook.sh (pm2 restart 포함)
      # 켜기(택1): (A) Variable HOMEPAGE_DEV_SSH_DEPLOY=true  (B) Secret DEV_SSH_AUTO_DEPLOY_ENABLE=1
      # (A)가 Actions에서 인식 안 되는 저장소가 있어 (조직/권한 등) (B)로 우회 가능
      # 로컬 PC의 ~/.ssh 는 건드리지 않음. 상세: docs/DEV_DEPLOY_CI_SSH.md
      - name: Deploy to dev server (SSH, after CI)
        if: ${{ github.event_name == 'push' && (vars.HOMEPAGE_DEV_SSH_DEPLOY == 'true' || vars.HOMEPAGE_DEV_SSH_DEPLOY == 'True' || secrets.DEV_SSH_AUTO_DEPLOY_ENABLE == '1') }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /var/www/homepage
            bash deploy-from-webhook.sh

  # 프로덕션 브랜치 빌드 및 테스트
  build-and-test:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
      
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL || 'https://api.mindgarden.co.kr' }}
          BLOG_ADMIN_PASSWORD: ${{ secrets.BLOG_ADMIN_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
      
      # 프로덕션 배포는 별도로 설정 필요 (예: Vercel, 자체 서버 등)
      # - name: Deploy to Production
      #   if: github.event_name == 'push'
      #   run: |
      #     # 배포 스크립트 추가

