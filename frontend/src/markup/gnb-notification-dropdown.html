<!--
  GNB 통합 알림 — 아토믹 디자인 기반 HTML 마크업
  참조: docs/design-system/GNB_AND_ADMIN_NOTIFICATION_UI_SPEC.md §1
  JS/React·스타일 연동은 core-coder 담당.
-->

<!-- Molecule: GNB 알림 트리거 + 배지 래퍼 -->
<nav class="mg-v2-notification-dropdown" role="navigation" aria-label="알림">
  <div class="mg-v2-notification-trigger-wrapper">
    <button
      type="button"
      class="mg-v2-notification-trigger"
      aria-label="알림 열기"
      aria-expanded="false"
      aria-haspopup="true"
    >
      <!-- 벨 아이콘: 코더가 아이콘 컴포넌트로 교체 -->
      <span class="mg-v2-notification-trigger__icon" aria-hidden="true">[Bell]</span>
    </button>
    <!-- Atom: 배지 (count > 0일 때만 노출, 99+ 규칙은 코더에서 처리) -->
    <span class="mg-v2-notification-badge" aria-label="읽지 않은 알림 3개">3</span>
  </div>

  <!-- 드롭다운 패널: position fixed 등은 코더에서 처리. 열림 시에만 렌더/표시 -->
  <div
    class="mg-v2-dropdown-panel mg-v2-notification-dropdown__panel"
    role="dialog"
    aria-label="알림 패널"
    aria-modal="false"
    hidden
  >
    <!-- §1.4 헤더 -->
    <div class="mg-v2-dropdown-panel__header">
      <h2 class="mg-v2-dropdown-panel__title">알림</h2>
      <button type="button" class="mg-v2-btn-text mg-v2-btn-sm" aria-label="모두 읽음으로 표시">
        모두 읽음
      </button>
    </div>

    <!-- §1.3 탭 바: 시스템 공지 | 메시지 -->
    <div class="mg-v2-notification-dropdown__tabs" role="tablist" aria-label="알림 유형">
      <button
        type="button"
        role="tab"
        id="tab-system"
        aria-selected="true"
        aria-controls="panel-system"
        class="mg-v2-notification-dropdown__tab mg-v2-notification-dropdown__tab--active"
      >
        시스템 공지
      </button>
      <button
        type="button"
        role="tab"
        id="tab-messages"
        aria-selected="false"
        aria-controls="panel-messages"
        class="mg-v2-notification-dropdown__tab"
      >
        메시지
      </button>
    </div>

    <!-- §1.5 리스트 영역: 탭별 패널 (코더에서 탭 전환 시 표시 전환) -->
    <div
      id="panel-system"
      role="tabpanel"
      aria-labelledby="tab-system"
      class="mg-v2-notification-dropdown__panel-content"
    >
      <ul class="mg-v2-notification-list" aria-label="시스템 공지 목록">
        <!-- §1.5 한 행: 공지 아이템 (미읽음 도트·아이콘·제목·시간·발신) -->
        <li>
          <button
            type="button"
            class="mg-v2-notification-item mg-v2-notification-item--unread"
          >
            <span class="mg-v2-notification-item__unread-dot" aria-hidden="true"></span>
            <div class="mg-v2-notification-item__icon" aria-hidden="true">[Bell]</div>
            <div class="mg-v2-notification-item__content">
              <div class="mg-v2-notification-item__header">
                <span class="mg-v2-notification-item__title">시스템 점검 안내</span>
                <span class="mg-v2-notification-item__time">10분 전</span>
              </div>
              <p class="mg-v2-notification-item__message">시스템</p>
            </div>
          </button>
        </li>
        <li>
          <button type="button" class="mg-v2-notification-item">
            <div class="mg-v2-notification-item__icon" aria-hidden="true">[Info]</div>
            <div class="mg-v2-notification-item__content">
              <div class="mg-v2-notification-item__header">
                <span class="mg-v2-notification-item__title">새 기능 업데이트</span>
                <span class="mg-v2-notification-item__time">1시간 전</span>
              </div>
              <p class="mg-v2-notification-item__message">시스템</p>
            </div>
          </button>
        </li>
      </ul>
    </div>

    <div
      id="panel-messages"
      role="tabpanel"
      aria-labelledby="tab-messages"
      class="mg-v2-notification-dropdown__panel-content"
      hidden
    >
      <ul class="mg-v2-notification-list" aria-label="메시지 목록">
        <!-- §1.5 한 행: 메시지 아이템 (발신자 등은 mg-v2-notification-item__message 또는 __sender) -->
        <li>
          <button
            type="button"
            class="mg-v2-notification-item mg-v2-notification-item--unread"
          >
            <span class="mg-v2-notification-item__unread-dot" aria-hidden="true"></span>
            <div class="mg-v2-notification-item__icon" aria-hidden="true">[MessageSquare]</div>
            <div class="mg-v2-notification-item__content">
              <div class="mg-v2-notification-item__header">
                <span class="mg-v2-notification-item__title">상담 일정 문의</span>
                <span class="mg-v2-notification-item__time">5분 전</span>
              </div>
              <p class="mg-v2-notification-item__message mg-v2-notification-item__sender">김상담사 → 내담자명</p>
            </div>
          </button>
        </li>
      </ul>
    </div>

    <!-- §1.6 푸터: 알림 전체 보기 -->
    <div class="mg-v2-dropdown-panel__footer">
      <a href="/notifications" class="mg-v2-dropdown-panel__footer-link">알림 전체 보기</a>
    </div>
  </div>
</nav>

<!-- §1.7 빈 상태·로딩 (코더에서 조건부 렌더) -->
