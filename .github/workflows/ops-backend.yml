name: Ops Backend CI

on:
  push:
    paths:
      - "backend-ops/**"
  pull_request:
    paths:
      - "backend-ops/**"

# CI Java timezone 표준화 (A3, 2026-06-12): GitHub Actions runner JVM (gradle clean build) 을 KST 로 고정.
# hotfix-4 [a73567ad] §A-3 의 pom.xml surefire/failsafe argLine 패턴을 워크플로 레벨로 확장.
env:
  JAVA_TOOL_OPTIONS: "-Duser.timezone=Asia/Seoul -Duser.language=ko -Duser.country=KR"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Grant execute permission for gradlew
        working-directory: backend-ops
        run: chmod +x gradlew

      - name: Build with Gradle
        working-directory: backend-ops
        run: ./gradlew clean build
