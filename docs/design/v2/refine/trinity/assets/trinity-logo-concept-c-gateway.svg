<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Concept C: Gateway Mark -->
  <rect width="400" height="120" rx="8" fill="#1A2233" />
  
  <!-- Symbol: Gateway/Archway representing "apply/onboarding" -->
  <g transform="translate(40, 30)">
    <!-- Arch -->
    <path d="M10 60 L10 30 C10 13.4 23.4 0 40 0 C56.6 0 70 13.4 70 30 L70 60" stroke="#FAF9F7" stroke-width="8" stroke-linecap="round" fill="none" />
    <!-- Inner Portal element -->
    <rect x="30" y="25" width="20" height="35" rx="10" fill="#3D5246" />
    <!-- Ground line -->
    <line x1="0" y1="60" x2="80" y2="60" stroke="#6B7F72" stroke-width="4" stroke-linecap="round" />
  </g>
  
  <!-- Wordmark -->
  <text x="140" y="70" font-family="'Inter', 'Noto Sans KR', sans-serif" font-weight="700" font-size="34" fill="#FAF9F7" letter-spacing="-0.5">Trinity</text>
</svg>