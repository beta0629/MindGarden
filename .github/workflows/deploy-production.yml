        if [ -z "${{ secrets.PRODUCTION_HOST }}" ] || [ -z "${{ secrets.PRODUCTION_SSH_KEY }}" ]; then
          echo "::error::PRODUCTION_HOST 또는 PRODUCTION_SSH_KEY 가 비어 있습니다."
          exit 1
        fi
        DB_HOST_RESOLVED="${{ secrets.PRODUCTION_DB_HOST }}"
