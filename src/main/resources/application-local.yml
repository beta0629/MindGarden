    username: ${OPS_ADMIN_USERNAME:superadmin@mindgarden.com}
    # Ops Portal 관리자 비밀번호 (로컬 개발용 기본값)
    password: ${OPS_ADMIN_PASSWORD:admin123}
    # Ops Portal 관리자 역할 (로컬 개발용 기본값)
    role: ${OPS_ADMIN_ROLE:HQ_ADMIN}

# Actuator 설정 (로컬 개발용)
