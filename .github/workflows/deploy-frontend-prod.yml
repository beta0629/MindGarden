# CoreSolution React(CRA) 운영 정적 배포 → /var/www/mindgarden/frontend
# (config/nginx/core-solution-prod.conf 의 app·*.core-solution.co.kr SPA root 와 동일)
#
# SSH: PRODUCTION_HOST, PRODUCTION_USER, PRODUCTION_SSH_KEY (deploy-production·Trinity 운영과 동일)
#
# deploy-production.yml 에도 프론트 업로드가 포함되어 있으나, JAR·DB·Nginx 전체 없이
# 프론트만 빠르게 갱신할 때 이 워크플로를 사용한다.

name: 🎨 Frontend (CoreSolution) 운영 배포

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend-prod.yml"
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "체크아웃할 Git ref (운영은 main만 허용)"
        required: false
        default: "main"
        type: string

jobs:
  build:
    name: 🏗️ Core 프론트엔드 빌드 (운영)
    runs-on: ubuntu-latest
    steps:
      - name: 🛡️ 운영 배포 ref 가드 (main만 허용)
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DREF="${{ github.event.inputs.deploy_ref }}"
            DREF="${DREF:-main}"
          else
            DREF="${{ github.ref_name }}"
          fi
          if [ "$DREF" != "main" ]; then
            echo "::error::운영 배포는 main 브랜치만 허용됩니다. 선택된 ref: $DREF"
            exit 1
          fi
          echo "deploy_ref=$DREF" >> "$GITHUB_OUTPUT"
          echo "이벤트=${{ github.event_name }} 배포 ref=$DREF"

      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.guard.outputs.deploy_ref }}

      - name: 📦 Node.js 20 설정
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 프론트엔드 의존성 설치
        run: |
          cd frontend
          npm ci

      # REACT_APP_PG_WEBHOOK_PUBLIC_ORIGIN: Secret 미설정 시 빈 문자열 — 미설정 시 프론트는 origin 기본값 사용
      # REACT_APP_GOOGLE_CLIENT_ID: GIS(@react-oauth/google) 웹 OAuth Client ID (운영). 미설정 시
      #   GOOGLE_WEB_CLIENT_ID 가 빈 문자열이 되어 GIS Provider 가 마운트되지 않고
      #   레거시 redirect 흐름으로 폴백된다(기존 oauth2Config?.google 검사 활용).
      # REACT_APP_APPLE_CLIENT_ID: Apple Developer Console Service ID (운영). 미설정 시
      #   APPLE_WEB_SERVICE_ID 가 빈 문자열이 되어 isAppleWebServiceIdConfigured=false →
      #   UnifiedLogin 의 Apple 버튼이 렌더되지 않는다(App Store 4.8 T1 정책 준수).
      # REACT_APP_APPLE_REDIRECT_URI: Apple Service ID 에 등록한 Return URL. 미설정 시
      #   getBaseUrl() 기반 기본값(`{origin}/api/v1/auth/oauth/apple/callback`) 사용.
      - name: 🏗️ 프론트엔드 빌드 (운영)
        env:
          REACT_APP_PG_WEBHOOK_PUBLIC_ORIGIN: ${{ secrets.REACT_APP_PG_WEBHOOK_PUBLIC_ORIGIN }}
          REACT_APP_GOOGLE_CLIENT_ID: ${{ secrets.REACT_APP_GOOGLE_CLIENT_ID }}
          REACT_APP_APPLE_CLIENT_ID: ${{ secrets.REACT_APP_APPLE_CLIENT_ID }}
          REACT_APP_APPLE_REDIRECT_URI: ${{ secrets.REACT_APP_APPLE_REDIRECT_URI }}
        run: |
          cd frontend
          npm run build:ci

      - name: 🔍 프론트엔드 빌드 결과 확인
        run: |
          echo "🔍 프론트엔드 빌드 결과 확인..."
          if [ -d frontend/build ]; then
            FILE_COUNT=$(find frontend/build -type f 2>/dev/null | wc -l)
            if [ "$FILE_COUNT" -gt 0 ]; then
              echo "✅ frontend/build 디렉토리 생성됨: $FILE_COUNT 개 파일"
              find frontend/build -maxdepth 1 -type f -print0 2>/dev/null | head -z -n 10 | xargs -0r ls -lh
            else
              echo "❌ frontend/build 디렉토리가 비어있음!"
              exit 1
            fi
          else
            echo "❌ frontend/build 디렉토리 없음!"
            exit 1
          fi

      - name: 📦 배포용 아티팩트 스테이징
        run: |
          rm -rf _gha_static_site_upload
          mkdir -p _gha_static_site_upload
          cp -a frontend/build/. _gha_static_site_upload/

      - name: 📤 빌드 산출물 업로드
        uses: actions/upload-artifact@v7
        with:
          name: core-frontend-prod-static-site-artifact
          path: _gha_static_site_upload/

  deploy:
    name: 📤 Core 프론트 운영 서버 배포
    needs: build
    uses: ./.github/workflows/reusable-static-site-ssh-deploy.yml
    with:
      site_label: Core 프론트(운영)
      remote_html_dir: mindgarden/frontend
      backup_subdir: mindgarden-frontend
      backup_tar_prefix: mindgarden-frontend-backup
      scp_source: _static_site_upload/*
      strip_components: 1
      artifact_name: core-frontend-prod-static-site-artifact
      health_urls: |
        https://app.core-solution.co.kr
        https://mindgarden.core-solution.co.kr
    secrets:
      ssh_host: ${{ secrets.PRODUCTION_HOST }}
      ssh_user: ${{ secrets.PRODUCTION_USER }}
      ssh_key: ${{ secrets.PRODUCTION_SSH_KEY }}

  # AI 모니터링 Phase 1 — 운영 배포 실패 시 Discord webhook 알람
  # Secret 미등록 시 알람 skip
  # 참고: docs/project-management/2026-06-11/AI_MONITORING_ROADMAP.md §6 Phase 1
  notify-discord-on-failure:
    name: 🚨 Discord 실패 알람
    needs: [build, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: 🚨 Discord 알람 발송
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "⚠️ DISCORD_WEBHOOK_URL Secret 미등록 — 알람 skip"
            exit 0
          fi
          WORKFLOW_NAME="${{ github.workflow }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BRANCH="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          PAYLOAD=$(jq -nc \
            --arg title "❌ CI/배포 실패: $WORKFLOW_NAME" \
            --arg branch "$BRANCH" \
            --arg actor "$ACTOR" \
            --arg sha "$SHORT_SHA" \
            --arg run_url "$RUN_URL" \
            --arg ts "$TIMESTAMP" \
            '{embeds: [{
              title: $title,
              color: 15158332,
              fields: [
                {name: "브랜치", value: ("`" + $branch + "`"), inline: true},
                {name: "Actor", value: $actor, inline: true},
                {name: "SHA", value: ("`" + $sha + "`"), inline: true},
                {name: "Run URL", value: $run_url}
              ],
              timestamp: $ts
            }]}')

          curl -fsS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "⚠️ Discord 발송 실패 (재시도 안 함, 본 알람만 skip)"

