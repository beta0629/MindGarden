# 표준 프로시저를 운영 파이프라인에서 반영할 때 사용한다.
# 흐름: GitHub Actions → SSH로 개발 서버(DEV_SERVER_HOST) 접속 → 해당 서버에서 mysql 클라이언트로 개발 DB(DEV_DB_*)에 프로시저 적용.
# 운영 앱 서버에서 개발 DB 3306으로 직접 붙이지 않는다(방화벽 2003 등 회피).
# 필수 시크릿: DEV_SERVER_HOST, DEV_SERVER_SSH_KEY, DEV_DB_HOST, DEV_DB_USER, DEV_DB_PASSWORD, DEV_DB_NAME (폴백 호스트·평문 비밀번호 없음).
# refs: deploy-procedures-dev.yml, deploy-standardized-procedures.sh prod 분기, docs/deployment/GITHUB_ACTIONS_WORKFLOW_INDEX.md

name: 📦 표준화된 프로시저 배포 (운영·개발 DB 경유)

on:
  workflow_dispatch:  # 수동 실행만 가능

jobs:
  deploy-procedures:
    name: 🚀 프로시저 배포
    runs-on: ubuntu-latest

    steps:
    - name: 📥 코드 체크아웃
      uses: actions/checkout@v4

    - name: 🔧 배포용 프로시저 파일 생성
      run: |
        chmod +x database/schema/procedures_standardized/create_deployment_files.sh
        bash database/schema/procedures_standardized/create_deployment_files.sh

    - name: 🔑 known_hosts 추가 (Host key verification 방지)
      run: |
        mkdir -p ~/.ssh
        for h in "${{ secrets.DEV_SERVER_HOST }}" "${{ secrets.PRODUCTION_HOST }}"; do
          [ -n "$h" ] && ssh-keyscan -H "$h" >> ~/.ssh/known_hosts 2>/dev/null || true
        done

    - name: 📤 프로시저 배포
      run: |
        fail() {
          echo "::error::$1"
          exit 1
        }

        [ -n "${{ secrets.DEV_DB_HOST }}" ] || fail "DEV_DB_HOST 시크릿이 비어 있습니다. 개발 DB 호스트를 GitHub Repository secrets에 설정하세요."
        [ -n "${{ secrets.DEV_SERVER_HOST }}" ] || fail "DEV_SERVER_HOST 시크릿이 비어 있습니다. SSH 점프(개발 서버) 호스트를 설정하세요."
        [ -n "${{ secrets.DEV_DB_PASSWORD }}" ] || fail "DEV_DB_PASSWORD 시크릿이 비어 있습니다. 폴백 비밀번호는 사용하지 않습니다."
        [ -n "${{ secrets.DEV_DB_USER }}" ] || fail "DEV_DB_USER 시크릿이 비어 있습니다."
        [ -n "${{ secrets.DEV_DB_NAME }}" ] || fail "DEV_DB_NAME 시크릿이 비어 있습니다."

        if [ -z "${{ secrets.DEV_SERVER_SSH_KEY }}" ] && [ -z "${{ secrets.PRODUCTION_SSH_KEY }}" ]; then
          fail "DEV_SERVER_SSH_KEY 또는 PRODUCTION_SSH_KEY 중 하나는 필수입니다."
        fi

        export PROD_SSH_JUMP_HOST="${{ secrets.DEV_SERVER_HOST }}"
        JUSER="${{ secrets.DEV_SERVER_USER }}"
        [ -n "$JUSER" ] && export PROD_SSH_JUMP_USER="$JUSER"

        export PROD_DB_HOST="${{ secrets.DEV_DB_HOST }}"
        export PROD_DB_PASSWORD="${{ secrets.DEV_DB_PASSWORD }}"
        export PROD_DB_USER="${{ secrets.DEV_DB_USER }}"
        export PROD_DB_NAME="${{ secrets.DEV_DB_NAME }}"

        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        if [ -n "${{ secrets.DEV_SERVER_SSH_KEY }}" ]; then
          echo "${{ secrets.DEV_SERVER_SSH_KEY }}" > ~/.ssh/prod_ci_key
        else
          echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/prod_ci_key
        fi
        chmod 600 ~/.ssh/prod_ci_key
        eval "$(ssh-agent -s)"
        ssh-add ~/.ssh/prod_ci_key
        chmod +x scripts/automation/deployment/deploy-standardized-procedures.sh
        bash scripts/automation/deployment/deploy-standardized-procedures.sh prod
