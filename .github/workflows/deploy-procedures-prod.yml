# SSH: PRODUCTION_HOST, PRODUCTION_USER, PRODUCTION_SSH_KEY.
# DB: PRODUCTION_DB_PASSWORD 필수. PRODUCTION_DB_HOST는 비어 있으면 PRODUCTION_HOST와 동일한 호스트로 간주(앱·DB 동일 Cafe24 호스트 등).
# PRODUCTION_DB_USER·PRODUCTION_DB_NAME 선택 — 미설정 시 스크립트 운영 기본값(mindgarden_prod, core_solution). DEV_DB_* 폴백 없음.
# refs: deploy-procedures-dev.yml, deploy-standardized-procedures.sh prod 분기

name: 📦 표준화된 프로시저 배포 (운영)

on:
  workflow_dispatch:  # 수동 실행만 가능

jobs:
  deploy-procedures:
    name: 🚀 프로시저 배포
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 🔧 배포용 프로시저 파일 생성
      run: |
        chmod +x database/schema/procedures_standardized/create_deployment_files.sh
        bash database/schema/procedures_standardized/create_deployment_files.sh

    - name: 🔑 known_hosts 추가 (Host key verification 방지)
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H "${{ secrets.PRODUCTION_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
    
    - name: 📤 프로시저 배포
      run: |
        if [ -z "${{ secrets.PRODUCTION_DB_PASSWORD }}" ]; then
          echo "::error::PRODUCTION_DB_PASSWORD 시크릿이 필요합니다."
          exit 1
        fi

        export PROD_SERVER_HOST="${{ secrets.PRODUCTION_HOST }}"
        export PROD_SERVER_USER="${{ secrets.PRODUCTION_USER }}"
        DB_HOST_RESOLVED="${{ secrets.PRODUCTION_DB_HOST }}"
        if [ -z "$DB_HOST_RESOLVED" ]; then
          DB_HOST_RESOLVED="${{ secrets.PRODUCTION_HOST }}"
        fi
        if [ -z "$DB_HOST_RESOLVED" ]; then
          echo "::error::운영 DB 호스트를 결정할 수 없습니다. PRODUCTION_DB_HOST를 설정하거나 PRODUCTION_HOST를 설정하세요."
          exit 1
        fi
        export PROD_DB_HOST="$DB_HOST_RESOLVED"
        export PROD_DB_PASSWORD="${{ secrets.PRODUCTION_DB_PASSWORD }}"
        PROD_USER_SECRET="${{ secrets.PRODUCTION_DB_USER }}"
        [ -n "$PROD_USER_SECRET" ] && export PROD_DB_USER="$PROD_USER_SECRET"
        PROD_NAME_SECRET="${{ secrets.PRODUCTION_DB_NAME }}"
        [ -n "$PROD_NAME_SECRET" ] && export PROD_DB_NAME="$PROD_NAME_SECRET"

        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/prod_ci_key
        chmod 600 ~/.ssh/prod_ci_key
        eval "$(ssh-agent -s)"
        ssh-add ~/.ssh/prod_ci_key
        chmod +x scripts/automation/deployment/deploy-standardized-procedures.sh
        bash scripts/automation/deployment/deploy-standardized-procedures.sh prod
