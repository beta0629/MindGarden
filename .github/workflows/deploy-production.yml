name: 🚀 Core Solution 운영 배포

# 운영 배포 동시 실행 가드: cutover 시퀀스(atomic mv → INCOMING JAR 회수) 중 두 번째 런이 SCP 단계에
# 도달하면 race condition 발생. cancel-in-progress=false 로 큐잉(2026-06-02 13:42 UTC run 26823743074 재발 방지).
concurrency:
  group: deploy-production
  cancel-in-progress: false

#
# 백엔드(배포 슬롯): 단일 호스트 블루그린 — 비활성 슬롯에 JAR 반영 → 기동·localhost 헬스 →
# /etc/nginx/snippets/mindgarden-core-backend-upstream.conf 갱신 → nginx -t && reload → /etc/mindgarden/active-backend 갱신.
# 레거시 mindgarden.service 전면 stop 은 사용하지 않음. 1회 마이그레이션: docs/deployment/PRODUCTION_BLUE_GREEN_BACKEND_CUTOVER.md
#
# OAuth가 apex(예: core-solution.co.kr) 콜백이고 SPA가 테넌트 서브도메인이면,
# 서버 EnvironmentFile 등에 SESSION_COOKIE_DOMAIN=core-solution.co.kr 를 넣는다(비밀 아님, RFC 6265 선행 점 없음).
# 예시: deployment/mindgarden.prod-env.example — 앱 재시작 후 브라우저에서 JSESSIONID Domain 확인.
#
# 표준 프로시저 통합: PRODUCTION_DB_PASSWORD 가 있으면 본 워크플로에서
# deploy-standardized-procedures.sh prod(DEPLOY_TARGET=production_mysql) 를 서비스 재시작 전에 실행합니다.
# 없으면 Notice 후 스킵 — 별도 「표준화 프로시저 배포 (운영 MySQL)」 워크플로도 계속 사용 가능.
# DB 계정: 기본 PRODUCTION_DB_USER=mindgarden. 1227 시 PRODUCTION_DB_PROCEDURE_* → PRODUCTION_MYSQL_ROOT_PASSWORD → root+앱비번.
# push 트리거: 본 파일 변경만으로도 코어 운영 배포 워크플로가 실행됨(paths에 포함).

on:
  push:
    branches: [ main ]
    paths:
      # 코어솔루션 관련 Java 코드 (온보딩 제외) — deploy-backend-dev.yml 과 동일
      - 'src/main/java/com/coresolution/core/domain/**'
      - '!src/main/java/com/coresolution/core/domain/onboarding/**'
      - 'src/main/java/com/coresolution/core/repository/**'
      - '!src/main/java/com/coresolution/core/repository/onboarding/**'
      - 'src/main/java/com/coresolution/core/service/**'
      - '!src/main/java/com/coresolution/core/service/Onboarding*.java'
      - '!src/main/java/com/coresolution/core/service/impl/Onboarding*.java'
      - 'src/main/java/com/coresolution/core/controller/**'
      - '!src/main/java/com/coresolution/core/controller/Onboarding*.java'
      - 'src/main/java/com/coresolution/core/controller/dto/**'
      - '!src/main/java/com/coresolution/core/controller/dto/Onboarding*.java'
      - 'src/main/java/com/coresolution/core/dto/**'
      - 'src/main/java/com/coresolution/core/security/**'
      - 'src/main/java/com/coresolution/core/filter/**'
      - 'src/main/java/com/coresolution/core/context/**'
      - 'src/main/java/com/coresolution/core/constant/**'
      - 'src/main/java/com/coresolution/core/config/**'
      - 'src/main/java/com/coresolution/consultation/**'
      - 'src/main/resources/application.yml'
      - 'src/main/resources/application-dev.yml'
      - 'src/main/resources/shop-catalog-thumbnails/**'
      - 'src/main/resources/db/migration/**'
      - 'pom.xml'
      - 'deployment/application-production.yml'
      - 'deployment/mindgarden.prod-env.example'
      - 'sql/**'
      - 'database/schema/**'
      - 'config/nginx/**'
      - '.github/workflows/deploy-production.yml'
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: '체크아웃할 Git ref (운영은 main만 허용)'
        required: false
        default: 'main'
        type: string

jobs:
  deploy:
    name: 🏗️ 빌드 및 배포
    runs-on: ubuntu-latest
    # Apple SIWA 환경변수 6종 — 운영 배포 SSH 스크립트가 /etc/mindgarden/prod.env 에 주입할 때 사용 (P0 hotfix 2026-06-08)
    # 가이드: docs/project-management/2026-06-04/APPLE_T1_OPS_ENV_INJECTION_GUIDE.md §1.1
    # 실제 런타임 주입은 서버 systemd EnvironmentFile=/etc/mindgarden/prod.env 가 담당하나,
    # 워크플로 env 로 매핑해 두어야 후속 SSH 스크립트(prod.env 갱신·검증)에서 즉시 참조 가능.
    # Google OAuth 환경변수 3종 — 운영 BE 의 GoogleOAuth2ServiceImpl 가 Google /token 호출 시 사용 (P0 hotfix 2026-06-11)
    # 배경: PR #204(Web Google OAuth A-2) 이후에도 워크플로에 자동 주입 step 이 없어
    #       운영 BE 가 fallback "dummy" 를 송신 → 401 invalid_client. Apple SIWA 와 동일 패턴으로 자동화.
    env:
      APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
      APPLE_PRIVATE_KEY: ${{ secrets.APPLE_PRIVATE_KEY }}
      APPLE_REDIRECT_URI: ${{ secrets.APPLE_REDIRECT_URI }}
      APPLE_ALLOWED_AUDIENCES: ${{ secrets.APPLE_ALLOWED_AUDIENCES }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
      # OAuth 4종 표준화 (옵션 B′, 2026-06-11): 외부 OAuth Console 등록 콜백 URL 목록.
      # 콤마 구분, 운영(core-solution.co.kr) 콜백을 포함. 미주입 시 BE 검증 graceful skip.
      KAKAO_REGISTERED_URLS: ${{ secrets.KAKAO_REGISTERED_URLS }}
      NAVER_REGISTERED_URLS: ${{ secrets.NAVER_REGISTERED_URLS }}
      GOOGLE_REGISTERED_URLS: ${{ secrets.GOOGLE_REGISTERED_URLS }}
      APPLE_REGISTERED_URLS: ${{ secrets.APPLE_REGISTERED_URLS }}
      # NCP SENS 4종 환경변수 폐기 (2026-06-12 SSOT 통합).
      # SmsGatewayServiceImpl → SolapiSmsProvider 단일 통합. 솔라피 자격 증명은
      # scripts/deployment/sync-solapi-sms-env.sh 가 운영 환경 동기화를 담당한다.
      # B8 (P0 보안, 2026-06-12): 운영 DB 비밀번호 회전 대비 — 저장소 평문 비밀번호 제거.
      # 본 env 매핑이 후속 SSH 스크립트(블루그린·프로시저 배포)에서 $PRODUCTION_DB_PASSWORD 로 노출된다.
      PRODUCTION_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}

    steps:
    - name: 🛡️ 운영 배포 ref 가드 (dispatch만, main만 허용)
      if: github.event_name == 'workflow_dispatch'
      env:
        DEPLOY_REF: ${{ github.event.inputs.deploy_ref || 'main' }}
      run: |
        if [ "$DEPLOY_REF" != "main" ]; then
          echo "::error::운영 배포는 main 브랜치만 허용됩니다. 선택된 ref: $DEPLOY_REF"
          exit 1
        fi

    - name: 📌 배포 대상 ref 출력
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "선택된 배포 ref: ${{ github.event.inputs.deploy_ref || 'main' }}"
        else
          echo "push 이벤트 체크아웃 SHA: ${{ github.sha }}"
        fi

    - name: 📥 코드 체크아웃
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.deploy_ref || 'main') || github.sha }}
        # push 시 전체 히스토리(0): github.event.before..sha diff 에 필요. 숫자 0 은 &&/|| 에서 falsy 이므로 문자열 사용.
        fetch-depth: ${{ github.event_name == 'push' && '0' || '1' }}

    - name: ☕ Java 17 설정
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: 📦 Node.js 20 설정
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: 🔧 Maven 캐시 설정
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: 🏗️ 백엔드 빌드
      run: mvn clean package -DskipTests
      
    - name: 📦 프론트엔드 의존성 설치
      run: |
        cd frontend
        npm install
        
    - name: 🏗️ 프론트엔드 빌드
      run: |
        cd frontend
        npm run build:ci
        
    - name: 🔍 변경된 파일 감지
      id: changed-files
      run: |
        echo "🔍 변경된 파일 감지 중..."
        
        # 이전 커밋과 비교 (main 브랜치의 마지막 배포 커밋)
        # 또는 workflow_dispatch의 경우 모든 파일이 변경된 것으로 간주
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          # 수동 실행 시: 모든 파일이 변경된 것으로 간주 (전체 배포)
          echo "📋 수동 실행: 모든 파일 배포"
          echo "backend_changed=true" >> $GITHUB_OUTPUT
          echo "frontend_changed=true" >> $GITHUB_OUTPUT
          echo "config_changed=true" >> $GITHUB_OUTPUT
          echo "sql_procedures_changed=true" >> $GITHUB_OUTPUT
        else
          # push: 이전 푸시 SHA와 현재 SHA 비교 (단일 커밋 checkout에서도 동작하도록 fetch-depth: 0)
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            git diff --name-only HEAD~1 HEAD > /tmp/changed_files.txt 2>/dev/null || git show --name-only --pretty=format: HEAD | sed '/^$/d' > /tmp/changed_files.txt
          else
            git diff --name-only "$BEFORE" "${{ github.sha }}" > /tmp/changed_files.txt || echo "" > /tmp/changed_files.txt
          fi
          
          # 백엔드 변경 감지 (Java 소스, pom, 운영 설정·스키마 경로 등)
          if grep -qE "^(src/|pom\.xml|deployment/application-production\.yml|\.github/workflows/deploy-production\.yml|sql/|database/schema/)" /tmp/changed_files.txt; then
            echo "✅ 백엔드 변경 감지됨"
            echo "backend_changed=true" >> $GITHUB_OUTPUT
          else
            echo "⏭️ 백엔드 변경 없음 - 업로드 스킵"
            echo "backend_changed=false" >> $GITHUB_OUTPUT
          fi
          
          # 프론트엔드 변경 감지
          if grep -qE "^frontend/" /tmp/changed_files.txt; then
            echo "✅ 프론트엔드 변경 감지됨"
            echo "frontend_changed=true" >> $GITHUB_OUTPUT
          else
            echo "⏭️ 프론트엔드 변경 없음 - 업로드 스킵"
            echo "frontend_changed=false" >> $GITHUB_OUTPUT
          fi
          
          # 설정 파일 변경 감지
          if grep -qE "^deployment/application-production\.yml" /tmp/changed_files.txt; then
            echo "✅ 설정 파일 변경 감지됨"
            echo "config_changed=true" >> $GITHUB_OUTPUT
          else
            echo "⏭️ 설정 파일 변경 없음 - 업로드 스킵"
            echo "config_changed=false" >> $GITHUB_OUTPUT
          fi
          
          # SQL 프로시저 변경 감지 (레거시 sql/ + database/schema 배포용)
          if grep -qE "^(sql/|database/schema/).*\.sql$" /tmp/changed_files.txt; then
            echo "✅ SQL 프로시저 변경 감지됨"
            echo "sql_procedures_changed=true" >> $GITHUB_OUTPUT
            grep -E "^(sql/|database/schema/).*\.sql$" /tmp/changed_files.txt > /tmp/changed_sql_files.txt || true
          else
            echo "⏭️ SQL 프로시저 변경 없음 - 업로드 스킵"
            echo "sql_procedures_changed=false" >> $GITHUB_OUTPUT
          fi
        fi
        
        echo ""
        echo "📋 변경 감지 결과:"
        echo "  백엔드: ${{ steps.changed-files.outputs.backend_changed }}"
        echo "  프론트엔드: ${{ steps.changed-files.outputs.frontend_changed }}"
        echo "  설정 파일: ${{ steps.changed-files.outputs.config_changed }}"
        echo "  SQL 프로시저: ${{ steps.changed-files.outputs.sql_procedures_changed }}"
        
    - name: 🔍 SSH 연결 테스트
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: 22
        timeout: 30s
        script: |
          echo "SSH 연결 테스트 성공: $(date)"
          echo "서버 정보: $(uname -a)"
          
          # SSH 안전장치: 방화벽 관련 명령어는 절대 실행하지 않음
          echo "🛡️ SSH 안전장치 활성화 - 방화벽 설정은 건드리지 않음"
          echo "✅ SSH 포트 22는 기존 상태 유지 (절대 변경 금지)"
          echo "⚠️ ufw, iptables, 방화벽 관련 명령어는 절대 실행하지 않음"
          
          echo "🔧 서버 상태 확인 완료 (SSH 보호됨)"
          
    - name: 🚀 서버 배포
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: 22
        timeout: 120s
        command_timeout: 30m
        script: |
          # 배포 디렉토리로 이동
          cd /var/www/mindgarden
          
          # 블루그린: 트래픽 유지 — 레거시 mindgarden.service 는 여기서 중지하지 않음(전환 절차는 CUTOVER 문서).
          mkdir -p releases/incoming releases/blue releases/green backups
          
          # 백업 생성
          if [ -f app.jar ]; then
            BACKUP_DIR="/var/www/mindgarden/backups"
            mkdir -p $BACKUP_DIR
            BACKUP_FILE="$BACKUP_DIR/app.jar.backup.$(date +%Y%m%d_%H%M%S)"
            # 같은 타임스탬프 파일이 있으면 초까지 포함한 타임스탬프 사용
            while [ -f "$BACKUP_FILE" ]; do
              BACKUP_FILE="$BACKUP_DIR/app.jar.backup.$(date +%Y%m%d_%H%M%S.%N | cut -b1-19)"
            done
            cp app.jar "$BACKUP_FILE"
            echo "✅ 백업 완료: $BACKUP_FILE"
          fi
          
          # 프론트엔드 백업
          if [ -d frontend ]; then
            BACKUP_DIR="/var/www/mindgarden/backups"
            mkdir -p $BACKUP_DIR
            FRONTEND_BACKUP_FILE="$BACKUP_DIR/frontend.backup.$(date +%Y%m%d_%H%M%S).tar.gz"
            # 같은 타임스탬프 파일이 있으면 초까지 포함한 타임스탬프 사용
            while [ -f "$FRONTEND_BACKUP_FILE" ]; do
              FRONTEND_BACKUP_FILE="$BACKUP_DIR/frontend.backup.$(date +%Y%m%d_%H%M%S.%N | cut -b1-19).tar.gz"
            done
            tar -czf "$FRONTEND_BACKUP_FILE" frontend/
            echo "✅ 프론트엔드 백업 완료: $FRONTEND_BACKUP_FILE"
          fi
          
          # 백업 보관: 유형별 최신 5개만 유지 (개발 배포와 동일·디스크 누적 방지)
          BACKUP_DIR="/var/www/mindgarden/backups"
          if [ -d "$BACKUP_DIR" ]; then
            cd "$BACKUP_DIR"
            ls -t app.jar.backup.* 2>/dev/null | tail -n +6 | xargs -r rm -f || true
            ls -t frontend.backup.*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm -f || true
            shopt -s nullglob
            extra=(app-before-*.jar app-flyway-*.jar)
            if [ ${#extra[@]} -gt 0 ]; then
              ls -t "${extra[@]}" 2>/dev/null | tail -n +6 | xargs -r rm -f || true
            fi
            echo "✅ 백업 디렉터리 정리 완료 (각 패턴별 최대 5개 유지)"
          fi
          
          # /tmp/ 디렉토리의 기존 SQL 파일 및 디렉토리 정리
          echo "🧹 /tmp/ 디렉토리 정리 중..."
          rm -rf /tmp/production_all_missing_procedures.sql
          rm -rf /tmp/mapping_update_procedures_mysql.sql
          rm -rf /tmp/production_mapping_procedures.sql
          rm -rf /tmp/business_time_procedures_final.sql
          rm -rf /tmp/update_all_role_menus.sql
          rm -f /tmp/*.sql
          rm -f /tmp/*_proc.log
          echo "✅ /tmp/ 디렉토리 정리 완료"
          
    - name: 📤 백엔드 파일 업로드
      if: steps.changed-files.outputs.backend_changed == 'true'
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: 22
        timeout: 120s
        source: "target/consultation-management-system-1.0.0.jar"
        target: "/var/www/mindgarden/releases/incoming/"
        strip_components: 1
        overwrite: true
        
    - name: ⏭️ 백엔드 파일 업로드 스킵
      if: steps.changed-files.outputs.backend_changed != 'true'
      run: echo "⏭️ 백엔드 변경 없음 - 업로드 스킵됨"
        
    # Core 테넌트·app Nginx root: /var/www/mindgarden/frontend (core-solution-prod.conf)
    # 과거 /var/www/html/ 업로드는 이 경로와 불일치하여 운영 SPA가 구버전으로 고정됨
    - name: 📤 프론트엔드 파일 업로드
      if: steps.changed-files.outputs.frontend_changed == 'true'
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: 22
        timeout: 120s
        source: "frontend/build/*"
        target: "/var/www/mindgarden/frontend/"
        strip_components: 2
        overwrite: true
        
    - name: ⏭️ 프론트엔드 파일 업로드 스킵
      if: steps.changed-files.outputs.frontend_changed != 'true'
      run: echo "⏭️ 프론트엔드 변경 없음 - 업로드 스킵됨"
        
    - name: 📤 설정 파일 업로드
      if: steps.changed-files.outputs.config_changed == 'true'
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: 22
        timeout: 120s
        source: "deployment/application-production.yml"
        target: "/var/www/mindgarden/"
        strip_components: 1
        overwrite: true
        
    - name: 📤 Nginx 설정 파일 업로드 (운영 서버 - 통합 설정)
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: 22
        timeout: 120s
        # 앱 배포 디렉터리에 두어 배포 계정이 쓰기 가능(/tmp 는 기존 루트 소유 파일과 충돌 가능)
        source: "config/nginx/core-solution-prod.conf"
        target: "/var/www/mindgarden/"
        strip_components: 2
