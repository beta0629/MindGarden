    - name: 📦 표준 프로시저 배포 (운영 MySQL, 배포 통합)
      run: |
        set -euo pipefail
        if [ -z "${{ secrets.PRODUCTION_DB_PASSWORD }}" ]; then
          echo "::notice::PRODUCTION_DB_PASSWORD 가 비어 있어 표준 프로시저 배포를 건너뜁니다. Secret 등록 시 이후 운영 배포마다 자동 적용됩니다."
          exit 0
        fi
        if [ -z "${{ secrets.PRODUCTION_HOST }}" ] || [ -z "${{ secrets.PRODUCTION_SSH_KEY }}" ]; then
          echo "::error::PRODUCTION_HOST 또는 PRODUCTION_SSH_KEY 가 비어 있습니다."
          exit 1
        fi
        DB_HOST_RESOLVED="${{ secrets.PRODUCTION_DB_HOST }}"
        if [ -z "$DB_HOST_RESOLVED" ]; then
          DB_HOST_RESOLVED="${{ secrets.PRODUCTION_HOST }}"
          echo "::notice::PRODUCTION_DB_HOST 없음 → PRODUCTION_HOST 를 DB 호스트로 사용합니다."
        fi
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        ssh-keyscan -H "${{ secrets.PRODUCTION_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
        echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/prod_integrated_proc_key
        chmod 600 ~/.ssh/prod_integrated_proc_key
        eval "$(ssh-agent -s)"
        ssh-add ~/.ssh/prod_integrated_proc_key
        unset PROD_SSH_JUMP_HOST 2>/dev/null || true
        unset PROD_SSH_JUMP_USER 2>/dev/null || true
        export PROD_SERVER_HOST="${{ secrets.PRODUCTION_HOST }}"
