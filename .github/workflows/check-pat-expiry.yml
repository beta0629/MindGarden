name: 🔑 ROTATION_SECRETS_PAT 만료 알림 (정책 §8 자동화)

# ============================================================================
# ROTATION_SECRETS_PAT 만료 임박 알림 워크플로 (회전 자동화 v2)
#
# 정책 SSOT: docs/standards/SECRET_ROTATION_POLICY.md §8 (자동화)
# 만료 SSOT: GH Repository Variable `ROTATION_SECRETS_PAT_EXPIRES_AT` (수동 등록)
#   - 형식: YYYY-MM-DD (UTC, 운영팀이 PAT 발급 시 90일 만료일을 그대로 입력)
#   - 예: ROTATION_SECRETS_PAT_EXPIRES_AT=2026-09-13
#
# 트리거: 매주 월요일 09:00 KST (UTC 00:00) 자동 + workflow_dispatch
#
# 동작:
#   1. GH Variable `ROTATION_SECRETS_PAT_EXPIRES_AT` 조회
#   2. D-day 계산 (YYYY-MM-DD UTC 기준)
#   3. 임계치별 알림:
#      - D > 30  : ✅ ok        (요약만, Discord 발송 없음)
#      - D ≤ 30  : ⚠️ warning   (Discord 알림)
#      - D ≤ 7   : 🚨 critical  (Discord + GitHub Issue 자동 생성)
#      - D < 0   : 🔴 expired   (Discord + GitHub Issue 자동 생성)
#   4. 보안 — PAT 값 자체는 본 워크플로가 절대 읽지 않는다 (만료일 메타만)
#
# 보안 원칙 (정책 §11):
#   - PAT 평문 노출 0 (값을 읽지도 출력하지도 않음)
#   - Discord 메시지에 만료일 + D-day 만 포함
#   - GitHub Issue 자동 생성은 GITHUB_TOKEN 으로 충분 (별도 PAT 불필요)
#   - Issue 라벨: `security`, `secret-rotation`, `pat-expiry`
# ============================================================================

on:
  schedule:
    # 매주 월요일 09:00 KST (UTC 00:00)
    - cron: '0 0 * * MON'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run 모드 (Discord/Issue 발송 skip, 요약만)'
        required: false
        type: boolean
        default: false

# 동시 실행 차단 — 동일 PAT 메타데이터 중복 알림 방지
concurrency:
  group: check-pat-expiry
  cancel-in-progress: false

# Issue 자동 생성에 필요한 최소 권한
permissions:
  contents: read
  issues: write

jobs:
  check-expiry:
    name: 🔑 PAT 만료일 체크
    # 다른 fork 에서 schedule 트리거 차단
    if: github.repository == 'beta0629/MindGarden'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      EXPIRES_AT: ${{ vars.ROTATION_SECRETS_PAT_EXPIRES_AT }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      WARN_THRESHOLD_DAYS: '30'
      CRITICAL_THRESHOLD_DAYS: '7'
    steps:
      - name: 🔍 GH Variable 존재 확인
        id: check-var
        run: |
          set -euo pipefail
          if [ -z "${EXPIRES_AT:-}" ]; then
            {
              echo "## ⚠️ ROTATION_SECRETS_PAT_EXPIRES_AT 미설정"
              echo ""
              echo "GH Repository Variable \`ROTATION_SECRETS_PAT_EXPIRES_AT\` 가 등록되지 않았습니다."
              echo ""
              echo "### 등록 방법"
              echo ""
              echo "\`\`\`bash"
              echo "gh variable set ROTATION_SECRETS_PAT_EXPIRES_AT --body '2026-09-13'"
              echo "\`\`\`"
              echo ""
              echo "PAT 발급 시 부여받은 만료일(YYYY-MM-DD)을 그대로 입력합니다."
              echo "PAT 회전(재발급) 시에는 동일 변수를 새 만료일로 갱신합니다."
              echo ""
              echo "정책: \`docs/standards/SECRET_ROTATION_POLICY.md\` §8"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning title=PAT 만료일 미등록::ROTATION_SECRETS_PAT_EXPIRES_AT GH Variable 등록 필요"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # 형식 검증 — YYYY-MM-DD 만 허용
          if ! printf '%s' "${EXPIRES_AT}" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            echo "::error title=형식 오류::ROTATION_SECRETS_PAT_EXPIRES_AT='${EXPIRES_AT}' (YYYY-MM-DD 형식 필요)"
            exit 1
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: 📅 D-day 계산
        if: steps.check-var.outputs.skip != 'true'
        id: dday
        run: |
          set -euo pipefail
          # 만료일·오늘(UTC) 을 epoch 로 변환 후 차이 계산
          EXPIRY_EPOCH=$(date -u -d "${EXPIRES_AT}" +%s)
          TODAY_EPOCH=$(date -u -d "$(date -u +%Y-%m-%d)" +%s)
          DDAY=$(( (EXPIRY_EPOCH - TODAY_EPOCH) / 86400 ))

          # 임계치별 severity 결정
          SEVERITY="ok"
          ICON="✅"
          COLOR_HEX="3066993"   # green (Discord embed color, decimal)
          if [ "${DDAY}" -lt 0 ]; then
            SEVERITY="expired"
            ICON="🔴"
            COLOR_HEX="10038562" # dark red
          elif [ "${DDAY}" -le "${CRITICAL_THRESHOLD_DAYS}" ]; then
            SEVERITY="critical"
            ICON="🚨"
            COLOR_HEX="15158332" # red
          elif [ "${DDAY}" -le "${WARN_THRESHOLD_DAYS}" ]; then
            SEVERITY="warning"
            ICON="⚠️"
            COLOR_HEX="15844367" # yellow
          fi

          {
            echo "expiry_date=${EXPIRES_AT}"
            echo "dday=${DDAY}"
            echo "severity=${SEVERITY}"
            echo "icon=${ICON}"
            echo "color_hex=${COLOR_HEX}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## ${ICON} ROTATION_SECRETS_PAT 만료 체크"
            echo ""
            echo "- 만료일: \`${EXPIRES_AT}\` (UTC)"
            echo "- 오늘(UTC): \`$(date -u +%Y-%m-%d)\`"
            echo "- D-day: \`${DDAY}\` 일 남음"
            echo "- Severity: \`${SEVERITY}\`"
            echo ""
            echo "정책: \`docs/standards/SECRET_ROTATION_POLICY.md\` §8"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 📡 Discord 알림 발송 (warning / critical / expired)
        if: |
          steps.check-var.outputs.skip != 'true' &&
          steps.dday.outputs.severity != 'ok' &&
          env.DRY_RUN != 'true'
        env:
          DDAY: ${{ steps.dday.outputs.dday }}
          EXPIRY_DATE: ${{ steps.dday.outputs.expiry_date }}
          SEVERITY: ${{ steps.dday.outputs.severity }}
          ICON: ${{ steps.dday.outputs.icon }}
          COLOR_HEX: ${{ steps.dday.outputs.color_hex }}
          REPO_FULL: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          # shellcheck disable=SC2016 # jq 필터는 단일 인용 유지
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "::warning title=Discord webhook 미설정::DISCORD_WEBHOOK_URL Secret 미등록 — 알림 skip"
            exit 0
          fi
          RUN_URL="https://github.com/${REPO_FULL}/actions/runs/${RUN_ID}"
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          if [ "${SEVERITY}" = "expired" ]; then
            TITLE="${ICON} ROTATION_SECRETS_PAT 만료됨 — 즉시 재발급 필요"
            DESC="PAT 만료일 \`${EXPIRY_DATE}\` 이 지났습니다 (D${DDAY}). 회전 자동화가 모두 차단됩니다."
          elif [ "${SEVERITY}" = "critical" ]; then
            TITLE="${ICON} ROTATION_SECRETS_PAT 만료 임박 — D-${DDAY} (재발급 권고)"
            DESC="PAT 만료일 \`${EXPIRY_DATE}\` 까지 \`${DDAY}\` 일 남았습니다. 즉시 재발급 후 GH Variable 갱신을 권장합니다."
          else
            TITLE="${ICON} ROTATION_SECRETS_PAT 만료 임박 — D-${DDAY}"
            DESC="PAT 만료일 \`${EXPIRY_DATE}\` 까지 \`${DDAY}\` 일 남았습니다. 운영팀 일정에 재발급을 등재해주세요."
          fi

          PAYLOAD=$(jq -nc \
            --arg title "${TITLE}" \
            --arg desc "${DESC}" \
            --argjson color "${COLOR_HEX}" \
            --arg expiry "${EXPIRY_DATE}" \
            --arg dday "${DDAY}" \
            --arg sev "${SEVERITY}" \
            --arg run_url "${RUN_URL}" \
            --arg ts "${TIMESTAMP}" \
            '{embeds: [{
              title: $title,
              description: $desc,
              color: $color,
              fields: [
                {name: "만료일(UTC)", value: ("`" + $expiry + "`"), inline: true},
                {name: "D-day", value: ("`" + $dday + "` 일"), inline: true},
                {name: "Severity", value: ("`" + $sev + "`"), inline: true},
                {name: "Run URL", value: $run_url}
              ],
              timestamp: $ts
            }]}')

          curl -fsS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "⚠️ Discord 발송 실패 (재시도 안 함, 본 알림만 skip)"

      - name: 🐛 GitHub Issue 자동 생성 (critical / expired)
        if: |
          steps.check-var.outputs.skip != 'true' &&
          (steps.dday.outputs.severity == 'critical' || steps.dday.outputs.severity == 'expired') &&
          env.DRY_RUN != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DDAY: ${{ steps.dday.outputs.dday }}
          EXPIRY_DATE: ${{ steps.dday.outputs.expiry_date }}
          SEVERITY: ${{ steps.dday.outputs.severity }}
          ICON: ${{ steps.dday.outputs.icon }}
        run: |
          # shellcheck disable=SC2016 # 마크다운 백틱은 단일 인용 유지
          set -euo pipefail
          # 동일 issue 중복 생성 방지 — 동일 만료일·severity 라벨 검색
          TITLE="${ICON} ROTATION_SECRETS_PAT 만료 임박 (${EXPIRY_DATE}, D-${DDAY}, ${SEVERITY})"
          EXISTING=$(gh issue list --label "pat-expiry" --label "security" --state open --json title --jq "[.[] | select(.title | contains(\"${EXPIRY_DATE}\")) | select(.title | contains(\"${SEVERITY}\"))] | length")
          if [ "${EXISTING:-0}" -gt 0 ]; then
            echo "ℹ️ 동일 만료일·severity issue 가 이미 open — 중복 생성 skip"
            exit 0
          fi

          BODY_FILE=$(mktemp)
          # heredoc 본문은 YAML 들여쓰기(10칸) 유지, sed 로 정확히 strip
          # ${VAR} 는 본 step env 매핑값(EXPIRY_DATE/DDAY/SEVERITY/ICON)만 사용 → 안전
          sed 's/^          //' > "$BODY_FILE" <<EOF
          ## ${ICON} ROTATION_SECRETS_PAT 만료 알림 (자동 생성)

          본 issue 는 .github/workflows/check-pat-expiry.yml 워크플로가 자동 생성합니다.

          ### 만료 정보

          - **만료일 (UTC)**: ${EXPIRY_DATE}
          - **D-day**: ${DDAY} 일
          - **Severity**: ${SEVERITY}

          ### 권고 조치

          1. GitHub PAT (Personal Access Token) 재발급
             - Scope: secrets:write, actions:write, contents:write, pull-requests:write
             - 유효기간: 90일 (운영 표준)
          2. secrets.ROTATION_SECRETS_PAT Secret 갱신
          3. vars.ROTATION_SECRETS_PAT_EXPIRES_AT Variable 갱신 (새 만료일 YYYY-MM-DD)
          4. rotate-jwt-secret.yml (또는 rotate-db-password.yml) dev 환경에서 1회 sanity 테스트
          5. 본 issue 닫기

          ### 참조

          - 정책: docs/standards/SECRET_ROTATION_POLICY.md §8 (자동화)
          - 워크플로: .github/workflows/check-pat-expiry.yml
          EOF

          gh issue create \
            --title "$TITLE" \
            --body-file "$BODY_FILE" \
            --label "security" \
            --label "secret-rotation" \
            --label "pat-expiry"
