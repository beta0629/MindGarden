<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <style>
      .stroke-main { fill: none; stroke: #3D5246; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .fill-main { fill: #3D5246; }
      .bg-accent { fill: #F5F3EF; stroke: #3D5246; stroke-width: 2; stroke-linejoin: round; }
    </style>
  </defs>
  
  <!-- Stacked Workspaces -->
  <path d="M 8 20 L 24 12 L 40 20 L 24 28 Z" class="bg-accent" />
  <path d="M 8 28 L 24 36 L 40 28" class="stroke-main" />
  <path d="M 8 36 L 24 44 L 40 36" class="stroke-main" />
  
  <!-- Nodes on top workspace -->
  <circle cx="24" cy="20" r="2" class="fill-main" />
  <circle cx="16" cy="16" r="1.5" class="fill-main" />
  <circle cx="32" cy="16" r="1.5" class="fill-main" />
  <path d="M 16 16 L 24 20 L 32 16" class="stroke-main" stroke-width="1.5" />

  <!-- Lock Icon (Bottom Right) -->
  <rect x="30" y="32" width="12" height="10" rx="2" class="bg-accent" />
  <path d="M 33 32 V 29 C 33 27.34 34.34 26 36 26 C 37.66 26 39 27.34 39 29 V 32" class="stroke-main" />
  <circle cx="36" cy="37" r="1.5" class="fill-main" />
</svg>