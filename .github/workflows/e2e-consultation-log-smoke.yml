# 상담일지 모달(어드민) Playwright 스모크 — 로그인·API 전제
# 백엔드 기동은 이 워크플로에 포함하지 않음.
#   → 스테이징/개발에 `E2E_BASE_URL`을 두거나, self-hosted runner에서 앱·백엔드가 이미 떠 있는 상태에서 실행할 것.
#
# 로그인 시크릿 SSOT: `.cursor/skills/core-solution-testing/SKILL.md` — `E2E_TEST_EMAIL`, `E2E_TEST_PASSWORD`
# (하위 호환: 예전에만 쓰던 `E2E_ADMIN_USERNAME` / `E2E_ADMIN_PASSWORD` 가 있으면 그대로 매핑)
name: E2E consultation log modal smoke

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'tests/e2e/tests/admin/consultation-log-modal-smoke.spec.ts'
      - 'tests/e2e/playwright.config.ts'
      - 'frontend/src/components/consultant/ConsultationLogModal.js'
      - 'frontend/src/hooks/useConsultationLogLocalAutosave.js'
      - 'frontend/src/utils/consultationLogDraftServerAdapter.js'
      - 'frontend/src/constants/consultationLogAutosaveConstants.js'
      - 'frontend/src/constants/consultationLogAutosaveStrings.js'
  workflow_dispatch:

jobs:
  e2e-consultation-log-smoke:
    # PR·fork 등 시크릿 미설정 시 잡 스킵 → 워크플로는 성공으로 끝나 PR 체크를 막지 않음.
    # 권장: E2E_TEST_EMAIL, E2E_TEST_PASSWORD (core-solution-testing 스킬과 동일).
    # 하위 호환: E2E_ADMIN_USERNAME / E2E_ADMIN_PASSWORD 만 있는 저장소도 실행.
    if: ${{ secrets.E2E_TEST_EMAIL != '' || secrets.E2E_ADMIN_USERNAME != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies (Playwright webServer)
        working-directory: frontend
        run: npm ci

      - name: Install E2E dependencies
        working-directory: tests/e2e
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright Chromium
        working-directory: tests/e2e
        run: npx playwright install chromium --with-deps

      - name: Run consultation log modal smoke (chromium)
        working-directory: tests/e2e
        env:
          BASE_URL: ${{ secrets.E2E_BASE_URL != '' && secrets.E2E_BASE_URL || 'http://localhost:3000' }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          TEST_USERNAME: ${{ secrets.E2E_TEST_EMAIL != '' && secrets.E2E_TEST_EMAIL || secrets.E2E_ADMIN_USERNAME }}
          TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD != '' && secrets.E2E_TEST_PASSWORD || secrets.E2E_ADMIN_PASSWORD }}
        run: npx playwright test tests/admin/consultation-log-modal-smoke.spec.ts --project=chromium
