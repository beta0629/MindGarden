    # [/P0 후속 강화 2026-06-09]
    # ============================================================================

    # ============================================================================
    # [P2 2026-06-11] dev.env 일괄 반영 단일 재시작 (5+ restart 통합 → 1회, transient 502 차단)
    # 배경: 디버거 보고서 db6bd2c5-b587-48d5-9f7d-386925579b97 — dev 외부 502 Cloudflare 자가 복구.
    # 근본 원인: 4개 env 자동 주입 step 이 각각 systemctl restart + sleep 15 → BE 부팅(Flyway/OAuth2 ~60s) 보다
    #           짧아 그 사이 외부 요청이 nginx 127.0.0.1:8080 proxy 에 도달하면 502 반환.
    #           nginx 측 proxy_next_upstream/재시도 정책 없음 → Cloudflare 가 그대로 전파.
    # 변경: 4개 env step 은 dev.env 갱신만 수행하고 마커 파일(/tmp/mindgarden-dev-env-pending-restart) 만 작성.
    #       본 step 이 마커 존재 시 1회 restart + 45s 워밍업 + 300s actuator/health 폴링 (deploy-production.yml 패턴 미러링).
    #       이후 통합 PID env 검증 — dev.env 에 정의된 키들만 /proc/PID/environ 으로 확인.
    # 미러: deploy-production.yml 의 BG cutover 패턴 (운영은 blue/green 이라 본 문제 비해당).
    # ============================================================================
    - name: 🔁 dev.env 일괄 반영 재시작 + 헬스 검증 (P2 transient 502 차단)
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 120s
        command_timeout: 15m
        script: |
          MARKER=/tmp/mindgarden-dev-env-pending-restart
          DEV_ENV_FILE=/etc/mindgarden/dev.env
          UNIT=mindgarden-dev.service

          if [ ! -f "$MARKER" ]; then
            echo "ℹ️ env 변경 마커 없음 — 통합 restart skip (4개 env step 모두 변경 없음)"
            exit 0
          fi

          echo "::group::🔁 dev.env 변경 감지 — 단일 restart 진행"
          echo "📋 마커: $MARKER (mtime=$(stat -c '%y' "$MARKER" 2>/dev/null || echo unknown))"
          sudo systemctl daemon-reload
          echo "🔄 ${UNIT} restart (1회 통합)"
          sudo systemctl restart "$UNIT" || echo "::warning::${UNIT} 재시작 실패 (계속 진행)"

          # JVM·Flyway·Hibernate·PlSql·OAuth2 초기화 워밍업 — 첫 폴링 전 45s
          echo "⏳ JVM·Flyway·OAuth2 초기화 워밍업 45초..."
          sleep 45

          # actuator/health 폴링 (최대 300초 = 60 × 5초, deploy-production.yml 패턴 미러링)
          SERVICE_STARTED=false
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:8080/actuator/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              ELAPSED=$((45 + i * 5))
              echo "✅ dev BE UP (시도 ${i}/60, 누적 ${ELAPSED}s, 워밍업 45s 포함)"
              SERVICE_STARTED=true
              break
            fi
            if [ $((i % 12)) -eq 0 ]; then
              ACTIVE_STATE=$(sudo systemctl is-active "$UNIT" 2>/dev/null || echo unknown)
              echo "⏳ 헬스 대기 중... ${i}/60 (systemd=${ACTIVE_STATE}, last_status=${STATUS})"
            fi
            sleep 5
          done

          if [ "$SERVICE_STARTED" != "true" ]; then
            echo "::warning title=통합 restart 후 헬스 미응답::300초 내 actuator/health 가 200 을 반환하지 않았습니다. 후속 '🏥 개발 서버 헬스체크' step 에서 재검증·롤백 판단."
            sudo journalctl -u "$UNIT" --no-pager -n 100 || true
          fi
          echo "::endgroup::"

          # 통합 PID env 검증 — dev.env 에 정의된 키들만 /proc/PID/environ 으로 확인.
          # 각 env step 의 7번 PID 검증을 본 step 으로 이관 (restart 미적용 상태 검증 회피).
          echo "::group::🔍 통합 PID env 검증 (APPLE_/GOOGLE_/REGISTERED_URLS/PROFILE_IMAGE)"
          PID=$(systemctl show -p MainPID --value "$UNIT" 2>/dev/null)
          if [ -z "$PID" ] || [ "$PID" = "0" ]; then
            echo "::warning::${UNIT} MainPID 조회 실패 (PID='$PID') — 프로세스 env 검증 skip"
          else
            echo "🔍 unit=${UNIT} / PID=${PID} 프로세스 env 일괄 확인"
            ALL_KEYS="APPLE_CLIENT_ID APPLE_TEAM_ID APPLE_KEY_ID APPLE_PRIVATE_KEY APPLE_REDIRECT_URI APPLE_ALLOWED_AUDIENCES GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET GOOGLE_REDIRECT_URI KAKAO_REGISTERED_URLS NAVER_REGISTERED_URLS GOOGLE_REGISTERED_URLS APPLE_REGISTERED_URLS PROFILE_IMAGE_UPLOAD_DIR"
            MISSING_ENV=0
            CHECKED=0
            for k in $ALL_KEYS; do
              # dev.env 에 키가 없으면(=GitHub Secret 미설정·graceful skip) 검증 생략
              if ! sudo grep -qE "^[[:space:]]*${k}=" "$DEV_ENV_FILE" 2>/dev/null; then
                continue
              fi
              CHECKED=$((CHECKED+1))
              len=$(sudo cat "/proc/$PID/environ" 2>/dev/null | tr '\0' '\n' | awk -F= -v K="$k" 'BEGIN{ found=0 } $1==K { v=substr($0, length(K)+2); print length(v); found=1; exit } END { if (!found) print "" }')
              if [ -z "$len" ] || [ "$len" = "0" ]; then
                echo "   ❌ ${k} = MISSING (dev.env 정의됨, 프로세스 env 누락)"
                MISSING_ENV=$((MISSING_ENV+1))
              else
                echo "   ✅ ${k} = ($len chars)"
              fi
            done
            if [ "$MISSING_ENV" -gt 0 ]; then
              echo "::error title=프로세스 env 누락::${UNIT} (PID=$PID) 프로세스 환경에 ${MISSING_ENV}/${CHECKED} 종 키가 없습니다. dev.env 형식·따옴표·systemd EnvironmentFile 경로(또는 start.sh set -a/source 패턴) 확인 필요."
            else
              echo "🎉 ${UNIT} 에 dev.env 정의 키 ${CHECKED}종 모두 주입 완료"
            fi
          fi
          echo "::endgroup::"

          # 마커 파일 정리 (다음 배포 사이클에서 재사용)
          sudo rm -f "$MARKER" || true
          echo "🧹 마커 파일 정리 완료"
    # ============================================================================
    # [/P2 2026-06-11 dev.env 일괄 반영 단일 재시작]
    # ============================================================================

    - name: 🏥 개발 서버 헬스체크
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 120s
        command_timeout: 15m
        script: |
          echo "🏥 개발 서버 헬스체크 시작..."
          sleep 10
          
          for i in {1..6}; do
            if curl -f -s --connect-timeout 5 --max-time 10 http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "✅ 개발 서버 헬스체크 성공 (시도 $i)"
              curl -s http://localhost:8080/actuator/health | head -5
              exit 0
            else
              echo "⏳ 헬스체크 대기 중... (시도 $i/6)"
              sleep 15
            fi
          done
          
          echo "⚠️ 헬스체크 실패 - 서비스 로그 확인 필요"
          echo "=== journalctl (최근 400줄, 기동 직후 예외 확인용) ==="
          sudo journalctl -u mindgarden-dev.service --no-pager -n 400
          echo "=== /var/log/mindgarden/dev-error.log (stderr) ==="
          sudo tail -200 /var/log/mindgarden/dev-error.log 2>/dev/null || echo "(파일 없음 또는 비어있음)"
          echo "=== 서비스 WorkingDirectory 로그 디렉터리 ==="
          ls -la /var/www/mindgarden-dev/logs/ 2>/dev/null || true
          echo "=== logs/error.log (기동 직후 예외 확인, 최근 150줄) ==="
          sudo tail -150 /var/www/mindgarden-dev/logs/error.log 2>/dev/null || echo "(파일 없음)"
          for f in /var/www/mindgarden-dev/logs/*.log; do
            [ -f "$f" ] && echo "--- $f (tail 30) ---" && sudo tail -30 "$f" 2>/dev/null || true
          done 2>/dev/null
          exit 1

    - name: 🔍 dev DB clients.phone 컬럼 폭 검증 (Flyway 미적용 조기 감지)
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 120s
        script: |
          if [ ! -f /etc/mindgarden/dev.env ]; then
            echo "❌ /etc/mindgarden/dev.env 없음 — 스키마 자동 검증 불가"
            exit 1
          fi
          set -a
          # shellcheck source=/dev/null
          source /etc/mindgarden/dev.env
          set +a
          DB_PORT="${DB_PORT:-3306}"
          if command -v mysql >/dev/null 2>&1; then
            COL_TYPE=$(mysql -h"$DB_HOST" -P"$DB_PORT" -u"$DB_USERNAME" -p"$DB_PASSWORD" "$DB_NAME" -Nsr -e "SELECT COLUMN_TYPE FROM information_schema.COLUMNS WHERE TABLE_SCHEMA = DATABASE() AND TABLE_NAME = 'clients' AND COLUMN_NAME = 'phone';" 2>/dev/null || true)
            if [ -z "$COL_TYPE" ]; then
              echo "❌ clients.phone 컬럼 타입 조회 실패 (빈 결과). DB 연결·DB_NAME·권한을 확인하세요."
              exit 1
            fi
            echo "📋 clients.phone COLUMN_TYPE=${COL_TYPE}"
            # PR-4 (V20260614_002__normalize_pii_columns_to_512.sql) 머지 후 표준: VARCHAR(512).
            # PII_PROTECTION_STANDARD.md §6 — PII 컬럼 length >= 512 강제.
            if echo "$COL_TYPE" | grep -qi 'varchar(512)'; then
              echo "✅ clients.phone varchar(512) 확인 (PII_PROTECTION_STANDARD §6 정합)"
              exit 0
            fi
            echo "❌ clients.phone이 varchar(512)이 아닙니다 (현재: ${COL_TYPE})."
            echo "   조치: Flyway 실패 시 flyway repair 후 재배포, 또는 V20260614_002 마이그레이션 DDL 수동 적용."
            exit 1
          fi
          echo "⚠️ mysql 클라이언트 없음 — journalctl로 Flyway·기동 로그 대체 검증"
          LOG_SNIP=$(sudo journalctl -u mindgarden-dev.service --no-pager -n 800 2>/dev/null || true)
          if echo "$LOG_SNIP" | grep -qiE 'flyway.*(error|failed|Failed|ERROR)'; then
            echo "❌ 최근 서비스 로그에 Flyway 관련 오류가 있습니다."
            exit 1
          fi
          if echo "$LOG_SNIP" | grep -qiE 'Successfully applied|schema.*up to date|is up to date|No migration needed'; then
            echo "✅ 로그에 Flyway 정상·최신 스키마 문구 확인 (서버에 mysql-client 설치 시 COLUMN_TYPE까지 자동 검증됩니다)"
            exit 0
          fi
          echo "❌ mysql CLI가 없고 Flyway 성공·최신 스키마 로그도 확인되지 않았습니다."
          echo "   조치: mysql 클라이언트 설치 또는 수동으로 SHOW FULL COLUMNS FROM clients LIKE 'phone'; 실행."
          exit 1

  # AI 모니터링 Phase 1 — 개발 BE 배포 실패 시 Discord webhook 알람
  # Secret 미등록 시 알람 skip
  # 참고: docs/project-management/2026-06-11/AI_MONITORING_ROADMAP.md §6 Phase 1
  notify-discord-on-failure:
    name: 🚨 Discord 실패 알람
    needs: [deploy-backend]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: 🚨 Discord 알람 발송
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "⚠️ DISCORD_WEBHOOK_URL Secret 미등록 — 알람 skip"
            exit 0
          fi
          WORKFLOW_NAME="${{ github.workflow }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BRANCH="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          PAYLOAD=$(jq -nc \
            --arg title "❌ CI/배포 실패: $WORKFLOW_NAME" \
            --arg branch "$BRANCH" \
            --arg actor "$ACTOR" \
            --arg sha "$SHORT_SHA" \
            --arg run_url "$RUN_URL" \
            --arg ts "$TIMESTAMP" \
            '{embeds: [{
              title: $title,
              color: 15158332,
              fields: [
                {name: "브랜치", value: ("`" + $branch + "`"), inline: true},
                {name: "Actor", value: $actor, inline: true},
                {name: "SHA", value: ("`" + $sha + "`"), inline: true},
                {name: "Run URL", value: $run_url}
              ],
              timestamp: $ts
            }]}')

          curl -fsS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "⚠️ Discord 발송 실패 (재시도 안 함, 본 알람만 skip)"

