name: 🗓️ 분기 자동 회전 트리거 (정책 §8 자동화)

# ============================================================================
# 분기 자동 회전 트리거 워크플로 (회전 자동화 v2)
#
# 정책 SSOT: docs/standards/SECRET_ROTATION_POLICY.md §2 (분기 1회) + §8 (자동화)
# 트리거 대상: rotate-jwt-secret.yml / rotate-db-password.yml / rotate-social-secrets.yml
#
# 트리거: 분기 첫째날(1/4/7/10월 1일) 02:00 KST = 전일 17:00 UTC + workflow_dispatch
#   cron 은 매월 1일 17:00 UTC 로 등록하고, 워크플로 내부에서 분기 첫째달인지 확인.
#   (GitHub cron expression 은 month-of-year list 가 schedule 단위에 종속되지 않아
#    안전하게 month=1,4,7,10 필터를 추가하지만, 향후 cron 표현 동작 변경 대비
#    내부 month gate 도 유지한다.)
#
# 동작 (회전 대상별):
#   1. JWT_SECRET (dev → 30분 안정 대기 → prod 권고만 (수동 confirm 필요))
#      - dev 자동 디스패치 + 결과 모니터링
#      - prod 는 본 워크플로가 직접 트리거하지 않는다 (confirm_prod=PROD_ROTATE 수동 필수)
#      - 대신 prod 회전 권고 issue 자동 생성
#   2. DB_PASSWORD readonly (dev) — BE 영향 없음, 안전 한정 자동 회전
#      - mindgarden / mindgarden_procedure 는 BE 영향 큼 → 권고 issue 만
#   3. KAKAO/NAVER — 외부 콘솔 의존, 자동화 불가 → 알림 issue 만
#   4. PII_KEY — 재암호화 마이그레이션 필요(§3.4 자동화 외) → disabled flag (현재 비활성)
#
# 사전 가드:
#   - if: github.repository == 'beta0629/MindGarden' (다른 fork 차단)
#   - concurrency: quarterly-rotation (동일 트리거 동시 실행 차단)
#   - 본 워크플로 내부 분기 월 검증 (1/4/7/10 외 즉시 종료)
#   - DRY_RUN 입력 시 dispatch 호출 skip, 알림만 발송
#
# 보안 원칙 (정책 §11):
#   - 회전 워크플로 dispatch 결과 폴링 후 다음 step 진행
#   - secret 평문 출력 절대 금지 (실제 회전 결과 메타만 발송)
#   - permissions 최소화 — workflow dispatch / issue 만 (PAT 별도 사용)
#
# 사후 처리:
#   - 각 회전 결과를 Discord 알림 + GitHub Issue 자동 생성 (트래킹용)
#   - prod 회전이 필요한 secret 은 운영팀이 issue 를 close 처리하며 수동 트리거
# ============================================================================

on:
  schedule:
    # 매월 1일 17:00 UTC (= 2일 02:00 KST). 분기 첫째달 필터는 jobs 내부 gate.
    # GitHub cron 은 month=1,4,7,10 list 도 지원하나, 향후 변경 대비 내부 gate 유지.
    - cron: '0 17 1 1,4,7,10 *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run 모드 (실제 dispatch 없이 issue/Discord 알림만)'
        required: false
        type: boolean
        default: false
      override_quarter_gate:
        description: '분기 첫째달 게이트 우회 (수동 디스패치 시 임의 시점 테스트)'
        required: false
        type: boolean
        default: false

# 동시 실행 차단 — 동일 분기 트리거 중복 회전 방지
concurrency:
  group: quarterly-secret-rotation
  cancel-in-progress: false

# 회전 워크플로 dispatch 호출 + issue 자동 생성에 필요한 최소 권한
# (실제 secret 쓰기는 호출 대상 워크플로의 ROTATION_SECRETS_PAT 가 담당)
permissions:
  contents: read
  actions: write
  issues: write

jobs:
  # ---------------------------------------------------------------------
  # 사전 가드 — 다른 fork 차단 + 분기 첫째달 검증
  # ---------------------------------------------------------------------
  preflight:
    name: 🛡️ 사전 가드 (fork 차단 + 분기 검증)
    if: github.repository == 'beta0629/MindGarden'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      proceed: ${{ steps.gate.outputs.proceed }}
      quarter: ${{ steps.gate.outputs.quarter }}
      kst_date: ${{ steps.gate.outputs.kst_date }}
    env:
      OVERRIDE_GATE: ${{ inputs.override_quarter_gate || 'false' }}
    steps:
      - name: 📅 분기 게이트
        id: gate
        run: |
          set -euo pipefail
          KST_NOW=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M')
          KST_MONTH=$(TZ=Asia/Seoul date +'%-m')
          QUARTER=""
          case "${KST_MONTH}" in
            1)  QUARTER="Q1" ;;
            4)  QUARTER="Q2" ;;
            7)  QUARTER="Q3" ;;
            10) QUARTER="Q4" ;;
          esac
          PROCEED="false"
          if [ -n "${QUARTER}" ]; then
            PROCEED="true"
          fi
          if [ "${OVERRIDE_GATE}" = "true" ]; then
            echo "::warning title=분기 게이트 우회::override_quarter_gate=true 입력으로 임의 시점 dry-run 실행"
            PROCEED="true"
            QUARTER="${QUARTER:-MANUAL}"
          fi

          {
            echo "proceed=${PROCEED}"
            echo "quarter=${QUARTER:-N/A}"
            echo "kst_date=${KST_NOW}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## 🗓️ 분기 자동 회전 게이트"
            echo ""
            echo "- KST 시각: \`${KST_NOW}\`"
            echo "- KST 월: \`${KST_MONTH}\`"
            echo "- 분기: \`${QUARTER:-N/A}\`"
            echo "- 진행 여부: \`${PROCEED}\`"
            echo ""
            echo "정책: \`docs/standards/SECRET_ROTATION_POLICY.md\` §2 / §8"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${PROCEED}" != "true" ]; then
            echo "::notice title=분기 첫째달 아님::month=${KST_MONTH} 은 분기 첫째달(1/4/7/10)이 아님 — 자동 회전 skip"
            exit 0
          fi
          echo "✅ 분기 게이트 통과 — ${QUARTER}"

  # ---------------------------------------------------------------------
  # JWT_SECRET dev 자동 회전 (분기 1회)
  # prod 회전은 별도 권고 issue (수동 confirm 필수, §3.1)
  # ---------------------------------------------------------------------
  rotate-jwt-dev:
    name: 🔁 JWT_SECRET dev 자동 회전
    needs: [preflight]
    if: needs.preflight.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
      QUARTER: ${{ needs.preflight.outputs.quarter }}
      GH_TOKEN: ${{ secrets.ROTATION_SECRETS_PAT }}
    steps:
      - name: 🔍 PAT 사전 확인
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error title=PAT 미설정::secrets.ROTATION_SECRETS_PAT 미설정 — 분기 자동 회전 차단. 정책 §3.1 사전 조건."
            exit 1
          fi
          echo "✅ ROTATION_SECRETS_PAT 등록 확인"

      - name: 🚀 rotate-jwt-secret.yml dev dispatch
        if: env.DRY_RUN != 'true'
        id: dispatch
        run: |
          set -euo pipefail
          BEFORE_TS=$(date -u +%s)
          gh workflow run rotate-jwt-secret.yml \
            --repo "${{ github.repository }}" \
            --ref develop \
            -f environment=dev \
            -f confirm=ROTATE \
            -f trigger_reason=정기

          # dispatch 후 신규 run 등록까지 최대 60초 polling (5s × 12)
          ROTATE_RUN_ID=""
          for i in $(seq 1 12); do
            sleep 5
            ROTATE_RUN_ID=$(gh run list \
              --workflow=rotate-jwt-secret.yml \
              --limit 10 \
              --json databaseId,createdAt,event \
              --jq "[.[] | select(.event == \"workflow_dispatch\") | select((.createdAt | fromdateiso8601) >= ${BEFORE_TS})] | sort_by(.createdAt) | last | .databaseId" 2>/dev/null || true)
            if [ -n "${ROTATE_RUN_ID}" ] && [ "${ROTATE_RUN_ID}" != "null" ]; then
              echo "✅ 회전 run 캡처: ${ROTATE_RUN_ID} (시도 ${i}/12)"
              break
            fi
            ROTATE_RUN_ID=""
          done
          if [ -z "${ROTATE_RUN_ID}" ]; then
            echo "::error title=회전 run 캡처 실패::dispatch 후 60초 이내 신규 run 미감지"
            exit 1
          fi
          echo "rotate_run_id=${ROTATE_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: ⏳ 회전 run 완료 대기
        if: env.DRY_RUN != 'true' && steps.dispatch.outputs.rotate_run_id != ''
        env:
          ROTATE_RUN_ID: ${{ steps.dispatch.outputs.rotate_run_id }}
        run: |
          set -euo pipefail
          echo "::group::회전 run 완료 대기 (run_id=${ROTATE_RUN_ID})"
          if ! gh run watch "${ROTATE_RUN_ID}" --repo "${{ github.repository }}" --exit-status; then
            echo "::error title=회전 실패::JWT_SECRET dev 자동 회전 run ${ROTATE_RUN_ID} 실패. 정책 §6 롤백 검토."
            exit 1
          fi
          echo "::endgroup::"
          echo "✅ JWT_SECRET dev 회전 완료"

      - name: 📋 dry-run 안내
        if: env.DRY_RUN == 'true'
        run: |
          echo "::notice title=Dry-run::JWT_SECRET dev 회전 dispatch skip (dry_run=true)"

      - name: ⏸️ 30분 안정 대기 (prod 회전 권고 issue 생성 전 모니터링 시간)
        if: env.DRY_RUN != 'true'
        run: |
          echo "🕒 30분 안정 대기 시작 (prod 회전 권고 issue 발행 전 dev 안정성 모니터링)"
          sleep 1800
          echo "✅ 30분 경과 — prod 권고 issue 발행 단계 진입"

  # ---------------------------------------------------------------------
  # DB_PASSWORD dev readonly 자동 회전 (안전 한정)
  # mindgarden / mindgarden_procedure 는 권고 issue 만
  # ---------------------------------------------------------------------
  rotate-db-readonly-dev:
    name: 🔁 DB_PASSWORD dev readonly 자동 회전
    needs: [preflight]
    if: needs.preflight.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
      GH_TOKEN: ${{ secrets.ROTATION_SECRETS_PAT }}
    steps:
      - name: 🔍 PAT 사전 확인
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error title=PAT 미설정::secrets.ROTATION_SECRETS_PAT 미설정 — 분기 자동 회전 차단."
            exit 1
          fi
          echo "✅ ROTATION_SECRETS_PAT 등록 확인"

      - name: 🚀 rotate-db-password.yml dev/readonly dispatch
        if: env.DRY_RUN != 'true'
        id: dispatch
        run: |
          set -euo pipefail
          BEFORE_TS=$(date -u +%s)
          gh workflow run rotate-db-password.yml \
            --repo "${{ github.repository }}" \
            --ref develop \
            -f environment=dev \
            -f user=mindgarden_readonly \
            -f confirm=ROTATE \
            -f confirm_dba=DBA_APPROVED \
            -f trigger_reason=정기

          ROTATE_RUN_ID=""
          for i in $(seq 1 12); do
            sleep 5
            ROTATE_RUN_ID=$(gh run list \
              --workflow=rotate-db-password.yml \
              --limit 10 \
              --json databaseId,createdAt,event \
              --jq "[.[] | select(.event == \"workflow_dispatch\") | select((.createdAt | fromdateiso8601) >= ${BEFORE_TS})] | sort_by(.createdAt) | last | .databaseId" 2>/dev/null || true)
            if [ -n "${ROTATE_RUN_ID}" ] && [ "${ROTATE_RUN_ID}" != "null" ]; then
              echo "✅ 회전 run 캡처: ${ROTATE_RUN_ID} (시도 ${i}/12)"
              break
            fi
            ROTATE_RUN_ID=""
          done
          if [ -z "${ROTATE_RUN_ID}" ]; then
            echo "::error title=회전 run 캡처 실패::dispatch 후 60초 이내 신규 run 미감지"
            exit 1
          fi
          echo "rotate_run_id=${ROTATE_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: ⏳ 회전 run 완료 대기
        if: env.DRY_RUN != 'true' && steps.dispatch.outputs.rotate_run_id != ''
        env:
          ROTATE_RUN_ID: ${{ steps.dispatch.outputs.rotate_run_id }}
        run: |
          set -euo pipefail
          if ! gh run watch "${ROTATE_RUN_ID}" --repo "${{ github.repository }}" --exit-status; then
            echo "::error title=회전 실패::DB_PASSWORD readonly dev 회전 run ${ROTATE_RUN_ID} 실패."
            exit 1
          fi
          echo "✅ DB_PASSWORD readonly dev 회전 완료"

      - name: 📋 dry-run 안내
        if: env.DRY_RUN == 'true'
        run: |
          echo "::notice title=Dry-run::DB_PASSWORD readonly dev 회전 dispatch skip (dry_run=true)"

  # ---------------------------------------------------------------------
  # 수동 회전 권고 issue (prod JWT_SECRET / KAKAO/NAVER / DB_PASSWORD mindgarden / PII)
  # ---------------------------------------------------------------------
  recommend-manual-rotations:
    name: 📌 수동 회전 권고 issue
    needs: [preflight, rotate-jwt-dev, rotate-db-readonly-dev]
    # 이전 자동 회전 jobs 가 실패해도 권고 issue 는 발행 (운영팀 수동 처리 트래킹)
    if: always() && needs.preflight.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      QUARTER: ${{ needs.preflight.outputs.quarter }}
      KST_DATE: ${{ needs.preflight.outputs.kst_date }}
      JWT_DEV_RESULT: ${{ needs.rotate-jwt-dev.result }}
      DB_RO_DEV_RESULT: ${{ needs.rotate-db-readonly-dev.result }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: 🐛 분기 회전 권고 issue 자동 생성
        if: env.DRY_RUN != 'true'
        run: |
          # shellcheck disable=SC2016 # 마크다운 백틱은 단일 인용 유지
          set -euo pipefail
          TITLE="📌 ${QUARTER} 분기 SECRET 회전 — 수동 처리 대상 (자동 생성)"
          BODY_FILE=$(mktemp)
          # heredoc 본문은 YAML 들여쓰기(10칸) 유지, sed 로 정확히 strip
          sed 's/^          //' > "$BODY_FILE" <<EOF
          ## 📌 ${QUARTER} 분기 자동 회전 결과 + 수동 회전 대상

          본 issue 는 \`.github/workflows/quarterly-secret-rotation-trigger.yml\` 워크플로가
          분기 첫째날 자동 생성합니다. 자동 회전이 끝난 secret 외 **수동 처리 대상**을
          운영팀이 close 처리하며 진행합니다.

          - 트리거 시각 (KST): \`${KST_DATE}\`
          - 분기: \`${QUARTER}\`

          ### ✅ 자동 회전 (이번 분기 처리됨)

          | Secret | 환경 | 결과 |
          |---|---|---|
          | \`JWT_SECRET\` | dev | \`${JWT_DEV_RESULT}\` |
          | \`DB_PASSWORD\` (\`mindgarden_readonly\`) | dev | \`${DB_RO_DEV_RESULT}\` |

          ### ⚠️ 수동 회전 대상 (운영팀 처리)

          1. **\`JWT_SECRET\` prod 회전** (정책 §3.1)
             - dev 회전 24시간 무사고 통과 후 운영팀이 직접 트리거
             - \`gh workflow run rotate-jwt-secret.yml -f environment=prod -f confirm=ROTATE -f confirm_prod=PROD_ROTATE -f trigger_reason=정기\`
          2. **\`DB_PASSWORD\` prod 회전** (정책 §3.3)
             - DBA 24h 사전 통지 + \`confirm_dba=DBA_APPROVED\` 입력 필수
             - \`gh workflow run rotate-db-password.yml -f environment=prod -f user=mindgarden -f confirm=ROTATE -f confirm_prod=PROD_ROTATE -f confirm_dba=DBA_APPROVED -f trigger_reason=정기\`
          3. **\`KAKAO_CLIENT_SECRET\` / \`NAVER_CLIENT_SECRET\`** (정책 §3.2)
             - 외부 콘솔(Kakao/Naver Developers)에서 신규 시크릿 발급 후
             - \`gh workflow run rotate-social-secrets.yml -f environment=prod -f provider=BOTH -f confirm=ROTATE -f confirm_prod=PROD_ROTATE -f trigger_reason=정기\`
          4. **\`PERSONAL_DATA_ENCRYPTION_KEY\`** (정책 §3.4)
             - 자동화 범위 외 — 재암호화 마이그레이션 필요. 별도 설계서 작성 후 진행.
             - 현재 분기 회전 자동 트리거 disabled.

          ### 사후 검증 (각 회전 완료 시)

          - 정책 §5 사후 검증 체크리스트 통과
          - \`docs/operations/secret-rotation-history.md\` 자동 append PR 머지 확인
          - 회전 직후 5분간 5xx 비율 모니터링 (Datadog / Sentry)

          ### 참조

          - 정책: \`docs/standards/SECRET_ROTATION_POLICY.md\` §2 / §8
          - prod Environment 보호: \`docs/operations/prod-environment-protection.md\`
          - 워크플로: \`.github/workflows/quarterly-secret-rotation-trigger.yml\`
          EOF

          gh issue create \
            --title "$TITLE" \
            --body-file "$BODY_FILE" \
            --label "security" \
            --label "secret-rotation" \
            --label "quarterly-rotation"

      - name: 📋 dry-run 안내
        if: env.DRY_RUN == 'true'
        run: |
          echo "::notice title=Dry-run::권고 issue 생성 skip (dry_run=true)"
          {
            echo "## 📌 [DRY-RUN] ${QUARTER} 분기 회전 권고"
            echo ""
            echo "- JWT dev: \`${JWT_DEV_RESULT}\`"
            echo "- DB readonly dev: \`${DB_RO_DEV_RESULT}\`"
            echo ""
            echo "실제 issue 는 dry_run=false 시 생성됩니다."
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------
  # Discord 분기 트리거 알림 (시작/종료 요약)
  # ---------------------------------------------------------------------
  notify-discord:
    name: 📡 Discord 분기 트리거 알림
    needs: [preflight, rotate-jwt-dev, rotate-db-readonly-dev, recommend-manual-rotations]
    if: always() && needs.preflight.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      QUARTER: ${{ needs.preflight.outputs.quarter }}
      KST_DATE: ${{ needs.preflight.outputs.kst_date }}
      JWT_DEV_RESULT: ${{ needs.rotate-jwt-dev.result }}
      DB_RO_DEV_RESULT: ${{ needs.rotate-db-readonly-dev.result }}
      ISSUE_RESULT: ${{ needs.recommend-manual-rotations.result }}
      RUN_ID: ${{ github.run_id }}
      REPO_FULL: ${{ github.repository }}
    steps:
      - name: 📡 Discord 알림 발송
        if: env.DRY_RUN != 'true'
        run: |
          # shellcheck disable=SC2016 # jq 필터는 단일 인용 유지
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "::warning title=Discord webhook 미설정::DISCORD_WEBHOOK_URL Secret 미등록 — 알림 skip"
            exit 0
          fi
          RUN_URL="https://github.com/${REPO_FULL}/actions/runs/${RUN_ID}"
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # 색상: 자동 회전 중 1건이라도 failure 면 빨강, 아니면 청색
          COLOR="3447003"  # blue
          TITLE="🗓️ ${QUARTER} 분기 자동 회전 트리거 — 완료"
          if [ "${JWT_DEV_RESULT}" = "failure" ] || [ "${DB_RO_DEV_RESULT}" = "failure" ]; then
            COLOR="15158332"  # red
            TITLE="🚨 ${QUARTER} 분기 자동 회전 — 일부 실패"
          fi

          PAYLOAD=$(jq -nc \
            --arg title "${TITLE}" \
            --argjson color "${COLOR}" \
            --arg quarter "${QUARTER}" \
            --arg kst_date "${KST_DATE}" \
            --arg jwt "${JWT_DEV_RESULT}" \
            --arg db_ro "${DB_RO_DEV_RESULT}" \
            --arg issue "${ISSUE_RESULT}" \
            --arg run_url "${RUN_URL}" \
            --arg ts "${TIMESTAMP}" \
            '{embeds: [{
              title: $title,
              color: $color,
              fields: [
                {name: "분기", value: ("`" + $quarter + "`"), inline: true},
                {name: "KST 시각", value: ("`" + $kst_date + "`"), inline: true},
                {name: "JWT_SECRET dev", value: ("`" + $jwt + "`"), inline: true},
                {name: "DB readonly dev", value: ("`" + $db_ro + "`"), inline: true},
                {name: "권고 issue", value: ("`" + $issue + "`"), inline: true},
                {name: "Run URL", value: $run_url}
              ],
              timestamp: $ts
            }]}')

          curl -fsS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "⚠️ Discord 발송 실패 (재시도 안 함)"

      - name: 📋 dry-run 안내
        if: env.DRY_RUN == 'true'
        run: |
          echo "::notice title=Dry-run::Discord 알림 skip (dry_run=true)"
