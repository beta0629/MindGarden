name: 🔧 Ops 프론트엔드 개발 서버 배포
# 배포 트리거: 2025-12-10

on:
  push:
    branches: [ develop ]
    paths:
      - 'frontend-ops/**'
      - '.github/workflows/deploy-ops-dev.yml'
  workflow_dispatch:
    # 수동 실행 가능

jobs:
  build:
    name: 🏗️ Ops 프론트엔드 빌드
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 📦 Node.js 18 설정
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend-ops/package-lock.json

      - name: 📦 Ops 프론트엔드 의존성 설치
        run: |
          cd frontend-ops
          npm ci

      - name: 🏗️ Ops 프론트엔드 빌드
        env:
          NEXT_PUBLIC_OPS_API_BASE_URL: "https://ops.dev.e-trinity.co.kr/api/v1"
          NEXT_PUBLIC_CORE_API_BASE_URL: "https://api.dev.core-solution.co.kr/api/v1"
          NEXT_PUBLIC_CORE_SOLUTION_URL: "https://dev.core-solution.co.kr"
          NEXT_PUBLIC_OPS_API_USE_MOCK: "false"
          NODE_ENV: production
          BUILD_STANDALONE: "true"
        run: |
          cd frontend-ops
          ESLINT_NO_DEV_ERRORS=true npm run build

      - name: 🔍 Ops 프론트엔드 빌드 결과 확인
        run: |
          echo "🔍 Ops 프론트엔드 빌드 결과 확인..."
          if [ -d frontend-ops/out ]; then
            FILE_COUNT=$(find frontend-ops/out -type f 2>/dev/null | wc -l)
            if [ "$FILE_COUNT" -gt 0 ]; then
              echo "✅ frontend-ops/out 디렉토리 생성됨: $FILE_COUNT 개 파일"
              find frontend-ops/out -maxdepth 1 -type f -print0 2>/dev/null | head -z -n 10 | xargs -0r ls -lh
            else
              echo "❌ frontend-ops/out 디렉토리가 비어있음!"
              exit 1
            fi
          else
            echo "❌ frontend-ops/out 디렉토리 없음!"
            exit 1
          fi

      - name: 📦 배포용 아티팩트 스테이징
        run: |
          rm -rf _gha_static_site_upload
          mkdir -p _gha_static_site_upload
          cp -a frontend-ops/out/. _gha_static_site_upload/

      - name: 📤 빌드 산출물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ops-static-site-artifact
          path: _gha_static_site_upload/

  deploy:
    name: 📤 Ops 개발 서버 배포
    needs: build
    uses: ./.github/workflows/reusable-static-site-ssh-deploy.yml
    with:
      site_label: Ops(개발)
      remote_html_dir: html-ops
      backup_subdir: html-ops
      backup_tar_prefix: html-ops-backup
      scp_source: _static_site_upload/*
      strip_components: 1
      artifact_name: ops-static-site-artifact
      health_urls: |
        https://ops.dev.e-trinity.co.kr
    secrets:
      ssh_host: ${{ secrets.DEV_SERVER_HOST }}
      ssh_user: ${{ secrets.DEV_SERVER_USER }}
      ssh_key: ${{ secrets.DEV_SERVER_SSH_KEY }}
