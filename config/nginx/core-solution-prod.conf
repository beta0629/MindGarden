# ============================================
# 운영 서버 통합 Nginx 설정 파일
# 서버 IP: 211.37.179.204
# ============================================
#
# Core API 블루그린(이중 JVM·포트 분리) 시: SPA/정적 root 는 그대로 두고,
# /api/·/actuator/·/oauth2/·/login/oauth2/ 의 proxy_pass 만 upstream 으로 통일한다.
# 예시: config/nginx/snippets/upstream-mindgarden-core-api-bluegreen.conf.example
# 절차: deployment/README-BLUEGREEN.md
# ============================================
# 이 파일은 모든 운영 서버 도메인을 포함합니다:
# - app.core-solution.co.kr
# - api.core-solution.co.kr
# - e-trinity.co.kr
# - apply.e-trinity.co.kr
# - ops.e-trinity.co.kr
# - *.core-solution.co.kr (테넌트 서브도메인)
# - core-solution.co.kr (apex) — 테넌트 Host 불가 → app.core-solution.co.kr 로 301, LE: /etc/letsencrypt/live/core-solution.co.kr/
# ============================================

# Core API (MindGarden JAR) — 단일 호스트 블루그린: upstream 정의는 스니펫(포트 전환).
# 운영: include 파일은 배포 전 /etc/nginx/snippets/ 에 존재해야 함(최초 1회 수동 또는 첫 배포 스크립트).
include /etc/nginx/snippets/mindgarden-core-backend-upstream.conf;

# ============================================
# Apex 루트 도메인: core-solution.co.kr, www.core-solution.co.kr
# apex는 테넌트 식별 불가 → 공용 앱 호스트(https://app.core-solution.co.kr)로 301 리다이렉트
# (와일드카드 *.core-solution.co.kr 인증서에 www 포함, apex는 동일 라인 인증서 사용)
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name core-solution.co.kr www.core-solution.co.kr;

    location /.well-known/acme-challenge/ {
        default_type text/plain;
        root /var/www/html;
    }

    location / {
        return 301 https://app.core-solution.co.kr$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.core-solution.co.kr;

    ssl_certificate /etc/letsencrypt/live/core-solution.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/core-solution.co.kr/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    return 301 https://app.core-solution.co.kr$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name core-solution.co.kr;

    ssl_certificate /etc/letsencrypt/live/core-solution.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/core-solution.co.kr/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    return 301 https://app.core-solution.co.kr$request_uri;

    access_log /var/log/nginx/core-solution.co.kr.access.log;
    error_log /var/log/nginx/core-solution.co.kr.error.log;
}

# ============================================
# 운영 서버: app.core-solution.co.kr
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name app.core-solution.co.kr;

    location /.well-known/acme-challenge/ {
        default_type text/plain;
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.core-solution.co.kr;

    ssl_certificate /etc/letsencrypt/live/app.core-solution.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.core-solution.co.kr/privkey.pem;

    # SSL 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 보안 헤더
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 백엔드: REST·헬스·OAuth2 (루트·클라이언트 라우트는 아래 React 정적)
    location /api/ {
        proxy_pass http://mindgarden_core_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /actuator/ {
        proxy_pass http://mindgarden_core_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /oauth2/ {
        proxy_pass http://mindgarden_core_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /login/oauth2/ {
        proxy_pass http://mindgarden_core_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Core Solution React (deploy-production: /var/www/mindgarden/frontend/)
    # 해시 번들은 장기 캐시; HTML·SPA 라우트는 재검증(옛 index로 옛 JS 로드 방지)
    location ^~ /static/ {
        root /var/www/mindgarden/frontend;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    location / {
        root /var/www/mindgarden/frontend;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # 로그 설정
    access_log /var/log/nginx/app.core-solution.co.kr.access.log;
    error_log /var/log/nginx/app.core-solution.co.kr.error.log;
}

