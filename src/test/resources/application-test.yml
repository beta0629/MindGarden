# 테스트 환경 설정 (MySQL 개발 DB 연동)
# Flyway: 미적용 마이그레이션만 실행. clean은 비활성(공유 DB 보호). application-local.yml과 동일 패턴.
# 공유 DB(운영/CI): V20260330_001 등 마이그레이션 미적용 시 clients.phone truncation 등 DDL 불일치로 실패할 수 있음.
spring:
  datasource:
    url: jdbc:mysql://beta0629.cafe24.com:3306/core_solution?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useUnicode=true&characterSetResults=UTF-8&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci
    username: mindgarden_dev
    password: MindGardenDev2025!@#
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none # Flyway가 스키마를 관리하므로 Hibernate의 ddl-auto는 비활성화
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        use_sql_comments: true
  task:
    scheduling:
      enabled: false  # 통합 테스트에서 스케줄·공유 DB 부하·종료 시 풀 경쟁 완화 (application-local.yml과 동일 패턴)
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false # 공유 개발 DB에서 checksum drift 허용 (로컬 프로파일과 동일)
    clean-disabled: true # clean 금지 — 공유 DB destructive 방지
    out-of-order: false

# 로깅 설정 (테스트 환경에서는 간소화)
logging:
  level:
    root: WARN
    com.coresolution: INFO
    org.springframework: WARN
    org.hibernate: WARN
    org.flywaydb: INFO

# ERD 자동 생성 비활성화
erd:
  auto-generation:
    enabled: false
    trigger-on-migration: false

# 기타 테스트 관련 설정
server:
  port: 8081 # 테스트 서버 포트 충돌 방지 (선택 사항)

# 테스트용 환경 변수 (필수)
# JWT 설정
JWT_SECRET: "test-jwt-secret-key-for-integration-test-only-minimum-32-characters-required"
JWT_EXPIRATION: 86400000
JWT_REFRESH_EXPIRATION: 604800000

# 개인정보 암호화 설정 (테스트용)
PERSONAL_DATA_ENCRYPTION_KEY: "test-encryption-key-32-characters-long-required"
PERSONAL_DATA_ENCRYPTION_IV: "test-iv-16-chars"

# OpenAI 설정 (테스트용 - 선택적)
OPENAI_API_KEY: "test-openai-key"
OPENAI_API_URL: "https://api.openai.com/v1"
OPENAI_MODEL: "gpt-3.5-turbo"

# 이메일 설정 (테스트용 - 선택적)
email:
  block-all-outbound: true
  send-allowlist: ""

# Ops Portal 관리자 설정 (테스트용)
ops:
  admin:
    username: "test-admin@mindgarden.com"
    password: "test-password-123"
    role: "HQ_ADMIN"
