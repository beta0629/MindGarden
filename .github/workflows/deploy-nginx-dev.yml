name: 🌐 Nginx 설정 개발 서버 배포

on:
  push:
    branches: [ develop ]
    paths:
      - 'config/nginx/**'
      - '.github/workflows/deploy-nginx-dev.yml'
  workflow_dispatch:
    # 수동 실행 가능

jobs:
  deploy-nginx:
    name: 🌐 Nginx 설정 배포
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 📤 Nginx 설정 파일 업로드 (개발 서버 - 통합 설정)
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 120s
        source: "config/nginx/core-solution-dev.conf"
        target: "/tmp/"
        overwrite: true
        
    - name: 📤 Nginx 설정 파일 업로드 (개발 서버 - 기존 도메인)
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 120s
        source: "config/nginx/dev.m-garden.co.kr.conf"
        target: "/tmp/"
        overwrite: true
        
    - name: 🔄 Nginx 설정 적용 및 재시작
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.DEV_SERVER_HOST }}
        username: ${{ secrets.DEV_SERVER_USER }}
        key: ${{ secrets.DEV_SERVER_SSH_KEY }}
        port: 22
        timeout: 30s
        script: |
          echo "🌐 Nginx 설정 업데이트 시작..."
          
          # SSL 인증서 확인 및 발급
          echo "🔐 SSL 인증서 확인 중..."
          
          # dev.e-trinity.co.kr 인증서 확인 및 발급
          if [ ! -f /etc/letsencrypt/live/dev.e-trinity.co.kr/fullchain.pem ]; then
            echo "⚠️ dev.e-trinity.co.kr 인증서가 없습니다. 발급 시도 중..."
            # standalone 방식으로 인증서 발급 (Nginx 중지 필요)
            sudo systemctl stop nginx 2>/dev/null || true
            if sudo certbot certonly --standalone -d dev.e-trinity.co.kr --non-interactive --agree-tos --email admin@e-trinity.co.kr --preferred-challenges http 2>&1; then
              echo "✅ dev.e-trinity.co.kr 인증서 발급 성공"
            else
              echo "⚠️ 인증서 발급 실패 - 수동 발급 필요"
            fi
            sudo systemctl start nginx 2>/dev/null || true
          else
            # 인증서가 있지만 잘못된 인증서일 수 있으므로 확인 후 재발급
            echo "🔍 dev.e-trinity.co.kr 인증서 확인 중..."
            CERT_CN=$(openssl x509 -noout -subject -in /etc/letsencrypt/live/dev.e-trinity.co.kr/fullchain.pem 2>/dev/null | grep -o 'CN=[^,]*' | cut -d= -f2)
            if [ "$CERT_CN" != "dev.e-trinity.co.kr" ]; then
              echo "⚠️ 잘못된 인증서 감지 (CN=$CERT_CN). 재발급 시도 중..."
              sudo certbot delete --cert-name dev.e-trinity.co.kr --non-interactive 2>/dev/null || true
              sudo systemctl stop nginx 2>/dev/null || true
              if sudo certbot certonly --standalone -d dev.e-trinity.co.kr --non-interactive --agree-tos --email admin@e-trinity.co.kr --preferred-challenges http 2>&1; then
                echo "✅ dev.e-trinity.co.kr 인증서 재발급 성공"
              else
                echo "⚠️ 인증서 재발급 실패 - 수동 발급 필요"
              fi
              sudo systemctl start nginx 2>/dev/null || true
            else
              echo "✅ dev.e-trinity.co.kr 인증서 유효"
            fi
          fi
          
          # apply.dev.e-trinity.co.kr 인증서 확인 및 발급
          if [ ! -f /etc/letsencrypt/live/apply.dev.e-trinity.co.kr/fullchain.pem ]; then
            echo "⚠️ apply.dev.e-trinity.co.kr 인증서가 없습니다. 발급 시도 중..."
            sudo systemctl stop nginx 2>/dev/null || true
            if sudo certbot certonly --standalone -d apply.dev.e-trinity.co.kr --non-interactive --agree-tos --email admin@e-trinity.co.kr --preferred-challenges http 2>&1; then
              echo "✅ apply.dev.e-trinity.co.kr 인증서 발급 성공"
            else
              echo "⚠️ 인증서 발급 실패 - 수동 발급 필요"
            fi
            sudo systemctl start nginx 2>/dev/null || true
          else
            echo "✅ apply.dev.e-trinity.co.kr 인증서 유효"
          fi
          
          # ops.dev.e-trinity.co.kr 인증서 확인 및 발급
          if [ ! -f /etc/letsencrypt/live/ops.dev.e-trinity.co.kr/fullchain.pem ]; then
            echo "⚠️ ops.dev.e-trinity.co.kr 인증서가 없습니다. 발급 시도 중..."
            sudo systemctl stop nginx 2>/dev/null || true
            if sudo certbot certonly --standalone -d ops.dev.e-trinity.co.kr --non-interactive --agree-tos --email admin@e-trinity.co.kr --preferred-challenges http 2>&1; then
              echo "✅ ops.dev.e-trinity.co.kr 인증서 발급 성공"
            else
              echo "⚠️ 인증서 발급 실패 - 수동 발급 필요"
            fi
            sudo systemctl start nginx 2>/dev/null || true
          else
            echo "✅ ops.dev.e-trinity.co.kr 인증서 유효"
          fi
          
          # Nginx 설정 업데이트 (전체 설정 적용)
          if [ -f /tmp/core-solution-dev.conf ]; then
            echo "🌐 Nginx 통합 설정 업데이트 중..."
            sudo cp /tmp/core-solution-dev.conf /etc/nginx/sites-available/core-solution-dev
            sudo ln -sf /etc/nginx/sites-available/core-solution-dev /etc/nginx/sites-enabled/core-solution-dev
            echo "✅ 통합 설정 파일 적용 완료"
          fi
          
          # 기존 도메인 설정 업데이트 (하위 호환성)
          if [ -f /tmp/dev.m-garden.co.kr.conf ]; then
            echo "🌐 Nginx 기존 도메인 설정 업데이트 중..."
            sudo cp /tmp/dev.m-garden.co.kr.conf /etc/nginx/sites-available/dev.m-garden.co.kr.conf
            sudo ln -sf /etc/nginx/sites-available/dev.m-garden.co.kr.conf /etc/nginx/sites-enabled/dev.m-garden.co.kr.conf
            echo "✅ 기존 도메인 설정 파일 적용 완료"
          fi
          
          # 프론트엔드 디렉토리 권한 설정
          sudo mkdir -p /var/www/html-dev
          sudo chown -R www-data:www-data /var/www/html-dev
          sudo chmod -R 755 /var/www/html-dev
          
          # Trinity 프론트엔드 디렉토리 생성 및 권한 설정
          sudo mkdir -p /var/www/html-trinity
          sudo chown -R www-data:www-data /var/www/html-trinity
          sudo chmod -R 755 /var/www/html-trinity
          
          # Ops 프론트엔드 디렉토리 생성 및 권한 설정
          sudo mkdir -p /var/www/html-ops
          sudo chown -R www-data:www-data /var/www/html-ops
          sudo chmod -R 755 /var/www/html-ops
          
          # Nginx 설정 테스트
          if sudo nginx -t; then
            sudo systemctl reload nginx
            echo "✅ Nginx 설정 업데이트 완료"
          else
            echo "❌ Nginx 설정 오류 - 수동 확인 필요"
            sudo nginx -t
            exit 1
          fi
          
    - name: ✅ Nginx 설정 배포 완료
      run: |
        echo "✅ Nginx 설정 배포 완료"
        echo "🌐 적용된 도메인:"
        echo "  - dev.core-solution.co.kr (CoreSolution)"
        echo "  - apply.dev.e-trinity.co.kr (Trinity 온보딩)"
        echo "  - ops.dev.e-trinity.co.kr (Ops 포털)"

