# SSH: PRODUCTION_HOST, PRODUCTION_USER, PRODUCTION_SSH_KEY (deploy-procedures-dev.yml의 점프 서버와 다를 수 있음).
# DB: deploy-procedures-dev.yml과 동일 — DEV_DB_HOST, DEV_DB_PASSWORD 필수. DEV_DB_USER·DEV_DB_NAME은 선택(미설정 시 스크립트 개발과 동일 기본값).
# 운영 호스트에서 mysql 클라이언트가 개발 DB로 접속 가능해야 함(방화벽·bind-address). 불가 시 배포 방식 재검토 필요.
# refs: deploy-procedures-dev.yml, deploy-standardized-procedures.sh prod 분기

name: 📦 표준화된 프로시저 배포 (운영)

on:
  workflow_dispatch:  # 수동 실행만 가능

jobs:
  deploy-procedures:
    name: 🚀 프로시저 배포
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 🔧 배포용 프로시저 파일 생성
      run: |
        chmod +x database/schema/procedures_standardized/create_deployment_files.sh
        bash database/schema/procedures_standardized/create_deployment_files.sh

    - name: 🔑 known_hosts 추가 (Host key verification 방지)
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H "${{ secrets.PRODUCTION_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
    
    - name: 📤 프로시저 배포
      run: |
        if [ -z "${{ secrets.DEV_DB_HOST }}" ]; then
          echo "::error::DEV_DB_HOST 시크릿이 필요합니다. (개발 프로시저 배포와 동일한 DB 호스트)"
          exit 1
        fi
        if [ -z "${{ secrets.DEV_DB_PASSWORD }}" ]; then
          echo "::error::DEV_DB_PASSWORD 시크릿이 필요합니다. (개발과 동일한 DB 비밀번호)"
          exit 1
        fi

        export PROD_SERVER_HOST="${{ secrets.PRODUCTION_HOST }}"
        export PROD_SERVER_USER="${{ secrets.PRODUCTION_USER }}"
        export PROD_DB_HOST="${{ secrets.DEV_DB_HOST }}"
        export PROD_DB_PASSWORD="${{ secrets.DEV_DB_PASSWORD }}"
        U_SECRET="${{ secrets.DEV_DB_USER }}"
        [ -n "$U_SECRET" ] && export PROD_DB_USER="$U_SECRET"
        N_SECRET="${{ secrets.DEV_DB_NAME }}"
        [ -n "$N_SECRET" ] && export PROD_DB_NAME="$N_SECRET"

        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/prod_ci_key
        chmod 600 ~/.ssh/prod_ci_key
        eval "$(ssh-agent -s)"
        ssh-add ~/.ssh/prod_ci_key
        chmod +x scripts/automation/deployment/deploy-standardized-procedures.sh
        bash scripts/automation/deployment/deploy-standardized-procedures.sh prod
