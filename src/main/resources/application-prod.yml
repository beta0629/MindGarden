# 프로덕션 환경 설정

# 개발 모드 비활성화 (운영 환경)
isDev: false

# 데이터베이스 백업 설정
backup:
  directory: /home/backup/database
  log:
    directory: /home/backup/logs

# Redis 캐시 활성화 (운영 환경)
spring:
  cache:
    type: redis
    redis:
      time-to-live: 3600000  # 1시간 (밀리초)
      cache-null-values: false
  main:
    allow-circular-references: false  # 순환 참조 비활성화 (프로덕션용)
  # Redis 설정
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  
  # 프로덕션 환경 전용 설정
  
  # 데이터베이스 설정 (프로덕션)
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useSSL=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useUnicode=true&allowPublicKeyRetrieval=false&connectionCollation=utf8mb4_unicode_ci&characterSetResults=utf8mb4
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 풀 상한은 인스턴스 수·MySQL max_connections와 합산 정합 필요 (HIKARI_* 환경 변수)
    hikari:
      maximum-pool-size: ${HIKARI_MAXIMUM_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MINIMUM_IDLE:5}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${HIKARI_MAX_LIFETIME_MS:1800000}
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION_THRESHOLD_MS:60000}
  
  # Flyway (운영): 기동 시 classpath:db/migration 적용. 기존 DB는 baseline-on-migrate 로 히스토리 정합.
  # 비상 시에만 서비스 Environment: SPRING_FLYWAY_ENABLED=false
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    # 비상 시 systemd Environment 로 SPRING_FLYWAY_VALIDATE_ON_MIGRATE=false 가능, 기본은 true.
    validate-on-migrate: ${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:true}
    clean-disabled: true
    # 상위 버전만 선적용된 뒤 중간 마이그레이션(예: 20260424.005)이 추가된 경우 검증 실패 방지.
    # 갭이 메워진 뒤 보수적으로 끄려면 SPRING_FLYWAY_OUT_OF_ORDER=false.
    out-of-order: ${SPRING_FLYWAY_OUT_OF_ORDER:true}

  # JPA 설정 (프로덕션)
  jpa:
    hibernate:
      ddl-auto: validate  # 스키마 검증만 수행
    show-sql: false  # SQL 로그 비활성화
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false
        use_sql_comments: false
        jdbc:
          batch_size: 50
        cache:
          use_second_level_cache: false
          use_query_cache: false
    database-platform: org.hibernate.dialect.MySQL8Dialect
  
  # 보안 설정 (프로덕션용)
  security:
    oauth2:
      # OAuth 콜백 redirect_uri용 apex: 요청 Host가 어느 패턴에 매칭되느냐에 따라 분기 (OAuth2DomainUtil)
      domain:
        main-domains: core-solution.co.kr,dev.core-solution.co.kr
        subdomain-patterns: "^dev\\.core-solution\\.co\\.kr$,.*\\.dev\\.core-solution\\.co\\.kr,.*\\.core-solution\\.co\\.kr"
        # 멀티테넌트: 어떤 서브도메인으로 들어와도 redirect_uri는 apex(core-solution.co.kr)로 통일 → 네이버·카카오 콜백 URL 1개.
        # 테넌트는 state 등으로 이어짐. apex에 DNS(A/CNAME)·Nginx server_name 필수.
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            scope: profile_nickname,account_email
            redirect-uri: ${KAKAO_REDIRECT_URI:${server.base-url}/api/auth/kakao/callback}
            client-authentication-method: post
            authorization-grant-type: authorization_code
            client-name: Kakao
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            scope: name,email
            redirect-uri: ${NAVER_REDIRECT_URI:${server.base-url}/api/auth/naver/callback}
            client-authentication-method: post
            authorization-grant-type: authorization_code
            client-name: Naver
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
    user:
      name: ${ADMIN_USERNAME}
      password: ${ADMIN_PASSWORD}
      roles: ADMIN
  
  # 프로덕션 환경 전용 설정
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

# 프로덕션 환경 전용 프로퍼티
isLocal: false
isDevelopment: false

# 환경 변수 검증 활성화 (운영 환경 필수)
environment:
  validation:
    enabled: true  # 운영 환경에서 필수 환경 변수 검증 활성화

# Phase 2-β 단독 운영 배포 (2026-05-28) — D+0~D+7 dry-run 강제
# tester V2 보고서(d64ece5f8) + USER_LIFECYCLE_TERMINATION_POLICY v1.2 §10.
# 운영 systemd drop-in 으로 환경 변수 명시 설정 누락 시에도 안전하도록 prod 프로파일에서 강제.
# D+7 결재 통과 시 본 블록 제거(또는 false 로 전환) 후 별도 hotfix PR 로 dry-run=false 전환.
mindgarden:
  scheduler:
    withdrawal-grace:
      dry-run: ${MINDGARDEN_SCHEDULER_WITHDRAWAL_GRACE_DRY_RUN:true}
    admin-delete-retention:
      dry-run: ${MINDGARDEN_SCHEDULER_ADMIN_DELETE_RETENTION_DRY_RUN:true}

# 프로덕션 환경에서 중복 로그인 방지 활성화
session:
  duplicate-login-check:
    enabled: true  # 프로덕션 환경에서는 중복 로그인 체크 활성화
    ask-user-confirmation: true  # 사용자에게 기존 세션 종료 확인 요청

# 테스트 플래그 (프로덕션용)
testing:
  enabled: false
  mock-data: false
  bypass-auth: false  # 인증 우회 비활성화
  debug-mode: false
  profile:
    show-test-data: false
    mock-user-info: false

# 프로덕션 환경 전용 설정
production:
  # 데이터베이스 초기화
  database:
    initialize: false
    seed-data: false
  
  # JWT 설정은 최상위 레벨로 이동됨
  
  # 이메일 설정 (프로덕션용)
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: ${SMTP_HOST:}
  
  # API 설정
  api:
    # 프로덕션용 CORS 제한
    cors:
      allowed-origins: ${ALLOWED_ORIGINS}
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: Authorization,Content-Type,X-Requested-With,X-CSRF-TOKEN
      allow-credentials: true
      exposed-headers: Set-Cookie
  
  # 로깅 설정 (운영 안정화 후 콘솔·파일 노이즈 축소: ERROR 중심)
  logging:
    level:
      root: ERROR
      com.mindgarden: ERROR
      org.springframework: ERROR
      org.hibernate: ERROR

# JWT 설정 (프로덕션용)
jwt:
  secret: ${JWT_SECRET:}
  expiration: 3600000   # 1시간 (밀리초)
  refresh-expiration: 604800000  # 7일 (밀리초)

# 개인정보 암호화 설정 (프로덕션용)
encryption:
  personal-data:
    key: ${PERSONAL_DATA_ENCRYPTION_KEY}
    iv: ${PERSONAL_DATA_ENCRYPTION_IV}

# 세션 관리 설정은 위에서 이미 정의됨 (중복 제거)

# OAuth2 동적 redirectUri(OAuth2ConfigController) 및 SERVER_BASE_URL 미설정 시 보강
# 네이버·카카오 개발자 센터에 등록한 콜백 FQDN과 동일하게 유지 (예: https://core-solution.co.kr/...)
oauth2:
  base-url: ${OAUTH2_BASE_URL:https://core-solution.co.kr}

# 프론트엔드 설정 (프로덕션용)
frontend:
  base-url: ${FRONTEND_BASE_URL:}

# 로깅 설정 (프로덕션용, Spring Boot 표준 logging.*)
logging:
  level:
    root: ERROR
    com.mindgarden: ERROR
    com.coresolution: ERROR
    com.mindgarden.consultation: ERROR
    org.hibernate.SQL: ERROR
    org.hibernate.type.descriptor.sql.BasicBinder: ERROR
    org.springframework.web: ERROR
    org.springframework.security: ERROR
    org.springframework.boot.autoconfigure: ERROR
    org.hibernate: ERROR
    com.zaxxer.hikari: ERROR
    org.springframework.orm.jpa: ERROR
    org.springframework.transaction: ERROR
    # === N2 정착 (2026-05-25) — 운영 가시성 회복용 도메인 INFO override ===
    # 디버거 보고서 §4 권고: 핵심 5개 도메인(스케줄러/발송/AI/Healing/통계) INFO 노출.
    # 광역 노이즈 차단을 위해 root: ERROR 및 com.coresolution: ERROR 는 유지.
    # notification/healing/statistics 는 전용 패키지가 없어 클래스 FQCN 으로 지정.
    # 추정 디스크 증분: 약 +3~5MB/일 (보고서 §5).
    # 1) 스케줄러 (전용 패키지)
    com.coresolution.consultation.scheduler: INFO
    # 2) AI (전용 패키지)
    com.coresolution.consultation.service.ai: INFO
    # 3) 발송 (notification — 전용 패키지 부재, FQCN)
    com.coresolution.consultation.service.impl.NotificationServiceImpl: INFO
    com.coresolution.consultation.service.impl.NotificationBatchSendLogger: INFO
    com.coresolution.consultation.service.impl.NotificationDispatchHelper: INFO
    com.coresolution.consultation.service.impl.BatchNotificationDispatchServiceImpl: INFO
    com.coresolution.consultation.service.impl.AdminManualNotificationServiceImpl: INFO
    com.coresolution.consultation.service.impl.AdminTestNotificationServiceImpl: INFO
    com.coresolution.consultation.service.impl.AdminTestNotificationLogger: INFO
    com.coresolution.consultation.service.impl.AdminTestNotificationRateLimiter: INFO
    com.coresolution.consultation.service.impl.SystemNotificationServiceImpl: INFO
    com.coresolution.consultation.service.impl.KakaoAlimTalkServiceImpl: INFO
    com.coresolution.consultation.service.impl.EmailServiceImpl: INFO
    com.coresolution.consultation.service.impl.MockEmailServiceImpl: INFO
    com.coresolution.consultation.service.impl.MobilePushServiceImpl: INFO
    com.coresolution.consultation.service.impl.MobilePushDispatchServiceImpl: INFO
    com.coresolution.consultation.service.impl.MobilePushDispatchDedupServiceImpl: INFO
    com.coresolution.consultation.service.impl.ScheduleCreatedNotificationHelperImpl: INFO
    com.coresolution.consultation.service.impl.MappingSettlementNotificationHelperImpl: INFO
    com.coresolution.consultation.service.impl.ShopNotificationHelperImpl: INFO
    # 4) Healing (전용 패키지 부재, FQCN)
    com.coresolution.consultation.service.impl.HealingContentServiceImpl: INFO
    # 5) 통계 (전용 패키지 부재, FQCN)
    com.coresolution.consultation.service.impl.StatisticsServiceImpl: INFO
    com.coresolution.consultation.service.impl.StatisticsConfigServiceImpl: INFO
    com.coresolution.consultation.service.impl.StatisticsSchedulerServiceImpl: INFO
    com.coresolution.consultation.service.impl.StatisticsTestDataServiceImpl: INFO
    com.coresolution.consultation.service.impl.BranchStatisticsServiceImpl: INFO
    com.coresolution.consultation.service.impl.PlSqlStatisticsServiceImpl: INFO
    com.coresolution.consultation.service.impl.RealTimeStatisticsServiceImpl: INFO
    # 보조 권고 — Hibernate JDBC batch 경고는 운영 트레이스 단서로 보존
    org.hibernate.engine.jdbc.batch: WARN
  
  # 로그 파일 설정
  file:
    name: logs/mindgarden-prod.log
    max-size: 50MB
    max-history: 30
  
  # 패턴 설정
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  
  # 에러 로그 분리 설정
  logback:
    rollingpolicy:
      # 에러 로그 파일 설정
      error-file: logs/error-prod.log
      error-max-size: 50MB
      error-max-history: 30
      # 에러 로그 패턴
      error-pattern: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n%ex{full}"

# 프로덕션 환경 전용 서버 설정
server:
  # Spring OAuth2 registration redirect-uri 등에 사용. 미설정 시 OAuth 콜백 상대 경로/불일치 방지
  base-url: ${SERVER_BASE_URL:https://core-solution.co.kr}
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
    session:
      cookie:
        http-only: false  # 프론트엔드에서 접근 가능하도록 false로 변경
        secure: false  # 운영 systemd에서 SERVER_SERVLET_SESSION_COOKIE_SECURE=true로 오버라이드됨
        same-site: none  # OAuth2 콜백 완전 호환을 위해 none으로 변경
        max-age: ${HTTP_SESSION_MAX_INACTIVE:8h}  # application.yml과 동일한 placeholder (기본 8시간)
        path: /  # 전체 경로에서 쿠키 사용
  # 프로덕션용 에러 페이지 설정
  error:
    whitelabel:
      enabled: true
    include-stacktrace: never
    include-message: never

# 카카오 알림톡 설정 (프로덕션용)
kakao:
  alimtalk:
    enabled: true  # 운영 환경에서 활성화
    simulation-mode: false  # 실제 API 호출
    api-key: ${KAKAO_ALIMTALK_API_KEY:}  # 환경 변수에서 가져오기
    sender-key: ${KAKAO_ALIMTALK_SENDER_KEY:}  # 환경 변수에서 가져오기
    api-url: https://alimtalk-api.bizmsg.kr
    # dead config 제거(2026-05-23 라운드) — @Value 바인딩 0건. SMS 폴백은 BatchNotificationDispatchServiceImpl 내부 정책으로 일원화.
    max-retry-count: 3
    timeout-seconds: 30