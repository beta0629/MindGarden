# 통합 상담관리 시스템 설정 파일 
# Spring Boot 3.x + Hibernate 6.x + MySQL 8.x

spring:
  # 프로파일은 환경 변수나 명령줄 인자로 설정 (--spring.profiles.active=dev)
  # Spring Boot 3.x에서는 spring.profiles 대신 환경 변수 사용

  application:
    name: consultation-management-system

  # 빈 정의 오버라이딩 허용 (레거시 Repository와의 호환성을 위해)
  main:
    allow-bean-definition-overriding: true

  # 데이터베이스 설정 (환경 변수로 설정 - 하드코딩 금지)
  datasource:
    # socketTimeout: 온보딩 프로시저·대량 시딩 등 장시간 쿼리 시 10초면 MySQLQueryInterruptedException 유발 → 상한 완화
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:core_solution}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useUnicode=true&characterSetResults=UTF-8&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci&connectTimeout=15000&socketTimeout=600000&autoReconnect=false&failOverReadOnly=false&rewriteBatchedStatements=true&useLocalSessionState=true&useServerPrepStmts=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&zeroDateTimeBehavior=CONVERT_TO_NULL&sessionVariables=wait_timeout=600,interactive_timeout=600
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 세션 wait_timeout은 장시간 온보딩 트랜잭션과 JDBC socketTimeout(10분)에 맞춤
    connection-init-sql: "SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci; SET SESSION wait_timeout=600; SET SESSION interactive_timeout=600"
    # HikariCP 연결 풀 설정
    hikari:
      connection-timeout: 5000   # 5초 (연결 대기 시간 - 빠른 실패로 누수 방지)
      validation-timeout: 3000   # 3초 (연결 검증 시간 - 빠른 실패)
      idle-timeout: 600000       # 10분 (장시간 온보딩 승인·시딩과 정합)
      max-lifetime: 900000       # 15분
      maximum-pool-size: 8       # 온보딩 시 다중 세션·배치 대비
      minimum-idle: 1
      leak-detection-threshold: 120000  # 2분 (장시간 작업 중 오탐 완화)
      connection-test-query: SELECT 1  # 연결 검증 쿼리
      keepalive-time: 30000     # 30초 (연결 유지 시간)
      register-mbeans: true     # JMX 모니터링 활성화
      initialization-fail-timeout: -1  # 연결 실패 시에도 애플리케이션 시작 허용
      # 애플리케이션 종료 시 연결 정리 보장
      allow-pool-suspension: false  # 풀 일시 중단 비활성화 (안정성 향상)

  # Flyway (전 프로파일 공통 기본값)
  # - out-of-order=true: dev 가 상위 버전(V20260525_001 등) 선적용된 뒤, 더 낮은 버전(V20260522_003 등)이 추가되어도
  #   "Schema is up to date" 로 영원히 건너뛰는 함정 회피. application-prod.yml 에 동일 키 명시되어 있어 운영도 정합.
  # - validate-on-migrate=false 기본: out-of-order 시 체크섬·갭 검증 실패 방지. 운영(application-prod.yml)에서 true 로 오버라이드 가능.
  # - baseline-on-migrate=true: 기존 운영 DB(히스토리 없음) 첫 기동에서도 안전하게 baseline.
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: ${SPRING_FLYWAY_OUT_OF_ORDER:true}
    validate-on-migrate: ${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:false}
    clean-disabled: true

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: none  # Flyway가 스키마 관리, Hibernate는 아무것도 안 함
    show-sql: true  # SQL 로그 활성화
    # 데이터소스 연결 관리
    open-in-view: false  # OSIV 비활성화 (연결 누수 방지)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true
        # 스키마 검증 설정
        # Flyway가 스키마를 관리하므로 Hibernate는 검증만 수행
        hbm2ddl:
          auto: none
        # 로그 레벨 분리 설정
        logging:
          level:
            org.hibernate.SQL: DEBUG          # SQL 쿼리만
            org.hibernate.type.descriptor.sql.BasicBinder: TRACE  # SQL 파라미터
            org.hibernate.engine.transaction.internal: DEBUG      # 트랜잭션
            org.hibernate.resource.transaction: DEBUG             # 트랜잭션 리소스
            org.hibernate.engine.jdbc.spi.SqlExceptionHelper: ERROR  # SQL 예외만
        # SQL 예외 상세 로깅
        jdbc:
          batch_size: 20
          batch_versioned_data: true
    database-platform: org.hibernate.dialect.MySQLDialect

  # ⚠️ 포트 충돌 방지: 애플리케이션 종료 설정
  lifecycle:
    timeout-per-shutdown-phase: 30s  # 종료 시 최대 30초 대기 (연결 풀 정리 시간 확보)

  # 스케줄러: graceful shutdown 시 작업 완료 후 풀 종료(HikariDataSource has been closed 완화)
  task:
    scheduling:
      shutdown:
        await-termination: true
        await-termination-period: 25s  # lifecycle timeout-per-shutdown-phase(30s) 이하

  # Multipart 업로드 설정 (프로필 이미지 등 multipart 업로드 endpoint 용)
  # 2026-06-09: P0 영구 대책 Phase 2 — profile-image multipart endpoint 신설.
  # max-file-size=5MB · max-request-size=6MB (multipart overhead 여유분 포함).
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 6MB
      file-size-threshold: 0

  # Thymeleaf 설정
  thymeleaf:
    cache: false
    mode: HTML
    encoding: UTF-8
    servlet:
      content-type: text/html

  # 보안 설정 (OAuth2 임시 비활성화)
  # security:
  #   oauth2:
  #     client:
  #       registration:
  #         kakao:
  #           client-id: ${KAKAO_CLIENT_ID:your-kakao-client-id}
  #           client-secret: ${KAKAO_CLIENT_SECRET:your-kakao-client-secret}
  #           redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
  #           client-authentication-method: post
  #           authorization-grant-type: authorization_code
  #           scope:
  #             - profile_nickname
  #             - account_email
  #           client-name: Kakao
  #         naver:
  #           client-id: ${NAVER_CLIENT_ID:your-naver-client-id}
  #           client-secret: ${NAVER_CLIENT_SECRET:your-naver-client-secret}
  #           redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
  #           client-authentication-method: post
  #           authorization-grant-type: authorization_code
  #           scope:
  #             - name
  #             - email
  #           client-name: Naver
  #         facebook:
  #           client-id: ${FACEBOOK_CLIENT_ID:your-facebook-client-id}
  #           client-secret: ${FACEBOOK_CLIENT_SECRET:your-facebook-client-secret}
  #           redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
  #           client-authentication-method: post
  #           authorization-grant-type: authorization_code
  #           scope:
  #             - name
  #             - email
  #           client-name: Facebook
  #         instagram:
  #           client-id: ${INSTAGRAM_CLIENT_ID:your-instagram-client-id}
  #           client-secret: ${INSTAGRAM_CLIENT_SECRET:your-instagram-client-secret}
  #           redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
  #           client-authentication-method: post
  #           authorization-grant-type: authorization_code
  #           scope:
  #             - basic
  #           client-name: Instagram
  # ────────────────────────────────────────────────────────────────────────────
  # OAuth 4종(Naver/Kakao/Google/Apple) registered-urls 검증 (옵션 B′, 2026-06-11)
  # ────────────────────────────────────────────────────────────────────────────
  # 외부 OAuth Console 에 등록된 콜백 URL 목록을 콤마 구분으로 주입한다.
  # OAuth2Controller#assertRegisteredCallbackUrl 가 동적으로 계산한 redirect_uri
  # 와의 일치 여부를 로깅해 운영 환경 콜백 매핑 누락을 조기에 발견한다.
  # 값 미주입(빈 문자열) 시 검증을 graceful skip 해 기존 동작을 유지한다.
  # 환경별 실제 값은 systemd EnvironmentFile (예 /etc/mindgarden/mindgarden.env)
  # 또는 GitHub Actions secrets 로만 주입 — 저장소에는 도메인 하드코딩 금지.
  security:
    oauth2:
      domain:
        naver-registered-urls: ${NAVER_REGISTERED_URLS:}
        kakao-registered-urls: ${KAKAO_REGISTERED_URLS:}
        google-registered-urls: ${GOOGLE_REGISTERED_URLS:}
        apple-registered-urls: ${APPLE_REGISTERED_URLS:}

# MindGarden 공개 API·계정 연동 보안(이메일 발송 쿨다운·일일 상한, IP 레이트리밋 등)
# 프로파일별로 mindgarden.security.* 를 오버라이드할 수 있습니다.
mindgarden:
  # PR-3/9 (2026-06-12): Branch 시스템 deprecation. PR-6/PR-7 에서 DB 컬럼/FK 제거 예정.
  # 빈 등록(@ConditionalOnProperty) 게이트로 사용. true(기본): 활성화 유지(현행). false: 빈 등록 차단.
  # 운영 비활성화 전환은 의존성 옵셔널화(@Autowired(required=false)) 작업과 함께 PR-6/PR-7 시점에 진행한다.
  branch:
    enabled: ${MINDGARDEN_BRANCH_ENABLED:true}
  # 사용자 프로필 이미지 업로드 (P0 영구 대책 Phase 2 — 2026-06-09).
  # 운영(blue/green 공용): /var/mindgarden/uploads/profile-images/ (절대경로 필수).
  # 개발 기본값: ./uploads/profile-images/ (서비스 워킹디렉터리 기준 상대경로).
  # 환경변수 PROFILE_IMAGE_UPLOAD_DIR 로 오버라이드.
  upload:
    profile-image:
      base-dir: ${PROFILE_IMAGE_UPLOAD_DIR:./uploads/profile-images/}
  # KICC 이지페이 온라인 API 호스트 기본값(테넌트 settings_json 으로 오버라이드 가능). 비밀 아님.
  pg:
    kicc:
      easypay:
        host-test: ${KICC_EASYPAY_HOST_TEST:testpgapi.easypay.co.kr}
        host-prod: ${KICC_EASYPAY_HOST_PROD:pgapi.easypay.co.kr}
  # 매핑 회기 차감 누락 보정 배치 (P1 #93 안전망)
  # 즉시 비활성화: MINDGARDEN_BATCH_SESSION_RECOVERY_ENABLED=false
  batch:
    session-recovery:
      enabled: ${MINDGARDEN_BATCH_SESSION_RECOVERY_ENABLED:true}
      cron: ${MINDGARDEN_BATCH_SESSION_RECOVERY_CRON:0 0/30 * * * ?}  # 매 30분
      page-size: ${MINDGARDEN_BATCH_SESSION_RECOVERY_PAGE_SIZE:200}
  mobile:
    push:
      expo:
        access-token: ${EXPO_ACCESS_TOKEN:}
        api-url: ${EXPO_PUSH_API_URL:https://exp.host/--/api/v2/push/send}
    app-version:
      min-android-version: "1.0.0"
      min-android-version-code: 1
      min-ios-version: "1.0.0"
      force-update-enabled: true
      message-ko: "새 버전이 필요합니다. 업데이트 후 이용해 주세요."
      android-store-url: ""
      android-apk-url: ""
      ios-store-url: ""
  security:
    # CAPTCHA (Cloudflare Turnstile). enabled=false 시 검증 생략(no-op). 시크릿·사이트키는 환경 변수로만 주입.
    captcha:
      enabled: false
      secret-key: ${MINDGARDEN_CAPTCHA_SECRET_KEY:}
      site-key: ${MINDGARDEN_CAPTCHA_SITE_KEY:}
    account-integration:
      email-verification-cooldown-seconds: 60
      email-verification-daily-limit: 10
    rate-limit:
      integration-path-prefix: /api/v1/accounts/integration/
      integration-requests-per-minute: 20
      # Trinity 공개 POST /api/v1/onboarding/requests 전용 (ops 경로 제외)
      onboarding-create-requests-per-minute: 5
      onboarding-create-path: /api/v1/onboarding/requests
      # 공개 온보딩 접두(GET 검사 등). POST+onboarding-create-path 정확 일치는 위 버킷만 적용(중복 카운트 방지)
      onboarding-public-path-prefix: /api/v1/onboarding/
      onboarding-public-requests-per-minute: 30
  # =====================================================
  # 사용자 라이프사이클(자동 파기·익명화·휴면·cutoff·PII 스크러빙) 통합 정책.
  # 정책서 v1.2 (docs/standards/USER_LIFECYCLE_TERMINATION_POLICY.md) §0.1 Q9~Q11 / §10.9 반영.
  # =====================================================
  lifecycle:
    # ---- Phase 5: cutoff (만료 데이터 파기) ----
    cutoff:
      # 비즈니스 정체성: NON_MEDICAL(default, 학회 윤리강령 3년) | MEDICAL(의료법 §22 10년)
      business-mode: NON_MEDICAL
      policy-version: v1.2-2026-05-28
      # 카테고리별 보존 연수 (분기는 LifecycleCutoffProperties#getRetentionYears 로 단일화)
      user-data-years: 1
      consultation-records-years: 3
      medical-consultation-records-years: 10
      payments-years: 5
      salary-data-years: 3
      access-logs-years: 1
      audit-logs-years: 3
      consent-logs-years: 3
    # ---- Phase 5: 자유 입력 PII 스크러빙 — 1단계 정규식(default). Phase 5.1 BERT / Phase 5.3 GPT 후속. ----
    pii-scrubber:
      strategy: regex
      enabled-patterns: email,phone,rrn,arn,card,bank,url
    # ---- Phase 3: 휴면(DORMANT) + 익명화 배치 + 30일 사전 통지 (정책서 §10.9) ----
    # dormant-pii-encryption-key: Base64(32 bytes) AES-256 키. 운영 systemd Environment 에서 주입 — 절대 코드 하드코딩 금지.
    dormant-pii-encryption-key: ${MINDGARDEN_DORMANT_PII_ENC_KEY:}
    dormant-period-years: ${MINDGARDEN_LIFECYCLE_DORMANT_PERIOD_YEARS:1}
    anonymize-after-dormant-years: ${MINDGARDEN_LIFECYCLE_ANONYMIZE_AFTER_DORMANT_YEARS:4}
    pre-notice-days-before: ${MINDGARDEN_LIFECYCLE_PRE_NOTICE_DAYS_BEFORE:30}
    # ---- Phase 4: 커뮤니티 작성자 익명화 (옵션 b — 본문 KEEP + 작성자 익명) — 정책서 §10.12 Q12 ----
    # enabled=false 면 anonymize 흐름에서 community 단계 전체 SKIP (운영 토글).
    # tables 콤마 구분 — community_posts / community_comments. community_replies 도입 시 추가.
    community-anonymization:
      enabled: ${MINDGARDEN_COMMUNITY_ANONYMIZATION_ENABLED:true}
      tables: ${MINDGARDEN_COMMUNITY_TABLES:community_posts,community_comments}
  # =====================================================
  # 라이프사이클 관련 배치 스케줄러 운영 토글 (USER_LIFECYCLE_TERMINATION_POLICY §6.2 / §10.9 / Q5).
  # enabled=false 이면 빈 자체가 생성되지 않아 cron 미실행. dry-run=true 이면 후보 조회·로깅만 수행하고
  # transitionTo(...) 호출은 생략 — 운영 검증·tester M2 권고.
  # =====================================================
  scheduler:
    # ---- Phase 2-β: 자발 탈퇴 30일 유예 + 어드민 강제 종료 7일 보존 ----
    withdrawal-grace:
      enabled: ${MINDGARDEN_SCHEDULER_WITHDRAWAL_GRACE_ENABLED:true}
      dry-run: ${MINDGARDEN_SCHEDULER_WITHDRAWAL_GRACE_DRY_RUN:false}
    admin-delete-retention:
      enabled: ${MINDGARDEN_SCHEDULER_ADMIN_DELETE_RETENTION_ENABLED:true}
      dry-run: ${MINDGARDEN_SCHEDULER_ADMIN_DELETE_RETENTION_DRY_RUN:false}
    # ---- Phase 3: 1년 휴면 batch + 4년차 anonymize batch + 30일 사전 통지 ----
    # Dry-run 초기 default=true: Phase 3 운영 진입 시 반드시 1주 dry-run 검증 후 false 전환.
    dormant-batch:
      enabled: ${MINDGARDEN_SCHEDULER_DORMANT_BATCH_ENABLED:true}
      dry-run: ${MINDGARDEN_SCHEDULER_DORMANT_BATCH_DRY_RUN:true}
      cron: ${MINDGARDEN_SCHEDULER_DORMANT_BATCH_CRON:0 0 4 * * *}
    anonymize-batch:
      enabled: ${MINDGARDEN_SCHEDULER_ANONYMIZE_BATCH_ENABLED:true}
      dry-run: ${MINDGARDEN_SCHEDULER_ANONYMIZE_BATCH_DRY_RUN:true}
      cron: ${MINDGARDEN_SCHEDULER_ANONYMIZE_BATCH_CRON:0 30 4 * * *}
    dormant-pre-notice:
      enabled: ${MINDGARDEN_SCHEDULER_DORMANT_PRE_NOTICE_ENABLED:true}
      dry-run: ${MINDGARDEN_SCHEDULER_DORMANT_PRE_NOTICE_DRY_RUN:true}
      cron: ${MINDGARDEN_SCHEDULER_DORMANT_PRE_NOTICE_CRON:0 0 9 * * *}
    # =====================================================
    # ERP P0-2 PR-B: 재무 마감 (Q1~Q9 default 수용, 합의서 §2 / §4.2)
    # - dry-run=true 운영 1주 검증 후 별도 결재로 false 전환
    # - cron 02:00~02:30 KST: 운영 트래픽 회피, blue/green cutover 시간대와 분리
    # =====================================================
    financial-close:
      dry-run: ${MINDGARDEN_SCHEDULER_FINANCIAL_CLOSE_DRY_RUN:true}
      daily-cron: ${MINDGARDEN_SCHEDULER_FINANCIAL_CLOSE_DAILY_CRON:0 0 2 * * *}
      monthly-cron: ${MINDGARDEN_SCHEDULER_FINANCIAL_CLOSE_MONTHLY_CRON:0 30 2 1 * *}

# JWT 설정 (프로파일별 설정에서 기본값 제공)
jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000   # 1시간 (밀리초)
  refresh-expiration: 604800000  # 7일 (밀리초)

# 개인정보 암호화 설정 (프로파일별 설정에서 기본값 제공)
encryption:
  personal-data:
    # 활성 키 ID (환경 변수 또는 프로파일별 기본값 사용)
    active-key-id: ${PERSONAL_DATA_ENCRYPTION_ACTIVE_KEY_ID:}
    # 다중 키 버전 (환경 변수 또는 프로파일별 기본값 사용)
    key-versions: ${PERSONAL_DATA_ENCRYPTION_KEYS:}
    # 다중 IV 버전 (환경 변수 또는 프로파일별 기본값 사용)
    iv-versions: ${PERSONAL_DATA_ENCRYPTION_IVS:}
    # 레거시 단일 키/IV (하위 호환성)
    key: ${PERSONAL_DATA_ENCRYPTION_KEY:}
    iv: ${PERSONAL_DATA_ENCRYPTION_IV:}
    algorithm: AES-256
    transformation: AES/CBC/PKCS5Padding

# 결제 시스템 설정 (프로파일별 설정에서 기본값 제공)
payment:
  toss:
    # 토스페이먼츠 시크릿 키 (환경 변수 또는 프로파일별 기본값 사용)
    secret-key: ${PAYMENT_TOSS_SECRET_KEY:}
    # 토스페이먼츠 웹훅 시크릿 (환경 변수 또는 프로파일별 기본값 사용)
    webhook-secret: ${PAYMENT_TOSS_WEBHOOK_SECRET:}
    # 토스페이먼츠 상점 아이디 (선택사항)
    merchant-id: ${PAYMENT_TOSS_MERCHANT_ID:}
    # 토스페이먼츠 API 기본 URL
    base-url: ${PAYMENT_TOSS_BASE_URL:https://api.tosspayments.com}
    # 시뮬레이션 모드
    simulation-mode: ${PAYMENT_TOSS_SIMULATION_MODE:true}
    # 테스트 결제 URL
    test-payment-url: ${PAYMENT_TOSS_TEST_URL:https://checkout.tosspayments.com/v1/test/}
    # 테스트 결제 키 접두사
    test-payment-key-prefix: ${PAYMENT_TOSS_TEST_KEY_PREFIX:toss_test_}
  iamport:
    # 아임포트 API 키 (환경 변수 또는 프로파일별 기본값 사용)
    api-key: ${PAYMENT_IAMPORT_API_KEY:}
    api-secret: ${PAYMENT_IAMPORT_API_SECRET:}
    base-url: ${PAYMENT_IAMPORT_BASE_URL:https://api.iamport.kr}
    simulation-mode: ${PAYMENT_IAMPORT_SIMULATION_MODE:true}

# 서버 설정
server:
  port: ${SERVER_PORT:8080}
  # ⚠️ 포트 충돌 방지: Graceful shutdown 설정
  shutdown: graceful  # Graceful shutdown 활성화 (자동 재시작 시 포트 충돌 방지)
  # 대용량 POST 본문 수용 (기본 2MB 초과 시 400 방지)
  # Spring Boot 3.2+: max-http-post-size 폐기 → max-http-form-post-size 사용.
  # 구현상 Connector#setMaxPostSize에 연결되며(JSON 포함) 전체 POST 바이트 한도로 동작함.
  tomcat:
    max-http-form-post-size: 10MB
    max-swallow-size: 10MB
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      force: true
    session:
      # 비활성 만료(슬라이딩). cookie.max-age를 timeout과 동일하게 명시해야
      # 브라우저가 쿠키를 먼저 폐기하는 현상을 방지할 수 있다.
      timeout: ${HTTP_SESSION_MAX_INACTIVE:8h}
      cookie:
        max-age: ${HTTP_SESSION_MAX_INACTIVE:8h}
        http-only: true
        # OAuth 콜백이 apex(예: core-solution.co.kr)이고 프론트가 테넌트 서브도메인(mindgarden.*)인 경우,
        # Domain 미설정 시 JSESSIONID가 콜백 호스트에만 묶여 서브도메인으로 돌아온 뒤 세션이 비는 현상 발생.
        # 도메인 값은 YAML placeholder(빈 기본값)로 두지 않음 — Spring Boot 3.x는 빈 문자열도 Domain에 적용될 수 있음.
        # 대신 com.coresolution.core.config.SessionCookieDomainWebServerCustomizer 가
        # SESSION_COOKIE_DOMAIN 이 비어 있지 않을 때만 Domain 을 설정(로컬·미설정은 호스트 전용 쿠키).
        # 운영/개발: EnvironmentFile 등에 SESSION_COOKIE_DOMAIN=core-solution.co.kr 또는 dev.core-solution.co.kr
        # (RFC 6265: 선행 점 없음). deployment/mindgarden.prod-env.example 참고.
        # OAuth2(카카오/네이버 등) 외부 리다이렉트 콜백에서는 SameSite=strict일 경우 세션 쿠키가 전송되지 않아
        # state 검증/세션 연속성이 깨질 수 있으므로 Lax로 설정합니다.
        # - local 프로파일은 application-local.yml에서 secure=false로 오버라이드됩니다.
        secure: true
        same-site: lax
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024

# ERD 자동 생성 설정 (로컬/개발 환경에서는 비활성화)
erd:
  auto-generation:
    enabled: false  # JPA 순환 참조 문제 방지를 위해 비활성화
    trigger-on-migration: false
  # ERD/DB 스키마 변경 알림 메일만 제어 (비밀번호 재설정·알림톡 등 다른 메일과 무관)
  notification:
    enabled: false

# 로깅 설정
logging:
  level:
    # 애플리케이션 로그 (정상 로그 계속 남기기)
    com.coresolution: INFO
    # Spring 관련 로그
    org.springframework.transaction: INFO
    org.springframework.orm.jpa: INFO
    # 데이터베이스 연결 로그
    com.zaxxer.hikari: INFO
    # SQL 관련 로그 (별도 파일로 분리)
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO
    org.hibernate.engine.transaction.internal: INFO
    org.hibernate.resource.transaction: INFO
    org.hibernate.engine.jdbc.spi.SqlExceptionHelper: ERROR
    # 기타 로그는 INFO 레벨로 (정상 로그 계속 남기기)
    root: INFO

  # 로그 파일 설정은 logback-spring.xml에서 관리
  # file:
  #   name: logs/coresolution.log
  #   max-size: 100MB
  #   max-history: 30

  # 로그 패턴 설정은 logback-spring.xml에서 관리
  # pattern:
  #   console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  #   file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

  # SQL/데이터베이스 오류 로그 별도 파일
  config: classpath:logback-spring.xml

# Actuator 설정
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true

# 파일 업로드 설정
file:
  upload:
    max-size: 10MB
    allowed-types: jpg,jpeg,png,gif,pdf,doc,docx
    upload-dir: ./uploads

# 심리검사 PDF/이미지 업로드 검열 (보안)
psych:
  assessment:
    upload:
      max-file-size: 52428800  # 50MB (바이트). PDF·이미지(JPG, PNG) 허용, 매직 바이트 검증
    tesseract:
      # tessdata 디렉터리 경로. TESSDATA_PREFIX 환경 변수 또는 tessdata 상위 경로.
      # macOS Homebrew: /opt/homebrew/share/tessdata 또는 /usr/local/share/tessdata
      # Linux apt: /usr/share/tesseract-ocr/4.00/tessdata
      datapath: ${TESSDATA_PREFIX:}

# 상담 시스템 설정
consultation:
  system:
    name: "통합 상담관리 시스템"
    version: "1.0.0"
    max-clients-per-consultant: 20
    # 분 단위 참고값(UI/문서). 실제 세션 수명은 server.servlet.session.timeout(기본 8h) 및 SessionConstants와 정합.
    session-timeout: 480
    notification:
      enabled: true
      real-time: true
    dashboard:
      max-components: 12
      default-layout: "grid"

# 프론트엔드 설정 (환경 변수 사용)
frontend:
  base-url: ${FRONTEND_BASE_URL:http://localhost:3000}

# SMS 인증 설정 (프로파일별 설정에서 기본값 제공)
sms:
  auth:
    enabled: ${SMS_AUTH_ENABLED:false}  # 기본값: 비활성화 (비용 절약)
    # 2026-06-12 SSOT 통합: 솔라피 단일 게이트웨이로 운영 통합 (NHN/NCP SENS 폐기).
    # 별도 provider 선택 옵션은 SmsAuthService.List<SmsProvider> 인터페이스 보존을 위해 유지하지만,
    # 등록된 SmsProvider 구현체는 SolapiSmsProvider 단 하나이므로 사실상 고정.
    provider: ${SMS_PROVIDER:solapi}
    # solapi 자격 증명: SMS_API_KEY=Solapi API Key, SMS_API_SECRET=Solapi API Secret 재활용 (별도 ENV 분리 불필요)
    api-key: ${SMS_API_KEY}
    api-secret: ${SMS_API_SECRET}
    sender-number: ${SMS_SENDER_NUMBER}
    test-mode: ${SMS_TEST_MODE:true}  # 테스트 모드 (실제 SMS 발송 안함)
    mock-verification-code: ${SMS_MOCK_CODE:123456}  # 테스트용 고정 인증번호
    # solapi 전용 옵션(보통 기본값 사용)
    solapi:
      api-base-url: ${SOLAPI_API_BASE_URL:https://api.solapi.com}

# OpenAI API 설정 (프로파일별 설정에서 기본값 제공)
openai:
  api:
    key: ${OPENAI_API_KEY}
    url: ${OPENAI_API_URL:https://api.openai.com/v1/chat/completions}
  model: ${OPENAI_MODEL:gpt-4o-mini}  # 기본: gpt-4o-mini(품질·비용 균형). 필요 시 gpt-4o 등으로 OPENAI_MODEL 오버라이드

# Claude AI 설정 (향후 지원)
#claude:
#  api:
#    key: ${CLAUDE_API_KEY:}
#    url: ${CLAUDE_API_URL:https://api.anthropic.com/v1/messages}
#  model: ${CLAUDE_MODEL:claude-3-opus-20240229}
#
# Google Gemini 설정 (향후 지원)
#gemini:
#  api:
#    key: ${GEMINI_API_KEY:}
#    url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1/models}
#  model: ${GEMINI_MODEL:gemini-pro}

# AI 모델 및 모니터링 설정 (통합)
ai:
  # AI 모델 설정 (확장 가능)
  model:
    provider: ${AI_MODEL_PROVIDER:openai}  # openai, claude, gemini 등
  # AI 모니터링 설정 (하이브리드 방식)
  monitoring:
    enabled: ${AI_MONITORING_ENABLED:false}  # AI 모니터링 활성화 여부 (기본: 비활성화)
    hybrid:
      enabled: true  # 하이브리드 모드 (통계 + AI)
      # 1차 필터링: 통계 기반 임계값
      statistical-threshold:
        cpu: 70.0      # CPU 70% 이상일 때만 AI 분석 고려
        memory: 75.0   # 메모리 75% 이상일 때만 AI 분석 고려
        jvm: 80.0      # JVM 80% 이상일 때만 AI 분석 고려
      # 2차 분석: AI 호출 조건
      ai-trigger:
        consecutive-violations: 3  # 연속 3회 임계값 초과 시 AI 호출
        severity-threshold: "MEDIUM"  # MEDIUM 이상 심각도일 때만 AI 호출
        cooldown-minutes: 30  # AI 호출 후 30분간 재호출 방지 (비용 절감)
    # 비용 관리
    cost-control:
      daily-limit: 100  # 일일 AI 호출 최대 횟수
      monthly-budget: 50.0  # 월 예산 (USD)
      alert-threshold: 80  # 예산 80% 도달 시 알림

# 민감정보 보호 설정은 아래 security 섹션으로 통합됨

# 온보딩 자동 승인 설정
onboarding:
  auto-approval:
    enabled: ${ONBOARDING_AUTO_APPROVAL_ENABLED:true}  # 자동 승인 활성화 여부
    allowed-risk-levels: ${ONBOARDING_AUTO_APPROVAL_RISK_LEVELS:LOW}  # 허용 위험도 (쉼표로 구분: LOW,MEDIUM)
    allowed-business-types: ${ONBOARDING_AUTO_APPROVAL_BUSINESS_TYPES:}  # 허용 업종 (쉼표로 구분, 비어있으면 모든 업종 허용)
    require-payment-method: ${ONBOARDING_AUTO_APPROVAL_REQUIRE_PAYMENT:false}  # 결제 수단 필수 여부 (false: 선택 사항)
    require-subscription: ${ONBOARDING_AUTO_APPROVAL_REQUIRE_SUBSCRIPTION:false}  # 구독 필수 여부 (false: 선택 사항)

# Ops Portal 관리자 계정 설정 (프로파일별 설정에서 기본값 제공)
ops:
  admin:
    # Ops Portal 관리자 아이디 (환경 변수 또는 프로파일별 기본값 사용)
    # OpsAuthController에서 userId로 사용하므로 userId로 설정
    userId: ${OPS_ADMIN_USERNAME:ops_core}
    username: ${OPS_ADMIN_USERNAME:ops_core}  # 하위 호환성
    # Ops Portal 관리자 비밀번호 (환경 변수 또는 프로파일별 기본값 사용)
    password: ${OPS_ADMIN_PASSWORD:godgod826!}
    # Ops Portal 관리자 역할 (환경 변수 또는 프로파일별 기본값 사용)
    role: ${OPS_ADMIN_ROLE:HQ_ADMIN}

# 환경변수 기본값 설정은 프로파일별 설정 파일에서 관리

# 이메일 설정은 프로파일별 설정 파일에서 관리

# =====================================================
# Sign in with Apple (SIWA) — Apple App Store 4.8 (Login Services) 대응 T1
# - AppleOAuth2Properties (com.coresolution.consultation.config) 바인딩
# - 5종 운영 env 는 운영 GitHub Actions secret 및 backend .env.prod 동일 키로 주입한다.
# - placeholder 만 커밋: 실제 키는 절대 커밋 금지. EAS Secret · GitHub Encrypted Secrets 사용.
# - 디자이너 핸드오프: docs/project-management/2026-06-04/APPLE_T1_SIWA_DESIGN_HANDOFF.md
# =====================================================
apple:
  client-id: ${APPLE_CLIENT_ID:}
  team-id: ${APPLE_TEAM_ID:}
  key-id: ${APPLE_KEY_ID:}
  private-key: ${APPLE_PRIVATE_KEY:}
  redirect-uri: ${APPLE_REDIRECT_URI:}
  # identityToken aud 검증 허용 List (콤마 구분). iOS 네이티브 SIWA 는 Bundle ID(예: com.mindgarden.MindGardenMobile),
  # 웹/Service ID 는 Service ID(예: co.kr.coresolution.app.signin) 로 aud 가 발급되므로 두 값 모두 등록 필수.
  # 미지정 시 client-id 단일값 fallback (P0 hotfix 2026-06-08 — iPhone 로그인 검증 실패 대응).
  allowed-audiences: ${APPLE_ALLOWED_AUDIENCES:}
  jwks-uri: ${APPLE_JWKS_URI:https://appleid.apple.com/auth/keys}
  issuer: ${APPLE_ISSUER:https://appleid.apple.com}
  token-uri: ${APPLE_TOKEN_URI:https://appleid.apple.com/auth/token}
  jwks-cache-ttl-seconds: ${APPLE_JWKS_CACHE_TTL_SECONDS:3600}
  client-secret-ttl-seconds: ${APPLE_CLIENT_SECRET_TTL_SECONDS:5184000}

# 카카오 알림톡 설정
# [2026-05-22] dev/prod 베이스 ENV 매핑 추가 (P0 핫픽스 — SOLAPI_NOTIFICATION_MISS_DEBUG.md §4)
# - 자바 측 키: KakaoSolapiCredentialResolver(@Value 'kakao.alimtalk.solapi.*'),
#   KakaoAlimTalkServiceImpl(@Value 'kakao.alimtalk.solapi.sender-number'),
#   SolapiAlimTalkClient(@Value 'kakao.alimtalk.solapi.api-url').
# - SOLAPI_ALIMTALK_PFID 등 평탄(flat) ENV 변수는 Spring relaxed-binding 으로
#   `kakao.alimtalk.solapi.pf-id` 키에 자동 매핑되지 않으므로 본 블록이 반드시 필요.
# - 자격증명 미설정 시 sms.auth.api-key/api-secret(= SMS_API_KEY/SMS_API_SECRET)로 자동 fallback.
kakao:
  alimtalk:
    enabled: ${KAKAO_ALIMTALK_ENABLED:false}
    provider: ${KAKAO_ALIMTALK_PROVIDER:solapi}
    simulation-mode: ${KAKAO_ALIMTALK_SIMULATION_MODE:true}
    solapi:
      api-key: ${SOLAPI_ALIMTALK_API_KEY:${sms.auth.api-key:}}
      api-secret: ${SOLAPI_ALIMTALK_API_SECRET:${sms.auth.api-secret:}}
      pf-id: ${SOLAPI_ALIMTALK_PFID:}
      sender-number: ${SOLAPI_ALIMTALK_SENDER_NUMBER:${sms.auth.sender-number:}}
      api-url: ${SOLAPI_ALIMTALK_API_URL:https://api.solapi.com}
# 지원 ENV 키(값은 프로파일별 yml·Secrets에서만 정의):
#   - KAKAO_ALIMTALK_ENABLED         : 알림톡 채널 활성화 (true|false)
#   - KAKAO_ALIMTALK_SIMULATION_MODE : 시뮬레이션 모드 (true|false)
#   - KAKAO_ALIMTALK_PROVIDER        : provider 선택 (bizmsg|solapi, 기본 solapi)
#   # bizmsg provider
#   - KAKAO_ALIMTALK_API_KEY         : 비즈엠 API Key
#   - KAKAO_ALIMTALK_SENDER_KEY      : 비즈엠 발신자 키
#   - KAKAO_ALIMTALK_API_URL         : 비즈엠 API base URL (기본 https://alimtalk-api.bizmsg.kr)
#   # solapi provider
#   - SOLAPI_ALIMTALK_PFID           : 솔라피 발신 프로필 ID
#   - SOLAPI_ALIMTALK_API_KEY        : 솔라피 API Key
#   - SOLAPI_ALIMTALK_API_SECRET     : 솔라피 API Secret
#   - SOLAPI_ALIMTALK_API_URL        : 솔라피 API base URL (기본 https://api.solapi.com)
#   - SOLAPI_ALIMTALK_SENDER_NUMBER  : 솔라피 발신 번호(폴백 SMS용, 선택)
#
# 솔라피는 계정당 통합 API Key/Secret 하나로 SMS·알림톡 모두 발송하므로,
# 단일 계정 운영자는 SMS_API_KEY/SECRET 만 채워도 알림톡 발송이 가능하다.

# =====================================================
# 알림 배치/이벤트 발송 토글 (notification.batch.*)
# - BatchNotificationProperties 바인딩 (com.coresolution.consultation.config)
# - 2026-06-04: alimtalk-enabled 영구 OFF (사용자 결재 — "알림톡 사용 안 함, SMS 전용")
#   AlimtalkTemplateMappingResolver 매핑 lookup skip → 알림톡 시도 자체 차단 → SMS 폴백(F1) 만 발송.
#   환경변수 NOTIFICATION_BATCH_ALIMTALK_ENABLED 로 운영 일시 활성화 가능 (회귀/A-B 테스트 용도).
# =====================================================
notification:
  batch:
    alimtalk-enabled: ${NOTIFICATION_BATCH_ALIMTALK_ENABLED:false}

# =====================================================
# 어드민 도구 — SMS·카카오 알림톡 테스트 발송 (2026-05-22)
# 기획: docs/project-management/2026-05-22/ADMIN_TEST_NOTIFICATION_TOOL_PLAN.md §4.X
# C5 rate-limit: per-minute=10, per-day=100 (사용자·테넌트당)
# =====================================================
admin:
  test-notification:
    rate-limit:
      per-minute: ${ADMIN_TEST_NOTIFICATION_RATE_PER_MINUTE:10}
      per-day: ${ADMIN_TEST_NOTIFICATION_RATE_PER_DAY:100}
    history-page-size-default: ${ADMIN_TEST_NOTIFICATION_HISTORY_PAGE_SIZE_DEFAULT:30}
    history-page-size-max: ${ADMIN_TEST_NOTIFICATION_HISTORY_PAGE_SIZE_MAX:100}

# =====================================================
# 알림 로그 보관기간(retention) 스케줄러 (2026-05-23)
# - admin_test_notification_logs / notification_batch_send_log 90일 초과 row 일괄 삭제
# - NotificationLogRetentionScheduler @Scheduled cron 외부화
# - dry-run=true 시 카운트만 로깅(실삭제 0), 운영 반영 직후 검증용
# =====================================================
app:
  # 슬롯 식별자 (핫픽스 2026-05-25, N1 후속) — ShedLock locked_by 컬럼 기록값.
  # systemd unit 에서 APP_INSTANCE_ID=blue / green / dev 로 주입하며,
  # 미설정 시 'default' 로 기록된다. (deployer 후속 작업: systemd Environment 추가)
  instance:
    id: ${APP_INSTANCE_ID:default}
  notification:
    retention:
      enabled: ${APP_NOTIFICATION_RETENTION_ENABLED:true}
      retention-days: ${APP_NOTIFICATION_RETENTION_DAYS:90}
      batch-size: ${APP_NOTIFICATION_RETENTION_BATCH_SIZE:5000}
      cron: ${APP_NOTIFICATION_RETENTION_CRON:0 30 3 * * *}
      dry-run: ${APP_NOTIFICATION_RETENTION_DRY_RUN:false}

# =====================================================
# 스케줄러 설정 (배치 작업 표준화)
# =====================================================
scheduler:
  # 전역 설정
  task:
    scheduling:
      pool:
        size: 10  # 스케줄러 스레드 풀 크기
      thread-name-prefix: scheduler-

  # 알림 설정
  alert:
    enabled: ${SCHEDULER_ALERT_ENABLED:true}
    success-rate-threshold: ${SCHEDULER_SUCCESS_RATE_THRESHOLD:0.95}  # 95% 미만 시 알림

  # 개별 스케줄러 설정
  # 1. 급여 배치 스케줄러
  salary-batch:
    enabled: ${SCHEDULER_SALARY_BATCH_ENABLED:true}
    cron: ${SCHEDULER_SALARY_BATCH_CRON:0 0 2 * * ?}  # 매일 새벽 2시

  salary-batch-monitor:
    enabled: ${SCHEDULER_SALARY_BATCH_MONITOR_ENABLED:true}
    cron: ${SCHEDULER_SALARY_BATCH_MONITOR_CRON:0 0 * * * ?}  # 매시간 정각

  # 2. 구독 만료 스케줄러
  subscription-expiration:
    enabled: ${SCHEDULER_SUBSCRIPTION_EXPIRATION_ENABLED:true}
    cron: ${SCHEDULER_SUBSCRIPTION_EXPIRATION_CRON:0 0 2 * * ?}  # 매일 새벽 2시

  # 3. 스케줄 자동 완료 스케줄러
  schedule-auto-complete:
    enabled: ${SCHEDULER_SCHEDULE_AUTO_COMPLETE_ENABLED:true}
    cron: ${SCHEDULER_SCHEDULE_AUTO_COMPLETE_CRON:0 */10 * * * *}  # 매 10분마다

  # 4. 통계 생성 스케줄러
  statistics-generation:
    enabled: ${SCHEDULER_STATISTICS_GENERATION_ENABLED:true}
    cron: ${SCHEDULER_STATISTICS_GENERATION_CRON:0 1 0 * * *}  # 매일 자정 1분 후

  # 5. 웰니스 알림 스케줄러
  wellness-notification:
    enabled: ${SCHEDULER_WELLNESS_NOTIFICATION_ENABLED:true}
    cron: ${SCHEDULER_WELLNESS_NOTIFICATION_CRON:0 0 9 * * ?}  # 매일 오전 9시

  # 6. 상담일지 알림 스케줄러
  consultation-record-alert:
    enabled: ${SCHEDULER_CONSULTATION_RECORD_ALERT_ENABLED:true}
    cron: ${SCHEDULER_CONSULTATION_RECORD_ALERT_CRON:0 0 9 * * *}  # 매일 오전 9시

  # 7. 워크플로우 자동화 스케줄러
  workflow-automation:
    enabled: ${SCHEDULER_WORKFLOW_AUTOMATION_ENABLED:true}
    cron: ${SCHEDULER_WORKFLOW_AUTOMATION_CRON:0 */10 * * * *}  # 매 10분마다

  # 8. 은행 이체 처리 스케줄러
  bank-transfer:
    enabled: ${SCHEDULER_BANK_TRANSFER_ENABLED:true}
    cron: ${SCHEDULER_BANK_TRANSFER_CRON:0 */5 * * * *}  # 매 5분마다

  # 9. 개인정보 파기 스케줄러
  personal-data-destruction:
    enabled: ${SCHEDULER_PERSONAL_DATA_DESTRUCTION_ENABLED:true}
    cron: ${SCHEDULER_PERSONAL_DATA_DESTRUCTION_CRON:0 0 3 * * ?}  # 매일 새벽 3시

  # 10. 세션 정리 스케줄러
  session-cleanup:
    enabled: ${SCHEDULER_SESSION_CLEANUP_ENABLED:true}
    cron: ${SCHEDULER_SESSION_CLEANUP_CRON:0 */5 * * * *}  # 매 5분마다

  # 쇼핑 미결제 주문 hold TTL 만료
  shop-order-hold-expiry:
    enabled: ${SCHEDULER_SHOP_ORDER_HOLD_EXPIRY_ENABLED:true}
    cron: ${SCHEDULER_SHOP_ORDER_HOLD_EXPIRY_CRON:0 */5 * * * *}  # 매 5분마다

  # 11. 스키마 변경 감지 스케줄러
  schema-change-detection:
    enabled: ${SCHEDULER_SCHEMA_CHANGE_DETECTION_ENABLED:true}
    cron: ${SCHEDULER_SCHEMA_CHANGE_DETECTION_CRON:0 0 2 * * ?}  # 매일 새벽 2시

  # 12. 내담자 CLIENT 등급 자동 승급 (완료 스케줄 수·common_codes min_sessions)
  client-grade-auto:
    enabled: ${SCHEDULER_CLIENT_GRADE_AUTO_ENABLED:true}
    cron: ${SCHEDULER_CLIENT_GRADE_AUTO_CRON:0 15 3 * * ?}  # 매일 새벽 3시 15분

# =====================================================
# 보안 설정 (보안 표준화 + 민감정보 보호)
# =====================================================
security:
  # 민감정보 보호 (데이터 마스킹)
  data-masking:
    enabled: ${DATA_MASKING_ENABLED:true}  # 민감정보 마스킹 활성화 (운영: true, 개발: false)
    mask-in-logs: true  # 로그 출력 시 마스킹
    mask-in-ai-analysis: true  # AI 분석 시 마스킹
    mask-in-external-api: true  # 외부 API 전송 시 마스킹

  # 로그인 보안
  login:
    max-attempts: ${SECURITY_LOGIN_MAX_ATTEMPTS:5}  # 최대 로그인 시도 횟수
    lockout-duration-minutes: ${SECURITY_LOGIN_LOCKOUT_DURATION:30}  # 계정 잠금 시간 (분)

  # JWT 설정
  jwt:
    secret-min-length: ${JWT_SECRET_MIN_LENGTH:32}  # JWT 비밀키 최소 길이
    access-token-validity: ${JWT_ACCESS_TOKEN_VALIDITY:3600000}  # 1시간 (ms)
    refresh-token-validity: ${JWT_REFRESH_TOKEN_VALIDITY:604800000}  # 7일 (ms)

  # 비밀번호 정책
  password:
    strength: ${SECURITY_PASSWORD_STRENGTH:12}  # BCrypt 강도 12 (표준화: backend-ops와 동일)
    min-length: ${PASSWORD_MIN_LENGTH:8}  # 최소 길이
    max-length: ${PASSWORD_MAX_LENGTH:100}  # 최대 길이
    require-uppercase: ${PASSWORD_REQUIRE_UPPERCASE:true}  # 대문자 필수
    require-lowercase: ${PASSWORD_REQUIRE_LOWERCASE:true}  # 소문자 필수
    require-digit: ${PASSWORD_REQUIRE_DIGIT:true}  # 숫자 필수
    require-special: ${PASSWORD_REQUIRE_SPECIAL:true}  # 특수문자 필수

  # 보안 감사 로그
  audit:
    enabled: ${SECURITY_AUDIT_ENABLED:true}  # 감사 로그 활성화
    retention-days: ${SECURITY_AUDIT_RETENTION_DAYS:365}  # 로그 보관 기간 (일)
