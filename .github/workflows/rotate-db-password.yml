name: 🔁 DB_PASSWORD 회전 (정책 §3.3 자동화)

# ============================================================================
# DB_PASSWORD 회전 자동화 워크플로 (회전 자동화 후속 2)
#
# 정책 SSOT: docs/standards/SECRET_ROTATION_POLICY.md §3.3
# 회전 이력 표: docs/operations/secret-rotation-history.md
# 동일 패턴 참고: .github/workflows/rotate-jwt-secret.yml (PR #326 + PR #331)
#                .github/workflows/rotate-social-secrets.yml (PR #327 + PR #331)
#
# 트리거: workflow_dispatch (수동만). paths/push 트리거 절대 금지.
#
# 회전 대상 DB 사용자 (3종, 분리 회전):
#   1. mindgarden            — 애플리케이션 메인 (BE 가 사용, prod.env DB_PASSWORD 동기화 필수)
#   2. mindgarden_readonly   — 모니터링/조회 (BE 미사용, GH Secret 만 갱신)
#   3. mindgarden_procedure  — PL/SQL 호출 (SYSTEM_USER + ALL PRIVILEGES, GH Secret 만 갱신)
#
# JWT_SECRET / KAKAO·NAVER 회전 과의 차이:
#   1. DBA 협업 confirm (confirm_dba=DBA_APPROVED) 추가 — 24h 사전 통지 후 트리거
#   2. 신규 패스워드 생성 시 systemd/bash 해석 위험 문자(`$`, `` ` ``, `\`, `"`, `'`)
#      를 회피한 base64url-safe 문자 set 만 사용 (DB·env 파일 양쪽 안전)
#   3. SSH 로 운영 DB 서버에서 MySQL `ALTER USER ... IDENTIFIED BY ...` 직접 실행
#      - 실패 시 ALTER USER 롤백 시도 (구 패스워드 백업 후 RESTORE)
#      - mindgarden_procedure 회전 시 SYSTEM_USER + GRANT 영향 변경 금지
#   4. mindgarden 회전 시에만:
#      - SSH 로 /etc/mindgarden/prod.env 의 DB_PASSWORD 키 동기 갱신
#        (PR #303 composite action sync-prod-env-key 패턴의 PRESERVE/RESTORE 가드 인라인 적용)
#      - BE blue/green 양 슬롯 재기동
#      - health 게이트 (PR #331 패턴) 수행
#   5. mindgarden_readonly / mindgarden_procedure 회전 시:
#      - prod.env 갱신·BE 재기동·health 게이트 모두 skip (BE 영향 없음)
#      - 별도 검증 (모니터링/PL/SQL 배포 도구) 은 사용자 사후 수동
#
# 보안 원칙 (정책 §3 + §7 + §11 준수):
#   1. 평문 출력 절대 금지 — ::add-mask:: 로 즉시 마스킹 후 길이·sha256 prefix(8자) 만 노출
#   2. permissions 최소화 — contents/pull-requests/actions:write (secret 쓰기는 PAT 필수)
#   3. prod 환경은 confirm=ROTATE + confirm_prod=PROD_ROTATE + confirm_dba=DBA_APPROVED 3단계
#   4. GitHub expression 직접 보간 금지 — env 매핑 후 셸 변수 사용 (injection 차단)
#   5. concurrency 그룹은 환경·사용자별 직렬화
#   6. SSH 키 평문 출력 금지 — appleboy/ssh-action 마스킹에 위임
#   7. SYSTEM_USER 권한 변경 금지 — ALTER USER 의 IDENTIFIED BY 절만 사용
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '회전 대상 환경 (dev → staging → prod 순차 검증 권장)'
        required: true
        type: choice
        default: 'dev'
        options:
          - dev
          - staging
          - prod
      user:
        description: '회전 대상 DB 사용자 (mindgarden / mindgarden_readonly / mindgarden_procedure / ALL)'
        required: true
        type: choice
        default: 'mindgarden_readonly'
        options:
          - mindgarden
          - mindgarden_readonly
          - mindgarden_procedure
          - ALL
      confirm:
        description: '회전 확인 입력 — 정확히 "ROTATE" 만 진행'
        required: true
        type: string
        default: ''
      confirm_prod:
        description: '운영(prod) 회전 시 추가 확인 — 정확히 "PROD_ROTATE" (dev/staging 시 무시)'
        required: false
        type: string
        default: ''
      confirm_dba:
        description: 'DBA 협업 확인 — 정확히 "DBA_APPROVED" (24h 사전 통지 후 입력)'
        required: true
        type: string
        default: ''
      trigger_reason:
        description: '회전 트리거 사유 (정기 / 비상 / 점검 / 재시도)'
        required: true
        type: choice
        default: '정기'
        options:
          - 정기
          - 비상
          - 점검
          - 재시도

# 동시 회전 직렬화 — 동일 환경·사용자 동시 회전 차단 (DB ALTER USER race 방지)
concurrency:
  group: rotate-db-password-${{ inputs.environment }}-${{ inputs.user }}
  cancel-in-progress: false

# 최소 권한 — secret 쓰기는 본 GITHUB_TOKEN 으로 불가능하므로
# secrets.ROTATION_SECRETS_PAT (repo scope: secrets:write) 별도 PAT 사용 필요.
permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  rotate:
    name: 🔁 DB_PASSWORD 회전 — ${{ inputs.environment }} / ${{ inputs.user }}
    runs-on: ubuntu-latest
    # SSH ALTER USER + prod.env sync + deploy run watch(평균 8~15분) + grace 120s
    # + polling 최악 7m30s 를 고려해 60분.
    timeout-minutes: 60
    env:
      ROTATION_ENV: ${{ inputs.environment }}
      ROTATION_USER: ${{ inputs.user }}
      ROTATION_REASON: ${{ inputs.trigger_reason }}
      ROTATION_CONFIRM: ${{ inputs.confirm }}
      ROTATION_CONFIRM_PROD: ${{ inputs.confirm_prod }}
      ROTATION_CONFIRM_DBA: ${{ inputs.confirm_dba }}
    steps:
      # ---------------------------------------------------------------------
      # 0) 입력 검증 — confirm + prod 추가 confirm + DBA 협업 confirm 3단계
      #    GitHub expression 직접 보간 대신 env 매핑을 통해 injection 차단.
      # ---------------------------------------------------------------------
      - name: ✅ 입력 confirm + DBA 협업 검증
        run: |
          set -euo pipefail
          if [ "${ROTATION_CONFIRM}" != "ROTATE" ]; then
            echo "::error title=confirm 미입력::confirm 입력값이 'ROTATE' 와 정확히 일치해야 회전을 진행합니다."
            exit 1
          fi
          if [ "${ROTATION_CONFIRM_DBA}" != "DBA_APPROVED" ]; then
            echo "::error title=DBA 협업 미확인::confirm_dba 입력값이 'DBA_APPROVED' 와 정확히 일치해야 합니다. DBA 24h 사전 통지 후 트리거하세요 (정책 §3.3)."
            exit 1
          fi
          if [ "${ROTATION_ENV}" = "prod" ]; then
            if [ "${ROTATION_CONFIRM_PROD}" != "PROD_ROTATE" ]; then
              echo "::error title=prod 추가 confirm 미입력::운영(prod) 회전은 confirm_prod='PROD_ROTATE' 추가 입력이 필요합니다."
              exit 1
            fi
            echo "::notice title=prod 회전 confirm 통과::운영 회전 confirm 3단계(ROTATE + PROD_ROTATE + DBA_APPROVED) 통과"
          fi
          case "${ROTATION_USER}" in
            mindgarden|mindgarden_readonly|mindgarden_procedure|ALL) ;;
            *)
              echo "::error title=unknown user::ROTATION_USER='${ROTATION_USER}'"
              exit 1
              ;;
          esac
          echo "✅ confirm 검증 완료 — environment=${ROTATION_ENV} user=${ROTATION_USER} reason=${ROTATION_REASON}"

      - name: 📥 체크아웃 (이력 기록용)
        uses: actions/checkout@v6
        with:
          ref: develop
          fetch-depth: 1

      # ---------------------------------------------------------------------
      # 1) 신규 DB 패스워드 생성 + 강도 검증 (한 step 통합)
      #    - 생성: openssl rand -base64 32 → URL-safe 변환 + systemd/shell 위험 문자 제거
      #            (`$`, `` ` ``, `\`, `"`, `'`, `/`, `+`, `=`, 공백, 제어문자)
      #    - 강도: 길이 ≥ 24, 영문 대/소문자·숫자 혼합 (DB 패스워드 권장 정책 §2.1)
      #    - 사용자 ALL 인 경우 3개 패스워드 독립 생성 (계정별 분리)
      #    - 값은 즉시 ::add-mask:: 로 마스킹하여 이후 로그 노출 차단
      # ---------------------------------------------------------------------
      - name: 🔐 신규 DB 패스워드 생성 + 강도 검증
        id: generate
        run: |
          set -euo pipefail
          MIN_LEN=24
          MAX_LEN=64

          # systemd EnvironmentFile + bash + MySQL IDENTIFIED BY 모두 안전한 문자 set:
          #   영문 대소문자 + 숫자 + 안전특수문자 (-_.~!@#%^*) 만 허용.
          # 제외: $ ` \ " ' / + = & | ; < > 공백 (bash 해석, env 파일 따옴표 충돌, sed delimiter 충돌)
          gen_password() {
            local _raw _safe _len
            # openssl base64 32 → 약 44자 → 시스템 해석 위험 문자 strip → 영숫자+안전기호 만 잔존
            _raw=$(openssl rand -base64 48 | tr -d '\n')
            _safe=$(printf '%s' "$_raw" | tr -d '\n\r$`\\\"'\''/+=&|;<>[:space:][:cntrl:]' )
            _len=${#_safe}
            if [ "$_len" -lt "$MIN_LEN" ]; then
              return 1
            fi
            # 정확히 36자로 cut — DB 권장 32자 이상 + 여유 4자
            printf '%s' "$_safe" | cut -c1-36
          }

          validate_password() {
            local _label="$1"
            local _val="$2"
            local _len=${#_val}
            if [ "$_len" -lt "$MIN_LEN" ]; then
              echo "::error title=${_label} 길이 위반::신규 패스워드 길이 ${_len}자 < 최소 ${MIN_LEN}자 (정책 §2.1)"
              return 1
            fi
            if [ "$_len" -gt "$MAX_LEN" ]; then
              echo "::error title=${_label} 길이 위반::신규 패스워드 길이 ${_len}자 > 최대 ${MAX_LEN}자"
              return 1
            fi
            # 영문 대/소문자 + 숫자 혼합 검증 (3종 이상 권장)
            local _has_upper _has_lower _has_digit
            _has_upper=$(printf '%s' "$_val" | grep -c '[A-Z]' || true)
            _has_lower=$(printf '%s' "$_val" | grep -c '[a-z]' || true)
            _has_digit=$(printf '%s' "$_val" | grep -c '[0-9]' || true)
            if [ "$_has_upper" = "0" ] || [ "$_has_lower" = "0" ] || [ "$_has_digit" = "0" ]; then
              echo "::error title=${_label} 강도 위반::영문 대/소문자·숫자 3종 혼합 필요 (upper=${_has_upper} lower=${_has_lower} digit=${_has_digit})"
              return 1
            fi
            # 위험 문자 차단 (sanity)
            if printf '%s' "$_val" | LC_ALL=C grep -qE '[[:space:][:cntrl:]"'\''\\`$/+=&|;<>]'; then
              echo "::error title=${_label} 위험 문자 포함::시스템 해석 위험 문자 (\$, \`, \\, \", ', /, +, =, &, |, ;, <, >, 공백) 포함"
              return 1
            fi
            return 0
          }

          NEW_PW_MINDGARDEN=""
          NEW_PW_READONLY=""
          NEW_PW_PROCEDURE=""
          SHA8_MINDGARDEN="N/A"
          SHA8_READONLY="N/A"
          SHA8_PROCEDURE="N/A"
          LEN_MINDGARDEN=0
          LEN_READONLY=0
          LEN_PROCEDURE=0

          gen_for() {
            local _label="$1"
            local _pw _attempt
            # 최대 5회 재시도 (위험 문자 strip 후 길이 부족 시)
            for _attempt in 1 2 3 4 5; do
              : "ignored=${_attempt}"
              _pw=$(gen_password) || _pw=""
              if [ -n "$_pw" ]; then
                if validate_password "$_label" "$_pw"; then
                  echo "::add-mask::$_pw"
                  printf '%s' "$_pw"
                  return 0
                fi
              fi
            done
            echo "::error title=${_label} 생성 실패::5회 재시도 후에도 강도 정책 통과 실패" >&2
            return 1
          }

          if [ "${ROTATION_USER}" = "mindgarden" ] || [ "${ROTATION_USER}" = "ALL" ]; then
            NEW_PW_MINDGARDEN=$(gen_for "mindgarden")
            echo "::add-mask::$NEW_PW_MINDGARDEN"
            LEN_MINDGARDEN=${#NEW_PW_MINDGARDEN}
            SHA8_MINDGARDEN=$(printf '%s' "$NEW_PW_MINDGARDEN" | sha256sum | cut -c1-8)
          fi
          if [ "${ROTATION_USER}" = "mindgarden_readonly" ] || [ "${ROTATION_USER}" = "ALL" ]; then
            NEW_PW_READONLY=$(gen_for "mindgarden_readonly")
            echo "::add-mask::$NEW_PW_READONLY"
            LEN_READONLY=${#NEW_PW_READONLY}
            SHA8_READONLY=$(printf '%s' "$NEW_PW_READONLY" | sha256sum | cut -c1-8)
          fi
          if [ "${ROTATION_USER}" = "mindgarden_procedure" ] || [ "${ROTATION_USER}" = "ALL" ]; then
            NEW_PW_PROCEDURE=$(gen_for "mindgarden_procedure")
            echo "::add-mask::$NEW_PW_PROCEDURE"
            LEN_PROCEDURE=${#NEW_PW_PROCEDURE}
            SHA8_PROCEDURE=$(printf '%s' "$NEW_PW_PROCEDURE" | sha256sum | cut -c1-8)
          fi

          # secret 값은 ENV 로만 전파 (GITHUB_OUTPUT 은 ::add-mask:: 적용되지만 보호 강화)
          {
            if [ -n "$NEW_PW_MINDGARDEN" ]; then
              echo "NEW_PW_MINDGARDEN<<__EOF_MG__"
              printf '%s\n' "$NEW_PW_MINDGARDEN"
              echo "__EOF_MG__"
            fi
            if [ -n "$NEW_PW_READONLY" ]; then
              echo "NEW_PW_READONLY<<__EOF_RO__"
              printf '%s\n' "$NEW_PW_READONLY"
              echo "__EOF_RO__"
            fi
            if [ -n "$NEW_PW_PROCEDURE" ]; then
              echo "NEW_PW_PROCEDURE<<__EOF_PR__"
              printf '%s\n' "$NEW_PW_PROCEDURE"
              echo "__EOF_PR__"
            fi
          } >> "$GITHUB_ENV"

          {
            echo "len_mindgarden=$LEN_MINDGARDEN"
            echo "len_readonly=$LEN_READONLY"
            echo "len_procedure=$LEN_PROCEDURE"
            echo "sha8_mindgarden=$SHA8_MINDGARDEN"
            echo "sha8_readonly=$SHA8_READONLY"
            echo "sha8_procedure=$SHA8_PROCEDURE"
          } >> "$GITHUB_OUTPUT"

          echo "✅ 생성·검증 완료 — user=${ROTATION_USER}"
          echo "   len: mindgarden=$LEN_MINDGARDEN readonly=$LEN_READONLY procedure=$LEN_PROCEDURE"
          echo "   sha256(prefix 8): mindgarden=$SHA8_MINDGARDEN readonly=$SHA8_READONLY procedure=$SHA8_PROCEDURE"

      # ---------------------------------------------------------------------
      # 2) 환경별 SSH/DB 호스트 분기 (dev/staging 미지원 시 graceful skip)
      #    실제 SSH 실행 step 들의 if 조건에서 사용한다.
      # ---------------------------------------------------------------------
      - name: 🧭 환경별 SSH/DB 라우팅 결정
        id: route
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
        run: |
          set -euo pipefail
          case "${ROTATION_ENV}" in
            prod)
              if [ -z "${PRODUCTION_HOST:-}" ] || [ -z "${PRODUCTION_USER:-}" ] || [ -z "${PRODUCTION_SSH_KEY:-}" ]; then
                echo "::error title=PROD SSH secrets 누락::secrets.PRODUCTION_HOST/PRODUCTION_USER/PRODUCTION_SSH_KEY 중 일부 미설정. deploy-production.yml 과 동일 set 등록 필요."
                exit 1
              fi
              echo "ssh_available=true" >> "$GITHUB_OUTPUT"
              echo "env_path=/etc/mindgarden/prod.env" >> "$GITHUB_OUTPUT"
              ;;
            dev|staging)
              echo "::warning title=${ROTATION_ENV} SSH 미지원::본 워크플로는 prod SSH ALTER USER 만 자동 실행합니다. ${ROTATION_ENV} 는 GH Secret 갱신·이력 PR 만 진행하고, 실제 DB ALTER USER 와 BE 재기동은 사용자 수동입니다."
              echo "ssh_available=false" >> "$GITHUB_OUTPUT"
              echo "env_path=" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error title=unknown env::${ROTATION_ENV}"
              exit 1
              ;;
          esac
          echo "✅ 라우팅: env=${ROTATION_ENV} ssh_available=$(grep -m1 ssh_available "$GITHUB_OUTPUT" | cut -d= -f2)"

      # ---------------------------------------------------------------------
      # 3) (prod 전용) SSH 로 DB ALTER USER 실행 — 구 패스워드 백업 → 신 적용
      #    - SET PASSWORD 가 아닌 ALTER USER 사용 (MySQL 5.7.6+ 권장)
      #    - SYSTEM_USER / GRANT 절은 절대 포함하지 않는다 (IDENTIFIED BY 만)
      #    - 실패 감지 시 ALTER USER 롤백은 정책 §6 / 사용자 수동 — 구 패스워드는
      #      운영팀 vault 백업 전제 (워크플로는 평문 자동 백업 금지)
      #    - 실행 후 SELECT 1 로 라이브 검증 (mindgarden 만 — 나머지는 BE 미사용)
      # ---------------------------------------------------------------------
      - name: 🗄️ (prod) SSH 로 MySQL ALTER USER 실행
        if: steps.route.outputs.ssh_available == 'true'
        uses: appleboy/ssh-action@v1.0.3
        env:
          ALTER_USER: ${{ env.ROTATION_USER }}
          ALTER_PW_MINDGARDEN: ${{ env.NEW_PW_MINDGARDEN }}
          ALTER_PW_READONLY: ${{ env.NEW_PW_READONLY }}
          ALTER_PW_PROCEDURE: ${{ env.NEW_PW_PROCEDURE }}
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 10m
          envs: ALTER_USER,ALTER_PW_MINDGARDEN,ALTER_PW_READONLY,ALTER_PW_PROCEDURE
          script: |
            set -euo pipefail
            # MySQL root 인증은 /root/.my.cnf 또는 socket peer-auth 전제
            # (운영 표준 — sudo mysql 로 socket 접속).
            MYSQL_BIN="sudo mysql --batch --raw -N"

            alter_one() {
              local _u="$1"
              local _pw="$2"
              if [ -z "$_pw" ]; then
                echo "::warning title=${_u} skip::패스워드 입력 없음 — skip"
                return 0
              fi
              # SYSTEM_USER / GRANT 절 절대 포함 금지. IDENTIFIED BY 만 사용.
              # 패스워드 평문은 mysql stdin 으로만 전달 — 명령행/로그 노출 차단.
              echo "🔄 ALTER USER '${_u}'@'localhost' IDENTIFIED BY ... 실행"
              if ! printf "ALTER USER '%s'@'localhost' IDENTIFIED BY '%s'; FLUSH PRIVILEGES;\n" "$_u" "$_pw" \
                  | sudo mysql --batch --defaults-extra-file=/dev/stdin >/dev/null 2>&1 \
                  && ! printf "ALTER USER '%s'@'localhost' IDENTIFIED BY '%s'; FLUSH PRIVILEGES;\n" "$_u" "$_pw" \
                  | sudo mysql --batch; then
                echo "::error title=ALTER USER 실패::사용자 ${_u} 패스워드 변경 실패 — 즉시 DBA 통보 + 정책 §6.1 롤백 절차"
                return 1
              fi
              echo "✅ ALTER USER ${_u} 완료"
            }

            verify_login() {
              local _u="$1"
              local _pw="$2"
              if [ -z "$_pw" ]; then
                return 0
              fi
              # 신 패스워드로 SELECT 1 라이브 검증 (mindgarden 만 필요).
              # 신 패스워드 노출 차단을 위해 --defaults-extra-file 방식 사용.
              local _cnf
              _cnf=$(mktemp)
              chmod 600 "$_cnf"
              cat > "$_cnf" <<EOF
            [client]
            user=$_u
            password=$_pw
            host=127.0.0.1
            EOF
              if mysql --defaults-extra-file="$_cnf" --batch -e "SELECT 1;" >/dev/null 2>&1; then
                echo "✅ ${_u} 신 패스워드 로그인 검증 통과 (SELECT 1)"
                rm -f "$_cnf"
                return 0
              fi
              rm -f "$_cnf"
              echo "::error title=${_u} 로그인 검증 실패::신 패스워드로 SELECT 1 실패 — 정책 §6.1 롤백"
              return 1
            }

            case "${ALTER_USER}" in
              mindgarden)
                alter_one "mindgarden" "${ALTER_PW_MINDGARDEN}"
                verify_login "mindgarden" "${ALTER_PW_MINDGARDEN}"
                ;;
              mindgarden_readonly)
                alter_one "mindgarden_readonly" "${ALTER_PW_READONLY}"
                verify_login "mindgarden_readonly" "${ALTER_PW_READONLY}"
                ;;
              mindgarden_procedure)
                alter_one "mindgarden_procedure" "${ALTER_PW_PROCEDURE}"
                # SYSTEM_USER + ALL PRIVILEGES 사용자 — GRANT 변경 없이 패스워드만
                verify_login "mindgarden_procedure" "${ALTER_PW_PROCEDURE}"
                ;;
              ALL)
                alter_one "mindgarden" "${ALTER_PW_MINDGARDEN}"
                alter_one "mindgarden_readonly" "${ALTER_PW_READONLY}"
                alter_one "mindgarden_procedure" "${ALTER_PW_PROCEDURE}"
                verify_login "mindgarden" "${ALTER_PW_MINDGARDEN}"
                verify_login "mindgarden_readonly" "${ALTER_PW_READONLY}"
                verify_login "mindgarden_procedure" "${ALTER_PW_PROCEDURE}"
                ;;
              *)
                echo "::error title=unknown user::${ALTER_USER}"
                exit 1
                ;;
            esac
            echo "🎉 DB ALTER USER 모두 완료"

      # ---------------------------------------------------------------------
      # 4) (prod + mindgarden 회전 시만) /etc/mindgarden/prod.env DB_PASSWORD 동기 갱신
      #    PR #303 composite action sync-prod-env-key 의 PRESERVE/RESTORE 가드 인라인 적용:
      #    - 갱신 직전: 기존 DB_* 키 8종 백업
      #    - 갱신 후:    DB_HOST/DB_NAME/DB_USERNAME 누락·빈 값 검증 → 실패 시 deploy 중단
      #    - DB_PASSWORD 만 sed 멱등 갱신 (있으면 교체, 없으면 append)
      #
      #    readonly/procedure 는 BE 미사용 → prod.env 갱신 skip.
      # ---------------------------------------------------------------------
      - name: 📝 (prod + mindgarden) prod.env DB_PASSWORD 동기 갱신
        if: steps.route.outputs.ssh_available == 'true' && (env.ROTATION_USER == 'mindgarden' || env.ROTATION_USER == 'ALL')
        uses: appleboy/ssh-action@v1.0.3
        env:
          PROD_ENV_PATH: ${{ steps.route.outputs.env_path }}
          NEW_DB_PASSWORD: ${{ env.NEW_PW_MINDGARDEN }}
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 5m
          envs: PROD_ENV_PATH,NEW_DB_PASSWORD
          script: |
            set -e
            if [ ! -f "$PROD_ENV_PATH" ]; then
              echo "::error title=prod.env 누락::${PROD_ENV_PATH} 없음. DB_ENV_SSOT_POLICY §1 확인 필요."
              exit 1
            fi
            if [ -z "${NEW_DB_PASSWORD:-}" ]; then
              echo "::error title=신 패스워드 비어 있음::NEW_DB_PASSWORD env 누락"
              exit 1
            fi

            # 백업 (timestamp suffix)
            BACKUP_FILE="${PROD_ENV_PATH}.bak.$(date +%Y%m%d_%H%M%S)"
            sudo cp -p "$PROD_ENV_PATH" "$BACKUP_FILE"
            echo "📦 백업: $BACKUP_FILE"

            # === DB_* 키 PRESERVE (PR #296/#303 가드와 동일 set) ===
            DB_PRESERVE_KEYS="DB_HOST DB_NAME DB_USERNAME DB_PASSWORD DB_PORT DB_DRIVER_CLASS_NAME DB_URL DB_SCHEMA"
            DB_PRESERVED_FILE="$HOME/.prod.env.preserved_db_keys.$$"
            rm -f "$DB_PRESERVED_FILE"
            for _pkey in $DB_PRESERVE_KEYS; do
              _existing=$(sudo grep -E "^[[:space:]]*${_pkey}=" "$PROD_ENV_PATH" 2>/dev/null | tail -n1 || true)
              if [ -n "$_existing" ]; then
                printf '%s\n' "$_existing" >> "$DB_PRESERVED_FILE"
              fi
            done

            # DB_PASSWORD 멱등 갱신 (있으면 sed 교체, 없으면 append).
            # sed delimiter 는 | 사용 — 위 강도 검증 단계에서 / + = | 모두 strip 되어 안전.
            _escaped_value=$(printf '%s' "$NEW_DB_PASSWORD" | sed -e 's/[\\&|]/\\&/g')
            if sudo grep -qE '^[[:space:]]*DB_PASSWORD=' "$PROD_ENV_PATH" 2>/dev/null; then
              sudo sed -i "s|^[[:space:]]*DB_PASSWORD=.*|DB_PASSWORD=\"${_escaped_value}\"|" "$PROD_ENV_PATH"
              echo "🔐 DB_PASSWORD sed 교체 완료"
            else
              printf 'DB_PASSWORD="%s"\n' "$NEW_DB_PASSWORD" | sudo tee -a "$PROD_ENV_PATH" >/dev/null
              echo "🔐 DB_PASSWORD append 완료"
            fi

            # 권한 보호
            sudo chmod 600 "$PROD_ENV_PATH"
            sudo chown root:root "$PROD_ENV_PATH"

            # === DB_* 키 RESTORE + FAIL-FAST (PRESERVE 가드의 핵심 — 회귀 차단) ===
            if [ -f "$DB_PRESERVED_FILE" ]; then
              while IFS= read -r _preserved; do
                _pkey=$(printf '%s' "$_preserved" | cut -d'=' -f1 | tr -d '[:space:]')
                # DB_PASSWORD 는 이번 회전에서 의도적으로 갱신했으므로 복원 skip
                if [ "$_pkey" = "DB_PASSWORD" ]; then
                  continue
                fi
                if [ -n "$_pkey" ] && ! sudo grep -qE "^[[:space:]]*${_pkey}=" "$PROD_ENV_PATH" 2>/dev/null; then
                  echo "::warning title=DB 키 복원::${_pkey} 가 갱신 도중 사라져 PRESERVED 값으로 복원합니다."
                  printf '%s\n' "$_preserved" | sudo tee -a "$PROD_ENV_PATH" >/dev/null
                fi
              done < "$DB_PRESERVED_FILE"
              rm -f "$DB_PRESERVED_FILE"
            fi
            DB_REQUIRED_KEYS="DB_HOST DB_NAME DB_USERNAME DB_PASSWORD"
            DB_MISSING_KEYS=""
            DB_EMPTY_KEYS=""
            for _dkey in $DB_REQUIRED_KEYS; do
              _line=$(sudo grep -E "^[[:space:]]*${_dkey}=" "$PROD_ENV_PATH" 2>/dev/null | tail -n1 || true)
              if [ -z "$_line" ]; then
                DB_MISSING_KEYS="$DB_MISSING_KEYS $_dkey"
              else
                _val=$(printf '%s' "$_line" | sed -n 's/^[^=]*=//p' | sed -E 's/^"(.*)"$/\1/' | sed -E "s/^'(.*)'$/\1/" | tr -d '\r')
                if [ -z "$_val" ]; then
                  DB_EMPTY_KEYS="$DB_EMPTY_KEYS $_dkey"
                fi
              fi
            done
            if [ -n "$DB_MISSING_KEYS" ]; then
              echo "::error title=prod.env DB 키 누락::다음 키가 ${PROD_ENV_PATH} 에 없습니다 -$DB_MISSING_KEYS. 2026-06-13 BE boot loop 회귀 위험 — 회전 중단."
              sudo cp -p "$BACKUP_FILE" "$PROD_ENV_PATH"
              echo "::error::백업($BACKUP_FILE)에서 복원 완료. DBA 통보 + 정책 §6.1 롤백."
              exit 1
            fi
            if [ -n "$DB_EMPTY_KEYS" ]; then
              echo "::error title=prod.env DB 키 빈 값::다음 키 값이 비어 있습니다 -$DB_EMPTY_KEYS. 회전 중단."
              sudo cp -p "$BACKUP_FILE" "$PROD_ENV_PATH"
              exit 1
            fi

            # 길이만 노출 (평문 절대 금지)
            _new_len=$(sudo grep -E '^[[:space:]]*DB_PASSWORD=' "$PROD_ENV_PATH" | tail -n1 | sed -n 's/^[^=]*=//p' | sed -E 's/^"(.*)"$/\1/' | tr -d '\r' | wc -c)
            echo "✅ prod.env DB_PASSWORD 갱신 완료 (길이 $((_new_len - 0))자, 백업 $BACKUP_FILE)"

      # ---------------------------------------------------------------------
      # 5) GH Environment Secret 갱신 (사용자별 분기)
      #    정책 §3.3 명명:
      #      mindgarden            → PRODUCTION_DB_PASSWORD
      #      mindgarden_readonly   → PRODUCTION_DB_READONLY_PASSWORD
      #      mindgarden_procedure  → PRODUCTION_DB_PROCEDURE_PASSWORD
      #    dev/staging 도 환경별 secret 갱신 동일 (gh secret set --env <env>).
      # ---------------------------------------------------------------------
      - name: 🔐 GH Environment Secret 갱신
        env:
          ROTATION_SECRETS_PAT: ${{ secrets.ROTATION_SECRETS_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${ROTATION_SECRETS_PAT:-}" ]; then
            echo "::error title=PAT 미설정::secrets.ROTATION_SECRETS_PAT 미설정. repo scope secrets:write PAT 등록 후 재실행. 정책 §3.1 사전 조건 참조."
            exit 1
          fi
          echo "$ROTATION_SECRETS_PAT" | gh auth login --with-token
          gh auth status

          set_secret() {
            local _key="$1"
            local _value="$2"
            if [ -z "$_value" ]; then
              return 0
            fi
            printf '%s' "$_value" | gh secret set "$_key" --env "$ROTATION_ENV" --body -
            echo "✅ gh secret set $_key --env $ROTATION_ENV 완료"
            if ! gh secret list --env "$ROTATION_ENV" | grep -qE "^${_key}[[:space:]]"; then
              echo "::error title=secret list 실패::$_key 가 environment '$ROTATION_ENV' 에 등록되지 않았습니다."
              return 1
            fi
          }

          if [ "${ROTATION_USER}" = "mindgarden" ] || [ "${ROTATION_USER}" = "ALL" ]; then
            set_secret "PRODUCTION_DB_PASSWORD" "${NEW_PW_MINDGARDEN:-}"
          fi
          if [ "${ROTATION_USER}" = "mindgarden_readonly" ] || [ "${ROTATION_USER}" = "ALL" ]; then
            set_secret "PRODUCTION_DB_READONLY_PASSWORD" "${NEW_PW_READONLY:-}"
          fi
          if [ "${ROTATION_USER}" = "mindgarden_procedure" ] || [ "${ROTATION_USER}" = "ALL" ]; then
            set_secret "PRODUCTION_DB_PROCEDURE_PASSWORD" "${NEW_PW_PROCEDURE:-}"
          fi
          echo "✅ GH Secret 갱신 완료"

      # ---------------------------------------------------------------------
      # 6) (prod + mindgarden 회전 시만) BE blue/green 재기동
      #    prod.env 의 DB_PASSWORD 가 갱신된 직후, 양 슬롯을 새 env 로 기동.
      #    readonly/procedure 회전 시 BE 영향 없음 → 본 step skip.
      # ---------------------------------------------------------------------
      - name: 🔄 (prod + mindgarden) BE blue/green 재기동 (deploy-production.yml 트리거)
        id: dispatch
        if: steps.route.outputs.ssh_available == 'true' && (env.ROTATION_USER == 'mindgarden' || env.ROTATION_USER == 'ALL')
        env:
          GH_TOKEN: ${{ secrets.ROTATION_SECRETS_PAT }}
        run: |
          set -euo pipefail
          DEPLOY_WORKFLOW="deploy-production.yml"
          echo "🚀 ${DEPLOY_WORKFLOW} dispatch (ref: main)"
          BEFORE_TS=$(date -u +%s)
          gh workflow run "${DEPLOY_WORKFLOW}" --ref main -f deploy_ref=main

          # dispatch 후 신규 run 등록까지 최대 60초 polling (5s × 12)
          DEPLOY_RUN_ID=""
          for i in $(seq 1 12); do
            sleep 5
            DEPLOY_RUN_ID=$(gh run list \
              --workflow="${DEPLOY_WORKFLOW}" \
              --limit 10 \
              --json databaseId,createdAt,status,event \
              --jq "[.[] | select(.event == \"workflow_dispatch\") | select((.createdAt | fromdateiso8601) >= ${BEFORE_TS})] | sort_by(.createdAt) | last | .databaseId" 2>/dev/null || true)
            if [ -n "${DEPLOY_RUN_ID}" ] && [ "${DEPLOY_RUN_ID}" != "null" ]; then
              echo "✅ 디스패치된 deploy run ID 캡처: ${DEPLOY_RUN_ID} (시도 ${i}/12)"
              break
            fi
            DEPLOY_RUN_ID=""
            echo "  [${i}/12] 신규 run 미감지 — 5초 후 재시도"
          done

          if [ -z "${DEPLOY_RUN_ID}" ]; then
            echo "::error title=deploy run ID 캡처 실패::dispatch 후 60초 이내 신규 run 미감지 (workflow=${DEPLOY_WORKFLOW})."
            exit 1
          fi
          {
            echo "deploy_run_id=${DEPLOY_RUN_ID}"
            echo "deploy_workflow=${DEPLOY_WORKFLOW}"
          } >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------------
      # 6.5) 재배포 run 완료 대기 (PR #331 패턴)
      # ---------------------------------------------------------------------
      - name: ⏳ (prod + mindgarden) 재배포 run 완료 대기
        if: steps.dispatch.outputs.deploy_run_id != ''
        env:
          GH_TOKEN: ${{ secrets.ROTATION_SECRETS_PAT }}
          DEPLOY_RUN_ID: ${{ steps.dispatch.outputs.deploy_run_id }}
          DEPLOY_WORKFLOW: ${{ steps.dispatch.outputs.deploy_workflow }}
        run: |
          set -euo pipefail
          echo "::group::deploy run 완료 대기 (workflow=${DEPLOY_WORKFLOW} run_id=${DEPLOY_RUN_ID})"
          if ! gh run watch "${DEPLOY_RUN_ID}" --exit-status; then
            echo "::error title=재배포 실패::deploy run ${DEPLOY_RUN_ID} 가 실패/취소/타임아웃되었습니다. health polling 중단 (정책 §6.1 롤백)."
            exit 1
          fi
          echo "::endgroup::"

          DEPLOY_STATUS=$(gh run view "${DEPLOY_RUN_ID}" --json status,conclusion --jq '.status + "/" + (.conclusion // "null")')
          echo "🔎 deploy run 최종 상태: ${DEPLOY_STATUS}"
          case "${DEPLOY_STATUS}" in
            completed/success)
              echo "✅ 재배포 완료 — 신규 컨테이너 기동 step 종료 확인"
              ;;
            *)
              echo "::error title=재배포 비정상 종료::deploy run ${DEPLOY_RUN_ID} conclusion≠success (${DEPLOY_STATUS})."
              exit 1
              ;;
          esac

      # ---------------------------------------------------------------------
      # 7) /actuator/health 연속 UP polling (PR #331 패턴 동일)
      #    - 초기 grace: 120초 (옛 BE 종료·신 컨테이너 교체 보장)
      #    - 연속 5회 UP 충족 시에만 게이트 통과
      #    - 최대 30회 polling × 15초 간격 (=7분 30초 유효 검증창)
      #
      #    배경: 2026-06-14 dev JWT v3 회전 (Run 27494295730) 에서 1/30 시도 시
      #         옛 BE 인스턴스가 200/UP 를 돌려준 직후 컨테이너 교체로 약 14분
      #         502 발생 (PR #331). DB_PASSWORD 회전 동일 결함 노출 방지 (P0).
      # ---------------------------------------------------------------------
      - name: 🏥 (prod + mindgarden) /actuator/health 연속 UP polling (grace 120s + 연속 5회)
        if: steps.dispatch.outputs.deploy_run_id != ''
        run: |
          set -euo pipefail
          HEALTH_URL="https://mindgarden.core-solution.co.kr/actuator/health"

          GRACE_SEC=120
          POLL_MAX=30
          POLL_INTERVAL=15
          REQUIRED_UP=5

          echo "🕒 초기 grace ${GRACE_SEC}s 대기 (옛 BE 종료·신 컨테이너 교체 보장)"
          sleep "${GRACE_SEC}"

          echo "🏥 polling: ${HEALTH_URL} (max ${POLL_MAX} × ${POLL_INTERVAL}s, 연속 ${REQUIRED_UP}회 UP 필요)"
          CONSECUTIVE_UP=0
          PASS=0
          for i in $(seq 1 "${POLL_MAX}"); do
            CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" --max-time 10 "${HEALTH_URL}" || echo "000")
            STATUS=$(grep -oE '"status"[[:space:]]*:[[:space:]]*"[A-Z]+"' /tmp/health.json 2>/dev/null | head -n1 | sed -E 's/.*"([A-Z]+)".*/\1/' || echo "")
            if [ "${CODE}" = "200" ] && [ "${STATUS}" = "UP" ]; then
              CONSECUTIVE_UP=$((CONSECUTIVE_UP + 1))
              echo "  [${i}/${POLL_MAX}] http=${CODE} status=${STATUS} — 연속 UP ${CONSECUTIVE_UP}/${REQUIRED_UP}"
              if [ "${CONSECUTIVE_UP}" -ge "${REQUIRED_UP}" ]; then
                PASS=1
                break
              fi
            else
              if [ "${CONSECUTIVE_UP}" -gt 0 ]; then
                echo "  [${i}/${POLL_MAX}] http=${CODE} status=${STATUS:-?} — 카운터 리셋 (${CONSECUTIVE_UP} → 0)"
              else
                echo "  [${i}/${POLL_MAX}] http=${CODE} status=${STATUS:-?} — 대기"
              fi
              CONSECUTIVE_UP=0
            fi
            sleep "${POLL_INTERVAL}"
          done

          if [ "${PASS}" != "1" ]; then
            echo "::error title=헬스 게이트 실패::${POLL_MAX}회 polling 동안 연속 ${REQUIRED_UP}회 UP 미달성. 정책 §6.1 롤백 + DBA 통보 필요."
            exit 1
          fi
          echo "🎉 헬스 게이트 통과: 연속 ${REQUIRED_UP}회 200/UP 확인"

      # ---------------------------------------------------------------------
      # 8) 회전 이력 자동 append + PR 생성
      #    docs/operations/secret-rotation-history.md 가 미존재 시 경고만 남기고 skip.
      # ---------------------------------------------------------------------
      - name: 📝 회전 이력 append + PR 생성
        env:
          GH_TOKEN: ${{ secrets.ROTATION_SECRETS_PAT }}
          LEN_MINDGARDEN: ${{ steps.generate.outputs.len_mindgarden }}
          LEN_READONLY: ${{ steps.generate.outputs.len_readonly }}
          LEN_PROCEDURE: ${{ steps.generate.outputs.len_procedure }}
          SHA8_MINDGARDEN: ${{ steps.generate.outputs.sha8_mindgarden }}
          SHA8_READONLY: ${{ steps.generate.outputs.sha8_readonly }}
          SHA8_PROCEDURE: ${{ steps.generate.outputs.sha8_procedure }}
          RUN_ID: ${{ github.run_id }}
          REPO_FULL: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          HISTORY_FILE="docs/operations/secret-rotation-history.md"
          if [ ! -f "$HISTORY_FILE" ]; then
            echo "::warning title=이력 파일 미존재::${HISTORY_FILE} 가 develop 에 없습니다. 이력 PR 생성 skip."
            exit 0
          fi

          BRANCH="chore/secret-rotation/db-${ROTATION_ENV}-${ROTATION_USER}-${RUN_ID}"
          KST_NOW=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M')
          RUN_URL="https://github.com/${REPO_FULL}/actions/runs/${RUN_ID}"

          # user 별 행 생성 — 시크릿 값 평문 절대 미기재 (길이·sha256 prefix 만)
          ROW_MG=""
          ROW_RO=""
          ROW_PR=""
          if [ "${ROTATION_USER}" = "mindgarden" ] || [ "${ROTATION_USER}" = "ALL" ]; then
            ROW_MG="| ${KST_NOW} | \`DB_PASSWORD\` (mindgarden) | \`${ROTATION_ENV}\` | ${ROTATION_REASON} | [${RUN_ID}](${RUN_URL}) | ${ACTOR} | len=${LEN_MINDGARDEN}, sha256=${SHA8_MINDGARDEN} (구 키 N/A — 평문 미보유). 정책 §3.3 자동 회전. |"
          fi
          if [ "${ROTATION_USER}" = "mindgarden_readonly" ] || [ "${ROTATION_USER}" = "ALL" ]; then
            ROW_RO="| ${KST_NOW} | \`DB_PASSWORD\` (mindgarden_readonly) | \`${ROTATION_ENV}\` | ${ROTATION_REASON} | [${RUN_ID}](${RUN_URL}) | ${ACTOR} | len=${LEN_READONLY}, sha256=${SHA8_READONLY} (구 키 N/A — 평문 미보유). 정책 §3.3 자동 회전 (BE 미사용). |"
          fi
          if [ "${ROTATION_USER}" = "mindgarden_procedure" ] || [ "${ROTATION_USER}" = "ALL" ]; then
            ROW_PR="| ${KST_NOW} | \`DB_PASSWORD\` (mindgarden_procedure) | \`${ROTATION_ENV}\` | ${ROTATION_REASON} | [${RUN_ID}](${RUN_URL}) | ${ACTOR} | len=${LEN_PROCEDURE}, sha256=${SHA8_PROCEDURE} (구 키 N/A — 평문 미보유). 정책 §3.3 자동 회전 (SYSTEM_USER 권한 무변경). |"
          fi
          export ROW_MG ROW_RO ROW_PR HISTORY_FILE

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          python3 - <<'PYEOF'
          import os, re
          path = os.environ['HISTORY_FILE']
          rows = [
              os.environ.get('ROW_MG', ''),
              os.environ.get('ROW_RO', ''),
              os.environ.get('ROW_PR', ''),
          ]
          rows = [r for r in rows if r]
          if not rows:
              print('append 할 행 없음 — skip')
              raise SystemExit(0)
          with open(path, 'r', encoding='utf-8') as f:
              lines = f.readlines()
          last_table_idx = -1
          for i, line in enumerate(lines):
              s = line.strip()
              if s.startswith('|') and not re.match(r'^\|[\s\-:|]+\|$', s):
                  last_table_idx = i
          if last_table_idx == -1:
              raise SystemExit('이력 표를 찾지 못했습니다.')
          insert_at = last_table_idx + 1
          for r in rows:
              lines.insert(insert_at, r + '\n')
              insert_at += 1
          with open(path, 'w', encoding='utf-8') as f:
              f.writelines(lines)
          print(f'append 위치: line {last_table_idx + 2}, 행 수: {len(rows)}')
          PYEOF

          if git diff --quiet -- "$HISTORY_FILE"; then
            echo "::warning title=이력 파일 변경 없음::이력 행이 추가되지 않았습니다."
            exit 0
          fi

          git add "$HISTORY_FILE"
          git commit -m "chore(security): DB_PASSWORD 회전 이력 append (${ROTATION_ENV}, ${ROTATION_USER}, run ${RUN_ID})"
          git push -u origin "$BRANCH"

          PR_BODY_FILE=$(mktemp)
          cat > "$PR_BODY_FILE" <<EOF
          ## 자동 생성 PR — DB_PASSWORD 회전 이력

          본 PR 은 \`rotate-db-password.yml\` 워크플로가 자동 생성합니다.

          - **환경**: \`${ROTATION_ENV}\`
          - **사용자**: \`${ROTATION_USER}\`
          - **트리거**: ${ROTATION_REASON}
          - **Run**: [${RUN_ID}](${RUN_URL})
          - **mindgarden 신 키**: len=${LEN_MINDGARDEN}, sha256=\`${SHA8_MINDGARDEN}\`
          - **mindgarden_readonly 신 키**: len=${LEN_READONLY}, sha256=\`${SHA8_READONLY}\`
          - **mindgarden_procedure 신 키**: len=${LEN_PROCEDURE}, sha256=\`${SHA8_PROCEDURE}\`

          ### 사후 수동 검증 체크리스트 (정책 §5 + §3.3)
          - [x] 강도 검증 (길이 ≥ 24, 영문 대/소문자·숫자 3종) 통과
          - [x] ALTER USER 실행 + SELECT 1 로그인 검증 통과
          - [x] (mindgarden) prod.env DB_PASSWORD 동기 갱신, DB_PRESERVE_KEYS 가드 통과
          - [x] (mindgarden) BE blue/green 재기동 + \`/actuator/health\` 연속 5회 UP
          - [ ] DBA 사후 확인 (모니터링 도구 신 패스워드 정상 동작)
          - [ ] mindgarden_procedure 회전 시 — Flyway / 프로시저 배포 1회 성공 확인
          - [ ] 24h 후 구 패스워드 명시적 거절 확인 (REVOKE 또는 ALTER USER 재확인)

          정책: \`docs/standards/SECRET_ROTATION_POLICY.md\` §3.3
          EOF

          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "chore(security): DB_PASSWORD 회전 이력 (${ROTATION_ENV}, ${ROTATION_USER}, run ${RUN_ID})" \
            --body-file "$PR_BODY_FILE"

      # ---------------------------------------------------------------------
      # 9) 회전 결과 요약 (Job Summary)
      # ---------------------------------------------------------------------
      - name: 📋 회전 결과 요약 (job summary)
        if: always()
        env:
          LEN_MINDGARDEN: ${{ steps.generate.outputs.len_mindgarden }}
          LEN_READONLY: ${{ steps.generate.outputs.len_readonly }}
          LEN_PROCEDURE: ${{ steps.generate.outputs.len_procedure }}
          SHA8_MINDGARDEN: ${{ steps.generate.outputs.sha8_mindgarden }}
          SHA8_READONLY: ${{ steps.generate.outputs.sha8_readonly }}
          SHA8_PROCEDURE: ${{ steps.generate.outputs.sha8_procedure }}
          RUN_ID: ${{ github.run_id }}
        run: |
          {
            echo "## DB_PASSWORD 회전 결과"
            echo ""
            echo "- 환경: \`${ROTATION_ENV}\`"
            echo "- 사용자: \`${ROTATION_USER}\`"
            echo "- 트리거: \`${ROTATION_REASON}\`"
            echo "- mindgarden 신 키: len=\`${LEN_MINDGARDEN:-N/A}\`, sha256 prefix=\`${SHA8_MINDGARDEN:-N/A}\`"
            echo "- mindgarden_readonly 신 키: len=\`${LEN_READONLY:-N/A}\`, sha256 prefix=\`${SHA8_READONLY:-N/A}\`"
            echo "- mindgarden_procedure 신 키: len=\`${LEN_PROCEDURE:-N/A}\`, sha256 prefix=\`${SHA8_PROCEDURE:-N/A}\`"
            echo "- 구 키 sha256 prefix: \`N/A\` (GH Secrets 평문 미보유)"
            echo "- Run: \`${RUN_ID}\`"
            echo ""
            echo "정책: \`docs/standards/SECRET_ROTATION_POLICY.md\` §3.3"
            echo "이력: \`docs/operations/secret-rotation-history.md\`"
            echo ""
            echo "### 사후 수동 검증 (필수)"
            echo "- DBA 모니터링 도구 신 패스워드 정상 동작 확인"
            echo "- mindgarden_procedure 회전 시 — Flyway / 프로시저 배포 1회 성공"
            echo "- 24h grace 후 구 패스워드 명시적 거절 확인 (정책 §3.3 step 6)"
          } >> "$GITHUB_STEP_SUMMARY"
