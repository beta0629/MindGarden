name: 🎨 Frontend (CoreSolution) 개발 서버 배포
# 운영: deploy-frontend-prod.yml (main, /var/www/mindgarden/frontend)
# Node 20: prod와 동일 메이저로 빌드 재현성
# 배포 트리거: 2025-12-10 (paths: frontend/**)

on:
  push:
    branches: [ develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend-dev.yml'
  workflow_dispatch:
    # 수동 실행 가능

jobs:
  build:
    name: 🏗️ Core 프론트엔드 빌드
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 📦 Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 프론트엔드 의존성 설치
        run: |
          cd frontend
          npm ci

      # REACT_APP_GOOGLE_CLIENT_ID: GIS(@react-oauth/google) 웹 OAuth Client ID (개발).
      # 미설정 시 빈 문자열로 빌드되며 GIS Provider 미마운트 → 레거시 redirect 흐름으로 폴백.
      # REACT_APP_APPLE_CLIENT_ID: Apple Developer Console Service ID (개발). 미설정 시
      #   APPLE_WEB_SERVICE_ID 가 빈 문자열이 되어 isAppleWebServiceIdConfigured=false →
      #   UnifiedLogin 의 Apple 버튼이 렌더되지 않는다(App Store 4.8 T1 정책 준수).
      # REACT_APP_APPLE_REDIRECT_URI: Apple Service ID 에 등록한 Return URL. 미설정 시
      #   getBaseUrl() 기반 기본값(`{origin}/api/v1/auth/oauth/apple/callback`) 사용.
      - name: 🏗️ 프론트엔드 빌드
        env:
          REACT_APP_GOOGLE_CLIENT_ID: ${{ secrets.REACT_APP_GOOGLE_CLIENT_ID }}
          REACT_APP_APPLE_CLIENT_ID: ${{ secrets.REACT_APP_APPLE_CLIENT_ID }}
          REACT_APP_APPLE_REDIRECT_URI: ${{ secrets.REACT_APP_APPLE_REDIRECT_URI }}
        run: |
          cd frontend
          npm run build:ci

      - name: 🔍 프론트엔드 빌드 결과 확인
        run: |
          echo "🔍 프론트엔드 빌드 결과 확인..."
          if [ -d frontend/build ]; then
            FILE_COUNT=$(find frontend/build -type f 2>/dev/null | wc -l)
            if [ "$FILE_COUNT" -gt 0 ]; then
              echo "✅ frontend/build 디렉토리 생성됨: $FILE_COUNT 개 파일"
              find frontend/build -maxdepth 1 -type f -print0 2>/dev/null | head -z -n 10 | xargs -0r ls -lh
            else
              echo "❌ frontend/build 디렉토리가 비어있음!"
              exit 1
            fi
          else
            echo "❌ frontend/build 디렉토리 없음!"
            exit 1
          fi

      - name: 📦 배포용 아티팩트 스테이징
        run: |
          rm -rf _gha_static_site_upload
          mkdir -p _gha_static_site_upload
          cp -a frontend/build/. _gha_static_site_upload/

      - name: 📤 빌드 산출물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: core-frontend-static-site-artifact
          path: _gha_static_site_upload/

  deploy:
    name: 📤 Core 프론트 개발 서버 배포
    needs: build
    uses: ./.github/workflows/reusable-static-site-ssh-deploy.yml
    with:
      site_label: Core 프론트(개발)
      remote_html_dir: html-dev
      backup_subdir: html-dev
      backup_tar_prefix: html-dev-backup
      scp_source: _static_site_upload/*
      strip_components: 1
      artifact_name: core-frontend-static-site-artifact
      health_urls: |
        https://dev.core-solution.co.kr
    secrets:
      ssh_host: ${{ secrets.DEV_SERVER_HOST }}
      ssh_user: ${{ secrets.DEV_SERVER_USER }}
      ssh_key: ${{ secrets.DEV_SERVER_SSH_KEY }}
