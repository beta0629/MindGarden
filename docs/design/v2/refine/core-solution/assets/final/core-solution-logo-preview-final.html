<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CoreSolution Logo — Final</title>
  <style>
    :root {
      --mg-color-primary-main: #3D5246;
      --mg-color-primary-light: #4A6354;
      --mg-color-secondary-main: #6B7F72;
      --mg-color-accent-main: #8B7355;
      --mg-color-text-main: #2C2C2C;
      --mg-color-text-secondary: #5C6B61;
      --mg-color-surface-main: #F5F3EF;
      --mg-color-border-main: #D4CFC8;
      --mg-color-background-main: #FAF9F7;
      --sidebar-dark: #2C2C2C;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Inter", "Noto Sans KR", system-ui, sans-serif;
      background: #eef1f4;
      color: var(--mg-color-text-main);
      line-height: 1.5;
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }
    header {
      margin-bottom: 2rem;
    }
    header h1 {
      margin: 0 0 0.5rem;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    header p {
      margin: 0;
      color: var(--mg-color-text-secondary);
      font-size: 0.95rem;
    }
    .concept {
      background: #fff;
      border: 1px solid var(--mg-color-border-main);
      border-radius: 12px;
      padding: 1.25rem 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
    }
    .concept__head {
      margin-bottom: 1rem;
    }
    .concept__label {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--mg-color-primary-main);
      margin-bottom: 0.25rem;
    }
    .concept__title {
      margin: 0 0 0.35rem;
      font-size: 1.125rem;
      font-weight: 600;
    }
    .concept__desc {
      margin: 0;
      font-size: 0.9rem;
      color: var(--mg-color-text-secondary);
    }
    .compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    @media (max-width: 640px) {
      .compare { grid-template-columns: 1fr; }
    }
    .panel {
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--mg-color-border-main);
    }
    .panel__tag {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 0.4rem 0.65rem;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }
    .panel--light .panel__tag {
      background: var(--mg-color-background-main);
      color: var(--mg-color-text-secondary);
    }
    .panel--dark .panel__tag {
      background: #1a1a1a;
      color: #8c9eab;
      border-bottom-color: rgba(255, 255, 255, 0.08);
    }
    .panel__canvas {
      padding: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 140px;
    }
    .panel--light .panel__canvas { background: var(--mg-color-background-main); }
    .panel--dark .panel__canvas { background: var(--sidebar-dark); }
    .logo-embed {
      display: block;
      max-width: 100%;
      width: min(100%, 300px);
    }
    .logo-embed svg {
      max-width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>CoreSolution — Final Logo</h1>
      <p>선정된 H2 컨셉 (Shield & Layers) · 라이트(메인/랜딩) 및 다크(사이드바) 배경 위 동일 SVG 임베드</p>
    </header>

    <section class="concept">
      <div class="concept__head">
        <span class="concept__label">Final Concept</span>
        <h2 class="concept__title">Shield & Layers (H2)</h2>
        <p class="concept__desc">Overlapping geometric shield shapes forming a central core. Represents security, layers of data, and B2B reliability.</p>
      </div>
      <div class="compare">
        <div class="panel panel--light">
          <div class="panel__tag">Light page (#FAF9F7)</div>
          <div class="panel__canvas">
            <span class="logo-embed" role="img" aria-label="CoreSolution Logo — Light">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
                <g transform="translate(20, 20)">
                  <!-- Outer Shield Layer -->
                  <path d="M4 12 L20 4 L36 12 L36 24 C36 32 28 38 20 40 C12 38 4 32 4 24 Z" fill="#6B7F72" opacity="0.3" />
                  <!-- Inner Shield Layer -->
                  <path d="M8 16 L20 10 L32 16 L32 24 C32 30 26 34 20 36 C14 34 8 30 8 24 Z" fill="#3D5246" />
                  <!-- Core Data Point -->
                  <circle cx="20" cy="22" r="4" fill="#8B7355" />
                </g>
                <text x="76" y="48" font-family="'Inter', 'Noto Sans KR', sans-serif" font-size="24" font-weight="700" fill="#2C2C2C" letter-spacing="-0.02em">Core<tspan font-weight="400" fill="#5C6B61">Solution</tspan></text>
              </svg>
            </span>
          </div>
        </div>
        <div class="panel panel--dark">
          <div class="panel__tag">Dark Sidebar (#2C2C2C)</div>
          <div class="panel__canvas">
            <span class="logo-embed" role="img" aria-label="CoreSolution Logo — Dark">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
                <g transform="translate(20, 20)">
                  <!-- Outer Shield Layer -->
                  <path d="M4 12 L20 4 L36 12 L36 24 C36 32 28 38 20 40 C12 38 4 32 4 24 Z" fill="#6B7F72" opacity="0.3" />
                  <!-- Inner Shield Layer -->
                  <path d="M8 16 L20 10 L32 16 L32 24 C32 30 26 34 20 36 C14 34 8 30 8 24 Z" fill="#3D5246" />
                  <!-- Core Data Point -->
                  <circle cx="20" cy="22" r="4" fill="#8B7355" />
                </g>
                <text x="76" y="48" font-family="'Inter', 'Noto Sans KR', sans-serif" font-size="24" font-weight="700" fill="#FAF9F7" letter-spacing="-0.02em">Core<tspan font-weight="400" fill="#FAF9F7" opacity="0.8">Solution</tspan></text>
              </svg>
            </span>
          </div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
