server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: mindgarden-ops-backend
  profiles:
    active: local
    group:
      staging: staging
      prod: prod
  main:
    banner-mode: off
  datasource:
    # 로컬 환경: H2 메모리 DB 사용
    url: jdbc:h2:mem:opsdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop  # 로컬에서는 매번 새로 생성
    properties:
      hibernate.dialect: org.hibernate.dialect.H2Dialect
    show-sql: true
  flyway:
    enabled: false  # 로컬에서는 Flyway 비활성화 (ddl-auto: create-drop 사용)

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.mindgarden.ops: DEBUG

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:local-dev-secret-change-me-please-use-a-stronger-one}
    issuer: ${SECURITY_JWT_ISSUER:mindgarden-ops}
    expires-in-seconds: ${SECURITY_JWT_EXPIRES:3600}
  ops:
    username: ${OPS_ADMIN_USERNAME:superadmin@mindgarden.com}
    password: ${OPS_ADMIN_PASSWORD:admin123}
    default-role: ${OPS_ADMIN_ROLE:HQ_ADMIN}
