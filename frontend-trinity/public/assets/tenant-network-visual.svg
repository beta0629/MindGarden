<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" fill="none">
  <!-- TenantNetworkVisual: Central Core symbol connected to 5 outer nodes on a dark navy background -->
  <rect width="480" height="480" fill="#0F172A" />
  
  <defs>
    <linearGradient id="line-grad-1" x1="240" y1="240" x2="240" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="line-grad-2" x1="240" y1="240" x2="373.14" y2="196.74" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="line-grad-3" x1="240" y1="240" x2="322.32" y2="353.26" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="line-grad-4" x1="240" y1="240" x2="157.68" y2="353.26" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="line-grad-5" x1="240" y1="240" x2="106.86" y2="196.74" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.2"/>
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Connecting Lines -->
  <line x1="240" y1="240" x2="240" y2="100" stroke="url(#line-grad-1)" stroke-width="2" />
  <line x1="240" y1="240" x2="373.14" y2="196.74" stroke="url(#line-grad-2)" stroke-width="2" />
  <line x1="240" y1="240" x2="322.32" y2="353.26" stroke="url(#line-grad-3)" stroke-width="2" />
  <line x1="240" y1="240" x2="157.68" y2="353.26" stroke="url(#line-grad-4)" stroke-width="2" />
  <line x1="240" y1="240" x2="106.86" y2="196.74" stroke="url(#line-grad-5)" stroke-width="2" />

  <!-- Outer Nodes -->
  <g id="nodes">
    <!-- Node 1 -->
    <circle cx="240" cy="100" r="12" fill="#1E293B" stroke="#8B5CF6" stroke-width="2" />
    <circle cx="240" cy="100" r="4" fill="#FFFFFF" />

    <!-- Node 2 -->
    <circle cx="373.14" cy="196.74" r="12" fill="#1E293B" stroke="#8B5CF6" stroke-width="2" />
    <circle cx="373.14" cy="196.74" r="4" fill="#FFFFFF" />

    <!-- Node 3 -->
    <circle cx="322.32" cy="353.26" r="12" fill="#1E293B" stroke="#8B5CF6" stroke-width="2" />
    <circle cx="322.32" cy="353.26" r="4" fill="#FFFFFF" />

    <!-- Node 4 -->
    <circle cx="157.68" cy="353.26" r="12" fill="#1E293B" stroke="#8B5CF6" stroke-width="2" />
    <circle cx="157.68" cy="353.26" r="4" fill="#FFFFFF" />

    <!-- Node 5 -->
    <circle cx="106.86" cy="196.74" r="12" fill="#1E293B" stroke="#8B5CF6" stroke-width="2" />
    <circle cx="106.86" cy="196.74" r="4" fill="#FFFFFF" />
  </g>

  <!-- Central Core Node -->
  <circle cx="240" cy="240" r="32" fill="#000000" stroke="#3B82F6" stroke-width="4" filter="url(#glow)" />
  <circle cx="240" cy="240" r="12" fill="#3B82F6" />
</svg>
